- level: -1
  keyword: '''NEWBIE INFO'''
  text: "Ah! Another mortal, seeking adventure.  You should go through mudschool first,\n\
    to gain experience to face the trials outside.  Be sure to practice a weapon\n\
    in the guild room, or your stay with us shall be very short indeed.  Type\n'equipment'\
    \ to see what your are wielding, 'spells' to see your spells, \n'skills' to see\
    \ your skills, and 'commands' for a list of commands. Help is\navailable on most\
    \ commands and abilities.\n"
