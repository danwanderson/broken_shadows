- vnum: 6152
  name: The circle of trees.
  description: "The trees here seem to form a circle around a HUGE tree that is in
    the center\n\rof them.  You notice a wooden door carved into the huge tree to
    the east.  The\n\rtrail that you followed to get here seems to end at the base
    of the tree.\n\r"
