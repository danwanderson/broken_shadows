      crush it\n\rin a single blow.\n\r"
- vnum: 6150
  name: The narrow trail.
  description: "This trail looks much spookier than any other thats you have seen.
    \ The usual\n\ranimal claw marks and bites on the trees are getting far and few
    between. The\n\rtrail continues north.\n\r"
