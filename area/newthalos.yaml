- vnum: 9782
  name: On the Plains
  description: "You stand on an open field of grass. The forest to the north is\n\rcloser
    but still a good distance away. To the south a small dirt\n\rpath has been trodden
    into the ground heading towards New Thalos.\n\r"
  room_flags: 0
  sector: 2
