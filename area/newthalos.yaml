- vnum: 9512
  name: The Southern Bridge
  description: "Walking over the bridge you see the rushing waters of the Ishtar River.\n\rTo
    the south you see the Southern Gate of New Thalos and the Common\n\rSquare stretches
    out to the north.\n\r"
