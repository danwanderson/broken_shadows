- vnum: 9518
  name: Sultan's Walk
  description: "This cobblestone road aides your journey through town. Traveling north
    will\n\rtake you by the palace and the Dancing Daemon Inn, and south will put
    you on\n\rthe market square.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9519
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9515
  extra_descs: []
- vnum: 9519
  name: Sultan's Walk
  description: "This part of the road travels between one of the sturdy walls of the\n\rPalace
    and the Dancing Daemon. To the east you peer through a small\n\rwindow into the
    Daemon, seeing many people dancing and drinking. After\n\ryou tend to your other
    chores you plan on visiting the Daemon.\n\rThe walk continues north and south
    from here.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9520
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9518
  extra_descs: []
- vnum: 9520
  name: Sultan's Walk
  description: "The road here between the palace and the Dancing Daemon Inn seems
    well\n\rworn by the travel of horses, carts, and leather boots. From the west
    you\n\rhear the faint sound of trumpets announcing the arrival of some duke or\n\rduchess
    to the palace. Safe haven awaits you to the east in the halls\n\rof the Daemon,
    and Sultan's Walk continues north and south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9521
  - dir: 1
    desc:
