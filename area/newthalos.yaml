- vnum: 9787
  name: The Dragon Sea
  description: "The Dragon Sea comes up along the shore here, the deep blue waters\n\rrolling
    in and crashing against the beach. To the north you see a\n\rsmall dock jutting
    out into the surf.\n\r"
  room_flags: 0
  sector: 7
