  extra_descs: []
- vnum: 9793
  name: On a road
  description: "This is the main land route through the land. Merchants can bring
    thier goods\n\rto the coastline and have them ferried onto ships for export. Travel\n\rby
    foot west will take you through New Thalos up and over the Eastern\n\rMountains
    and down into Midgaard.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
