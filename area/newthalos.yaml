    key: -1
    to_vnum: 9543
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9534
  extra_descs: []
- vnum: 9536
  name: West Ishtar Drive
  description: "A cool breeze blows up off the river chilling the sweat otherwise
    present\n\ron you skin. Orders and sometimes curses can be heard from the west\n\rin
    the direction of the warehouses. The common square opens up to the east\n\rand
    Ishtar Drive continues west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9510
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9535
  extra_descs: []
- vnum: 9537
  name: East Ishtar Drive
  description: "Loud hammering and the sound of red hot iron cooling in water reaches\n\ryour
    ears as you stand in front of the blacksmith. A small boy runs up\n\rto you with
    big eyes and as you return his gaze runs off down the road.\n\rThe common square
    can be seen to the west and Ishtar Drive continues\n\rto the east.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9644
  - dir: 1
    desc:
