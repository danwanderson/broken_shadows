- vnum: 9790
  name: On a road
  description: "The people of New Thalos take great pride in the services their\n\rcity
    may provide. One of these services is the construction crews\n\rthat go to great
    lengths to keep all the roads in order. Although\n\rthe taxes in New Thalos are
    higher than other cities in the realm\n\rmost of the money is used for the good
    of the people.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
