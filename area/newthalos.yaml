  extra_descs: []
- vnum: 9794
  name: Near the shore
  description: "The road ends here turning into a small dirt path leading down the\n\rbeach
    and onto a dock. To the north and south you see the coastline\n\rstretching out
    before you. West of here the lowlands roll up into\n\rhuge snow capped mountains.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
