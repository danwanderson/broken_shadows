- vnum: 9515
  name: The Northern Market Square
  description: "You stand in one of the most heavily used parts of town. To the north
    lies\n\rthe Palace of New Thalos and the Casbah; east west and south of here the\n\rbusy
    market thrives with life.\n\r"
  room_flags: 0
  sector: 1
