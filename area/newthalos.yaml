- vnum: 9795
  name: On a dock
  description: "You stand on a simple wooden dock that acts as an extension of the
    road\n\rto the west. The dock seems to have been here for quite a long time\n\rbut
    is still sturdy. A small ladder has been built on the eastern end\n\rto allow
    easy access to and from ships.\n\r"
  room_flags: 0
