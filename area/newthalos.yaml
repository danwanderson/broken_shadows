  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9540
  extra_descs: []
- vnum: 9542
  name: East Ishtar Drive
  description: "The sound of squawking gulls and the smell of rotting fish gives you
    a hint\n\rof your location. The Ishtar River flows south of you, but looks crystal\n\rclear,
    so it cannot be the source of this putrid smell. Looking north you\n\rnotice a
    small sign hanging over the dump.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
