    to_vnum: 9525
  extra_descs:
  - keywords: poster
    description: "A wealthy man in red robes is smiling at you.  The caption reads:\n\r\n\rTHE
      SULTAN REMINDS YOU TO PAY YOUR TAXES!\n\r\n\r"
- vnum: 9527
  name: East Main Street
  description: "Here on East Main, you smell the odor of freshly slaughtered meat
    and\n\rhear the pounding of new metal from the armory.  The Square is to\n\rthe
    west and a junction is to the East.\n\r"
  room_flags: 0
  sector: 1
