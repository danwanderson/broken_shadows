  extra_descs: []
- vnum: 9526
  name: West Main Street
  description: "You are strolling on the street between the bank and general store.\n\rTo
    the west you hear a roadcrew at work and to the East, the sounds of\n\rcommerce
    taking place.  The air is filled with the smell of gold and riches.\n\rOn the
    wall of the store is a poster.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
