- vnum: 9511
  name: Outside the Southern Gate of New Thalos
  description: "You see before you the expanse of the Sands of Sorrow.  The shifting
    sands \n\rstretch on endlessly to the south, hiding treasure and adventure.\n\r"
  room_flags: 0
  sector: 1
