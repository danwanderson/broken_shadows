- vnum: 9612
  name: Entrance to the Guild of Clerics
  description: "This hall pales in comparison to that of the main hall, but is beautiful\n\rin
    its own right. Shaven heads and brown robes can be seen milling about\n\rquitely
    talking to each other. North is back inside the temple proper,\n\rand south is
    the entrance to the cleric's bar.\n\r"
