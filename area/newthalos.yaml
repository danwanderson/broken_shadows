  - keywords: note sign
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth to Ahkeem\n\rSELL : sells an item to Akheem for a
      generous sum\n\rBUY : Akheem's FAVORITE command lets you have an item for his
      low low price.\n\r\n\r                                       "
- vnum: 9615
  name: Vera's Veggies
  description: "This is a busy place.  Customers shuffle around, bartering for lower
    prices\n\ron the wide selection of vegetables.  You can still hear your mother
    telling\n\ryou 'Eat your Veggies'.  That's probably why you're mudding right now
    and\n\rnot hanging out with mom.  But wait...Vera looks just like your mother!\n\rThere
    is a large poster, behind the counter, taped to the wall.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9516
  extra_descs:
  - keywords: note poster
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth to Vera\n\rSELL : sells an item to Vera for a generous
      sum\n\rBUY : Vera's FAVORITE command lets you have an item for her low low price.\n\r\n\r
      \                                       NEWBEE INTRUCTOR COMITEE\n\r"
