- vnum: 9531
  name: Inside the Eastern Gate of New Thalos
  description: "Two large stone towers imbedded in the wall loom over you. The massive\n\riron
    gate, emblazened with the crest of New Thalos, swings easily on\n\rfour ornately
    crafted hinges. It is obvious the makers of this city spared no\n\rexpense in
    protecting their home.  Main street heads towards the market\n\rwestward and the
    wilderness beckons from the east. To the north lies the\n\rentrance to the mages'
    guild.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
