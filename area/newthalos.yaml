    exit_flags: 0
    key: -1
    to_vnum: 9658
  extra_descs: []
- vnum: 9521
  name: Sultan's Walk
  description: "The main road north from the square continues here, surrounded by
    the walls\n\rof the palace and the Daemon. To the north you see the heavily guarded
    gate\n\rand can make out faint sounds of trade to the south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
