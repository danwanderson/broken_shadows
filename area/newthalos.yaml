- vnum: 9604
  name: Chamber of the High Priest
  description: "You have entered the chamber of the most holy man in New Thalos. The\n\rHigh
    Priest advises the Sultan on all matters in the world of the sacred.\n\rFrom what
    you have heard however, this holy man has a bit of a temper,\n\rand he doesn't
    look very happy that you've disturbed his prayers.\n\rThe only obvious exit is
    south.\n\r"
  room_flags: D
