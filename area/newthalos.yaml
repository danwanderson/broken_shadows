- vnum: 9530
  name: East Main Street
  description: "The Main street through eastern New Thalos begins here and heads westward\n\rtowards
    the marketplace. One of the main gates can be seen to the east, and\n\rBraheem's
    Magic Shop awaits your business to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
