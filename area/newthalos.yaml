    to_vnum: 9539
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9510
  extra_descs: []
- vnum: 9538
  name: East Ishtar Drive
  description: "The wide road bordering the south of town continues to the east and\n\rwest
    here, bordered only by the hay-loft to the north and the Ishtar\n\rRiver to the
    south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9540
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9539
  extra_descs: []
- vnum: 9539
  name: East Ishtar Drive
  description: "Small clumps of hay strewn about the ground alerts you to the fact
    that\n\ryou have reached the stables. Arabian stallions as well as many other\n\rfine
    breeds of horses can be purchased for a price. Ishtar road continues\n\reast and
    west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9645
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9538
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9537
  extra_descs: []
- vnum: 9540
  name: East Ishtar Drive
  description: "Even in broad daylight, you can hardly see into the back alley that
    begins\n\rhere and heads north. Sounds of loud drunken folk and the occasional\n\rscreaming
    cat emenate from the direction. Luckily you have the choice of\n\rgoing east or
    west down the drive as well.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see murky darkness.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9568
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9541
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9538
  extra_descs: []
- vnum: 9541
  name: East Ishtar Drive
  description: "Your highly acute sense of smell reports you have reached the entrance\n\rto
    the fish market. Although renowned for it fresh catches and\n\rwide selection
    of aquarian delicacies you wonder how much longer you\n\rcan endure the smell!
    The Ishtar River flows alongside to the south\n\rwith the drive running alongside
    it east to west.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9532
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
