  name: Inside the Temple
  description: "The temple continues here, but not on such a grand scale. The place\n\rstill
    looks immaculate. To the north you see the chamber of the High\n\rPriest and a
    sign on the door in BIG letters thats says DO NOT DISTURB.\n\rTo the south is
    the entrance to the Cleric's Guild.\n\r"
