- vnum: 9514
  name: The Northwestern Market Square
  description: "This corner of the market contains some of the most civilized folk
    in\n\rNew Thalos. To the north lies the humble store of the merchant Ahkeem, his\n\rweavings
    known to be the best in the city. West of here is the entrance\n\rto the First
    Royal Bank of New Thalos.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
