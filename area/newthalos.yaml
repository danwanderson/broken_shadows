- vnum: 9595
  name: Zippoii's Room
  description: "Climbing up the staircase you enter the hovel of a curious mage. A
    small\n\runcomfortable looking bed rests in the corner, surrounded by ancient\n\rtomes.
    On the worn desk next to the window candles burn low, casting\n\rstrange shadows
    on the walls. The only noticeable decor is the mounted\n\rhead of the Demi-Lich.\n\r"
  room_flags: DEFG
