- vnum: 9609
  name: Inside the Temple
  description: "Huge marble pillars rise on either side of you and grab hold of the
    ceiling.\n\rBetween each of these, fine softstone frescoes have been carved depicting\n\rscenes
    from the religous history of New Thalos. Rows of pews face forward\n\rgiving their
    full attention to the pulpit rising high  above the ground. The\n\rdeep red carpeting
    underfoot shows not a speck of wear or dirt. It's obvious\n\rthat New Thalonians
    take religion seriously.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
