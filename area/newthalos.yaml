- vnum: 9524
  name: West Main Street
  description: "This is the main road traveling though the city. To the south you
    hear\n\rthe hammering of the repair shop and to the north is the grassy field\n\rknown
    as the temple square. Main street continues east and west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
