- vnum: 9598
  name: Tank's Room
  description: "Now here's a room that is easy to understand. A bed, a dresser, and
    a\n\rrack for weapons and armor are all that occupy it. Some posters adorn\n\rthe
    walls, to add color, proclaiming things such as Live fast, Die Young,\n\rand a
    homemade one in the corner with a picture of Ice and under it the\n\rinscription,
    \"I LOVE the resurrection spell\". The only thing out of\n\rplace in this happy-go-lucky
    room is mounted head of Crimson Death.\n\r"
  room_flags: DEFG
