- vnum: 9596
  name: Ice's Room
  description: "Brrrrrr, it's COLD in here. Must be 30 below. It would seem the cleric\n\rIce
    lives up to his name. Healing herbs and other such things line\n\rthe walls in
    racks, holy symbols and pictures cover the walls, and\n\rthe smiley face button
    stuck on his bedpost tells you he'll probably\n\rhelp you out all he can. As you
    turn to leave the room the mounted head\n\rof Kalas stares past you into emptiness.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords: door
    exit_flags: AB
    key: -1
    to_vnum: 9594
  extra_descs: []
- vnum: 9597
  name: Naazgul's Room
  description: "Three Rings for the Elven-kings under the sky,\n\r  Seven for the
    Dwarf-lords in thier halls of stone,\n\rNine for Mortal Men doomed to die,\n\r
    \ One for the Dark Lord on his Dark Throne\n\rIn the Land of Mordor where Shadows
    lie.\n\r  One ring to rule them all, One ring to find them,\n\r  One ring to bring
    them all and in the darkness bind them\n\rIn the Land of Mordor where the Shadows
    lie.\n\r\n\rIf I have to explain, you wouldn't understand.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
