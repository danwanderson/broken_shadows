- vnum: 9513
  name: Inside the South Gate of New Thalos
  description: "Two large stone towers rise up to greet you with the massive iron
    gate\n\rswinging on ornately crafted hinges and emblazoned with the crest of\n\rNew
    Thalos. The makers of the city spared no expense in rebuilding the\n\rdefenses
    or their home. The Ishtar River bridge lies to the north and\n\rwilderness to
    the south.\n\r"
