- vnum: 9523
  name: Inside the West Gate of New Thalos
  description: "Two large stone towers embedded in the wall loom over you. The massive\n\riron
    gate, emblazoned with the crest of New Thalos, swings easily on\n\rfour ornately
    crafted hinges. It is obvious the makers of this city\n\rspared no expense to
    protect thier home.  Main street heads towards\n\rthe market eastward and the
    eastern road passes through the Sands of\n\rSorrow to your west. To the south
    lies the entrance of the warrior's guild.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
