  extra_descs: []
- vnum: 9525
  name: West Main Street
  description: "A foreman stands stand here watching over two construction workers\n\rfixing
    a pothole. The road here branches off north and south into\n\rtwo alleys behind
    the stores of the market. The main street continues\n\reast and west from here.\n\r"
  room_flags: 0
  sector: 1
