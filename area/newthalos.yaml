  name: The Temple Gates
  description: "You stand before the entrance way to the Temple of New Thalos. Two
    large\n\rwrought iron gates lie open before you. Although they might not ever
    be\n\rused, the priests in the temple are ready to defend themselves, should\n\rtheir
    city ever come under siege again.\n\r"
