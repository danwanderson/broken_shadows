- vnum: 9522
  name: Inside the Northern Gate of New Thalos
  description: "Two large stone towers rise up to greet you with a massive iron gate\n\rswinging
    between on ornately crafted hinges and emblazend with the crest of\n\rNew Thalos.
    The makers of this city spared no costs in rebuilding the\n\rdefenses of thier
    home. Sultan's Walk runs to the south and the Casbah\n\rstretches out east and
    west. To the north lay wilderness of the desert.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords: gate
    exit_flags: ABC
    key: 9501
