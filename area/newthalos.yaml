- vnum: 9510
  name: The Common Square
  description: "People pass by talking to each other, or rest their weary bones on
    this\n\rgrassy field. You can hear faint sounds of the river to the south of you\n\ras
    it passes through the city. Ishtar drive heads east and west from here\n\rand
    the medina is to the north. South lies the Ishtar River bridge and the\n\rsouthern
    gate.\n\r"
  room_flags: 0
  sector: 1
