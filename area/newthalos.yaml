- vnum: 9516
  name: The Northeastern Market Square
  description: "Pandemonium. Chaos. Madness. A few other choice words come to mind
    as you\n\rgaze into this corner of the market. The vegetable stand seems quiet
    enough\n\rso you have to assume the noise comes from the Butchery. You have to\n\rthink
    for a while before you muster the will to enter this shop.\n\rThe market continues
    to the south and west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
