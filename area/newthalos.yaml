  name: Cleric's Sanctum
  description: "You walk down the staircase into the silent inner sanctum. Here sits\n\ryour
    guildmaster ready to assist you when the time is right. The room\n\ris completely
    silent. The only obvious exit is back up the staircase\n\rinto the the Nectar.\n\r"
