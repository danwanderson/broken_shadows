- vnum: 9610
  name: Donation Room
  description: "This room is new to the temple.  It was created during the hard times\n\rthat
    have struck the city in recent decades.  Luckily for them the sultan\n\rhad been
    hoarding some of the basic necessities for just such an occasion.\n\rThese days
    the donation room depends on the generosity of wealthy\n\radventureres, and a
    curse on any that walk in to get all.\n\r"
  room_flags: D
  sector: 0
