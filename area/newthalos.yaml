- vnum: 9517
  name: The Eastern Market Square
  description: "You stand in the market of New Thalos, the gem of the desert. The\n\rmarket
    is the hub of the city; all trade and commerce of any significance is\n\rcarried
    on here. The market spreads out in all directions save east; here\n\rMain Street
    heads for the eastern gate.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
