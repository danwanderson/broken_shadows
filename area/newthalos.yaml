  extra_descs:
  - keywords: sign
    description: "NO LOITERING!\n\r\n\r(by order of the Sultan of New Thalos)\n\r"
- vnum: 9529
  name: East Main Street
  description: "As you walk by the mercenary guild a cold chill causes you to shiver\n\runcontrollably.
    You see some shady looking characters lurking about the\n\rentrance to this house
    of 'helpful' people. Perhaps curiosity gets the\n\rbest of you, but you wonder
    what could be going on inside. To the north\n\ryou see the open doors of the apothecary
    shop where one may buy many\n\rmagical livations.\n\rMain Street continues east
    and west from here.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
