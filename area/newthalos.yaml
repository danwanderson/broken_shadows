- vnum: 9528
  name: East Main Street
  description: "You are on East Main Street.  To the North is the beginning of\n\rGuildsman's
    Row.  To the South is a dark alley.  The road also\n\rcontinues to the East. There
    is a small sign on a wire hanging\n\racross the junction.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
