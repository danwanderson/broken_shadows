rooms:
- vnum: 9500
  name: The Entrance to the Dancing Daemon Inn
  description: "You find yourself in an entrance foyer to the Dancing Daemon Inn.
    Chrome\n\rplated stairs spiral up to the reception area. To the south you hear
    the\n\rsounds of merriment and drinking and from the west you hear the bustling\n\ractivity
    of New Thalos.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see people dancing and drinking.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9502
  - dir: 3
    desc: "You see people walking by on Sultan's Walk.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9520
  - dir: 4
    desc: "The spiral stairs lead up to the reception area.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9501
  extra_descs: []
- vnum: 9501
  name: The Reception Area
  description: "You are now standing in the reception of New Thalos. A huge mahogany\n\rdesk
    is here along with two sofas and a coffee table covered in magazines.\n\rThe plush
    carpeting under your feet is a nice change from the rugged paths\n\ryou are used
    to travelling. A chrome stairway spirals downstairs to the\n\rtavern of the Dancing
    Daemon Inn, and your future adventures in New Thalos.\n\r"
  room_flags: CDEFG
  sector: 0
  owner:
  exits:
  - dir: 5
    desc: "The stairs lead down to the Daemon.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9500
  extra_descs:
  - keywords: 4.picture
    description: "You see a picture of Loki... at least you think it's Loki.\n\rHe
      seems to be hiding from the camera.\n\r"
  - keywords: 3.picture
    description: "You see a picture of Hammor on the front porch of the Danjerhaus,\n\rdrinking
      a guinness stout and petting Big Guy the Cat.\n\r"
  - keywords: 2.picture
    description: "You see a picture of Shark standing behind his desk screaming at
      a newbie.\n\rThrough a window in the back you see a large aquarium. The newbie
      seems to\n\rbe cowering in fear.\n\r"
  - keywords: 1.1picture
    description: "You see a picture of Felix here, standing before the arena.\n\rHe
      seems to be doing a body count.\n\r"
- vnum: 9502
  name: The Dancing Daemon Inn
  description: "A huge circling wet-bar takes up most of the east end of the Daemon.
    An\n\rold mage reclines against the mirror behind the bar absentmindedly pouring\n\rseveral
    drinks at once with his refined telekinesis. The Lokettes, a local\n\rband, are
    playing their usual gig on the stage. The large booths along the\n\rwall are filled
    with people drinking and having a grand time. You feel like\n\rpartying here.\n\rThe
    only obvious exit is to the north.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "You see the entrance to the Daemon.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9500
  extra_descs:
  - keywords: bar
    description: "The bar looks slightly out of place and you can only assume the
      powerful\n\rmagic of the bartender allows it to revolve.\n\r"
- vnum: 9503
  name: The Medina
  description: "You stand on the Medina, on the larger open areas in New Thalos. People\n\rwalk
    to and fro carrying on their day to day business. The Common Square\n\rof the
    people opens up to the south and the Medina continues north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see medina.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9504
  - dir: 2
    desc: "You see the Common square.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9510
  extra_descs: []
- vnum: 9504
  name: The Medina
  description: "You are walking along a wide open expanse of road connecting the market\n\rsquare
    to the common square. Panhandlers, beggars, and other such riff-\n\rraff wander
    about hoping to catch those few who with open hearts.\n\rThe medina continues
    to the south and the market spreads out to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see the market.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9505
  - dir: 2
    desc: "You see the medina.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9503
  extra_descs: []
- vnum: 9505
  name: The Southern Market Square
  description: "The large square of markets fills your vision. Strange sights and
    sounds,\n\rthose known only to the New Thalos market, barrage your senses. The
    only\n\rhope of making any sense of what's going on here is to wander around.
    The\n\rMarket continues north, west, and east, with the Medina trailing off south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
