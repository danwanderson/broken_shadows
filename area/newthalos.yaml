  extra_descs: []
- vnum: 9786
  name: The Dragon Sea
  description: "You are on the clear blue seas of the Dragon Sea.  Water extends in
    all\n\rdirections as far as the eye can see.  Off in the distance you think you\n\rmight
    see a small dock to the north.  \n\r"
  room_flags: 0
  sector: 7
  owner:
  exits:
