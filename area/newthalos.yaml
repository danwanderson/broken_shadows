    to_vnum: 9535
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9533
  extra_descs: []
- vnum: 9535
  name: West Ishtar Drive
  description: "The cobblestone road is moist here, the trail of water heading down
    to\n\rthe boat ramp. Catching your balance as you start to slide on the slick\n\rpavement
    you grab on to the handrail someone has conveniently placed here.\n\rTo the north
    is the Shipwright and Ishtar Drive continues east and west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9642
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
