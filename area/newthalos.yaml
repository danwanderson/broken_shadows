    to_vnum: 9790
  extra_descs: []
- vnum: 9792
  name: On a road
  description: "The Dragon Sea can be seen to the east now spreading out to unkown\n\rlands.
    The road continues east and west. To the south you hear the\n\rsounds of boats
    traveling the Ishtar delivering goods.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
