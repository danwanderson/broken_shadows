- vnum: 9791
  name: On a road
  description: "You walk along a well used road with beautiful scenery. To the north\n\rtall
    pine trees form a wall that goes on for miles. Between the road\n\rand the trees
    lies a great expanse of grassy plains. South of here,\n\rbeyond the river, lie
    the Sands of Sorrow. The road continues\n\reast and west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
