- vnum: 9532
  name: Cassandra's Catch of the Day
  description: "Nothing in your life has prepared you for the odor which fills your
    lungs.\n\rNot wanting to offend the beautiful shopkeeper you hold your tongue
    and\n\rquietly look over her selection.\n\r"
  room_flags: DEF
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9541
  extra_descs: []
- vnum: 9533
  name: West Ishtar Drive
  description: "This is the warehouse district of New Thalos. Strong men walk back
    and\n\rforth from the docks to the warehouse carrying large crates loading\n\rand
    unloading the boats as they sail down the river. To the north is\n\rone of the
    entrances of the warehouse and West Ishtar leads east.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9640
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9534
  extra_descs: []
- vnum: 9534
  name: West Ishtar Drive
  description: "A few men walk by almost pushing you out of the way as they go about\n\rthier
    business of loading and unloading the boats. An entrance to the\n\rhuge warehouses
    of New Thalos is to the north and the Ishtar River\n\rquietly flows by to the
    south. Ishtar Drive continues east and west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9641
  - dir: 1
    desc:
