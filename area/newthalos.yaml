- vnum: 9784
  name: Ishtar River
  description: "The river broadens even more here and the waters become murky. The\n\rsmell
    of saltwater has reached you from the east. The Dragon Sea\n\rcannot be far away.
    To the east you can see the faint outline\n\rof a city and to the north you see
    a large expanse of grass.\n\r"
  room_flags: 0
  sector: 7
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9785
  - dir: 3
    desc:
