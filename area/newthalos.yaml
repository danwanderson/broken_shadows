    key: -1
    to_vnum: 9726
  extra_descs: []
- vnum: 9785
  name: The river delta
  description: "This is where the river empties out into the Dragon Sea. The backrush\n\rof
    water has kicked up a lot of sand and the blue sea is stained where\n\rthe river
    empties. Looking east, all you can see is water....all the way\n\rto the horizon.
    North of here is a small dock you think you should be\n\rable to reach with out
    too much trouble. The river stretches off to\n\rthe west back towards New Thalos.\n\r"
  room_flags: 0
  sector: 7
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
