- vnum: 9508
  name: The Southwestern Market Square
  description: "This area of the market seems relatively quiet, save the high-pitched\n\rbanter
    of the shopkeeps attempting to lure you into their stores.  South\n\ryou see the
    bread stand and west is the entrance to the general store.\n\rThe market's sprawl
    continues east and north of here.\n\r"
  room_flags: 0
