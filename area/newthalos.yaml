- vnum: 9783
  name: Edge of the forest
  description: "You stand at the edge of a huge forest. The line of trees\n\rcontinues
    as far as the eye can see to the east and west. A large\n\rexpanse of grass spreads
    out to the south.\n\r"
  room_flags: 0
