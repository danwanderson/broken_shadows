- vnum: 9506
  name: The Center of Market Square
  description: "You are standing on the Center of Market Square, the famous square
    of\n\rNew Thalos. A large, peculiar looking statue is standing in the middle\n\rof
    the square. The square extends in every direction.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
