- vnum: 9605
  name: By the Altar
  description: "You are by the temple altar in the northern end of Temple of New\n\rThalos.
    A huge altar made of highly polished black onyx is standing\n\rin front of you.
    Behind this altar sits a twelve foot tall statue of\n\rLoki, the highest god in
    all the lands.\n\r"
  room_flags: CDG
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9609
  extra_descs:
  - keywords: statue
    description: "Looking up the huge statue you see Loki calmly gazing out across
      his\n\rlands.  He seems pleased.\n\r"
- vnum: 9606
  name: The Weaver's Guild
  description: "Rows and rows of uncut cloth lie about waiting to be hemmed up into\n\rtailored
    clothes. Cotton is brought in from the countryside and\n\rspun up into cloth and
    dyed different colors. A young boy walks\n\rin, grabs a pile of clothing and leaves.\n\r"
  room_flags: D
