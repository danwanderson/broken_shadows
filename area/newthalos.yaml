- vnum: 9798
  name: Under the dock
  description: "You are swimming underneath the dock. You can see the four wooden\n\rpylons
    that support the structure. The murky water clouds your vision\n\ras you gaze
    westward, but you think you can make out an iron grating in\n\rthat direction.\n\r"
