- vnum: 9509
  name: The Western Market Square
  description: "This area of the square seems a bit more subdued than the rest. You\n\rnotice
    that most of the outland adventurers mill around the southern\n\rend of the market,
    while the townfolk seem to keep their business in\n\rthe northern end.  West Main
    Street begins here and heads for the\n\rgate. The market's expanse fills the other
    directions.\n\r"
  room_flags: 0
  sector: 1
