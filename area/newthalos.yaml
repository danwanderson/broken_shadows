  - keywords: statue
    description: "Before you is a statue of the Mighty Beholder!\n\rA great beast
      with multiple eyes and wicked... wicked... um.... eyes...\n\rThe Mighty Beholder
      is in Excellent condition.\n\r"
- vnum: 9507
  name: The Southeastern Market Square
  description: "In this corner of the market some of the largest warriors in the land\n\rtower
    over you. It's easy to understand why they hangout here once you\n\rnotice the
    weapon shop and the armory close by. Perhaps you might stop\n\rin and take a look
    at the wares these shops have to offer.\n\r"
  room_flags: 0
  sector: 1
