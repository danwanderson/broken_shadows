  description: "You stand on one of the four towers guarding the city. The view from\
    \ here\nis great! To the west you see the tall mountains that make up the divide\n\
    between here an Midgaard. The Ishtar river slowly flows from that direction.\n\
    South you can see the entire city of New Thalos and the Sands of Sorrow \nto the\
