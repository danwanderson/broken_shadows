- vnum: 9618
  name: The Mage's Courtyard
  description: "You enter a small tiled courtyard with a small fountain in the middle.\n\rAround
    the sides are four wrought iron benches with cushions where the\n\rmages of the
    land sit and exchange ideas. To the west stands a two-story\n\rtower where the
    leader of the mage's guild performs his experiments.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9625
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9617
  extra_descs: []
- vnum: 9619
  name: Nectar of the Gods
  description: "You are startled by the lavishness of this place. From what you know
    of\n\rclerics they are supposed to be humble people, giving all thier\n\rmaterial
    goods to their cause. Perhaps because only clerics are\n\rallowed to enter this
    bar they have condoned making it as comfortable\n\ras possible. In the corner
    stands a staircase leading down to the\n\rmeditaion chambers.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9612
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9603
  extra_descs: []
- vnum: 9620
  name: The Temple Square
  description: "You are standing on the meeting grounds of those with holy intentions.\n\rMonks,
    bards, paladins and clerics mill around either preaching or\n\rlistening to their
    fellows preach. Huge marble steps lead up to the\n\rgates of the temple and Main
    Street lies to the south.\n\r"
  room_flags: F
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9613
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9524
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9613
  extra_descs: []
- vnum: 9621
  name: The Bank
  description: "You stand in a large building decorated with black marble and red
    satin.\n\rHuge pillars support an arched ceiling far above your head.  You wonder
    at\n\rthe skill the dwarves have for detail as you examine the trim.  Fine silver\n\rseparates
    the polished blocks that make up the floor.\n\r"
  room_flags: DEFGV
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9514
  extra_descs: []
- vnum: 9622
  name: The Butchary
  description: "This shop has the aroma of freshly slaughterd beasts.  You feel right
    at home.\n\rYou see a fairly simple set up.  The corpses..er...selections hang
    on hooks,\n\rstill bleeding into catch pans that drain into a single underground
    vat.\n\rYou wonder where that leads....  Taped to the counter, almost obscured
    by\n\rblood, there is a barely readable sign.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9516
  extra_descs:
  - keywords: vat
    description: "You think you hear noises from the vat....nah.\n\r"
  - keywords: note sign
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth\n\rSELL : sells an item to Butch for a generous sum\n\rBUY
      : Butch's FAVORITE command lets you have an item for his low low price.\n\r\n\r
      \                                       NEWBEE INTRUCTOR COMMITEE\n\r"
- vnum: 9623
  name: The Witch's Brew
  description: "The first thing you notice as you walk into this spacious shop is
    the\n\rhundreds of candles that line the shelves. The swirling mist that surrounds\n\ryour
    feet makes it seem that you have stepped into a gateway to another\n\rplane. A
    tall brunette stands behind her cluttered table unaware of\n\ryour entrance.  An
    ornately lettered sign floats above your head.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9529
  extra_descs:
  - keywords: note sign
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth to Elvira\n\rSELL : sells an item to Elvira for a
      generous sum\n\rBUY : Elvira's FAVORITE command lets you have an item for her
      low low price.\n\r\n\r\n\r"
- vnum: 9624
  name: Braheem's Magic Shop
  description: "You enter a shop crowded with bookshelves and clutterd with scrolls.
    The\n\rowner seems to be hard at work on his latest magical creation. You see
    a\n\rsmall sign on the wall.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9530
  extra_descs:
  - keywords: sign
    description: "Welcome to Braheem's.\n\rLIST -Shows you all of my wonderful creations.\n\rVAL
      \ -Shows what an item might be worth to me.\n\rSELL -Allows you to rid yourself
      of excessive magic items.\n\rBUY  -Allows you to rid youself of excessive cash.\n\r"
- vnum: 9625
  name: Entrance to the Mage's Tower
  description: "The entrance hall is a small poorly lit room. It would seem its only\n\rpurpose
    is to house the powerful sorcerer standing here guarding\n\rthe entrance.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9618
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9531
  extra_descs: []
- vnum: 9626
  name: Entrance to the Guild of Warriors'
  description: "This small hall is merely a check point to keep the unwanted out.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9523
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9633
  extra_descs: []
- vnum: 9627
  name: The Repair Shop
  description: "One of the most popular shops in New Thalos, this shop is always a
    hive\n\rof activity. It is almost inhuman the way one man can fix all the area's\n\rarmor
    singlehandedly. If you have an item in need of repair simply give\n\rit to the
    man behind the counter.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9524
  extra_descs: []
- vnum: 9628
  name: The General Store
  description: "The new found wealth of this beautiful city is apearant in the exotic
    items\n\rfor sale here.  You wonder what would happen if you typed....LIST...\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9508
  extra_descs: []
- vnum: 9629
  name: Abdul's Armor
  description: "The sound of hammering metal grows louder as you enter the armory.
    \ Young\n\rboys run to and fro carrying buckets of water and coal.  A few dwarves
    work\n\ron sections of armor in the back of the shop, their hammers working too
    fast\n\rto follow.  The walls are adorned with all of Abdul's prize creations.
    \ Here\n\ryou can purchase suits of armor meant to keep monsters from hacking
    you into\n\rlittle pieces.\n\rA note on the wall beckons newbies.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9507
  extra_descs:
  - keywords: note
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth to Abdul\n\rSELL : sells an item to Abdul for a generous
      sum\n\rBUY : Abdul's FAVORITE command lets you have an item for his low low
      price.\n\r\n\r\n\r"
- vnum: 9630
  name: The Mercenary's Guild
  description: "This guild is frowned upon by most of the population of New Thalos,
    but\n\rthe laws of supply and demand are irresistable. People come here when\n\rthey
    feel unable or are unwilling to fight their own battles. For a\n\rsmall fee you
    may hire henchman.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9529
  - dir: 1
    desc: "You notice some small scratches in the floor next to the eastern wall.\n\r"
    keywords: secret door
    exit_flags: AB
    key: -1
    to_vnum: 9632
  extra_descs: []
- vnum: 9631
  name: The Mercenary's Guild
  description: "This is the storage room for the mercenaries to be hired.\n\r"
  room_flags: C
  sector: 0
  owner:
  exits: []
  extra_descs: []
- vnum: 9632
  name: Entrance to the Thieves' Guild
  description: "This small, dark room has a single torch mounted in the wall for light.\n\rThere
    is a small wooden bench and a book lying on it. The assassin\n\rguarding the entrance
    from 'outsiders' stands as you walk in.\n\r"
  room_flags: AD
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9639
  - dir: 3
    desc:
    keywords: secret door
    exit_flags: ABC
    key: -1
    to_vnum: 9630
  extra_descs: []
- vnum: 9633
  name: The Whet Stone
  description: "Very large men with very large swords drink beer from very large mugs.
    Every-\n\rthing in this room is BIG. The large round tables are scuffed and nicked
    from\n\rthe numerous bar brawls that have sprung up. It might be a good idea to
    hold\n\ryour tounge for a while as you soak up the atmosphere. There is an exit
    to\n\rthe east where the master swordsman awaits pupils to train with.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9626
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9634
  extra_descs: []
- vnum: 9634
  name: Tournament and Practice Yard
  description: "This is a wide expanse of grass filled with dummies, punching bags
    and\n\rswordpupils. To the north you see a man dressed in black robes, unlike\n\rhis
    iron clad comrades, who you assume to be your master.\n\r"
  room_flags: CDEFG
  sector: 0
  owner:
  exits:
  - dir: 1
    desc: "You see the grass near the base of the wall here is slightly torn.\n\r"
    keywords: secret door
    exit_flags: ABC
    key: -1
    to_vnum: 9573
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9633
  extra_descs: []
- vnum: 9635
  name: The Bread Stand
  description: "A small stand has been set up here, showing the shopkeep's humble\n\rselection.
    You notice he has added a few things to his list.\n\r"
  room_flags: DEFGS
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9508
  extra_descs: []
- vnum: 9636
  name: Igor's Implements of Destruction
  description: "You can't help but shiver as you look at the selection of vicious
    weapons.\n\rHuge swords and wicked looking axes hang on pegs around the room.
    \ A dwarf\n\rsits at a bench in the back hammering away on his latest creation.
    \ It is\n\rhere you can buy rare and exotic items not found in other parts of
    the world.\n\rA note catches your eye.\n\r"
  room_flags: DFG
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9507
  - dir: 5
    desc:
    keywords: secret sesame
    exit_flags: ABCD
    key: 9591
    to_vnum: 9750
  extra_descs:
  - keywords: note
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth to Igor\n\rSELL : sells an item to Igor for a generous
      sum\n\rBUY : Igor's FAVORITE command lets you have an item for his low low price.\n\r\n\r
      \                                       NEWBEE INTRUCTOR COMITEE\n\r"
- vnum: 9637
  name: Ye Old Leather Shoppe
  description: "You are standing on a thick oriental rug surrounded on all sides by
    racks\n\rof numerous leather goods. A few women sit on leather cushions sewing
    in\n\rsome detail work on custom ordered jackets.  There is a note on the counter.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9566
  extra_descs:
  - keywords: note
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth\n\rSELL : sells an item for a generous sum\n\rBUY
      :  buy an item for an outrageous price.\n\r\n\r\n\r"
- vnum: 9638
  name: Smuggler's Inn
  description: "You are inside a filthy inn, that seemingly hasn't  been cleaned in
    decades.\n\rPoker tables line the walls and everyone stares at you as you walk
    in.\n\rYou don't feel very welcome. The bar has numerous knife holes in it\n\rand
    the bartender leans over waiting for your order.  A large sign, pinned\n\rto the
    wall by a knife, awaits your inspection.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9567
  extra_descs:
  - keywords: sign
    description: "LIST : gives you a list of items for sale.\n\rBUY :  buy something
      drinkable.\n\r\n\r\n\r"
- vnum: 9639
  name: The Filthy Unicorn
  description: "A draft chills your bones as you enter, though you see no open window
    or\n\rdoor. Hooded figures lurk around in the shadows and speak in low voices.\n\rA
    flash of steel lets you know that weapons are in great abundance\n\rin this crowd.
    As you quickly check your beltpouch you notice\n\ra small staircase leading down.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9632
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9646
  extra_descs: []
- vnum: 9640
  name: Warehouse
  description: "You are standing in a large room used to store merchandise made in
    the\n\rcity before it is shipped off. All the items here are made in New Thalos\n\rand
    shipped to other parts of the land.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9641
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9533
  extra_descs: []
- vnum: 9641
  name: Warehouse
  description: "Men walk to and fro counting crates and writing down their findings.
    This\n\rarea of the warehouse is used for storing the raw materials brought in\n\rfrom
    areas outside the city. These goods are then delivered to the various\n\rguilds.
    The export area of the warehouses is to the south.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9534
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9640
  extra_descs: []
- vnum: 9642
  name: Shipwright
  description: "The wood under you feet creaks from years of being soaked in saltwater.
    An\n\rold man with a curly, grey beard stand behind a small counter waiting to\n\rtake
    your order. Behind him are mounted various model sailboats and large\n\rfish.
    \ There is a large poster stapled to the counter.\n\r"
  room_flags: DEFG
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9643
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9535
  extra_descs:
  - keywords: note poster
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much an item is worth to the shipwright\n\rSELL : sells an item to the shipwright
      for a generous sum\n\rBUY : The shipwright's FAVORITE command lets you have
      an item for his low low pr\n\rice.\n\r\n\r\n\r"
- vnum: 9643
  name: Drafting Room
  description: "The walls are covered with paper sketchings of hull designs. This
    room is\n\rused by the shipwright to build his creations on paper before making\n\ra
    single cut in wood.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9642
  extra_descs: []
- vnum: 9644
  name: The Forge
  description: "Very much like the weaponsmith this man deals in the molding of metal.
    It\n\rseems that most of his creations deal with horses. On the walls you see\n\rseveral
    horseshoes made of iron. The room is hot, hotter than the desert\n\rjust south
    of here, and one wonders how the smithy can stand it.  Some\n\rletters have been
    burned into the wooden wall.\n\r"
  room_flags: CDEFG
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9537
  extra_descs:
  - keywords: letters wall
    description: "LIST : gives you a list of items for sale.\n\rVALUE : tells you
      how much the blacksmith will give you for his merchandise\n\rSELL : sells an
      item to the blacksmith\n\rBUY : buy an item from the blacksmith for a fair price\n\r\n\r\n\r"
- vnum: 9645
  name: The Royal Stables
  description: "Nothing you wouldn't expect is here. Several stalls hold the Sultan's\n\rchoice
    Arabian Stallions, and each has its own trough for drinking.\n\rA small boy wanders
    in sometimes with a shovel to remove the offensive\n\rby-product of such beasts.\n\r"
  room_flags: D
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9649
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9539
  extra_descs: []
- vnum: 9646
  name: The Secret Yard
  description: "This is a hidden yard known to only a few people in New Thalos. Here
    you\n\rmay train in the arts of stealing, picking locks, and becoming almost\n\rinvisible.
    A small staircase leads back up to the unicorn.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see some small scratches in the wall to the south.\n\r"
    keywords: secret door
    exit_flags: ABC
    key: -1
    to_vnum: 9589
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9639
  extra_descs: []
- vnum: 9647
  name: The Dump
  description: "This is the place where the people of the city dump their trash. Due
    to\n\rthe constant winds blowing down the moutains the smell is usually blown\n\routside
    the walls and over the desert.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9542
  extra_descs: []
- vnum: 9648
  name: The Mage's Laboratory
  description: "You stand in the top of an old stone tower. Along the walls hundreds
    of\n\rpotions, scroll, and wands lie in disarray. The man you see before you\n\rsits
    hunched over a small wooden table with two beakers of bubbling\n\rliquid in front
    of him. He looks up as you enter and smiles broadly.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9617
  extra_descs: []
- vnum: 9649
  name: The Hay Loft
  description: "Not as big as the ones you see on farms in the country, this hay loft\n\rserves
    as a storage area for the horses in the stables. The young boy\n\ryou saw with
    the shovel seems to have taken up residence on the second\n\rstory.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9645
  extra_descs: []
- vnum: 9650
  name: The Grand Entrance
  description: "Nowhere have you seen such an obscene display of wealth than in this\n\rcorridor.
    The shag carpeting under your feet makes it seem as if you are\n\rwalking on a
    cloud. Platinum candelabras hang delicately from the ceiling\n\rcasting light
    on the ancient tapestries adorning the walls. The crick\n\rin your neck tells
    you it's time to stop staring. To the west the\n\rnumerous halls of the palace
    begin and the gate lies to the east.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9660
  - dir: 1
    desc:
    keywords: gate
    exit_flags: ABCD
    key: 9500
    to_vnum: 9658
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9657
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9705
  extra_descs: []
- vnum: 9651
  name: The Library
  description: "This building holds the vast collection of books and documents that\n\rhave
    been brought here by the committee appointed to recover the\n\rlost knowledge
    of Thalos.  Rows of shelves, filled with book in every\n\rcondition, lines the
    walls.  The air has the aroma of old parchment and\n\rglue.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9555
  extra_descs: []
- vnum: 9652
  name: The Dance Hall
  description: "You seem to have missed a huge party.  The janitors are here cleaning
    up\n\rthe confetti and cigarette butts.  Hundreds of empty beer mugs on the\n\rtables
    surrounding the dance floor suggest that the citizens love their\n\rdrink.  There
    is still a banner on the wall.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9556
  extra_descs:
  - keywords: banner
    description: "========================================================================\n\r\n\r\t\tH
