rooms:
- vnum: 2801
  name: Wastedump
  description: "This room is filled with bone shards and fragments.  Something (or
    things)\n\rvery big lives here.  A small plaque is on the wall.\n\r"
  room_flags: AD
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "You reach civilization again.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 6124
  - dir: 2
    desc: "You find the stench is stronger inside.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2803
  extra_descs:
  - keywords: plaque
    description: "This zone (trollden) is created by MERC for any MERC Mud.\n\rcopyright
      1992\n\r"
- vnum: 2802
  name: Troll's Larder
  description: "This room has blood and grime all over the walls.  You see maggots
    and other\n\rinsects crawling up them.  The resident is definitely uncivilized.
    \ Half-eaten\n\rand rotting body parts scatter the floor, each having its own
    colony of flies,\n\rworms, and maggots.\n\r"
  room_flags: AD
  sector: 0
  owner:
  exits:
  - dir: 1
    desc: "You welcome the fresh breeze coming from the east, but wrinkle your nose
      when\n\rthe stench bears down on you once more.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2803
  extra_descs:
  - keywords: Half-eaten body rotting corpse
    description: "YUCK!  You find worms crawling in and out this poor unfortunate
      former human.\n\r"
- vnum: 2803
  name: Troll's Living Room
  description: "This small cave opens to the north, south, east, and west.  You are\n\rovercome
    by the stench and consider turning around.\n\r"
  room_flags: AD
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "There is a trail of bone shards and fragments leading north.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2801
  - dir: 1
    desc: "Good God!  You spy corpses all over the floor in there.  It looks like
      a\n\rvirtual graveyard in there.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2804
  - dir: 2
    desc: "Whoa!  You reel back from the stench.  You believe you have found the source\n\rof
      this bad smell.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2805
  - dir: 3
    desc: "You puke as you watch worms crawl between this room and the room west of
      here\n\ras they bore new holes into a corpse laying on the far wall of the west
      room.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2802
  extra_descs: []
- vnum: 2804
  name: The Playpen
  description: "The walls are covered with blood (and body parts!?!?).  Plastered
    on the far\n\rwall you see what looks like a human arm.  A half-eaten body lies
    here with\n\rits chest ripped out.  The predator seems disinterested in it.\n\r"
  room_flags: AD
  sector: 0
  owner:
  exits:
  - dir: 3
    desc: "You welcome the fresh breeze coming from the west, but wrinkle your nose
      when\n\rthe stench bears down on you once more.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2803
  extra_descs:
  - keywords: arm rotting
    description: "This reminds you of what a baby would do to its formula during dinnertime,\n\rplastering
      it on the wall.\n\r"
- vnum: 2805
  name: Troll's Bedroom
  description: "Obviously something REALLY big lives here.  The stench is quite unbearable.\n\rThere
    are piles and piles of rotten and half-eaten body parts of animals,\n\rorcs, (and
    humans?) strewn across the floor.  There is a larger, more\n\rprominent pile of
    rotten parts over in a corner.  It seems to have been\n\rflattened by something.\n\r"
  room_flags: ACD
  sector: 5
  owner:
  exits:
  - dir: 0
    desc: "You welcome the fresh breeze coming from the north, but wrinkle your nose
      when\n\rthe stench bears down on you once more.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2803
  extra_descs: []
