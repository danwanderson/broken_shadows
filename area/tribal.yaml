- vnum: 10269
  keywords: tommy cat
  short_desc: Tommy the Cat
  long_desc: "Tommy the Cat is here, on the prowl.\n\r"
  description: "\"I remember it as though it were a meal ago,\" said Tommy the Cat
    as he\n\rreeled back to clear whatever foreign matter may have nestled its way
    into\n\rhis mighty throat.  Many a fat alley rat had met its demise while staring\n\rpoint-blank
    down the cavernous barrel of this awesome prowling machine. \n\rTruly a wonder
    of nature this urban predator.  Tommy the Cat had many a\n\rstory to tell, but
    it was a rare occasion such as this that he did.  \"She\n\rcame slidin' down the
    alleyway like butter dripping over a hot biscut.  The\n\raroma, the mean scent,
    was enough to arouse suspicion in even the oldest of\n\rTigers that hung around
    the hot spot in those days.  The sight was beyond\n\rbelief.  Many a head snapped
    for double, even triple, takes as this\n\rvivacious feline made her way into the
    delta of the alleyway where the most\n\rverile of young tabbys were known to hang
    out.  They hung in droves.  Such a\n\rmultitude of masculinity could only be found
    in one place...  And that was\n\rO'Malley's Alley.  The air was thick with cat
    calls (no pun intended) but\n\rnot even a muscle in her neck did twitch as she
    sauntered straight into the\n\rheart of the alley.  She knew what she wanted!
    \ She was looking for that\n\rstud bull, that he cat.  And that was me.  Tommy
    the Cat is my name and I\n\rsay unto thee...  Say, baby, do you want to lay down
    with me?\"  \n\r"
