- vnum: 4774
  name: By the beautiful waterfall
  description: "You see a VERY beautiful waterfall here.  It looks almost as if diamonds
    are\n\rfalling down the mountain.  (You reach out and grab and no, it IS only
    water.)\n\rIt looks so nice here, you feel like taking a nap.\n\rThe trail leads
    north and south.\n\r"
  room_flags: 0
