- vnum: 4772
  name: The small cave
  description: "You barely squeeze through into this cave, and you don't see much
    to it\n\reither.  All you see are piles of stones.  At least none of the stones
    has\n\rfallen over your exit north.\n\r"
  room_flags: D
  sector: 4
  owner:
  exits:
