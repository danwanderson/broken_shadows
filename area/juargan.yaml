- vnum: 4776
  name: A valley
  description: "You see a fresh green valley.  Flowers blossom everywhere around you,
    and you\n\rhave a big urge to giggle.  The valley continues to the east, or you
    can take\n\ra steep trail up.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
