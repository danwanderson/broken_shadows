- vnum: 4777
  name: At the end of the hills
  description: "What a view!  From here, you can see a waterfall toward the east,
    and lush\n\rgreen forests south-east.  To the north, you see the Mountains of
    Moria.  To\n\rthe west, you see the dirty trail again.  A trail leads down to
    the valley\n\rbelow.\n\r"
  room_flags: C
  sector: 2
  owner:
  exits:
  - dir: 3
    desc: "You see the trail continue west.\n\r"
    keywords:
