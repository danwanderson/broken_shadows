- vnum: 4773
  name: Beneath the waterfall
  description: "As you wring your clothes, you see sunlight reflect beautifully off
    the\n\rwaterfall, forming at rainbow.  With the sparkling illumination, you think
    you\n\rsee a cave to the south.\n\r"
  room_flags: CD
  sector: 4
  owner:
  exits:
  - dir: 2
    desc: "You think you hear a small noise coming from there too.\n\r"
