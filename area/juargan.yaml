- vnum: 4765
  name: The Stone Jewel
  description: "Many different colors and sizes of jewels hang from the walls of this
    well\n\rkept dwelling.  A small counter sits on the far wall with other small
    tables\n\rlining the walls.\n\r"
  room_flags: D
