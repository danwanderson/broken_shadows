- vnum: 4761
  name: Pasty's Dwelling
  description: "This is a small stone dwelling with a large oven on the south wall.
    \ There are\n\rmany tables and chairs placed about the place and by the oven there
    is a table\n\rpiled with grains and a small bowl of dough.\n\r"
