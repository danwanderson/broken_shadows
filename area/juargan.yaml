- vnum: 4768
  name: Entrance to Tomb
  description: "A large archway leads north to a dark vault.  An old stench emanates
    from it,\n\ras dust seems to continually flow from the old arch.  There is a small
    tunnel\n\rthat travels east into a darkness.\n\r"
