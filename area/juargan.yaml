- vnum: 4775
  name: A valley
  description: "You see a fresh green valley.  Flowers blossom everywhere around you,
    and you\n\rhave a big urge to giggle.  To the north, you can see the source of
    this\n\rgreenness, a waterfall.  To the west, you see the trail along the valley.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "You hear the rush of a waterfall.\n\r"
    keywords:
