- vnum: 4766
  name: Guard Barrack
  description: "Many small cots line the walls of this large building as it serves
    for the\n\rhomes of many brave Dwarven men who pledge their lives to the suppression
    of\n\rtheir Duergar enemies.  A small archway leads south to a lower level.\n\r"
