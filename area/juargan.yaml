- vnum: 4770
  name: Ancients Vault
  description: "This is more of a small alcove than anything else.  The ceiling is
    covered\n\rwith many descriptive carvings, as are the walls and floor.  Where
    it not for\n\rthe years of decay and no upkeep, this would be a glamorous chamber.\n\r"
