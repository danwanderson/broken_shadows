- vnum: 4778
  name: A trail along the hills
  description: "The dirt road you are treading on is as gentle as you can believe.
    \ Rocks\n\rcatch on you as you try to keep your balance.  The trail continues
    east and\n\rback west to relative safety.\n\r"
  room_flags: 0
