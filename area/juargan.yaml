- vnum: 4769
  name: Ancients Tomb
  description: "Two large stone sarcophagus's lie stagnant in the center of this small
    tomb.\n\rThe walls are lined with holes that contain many coffers containing,
    no doubt,\n\rthe remains of some ancient dwarf.\n\r  A great stone door leads
    to the west, it has many inscriptions upon it.\n\r"
