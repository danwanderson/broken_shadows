- vnum: 4779
  name: A trail along the hills
  description: "The trail flattens out a bit, giving you time to breathe.  You don't
    see much\n\rwater and don't think the sun is going to help your thirst.  The closest
    shade\n\rappears to be the dwarf forest, which is VERY far away.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
