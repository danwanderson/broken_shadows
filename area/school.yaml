- vnum: 3701
  name: A Room in Mud School
  description: "You are in a square white room.  The walls are all blank, with no
    windows.\n\rLight fluoresces off the ceiling in soft white tones.  Of course,
    there is a\n\rsign on the wall.  The exits are west and south.  A small plaque
    is on the\n\rwall.\n\r"
  room_flags: 131084
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see a path into another room.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3757
  - dir: 3
    desc: "You see a path into another room.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3702
  extra_descs:
  - keywords: plaque
    description: "This zone (Mud School) is created by Hatchet for any Merc Mud.\n\rCopyright
      1992, 1993.\n\r"
  - keywords: sign
    description: "Equipment check time!  Type 'EQUIPMENT' to see your current equipment.
      \ Right\n\rnow, you have just a vest, a shield, and a weapon.  As you go through
      Mud\n\rSchool you will acquire a complete set of equipment.\n\r\n\rTo pick up
      items on the ground as you see them, type 'GET item'.\n\rTo wear a piece of
      armor, type 'WEAR item'.\n\rTo hold a light source, type 'HOLD item'.\n\rTo
      wield a weapon, type 'WIELD weapon'.\n\rTo wear, hold, and wield everything
      you have, type 'WEAR ALL'.\n\rTo stop using a piece of equipment, type 'REMOVE
      item'.\n\rFinally, to see the items in your inventory, type 'INVENTORY'.\n\r\n\rWhen
      you are ready to continue, go west.\n\r"
