    desc: "You see a cage.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3710
  extra_descs:
  - keywords: sign
    description: "Welcome to combat training.\n\r\n\rThe first lesson is knowing whom
      to fight.  Use the command 'CONSIDER' to\n\rconsider killing a monster.  Avoid
      fighting monsters that will kill you\n\reasily.\n\r\n\rThe second lesson is
      running away.  There is a monster in the room down.\n\rHe is too strong for
      you to kill, but he won't kill you.  So go 'DOWN' from\n\rhere, then 'CONSIDER'
      him, then 'KILL' him.  After a while, type 'FLEE' to\n\rescape from him.\n\r\n\rYou
      can also set your character to flee automatically with the 'WIMPY' command.\n\rType
      'HELP WIMPY' to find out more about 'WIMPY'.\n\r\n\rAfter you flee, you will
      be back in this room.  When you are ready to go on\n\rto the next station, go
      'WEST'.\n\r"
- vnum: 3710
  name: The Blob Cage
  description: "You are in a smelly cage.  Strangely, the walls are still clean!\n\rYou
    see a sign here.  The only exit is up.\n\r"
  room_flags: 131080
  sector: 0
  owner:
  exits:
  - dir: 4
    desc: "You see a safe room up.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3709
  extra_descs:
  - keywords: sign
    description: "Remember, don't fight the blob to the finish!  Just type 'KILL BLOB',
      then\n\rwhen you are fighting, type 'FLEE', until you flee and are out of here.\n\r"
