  extra_descs:
  - keywords: sign
    description: "Welcome to the cage room.  The adepts of mud school have captured
      some\n\rmonsters for you to kill.  In the four cages are four monsters of various\n\rtypes.
      \ Kill them all!\n\r\n\rAfter you kill each monster, get all of the equipment
      from their corpses\n\rwith the command 'GET ALL CORPSE'.  You can then use the
      command 'WEAR ALL'\n\rto wear your newly won equipment.\n\r\n\rWhen you are
      done with the corpse, 'SACRIFICE CORPSE' to give it to your God.\n\rGod will
      reward you for this.\n\r\n\rBetween combat, you may need to rest or sleep to
      regenerate hit points.\n\rYou can 'REST' to regenerate hit points, or you can
      'SLEEP'.  'SLEEP' will\n\rrefresh you faster than 'REST', but you will be less
      aware of your\n\rsurroundings.\n\r"
