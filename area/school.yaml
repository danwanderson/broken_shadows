- vnum: 3757
  name: A Room in Mud School
  description: |
    You are in a room in Mud School.  Paintings of the heroic graduates of mud
    school adorn the walls. To the west is Furey's Training Room, and to the east
    is Seth's Guild Room.  North of you is the next Station of Mud School.
    There is a sign on the wall (type 'LOOK SIGN' to read it).
  room_flags: CDR
  sector: 1
  owner: ''
  exits:
  - dir: 0
    desc: |
      You see the next station of Mud School.
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 3701
  - dir: 1
    desc: |
      You see Seth's Guild Room.  Go there to practice your skills.
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 3759
  - dir: 2
    desc: |
      You see the entrance to Mud School.
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 3700
  - dir: 3
    desc: |
      You see Furey's Training Room.  Go there to train your attributes.
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 3758
  extra_descs:
  - keywords: sign
    description: |
      To find out your attributes, type 'score'.  You can improve your attributes
      in Furey's Training Room to the west.  You can practice your skills and spells
      in Seth's Guild Room to the east.  You can continue through mud school by
      going north.

      If you are a new character, you should go 'WEST' from here, train your
      abilities, and then come back here and go 'NORTH'.
- vnum: 3758
  name: Furey's Training Room
  description: "You are in Furey's Training Room.  Around you are all sorts of physical\n\
    and mental training tools.  The whole room is filled with magic, holiness, \n\
    and sweat.  There is a sign on the wall.\n"
  room_flags: CDR
  sector: 1
  owner: ''
  exits:
  - dir: 1
    desc: |
      You see the room you came from, and the room you should go to.
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 3757
  extra_descs:
  - keywords: sign
    description: "Welcome to Furey's Training Room.  Here you can train your attributes.\
      \  To \ntrain an attribute, you need enough practices.  To find out how many\
      \ practice\nsessions you have, type 'train' while you are in this room.  To\
      \ train for a \nspecific attribute, type 'train <attr>' where attr is the first\
      \ 3 letters of\nthe attribute you want increased.  Type 'help train' for more\
      \ information.\n"
- vnum: 3759
  name: Seth's Guild Room
  description: |
    You are in a room filled with weapons, books, and many combat dummies, some
    cut and stabbed many times, others burnt to a crisp.  The room is filled with
    sweat and an aura of magic.  There is a sign on the wall.
  room_flags: CDR
  sector: 1
  owner: ''
  exits:
  - dir: 3
    desc: |
      You see the room you came from and the room you should go to.
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 3757
  extra_descs:
  - keywords: sign
    description: |
      Welcome to Seth's Guild Room.  Here you will learn your skills and spells.
      To find out what skills and spells you can practice and how many practice
      sessions you have, type 'practice'.  To practice the specific skill, type
      'practice <skill>', where 'skill' is the skill or spell you wish to practice.
      Practicing increases the amount you know of that skill or spell, up to a
      certain maximum.  When you have practiced all you wish to practice, go west.
- vnum: 3760
  name: A Safe Room
  description: "You are in a safe room, away from all the mean rabbits and snails\
    \ of the\nArena.  You can rest here, and go up to go back to the Temple of Midgaard.\
    \  \n"
  room_flags: CD
  sector: 0
  owner: ''
  exits:
  - dir: 4
    desc: |
      You see the Temple of Midgaard.
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 3001
  extra_descs: []
