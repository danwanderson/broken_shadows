  extra_descs:
  - keywords: sign
    description: "This is the direction practicing room.  The directions you can go
      in any\n\rroom are: north, south, east, west, up, or down.  Of course, not all
      rooms\n\rhave all exits available.\n\r\n\rTo see the obvious exits in a room,
      type 'EXITS'.\n\r\n\rSometimes doors are closed, or locked, or secret.  Then
      you have to notice\n\rclues in the room description, or try going into that
      direction and seeing\n\rif you bump into a door.\n\r\n\rTry going into each
      direction from here.  When you are done, go NORTH.\n\r"
