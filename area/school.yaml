- vnum: 3757
  name: A Room in Mud School
  description: "You are in a room in Mud School.  Paintings of the heroic graduates
    of mud\n\rschool adorn the walls. To the west is Furey's Training Room, and to
    the east\n\ris Seth's Guild Room.  North of you is the next Station of Mud School.\n\rThere
    is a sign on the wall (type 'LOOK SIGN' to read it).\n\r"
  room_flags: 131084
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see the next station of Mud School.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3701
  - dir: 1
    desc: "You see Seth's Guild Room.  Go there to practice your skills.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3759
  - dir: 2
    desc: "You see the entrance to Mud School.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3700
  - dir: 3
    desc: "You see Furey's Training Room.  Go there to train your attributes.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3758
  extra_descs:
  - keywords: sign
    description: "To find out your attributes, type 'score'.  You can improve your
      attributes\n\rin Furey's Training Room to the west.  You can practice your skills
      and spells\n\rin Seth's Guild Room to the east.  You can continue through mud
      school by\n\rgoing north.\n\r\n\rIf you are a new character, you should go 'WEST'
      from here, train your\n\rabilities, and then come back here and go 'NORTH'.\n\r"
- vnum: 3758
  name: Furey's Training Room
  description: "You are in Furey's Training Room.  Around you are all sorts of physical\n\rand
    mental training tools.  The whole room is filled with magic, holiness, \n\rand
    sweat.  There is a sign on the wall.\n\r"
  room_flags: 131084
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "You see the room you came from, and the room you should go to.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3757
  extra_descs:
  - keywords: sign
    description: "Welcome to Furey's Training Room.  Here you can train your attributes.
      \ To \n\rtrain an attribute, you need enough practices.  To find out how many
      practice\n\rsessions you have, type 'train' while you are in this room.  To
      train for a \n\rspecific attribute, type 'train <attr>' where attr is the first
      3 letters of\n\rthe attribute you want increased.  Type 'help train' for more
      information.\n\r"
- vnum: 3759
  name: Seth's Guild Room
  description: "You are in a room filled with weapons, books, and many combat dummies,
    some\n\rcut and stabbed many times, others burnt to a crisp.  The room is filled
    with\n\rsweat and an aura of magic.  There is a sign on the wall.\n\r"
  room_flags: 131084
  sector: 1
  owner:
  exits:
  - dir: 3
    desc: "You see the room you came from and the room you should go to.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3757
  extra_descs:
  - keywords: sign
    description: "Welcome to Seth's Guild Room.  Here you will learn your skills and
      spells.\n\rTo find out what skills and spells you can practice and how many
      practice\n\rsessions you have, type 'practice'.  To practice the specific skill,
      type\n\r'practice <skill>', where 'skill' is the skill or spell you wish to
      practice.\n\rPracticing increases the amount you know of that skill or spell,
      up to a\n\rcertain maximum.  When you have practiced all you wish to practice,
      go west.\n\r"
- vnum: 3760
  name: A Safe Room
  description: "You are in a safe room, away from all the mean rabbits and snails
    of the\n\rArena.  You can rest here, and go up to go back to the Temple of Midgaard.
    \ \n\r"
  room_flags: 12
  sector: 0
  owner:
  exits:
  - dir: 4
    desc: "You see the Temple of Midgaard.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3001
  extra_descs: []
