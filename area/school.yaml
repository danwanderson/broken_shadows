- vnum: 3700
  name: Entrance to Mud School
  description: "This is the entrance to the Merc Mud School.  Go north to go through
    mud\n\rschool.  If you have been here before and want to go directly to the arena,\n\rgo
    south.\n\r\n\rA sign warns 'You may not pass these doors once you have passed
    level 5.'\n\r"
  room_flags: 12
  sector: 0
