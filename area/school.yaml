    windows.\n\rLight fluoresces off the ceiling in soft white tones.  Of course,
    there is a\n\rsign on the wall.  Find your own exit here.\n\r"
  room_flags: 131084
  sector: 0
  owner:
  exits:
  - dir: 1
    desc: "You see the next station of Mud School.\n\r"
    keywords: door
    exit_flags: 9
    key: -1
    to_vnum: 3719
  - dir: 2
    desc: "You see the Shop.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3718
  - dir: 4
    desc: "You see the Cage room.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3712
  extra_descs:
  - keywords: sign
    description: "By now, you must be hungry and thirsty.  Time to buy groceries!\n\rTo
      the south is a store.  Inside the store, you can use these commands:\n\r\n\r
      \   BUY    Buy an item\n\r    LIST   List what is for sale\n\r\n\rAfter buying
      some food and drink, you can 'EAT' and 'DRINK' it.\n\r\n\rAfter that, find the
      next exit yourself.\n\r"
- vnum: 3718
  name: The Store in Mud School
  description: "You are in a cramped room.  Stacked neatly on shelves everywhere are
    items\n\rand packages.  Light fluoresces off the ceiling in soft white tones.
    \ Of\n\rcourse, there is a sign on the wall.  The only exit is north.\n\r"
  room_flags: 131080
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "You see the only exit out of here.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3717
  extra_descs:
  - keywords: sign
    description: "The sign reads:\n\r\n\r   Buy   - Buy something from the storekeeper.\n\r
      \  List  - The storekeeper will tell you what's for sale.\n\r   Value - The
      storekeeper will tell you how much he will give to you for\n\r           that
      item.\n\r   Sell  - Sell that item to the storekeeper.\n\r"
- vnum: 3719
  name: A Room in Mud School
  description: "You are in a square white room.  The walls are all blank, with no
    windows.\n\rLight fluoresces off the ceiling in soft white tones.  Of course,
    there is a\n\rsign on the wall.  The exits are north and west, with a door to
    the east.\n\r"
  room_flags: 131084
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "You see a darkened room inside.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3720
  - dir: 1
    desc: "You see the next station of Mud School.\n\r"
    keywords: door
    exit_flags: 15
    key: 3714
    to_vnum: 3721
  - dir: 3
    desc: "You see the room you just came from.\n\r"
    keywords: door
    exit_flags: 9
    key: -1
    to_vnum: 3717
  extra_descs:
  - keywords: sign
    description: "North of you is a dark room.  I hope you still have the lantern!
      \ If not,\n\ryou have to back to the store and buy one.\n\r\n\rIn the room is
      a monster with a key that you need.  After killing the\n\rmonster and getting
      the key, come back here, UNLOCK EAST, OPEN EAST,\n\rand continue east.\n\r"
- vnum: 3720
  name: The Darkened Room
  description: "This room was purposefully darkened so that you would need to hold
    on to a\n\rlight source to go through.  The walls are, of course, blank, and white.\n\rThe
    only exit is south.\n\r"
  room_flags: 131081
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see the room that you have come from.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3719
  extra_descs: []
- vnum: 3721
  name: The End of Mud School!
  description: "This is a very bright room, with a marble pedestal in the center.
    \ Behind\n\rthe pedestal stands a person cloaked in Silver.  Tapestries flow from
    every\n\rwall, and you feel very happy to be here right now.  There is a big sign
    here.\n\rThe only exit is on the other side of the gate north of you.\n\r"
  room_flags: 131080
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "You see the Arena ahead.\n\r"
    keywords: gate
    exit_flags: 9
    key: -1
    to_vnum: 3722
  extra_descs:
  - keywords: sign
    description: "You have graduated from Mud School!  Take your diploma...if you
      can.\n\rGo 'NORTH' from here to visit our arena.  There are plenty of low-level\n\rmonsters,
      but DON'T attack other players.\n\r\n\rIf you want to go directly back to the
      temple at any time, type 'RECALL'.\n\r\n\rDon't forget to type save to protect
      your character.  You won't be saved after\n\rquitting until you reach level
      2, so also type save before you type quit.\n\r\n\rIf you need more help during
      the game, type 'HELP'.  If you see something\n\rwrong or have comments, use
      'NOTE WRITE' in the appropriate board to \n\rreport them.\n\r\n\rMay your visit
      here be ... mercenary.\n\r"
