  name: The Temple Square
  description: "You are standing on the temple square.  Huge marble steps lead up
    to the\n\rtemple gate.  The ground is just dirt but there are plans to make the
    road\n\rcobble stone.  Just south of here you see a blooming market square, the\n\rcenter
    of Midgaard.\n\r"
