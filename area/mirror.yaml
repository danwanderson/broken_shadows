  description: "You are standing on a immaculately manicured green lawn, the kind
    you only\n\rget after 200 years of meticulous work. There is a winding stone path
    leading\n\rfrom the wood's edge to the north, to the softly shimmering, rainbow-colored\n\rdome
    covering construction to the south. This place enjoys a perpetual cool,\n\rsunny
    summers after-noon.\n\r"
