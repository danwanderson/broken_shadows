- vnum: 5365
  name: The Plains
  description: "You are standing on the plains. This is a vast desolate place where
    the\n\rwind can howl undisturbed since nothing but you bars its way. However you\n\rare
    not the first to wander here. Before you somebody has left footprints.\n\rThe
    footprints make a path that looks rather bewildered and is not the kind\n\rof
    path to lead to anywhere significant or important but it seems to have\n\rmade
    up its mind to enter the hills far away north.  A little distance\n\rfurther,
    you lose the trail and decide not to get lost.\n\r"
