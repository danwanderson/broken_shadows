      other with\n\rsome kind of mortar.  It is far too high to climb.\n\r"
- vnum: 5386
  name: By the Temple Altar
  description: "You are by the temple altar in the northern end of the Temple of Midgaard.\n\rA
    huge altar made from white polished marble is standing in front of you and\n\rbehind
    it is a ten foot tall sitting statue of Odin, the King of the Gods.\n\r"
  room_flags: 1032
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see the southern end of the temple.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 5379
  extra_descs:
  - keywords: altar
    description: "Even though the altar is more than ten feet long it appears to be
      made from a\n\rsingle block of white virgin marble.\n\r"
  - keywords: statue odin king god
    description: "The statue represents the one-eyed Odin sitting on a his throne.
      \ He has\n\rlong, grey hair and beard and a strict look on his face.  On top
      of the\n\rthrone, just above his shoulders, his two ravens Hugin and Munin are
      sitting\n\rand at his feet are his wolves Gere and Freke.\n\r"
