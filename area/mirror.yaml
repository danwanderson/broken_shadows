- vnum: 5300
  name: The Grand Gate of Thalos
  description: "You stand in the archway of a gigantic stone archway. The two\n\rsteel
    gates look indestructible, yet they are elaborate in engravings.  You can\n\rhear
    laughter and good cheer from the other side of these gates.  Obviously, \n\rthe
    city is teeming with activity!  There is a small gold plaque on mounted\n\ron
    the archway.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "You are saddened at the thought of leaving this beautiful place.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 5356
  - dir: 3
    desc: "You see happiness everywhere. Houses cover your vision. You see strange
      cute\n\rbeasts walking hand in hand with people.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5301
  extra_descs:
  - keywords: plaque sign
    description: "This zone has been heavily modified by Kahn and Hatchet of MERC
      Industries\n\rand integrated by Kahn of MERC Industries.\n\rcopyright 1993\n\r"
