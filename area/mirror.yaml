- vnum: 5373
  name: The sunny field
  description: "You are standing in the middle of a wide, summery, sunlit field. There
    is a\n\rfragrance of spring in the air, a sound of summer and a feeling of eternal\n\rSaturday
    afternoon. To the south is a clear, sparkling lake, and to the north\n\rand west
    is the holy grove. In the wood's edge, to the east, is construction,\n\rshimmering
    softly through the colors of the rainbow. You feel as if You\n\rcould spend the
    rest of your life here, lying on your back and looking at the\n\rpatterns of the
    clouds as they gently drift across the sky.\n\r"
