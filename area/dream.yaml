- vnum: 8630
  name: Road to Newfane
  description: "You are on a gently curving north-south road.  On your east side a
    youthful\n\rriver sparkles blue and rushes in the sunlight.  On the west, green
    leaves and\n\rgreen ferns burst against the rich brown earth.  You feel the heat
    of your\n\rhealthy muscles as you travel swiftly down the well-paved road.\n\rYou
    may recall now if you like.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "You see a village square.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8631
  - dir: 2
    desc: "You see machine dreams and taste violet phosphor.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8611
  extra_descs: []
- vnum: 8631
  name: Newfane Village Square
  description: "You are on the lawn of the village square of Newfane, resting against
    an oak\n\rafter your vigorous journey.  The late spring breeze feels warm and
    sensuous\n\ron your body.  An Ale is in progress: you spy more than a dozen fiddlers
    and\n\rhundreds of Morris Dancers dressed in white cotton and wearing colorful
    hats\n\rand bells.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 2
    desc: "You see the Road to Newfane.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8630
  extra_descs: []
- vnum: 8632
  name: A Large Dance Hall
  description: "You are inside a large dance hall with a very polished, very slippery
    wooden\n\rfloor.  You see three long lines of dancers, alternating men and women,
    in\n\rsome sort of progressive country dance.  Two fiddlers, a flautist, and a\n\rharpsichord
    player provide the music.  You hear scattered screams of joy\n\rfrom the dancers.\n\rYou
    may recall now if you like.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 3
    desc: "You see machine dreams and taste violet phosphor.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8615
  extra_descs:
  - keywords: dancer dancers
    description: "The dancers have been here all night and intend to dance until dawn.\n\r"
- vnum: 8634
  name: A Small Hall
  description: "You are inside a small hall with a rough wooden floor.  You see dozens
    of\n\rpeople in the hall chasing one poor man who is yelling at the top of\n\rhis
    lungs.  Wait a minute.  These people are all holding hands and smiling!\n\rThe
    man in front is leading them in a spiral!  They're DANCING!  And you\n\rthought
    people didn't dance like this any more!\n\rYou may recall now if you like.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "You see machine dreams and taste violet phosphor.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8617
  extra_descs: []
- vnum: 8636
  name: Road by a Pond
  description: "You are passing by a large pond, almost a small lake.  You notice
    a small\n\rwooden shack by the side of the road.\n\rYou may recall now if you
    like.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc: "You see machine dreams and taste violet phosphor.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8613
  - dir: 3
    desc: "You see a wooden church set back among the trees.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8637
  extra_descs:
  - keywords: shack
    description: "The shack looks hand-made by an amateur.\n\r"
- vnum: 8637
  name: An Old Wooden Church
  description: "As you enter the hall, you see the largest crowd of people you've
    ever seen in\n\ryour life.  They're also the noisiest crowd you've ever heard,
    and as they\n\rpress around you, the SWEATIEST crowd you've ever felt!  At the
    front of the\n\rhall, a group of musicians are playing 'Chorus Jig'.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc: "You see a road by a pond.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8636
  extra_descs: []
- vnum: 8638
  name: Mountain Road
  description: "You are following a road at the top of a mountain ridge with sky all
    around\n\ryou.  Distant valleys are spread out below you on both sides.  There
    are\n\rmany horsemen and horsewomen on this road, riding hell-for-leather out
    of\n\rsheer exhilaration.  You wish you had a horse!\n\rYou may recall now if
    you like.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 4
    desc: "You see several acres of thickly planted, very young Yule Trees.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8639
  - dir: 5
    desc: "You see machine dreams and taste violet phosphor.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8624
  extra_descs: []
- vnum: 8639
  name: Yule Tree Farm
  description: "This is the Yule Tree Farm at the top of Mountain Road.  All around
    you,\n\ryoung Yule Trees saturate your senses with dark green needles and pine\n\ressence.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 5
    desc: "You see a mountain ridge against the sky.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8638
