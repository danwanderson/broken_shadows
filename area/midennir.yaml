- vnum: 3532
  name: On the Outskirts of New Thalos
  description: "The sun is hot enough to melt your armor, but salvation is at hand.\
    \  To the\neast, you see the mighty gates of New Thalos, one of the most prosperous\
    \ cities\nof all of Thera.  To the south, you see the endless wasteland of the\
    \ Sands\nof Sorrows, and to the west you can barely make out a faint, but well-used,\n\
    road leading to the City of Midgaard. \n"
  room_flags: '0'
  sector: 10
  owner: ''
