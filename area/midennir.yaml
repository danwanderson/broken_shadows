    exit_flags: '0'
    key: -1
    to_vnum: 3528
  extra_descs: []
- vnum: 3530
  name: Near the Sands of Sorrow
  description: "The eastern road is losing ground to the creeping desert here.  You\
    \ stagger\nin the growing heat, and wonder if you have enough water.  The endless\
    \ waste\nof the Sands of Sorrows is south, and the road continues east and west.\
    \  The \nsun paints illusions at the edge of your vision, one of them looks like\
    \ a far \noff city...\n"
  room_flags: '0'
