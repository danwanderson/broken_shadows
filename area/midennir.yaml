- vnum: 3502
  name: The Cross Roads
  description: "Here, the great eastern road intersects with an older road between
    the mines\n\rof Moria and the ruined city of Thalos.  The outskirts of Midgaard
    lie to your\n\rwest, and the highway continues the the east.  An old northern
    road leads to\n\rthe dwarven kingdom and the abandoned mines of Moria, while the
    southern road\n\rshows the scars of the war which destroyed Thalos.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "An old road leads towards the abandoned mines of Moria and the Dwarven
      Kingom.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3501
  - dir: 1
    desc: "The road continues east, where you hear faint singing.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3525
  - dir: 2
    desc: "A once mighty road leads through the dwarf forest towards ruined Thalos.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5261
  - dir: 3
    desc: "The road leads west towards Midgaard.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3503
  extra_descs: []
- vnum: 3503
  name: City Entrance
  description: "You stand on the outskirts of a large city - Midgaard; the capital
    of this\n\rland. The road leads east into the peace and quiet - and dangers -
    of the\n\rforest; and to the west it becomes the main street of the town; surrounded
    by\n\ra confusion of shops, bars, and market places.\n\r"
  room_flags: 4
  sector: 1
  owner:
  exits:
  - dir: 1
