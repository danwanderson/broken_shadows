- vnum: 3528
  name: Along the Eastern Road
  description: "You are walking along a well-travelled road, just east of a heavily\
    \ \nguarded checkpoint.  You have covered about half the distance between\nthe\
    \ city of Midgaard and New Thalos.  The air is getting drier and the heat\nmore\
    \ oppressive as you near the the barren wastes of the Sands of Sorrow.\n"
  room_flags: '0'
  sector: 1
  owner: ''
  exits:
