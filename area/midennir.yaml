- vnum: 3526
  name: Along the Eastern Road
  description: "You are travelling down the eastern road between Midgaard and the\
    \ eastern\nlands.  The road back to Midgaard is west of you, and a heavily guarded\n\
    checkpoint is east.  A beautiful grove of trees is north, and a dirt path \nwanders\
    \ off to the south.\n"
  room_flags: '0'
  sector: 1
  owner: ''
