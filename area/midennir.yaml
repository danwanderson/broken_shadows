- vnum: 3501
  name: The Lane
  description: "You are strolling along a pleasant, shady lane. The road is lined
    on both\n\rsides by tall, stately trees which lend the scene with a sense of quiet\n\rserenity.
    You can follow the road north or south.\n\r"
  room_flags: 0
  sector: 1
