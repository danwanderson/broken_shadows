- vnum: 3516
  name: Muddy Ground
  description: "The ground is quite muddy here and puddles are all around. Your boots\n\rmake
    a disgusting SQUISH as you walk here. You can go in any of the\n\rfour cardinal
    directions from here. Hopefully, it will be dryer.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "The Miden'nir continues.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3510
  - dir: 1
    desc: "More trees.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3517
  - dir: 2
    desc: "The trees get VERY thick to the south. You can barely see...\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3519
  - dir: 3
    desc: "Some light trees and daylight.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3515
  extra_descs: []
- vnum: 3517
  name: Near the Mountains
  description: "The most prominent feature here is the mountains that lie to the east.\n\rYou
    can only go north and west from here as the rocks stop all other\n\rmovement.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "Many trees to the north.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3514
  - dir: 3
    desc: "There is a bit of a slope downward to the west.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3516
  extra_descs: []
- vnum: 3518
  name: The Fading Trail
  description: "The trail becomes nearly unpassable here. You can go north\n\ras the
    forest is relatively light. To the south, you can see a path.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "You can see a trail this way.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3515
  - dir: 2
    desc: "Dark forests.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3522
  extra_descs: []
- vnum: 3519
  name: The Dark Path
  description: "You are hemmed in by trees on either side of you.  The path continues\n\rnorth
    and south, and while is much to thick to explore west, you can head\n\roff into
    the woods to the east.  \n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "The forest gets lighter this way.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3516
  - dir: 1
    desc: "The forest continues.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3520
  - dir: 2
    desc: "There is a strong stench coming from this direction.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3521
  extra_descs: []
- vnum: 3520
  name: The Dark Forest
  description: "You stomp your way through the underbrush.  The dark forest of Miden'nir\n\rget
    pretty thick here, and the branches high above your head are so thick that\n\rthey
    block out all direct sunlight.  While it is much too thick to go\n\rfurther east,
    you might be able to make your way though the forest to the\n\rsouth and west.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 2
    desc: "The thick forest continues.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3523
  - dir: 3
    desc: "The thick forest continues.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3519
  extra_descs: []
- vnum: 3521
  name: Carnage
  description: "Here, you see a gruesome sight. Blood is everywhere... on the trees
    and\n\rsoaked into the ground. Two carcasses lie in front of you, seeming to look\n\rup
    at you. The forest is impassible to the south, but the other directions\n\rlook
    ok.\n\r"
  room_flags: 1
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "Darkness...\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3519
  - dir: 1
    desc: "Your light does not extend that far.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3523
  - dir: 3
    desc: "More dark forest.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3522
  extra_descs:
  - keywords: carcass body corpse carcasses bodies corpses
    description: "The corpses looked as if they have been pierced by a large, jagged\n\rspear.
      The damage these people sustained is simply amazing. Worse, the\n\rlips on the
      bodies are a light shade of blue, hinting at poison in\n\rtheir systems.\n\r"
- vnum: 3522
  name: Deep in the Forest of Miden'nir
  description: "There is a sickening stench here. It smells of blood and death.\n\rTo
    the north, you catch glimpses of daylight. To the east, you\n\rsimply cannot see.
    The trees are close and stifling.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "You see daylight and a trail to follow.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3518
  - dir: 1
    desc: "The stench seems to becoming from this direction.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3521
  extra_descs: []
- vnum: 3523
  name: The Dark Forest
  description: "The branches above you block out all direct sunlight, making the forest\n\rin
    this area rather dark.  The forest continues east, where it meets the\n\rmountains.
    The air is still and stuffy - a stench comes from the west and an\n\rugly feeling
    causes the hair to rise on the back of your neck!\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "It appears to get much darker that direction.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3520
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3551
  - dir: 3
    desc: "The sky becomes lighter in this direction.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3521
  extra_descs: []
- vnum: 3525
  name: Along the Eastern Road
  description: "You are walking along a well-travelled road between Midgaard and lands\n\reast.
    \ A northern road crosses this one to the west, towards Midgaard.  You\n\rhear
    faint, happy singing to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see a faint trail, covered with tiny footprints. The singing grows
      louder.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 101
  - dir: 1
    desc: "The road continues to the east.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3526
  - dir: 3
    desc: "You can see the crossroads.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3502
  extra_descs: []
- vnum: 3526
  name: Along the Eastern Road
  description: "You are travelling down the eastern road between Midgaard and the
    eastern\n\rlands.  The road back to Midgaard is west of you, and a heavily guarded\n\rcheckpoint
    is east.  A beautiful grove of trees is north, and a dirt path \n\rwanders off
    to the south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see a beautiful, shady grove -- it looks like a peaceful place to relax.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8950
  - dir: 1
    desc: "The road continues west towards a guarded checkpoint.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3527
  - dir: 2
    desc: "A dirt path leads to the gnome village.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1501
  - dir: 3
    desc: "The road continues west towards midgaard.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3525
  extra_descs: []
- vnum: 3527
  name: The Checkpoint
  description: "You are met by a group of heavily armored knights.  They check you
    over\n\rfor contraband, and then allow you to pass on.  One ofthe knights cautions
    to\n\rnot stray into the desert, lest you lose your way.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "The continues east towards New Thalos.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3528
  - dir: 3
    desc: "The road continues west towards midgaard.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3526
  extra_descs: []
- vnum: 3528
  name: Along the Eastern Road
  description: "You are walking along a well-travelled road, just east of a heavily
    \n\rguarded checkpoint.  You have covered about half the distance between\n\rthe
    city of Midgaard and New Thalos.  The air is getting drier and the heat\n\rmore
    oppressive as you near the the barren wastes of the Sands of Sorrow.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "The road continues ahead, growing more arid as you near the desert.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3529
  - dir: 3
    desc: "You see a heavily guarded checkpoint to the west.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3527
  extra_descs: []
- vnum: 3529
  name: Along the Eastern Road
  description: "The tempatures are climbing as you near the Sands of Sorrow, a barren\n\rwasteland
    blasted by arcane powers.  Ahead of you, the road is partially\n\rburied by the
    creeping sands, and the air grows even hotter.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "You see the Sands of Sorrow spilling over the road.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3530
  - dir: 3
    desc: "The road continues to the west, towards distant Midgaard.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3528
  extra_descs: []
- vnum: 3530
  name: Near the Sands of Sorrow
  description: "The eastern road is losing ground to the creeping desert here.  You
    stagger\n\rin the growing heat, and wonder if you have enough water.  The endless
    waste\n\rof the Sands of Sorrows is south, and the road continues east and west.
    \ The \n\rsun paints illusions at the edge of your vision, one of them looks like
    a far \n\roff city...\n\r"
  room_flags: 0
  sector: 10
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3531
  - dir: 3
    desc: "You see a clearer section of road. \n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3529
  extra_descs: []
- vnum: 3531
  name: Near the Sands of Sorrow
  description: "The road is almost completely swallowed by the desert here.  The heat
    is\n\rsucking the life from your body, you wonder if it will ever end.  To your\n\rsouth,
    the Sands of Sorrow stretch on for miles, and to the east you think\n\ryou see
    the towers of a magnificent city...or is it just a mirage?\n\r"
  room_flags: 0
  sector: 10
  owner:
  exits:
  - dir: 1
    desc: "You can barely make out enough road to follow.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3532
  - dir: 3
    desc: "The desert thins a little to the west.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3530
  extra_descs: []
- vnum: 3532
  name: On the Outskirts of New Thalos
  description: "The sun is hot enough to melt your armor, but salvation is at hand.
    \ To the\n\reast, you see the mighty gates of New Thalos, one of the most prosperous
    cities\n\rof all of Thera.  To the south, you see the endless wasteland of the
    Sands\n\rof Sorrows, and to the west you can barely make out a faint, but well-used,\n\rroad
    leading to the City of Midgaard. \n\r"
  room_flags: 0
  sector: 10
  owner:
  exits:
  - dir: 1
    desc: "You see the west gate of New Thalos.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9669
  - dir: 3
    desc: "You see the road to Midgaard, covered with sand.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3531
  extra_descs: []
- vnum: 3550
  name: At The Foot of The Mountains
  description: "You find yourself at the foot of the mountains, where it is much to
    steep\n\rto continue north or east.  You see the lush, green forest of Miden'nir
    to the\n\rsouth and west.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 2
    desc: "The forest of Miden'nir spreads out before you.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3512
  - dir: 3
    desc: "The forest of Miden'nir spreads out before you.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3506
  extra_descs: []
- vnum: 3551
  name: The Deep in the Forest of Miden'nir
  description: "The branches above you block out all direct sunlight, making the forest\n\rin
    this area very dark.  The forest continues west, but mountains block\n\rfurther
    exploration in all other directions, except south, where you notice a\n\rsmall
    tunnel dug into the mountainside.\n\r"
  room_flags: 1
  sector: 3
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3552
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3523
  extra_descs: []
- vnum: 3552
  name: A Tunnel in the Mountains
  description: "The walls of this tunnel were carved out many years ago by the goblins
    of\n\rthis forest.  The floor is well worn, and continues south, into the\n\rmountain,
    or back north out into the forest.\n\r"
  room_flags: 1
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "Outside, you see the forest of Miden'nir.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3551
  - dir: 2
    desc: "The tunnel continues to the south.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3553
  extra_descs: []
- vnum: 3553
  name: A Tunnel in the Mountains
  description: "The tunnel gets lighter to the north, presumably leading out, while
    to\n\rthe south the passage gets smaller and smaller.  A small alcove has been\n\rcarved
    into the east wall.\n\r"
  room_flags: 1
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The tunnel gets wider in this direction.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3552
  - dir: 1
    desc: "You see a small alcove.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3554
  - dir: 2
    desc: "The tunnel gets smaller in this direction.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3555
  extra_descs: []
- vnum: 3554
  name: A Small Alcove
  description: "A small alcove has been carved out here.  There are a bunch of twigs\n\rand
    leaves thrown into a pile here, probably serving as a bed.\n\r"
  room_flags: 1
  sector: 1
  owner:
  exits:
  - dir: 3
    desc: "You see the main passageway.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3553
  extra_descs:
  - keywords: twigs leaves bead
    description: "The twigs and leaves have all been piled together as a makeshift
      bed for\n\rsome small humanoid.\n\r"
- vnum: 3555
  name: A Tunnel in the Mountains
  description: "As you explore further into the mountainside, the tunnel gets smaller
    and\n\rsmaller to the south.  You almost have to hunch over to make your way thru\n\rthis
    area.  A small archway to the south leads into a large chamber.\n\r"
  room_flags: 1
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The tunnel continues north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3553
  - dir: 2
    desc: "You see a small cavern.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3556
  extra_descs: []
- vnum: 3556
  name: The Goblin Headquarters
  description: "The tunnel widens into a large (well, large for goblins) cavern that\n\rserves
    as the living quarters for the goblins of Miden'nir.  The bones of\n\rnumbers
    woodland creatures are strewn about the room, the remanents of a\n\rrecent meal.\n\r"
  room_flags: 1
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The tunnel heads north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3555
  extra_descs: []
- vnum: 3570
  name: The Front of the Inn
  description: "You are standing on a well-worn path which opens into a clearing.\n\rAn
    old, wooden building is here with smoke billowing from its\n\rchimney. A painted
    sign is visible on the porch to the west. You\n\rcould go north or south around
    the building or leave this place and\n\rreturn to the forest.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "You can go north around the inn.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3571
  - dir: 1
    desc: "Back through the trees to the Miden'nir.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3505
  - dir: 2
    desc: "You can go south around the inn.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3572
  - dir: 3
    desc: "The front door of the inn beckons.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3574
  extra_descs:
  - keywords: sign
    description: "The sign reads:\n\r   The Woodsman\n\r"
  - keywords: credits credit author
    description: "+-------------------------------------------------+\n\r| This zone
      originally written for Copper II DIKU |\n\r|   by ?                                          |\n\r|
      Modification and alterations for MERCmud DIKU   |\n\r|   by VampLestat                        1
      JAN 93 |\n\r+-------------------------------------------------+\n\r"
- vnum: 3571
  name: North of the Inn
  description: "You are standing north of the inn. Things don't look much different\n\rfrom
    this angle.  The air here is filled with smells of smoke and cooking.\n\rSouth,
    the front porch is waiting for you... or you can see if there is\n\ra back door.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 2
    desc: "You see the front of the Inn.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3570
  extra_descs: []
- vnum: 3572
  name: South of the Inn
  description: "You are standing south of the inn.  You could easily go north and
    enter\n\rthrough the front door, or west and to the rear of the establishment.
    \ You\n\rhere some muffled cries from a tiny trail leading south of here.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "This way leads to the front of the inn.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3570
  - dir: 2
    desc: "The trail heads south.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3575
  - dir: 3
    desc: "This way leads to the back of the inn.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3573
  extra_descs: []
- vnum: 3573
  name: Behind the Inn
  description: "You now stand behind the inn. The smell here is not so pleasant as\n\rthe
    keeper and his help throw a good deal of garbage here. A couple of\n\rpiles of
    rubbish are to the west, but you will smell the worse for\n\rmeddling there. As
    a clean alternative, you can go north or east around\n\rthe inn.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 1
    desc: "You can go around the inn this way.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3572
  - dir: 3
    desc: "Only rats and fool adventurers play in garbage.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3578
  extra_descs: []
- vnum: 3574
  name: The Woodsman Inn
  description: "You are in the common room of the Woodsman Inn. A thin haze of smoke
    sits\n\rin the air here. The Inn is often empty, as the forest has become overrun
    by\n\rgoblins as of late, and it is no longer safe in these parts. The bar is
    just\n\rnorth of here. If you'd rather have your own table, one is empty to the\n\rsouth.\n\r"
  room_flags: 12
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The bar is here, manned by the innkeeper.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3576
  - dir: 1
    desc: "You can leave now and return to fresher air.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3570
  - dir: 2
    desc: "An empty table is a rare commodity.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3579
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3577
  extra_descs: []
- vnum: 3575
  name: The Ambush Point
  description: "This is a overgrown foot-trail south of the inn. It leads west, but
    you\n\rwould be hard pressed to follow it far. A number of bushes are trampled
    on\n\rand some medium sized branches have been knocked down.  Obviously there
    has\n\rbeen a battle here rather recently.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "The inn lies to the north.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3572
  - dir: 3
    desc: "A trail thru the woods.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3581
  extra_descs: []
- vnum: 3576
  name: The Bar
  description: "This is where people use to come and enjoy the food, drink and hospitality\n\rof
    the innkeeper, but as of late, he only serves the few adventurers that\n\rmanage
    to survive a trip thru the forest. You can leave south and return to the\n\rcommon
    room.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 2
    desc: "You may retreat south back to the common room.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3574
  extra_descs: []
- vnum: 3577
  name: The Bard's Table
  description: "You are in a darker corner in the Inn.  A large round table with a
    few\n\rwooden chairs sits here.  There is a large stain on the table, the remnants\n\rof
    a spilled drink.\n\r"
