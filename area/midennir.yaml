- vnum: 3500
  name: The Plains
  description: "You are standing on the plains. This is a vast desolate place where
    the\n\rwind can howl undisturbed since nothing but you bars its way. However you\n\rare
    not the first to wander here. Before you somebody has left a small path.\n\rThe
    path looks rather bewildered and is not the kind of path to lead to\n\ranywhere
    significant or important but it seems to have made up its mind to\n\renter the
    hills far away north.\n\r"
  room_flags: 0
  sector: 1
  owner:
