  description: "You have entered what appears to be a burial ground of sorts. The\n\rtemplars
    buried their dead here.  Chills go down your spine as you feel\n\rsomething watching
    you.  You hear the random groan of a ghost, the howl\n\rof a wraith, and the dry
    clanking of bones.\n\r"
