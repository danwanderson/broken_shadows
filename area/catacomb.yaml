  name: Desolate ruins
  description: "Several mausoleums used to grace the way here but these have been\n\rdefiled.
    And most have been torn down and burned by looters. Some still\n\rseem to be intact
    to the south.  To the northwest is a seeming field of\n\rtombs of soldiers, now
    a battleground for the undead.\n\r"
