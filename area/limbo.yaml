    \ \n\rEven as you watch, though, the form reiterates itself in finer detail--\n\rwith
    each passing moment, the shape becomes more complex and interesting.\n\rAlmost,
    almost, you can discern the pattern...\n\r\n\rFor all her fabulous appearance,
    though, Puff seems quite... addled.  As \n\rthe definition of her eyes increases,
    you realize that the Fractal Dragon \n\ris obviously not paying much attention
    to the mortal world; she seems lost \n\rin strange contemplations.\n\r\n\r"
