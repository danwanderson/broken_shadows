- vnum: 6392
  name: The Great Door
  description: "Before you you see a large, web-like door.  Various designs\n\rof
    ancient runes and names of Midgaard heroes are etched into\n\rthe webwork.  Perhaps
    lists of victims?  You can't tell.\n\r"
