  extra_descs: []
- vnum: 6309
  name: A Split in the Path
  description: "As always, there is a split in the road.  One road is strewn\n\rwith
    cricket feelers.  The other is well-kept and suitable for smooth\n\rtravelling.
    \ The webbing that was prevalent in earlier rooms is almost\n\rnon-existent now.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6310
  - dir: 2
    desc:
