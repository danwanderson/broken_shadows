- vnum: 6370
  name: The Donjonkeep
  description: "No souls have ever lived in this place.  The wails of slaves\n\rand
    the howls of wolves are the only way you can describe the sounds\n\ryou hear.
    \ The walls are thin and wispy.  The only light you receive\n\ris the shimmering
    from the strand of the ethereal web you used to get\n\rhere.\n\r"
  room_flags: 0
