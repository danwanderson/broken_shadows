  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6303
  extra_descs: []
- vnum: 6303
  name: Wasp Hive
  description: "Drones scuttle about in this room.  The cells on the walls\n\rare
    honeycomb in shape and many of the maggots and wasps you see\n\rhave fang-marks
    on there bodies.  You sense some order in their markings.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6302
  extra_descs: []
- vnum: 6304
  name: Webby Passage
  description: "Another webby passage, all sticky and wet.  Tiny ballooning\n\rspiders
    fill the air.  It seems that these young ones are newborns.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6302
  extra_descs: []
- vnum: 6305
  name: Beneath the Busy Path
  description: "You hear the sounds of crawling arachnids above.  The rhythms of\n\rthe
    footsteps suggest a primitive order in there movement.  The light\n\rseems brighter
    upwards.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6302
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6306
  extra_descs: []
- vnum: 6306
  name: On the Busy Path
  description: "Spiders, spiders, everywhere!  It is almost ant-like in efficiency\n\rwith
    one big difference.  The spiders here are carrying ant-corpses,\n\ras well as
    rats, wolves, and humans.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6307
