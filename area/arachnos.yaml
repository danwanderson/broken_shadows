- vnum: 6302
  name: Webby Passage
  description: "You find that footing here is very good, almost too good.  The\n\rlimbs
    are coated with cobwebs and seem unusually strong for tree\n\rbranches.  Paths
    lead in four directions.  The eastward path goes\n\rdown a bit.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6304
  - dir: 1
    desc:
