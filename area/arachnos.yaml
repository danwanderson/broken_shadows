- vnum: 6391
  name: The Sticky Chamber
  description: "You can still bail out since your knees are shaking from the\n\ranticipation
    (or is it fear?).  The sky is clear on this strand of\n\rweb, surprisingly unsticky.
    \ The strand does not vibrate like the\n\rothers.  A few ballooning spiders pass
    by, cackling \"You're gonna\n\rdie, you're gonna fry.  Good bye!\"\n\r"
  room_flags: 0
