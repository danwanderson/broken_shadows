- vnum: 6373
  name: The Hermit's Corner
  description: "Here you see evidence of a vagrant's abode.  The shack is to the\n\reast,
    if you dare enter it.  You get the sneaking feeling you should\n\rgo back now.
    \ The skies above you darken and roar with the laughter\n\rof thunder.\n\r"
