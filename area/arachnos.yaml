- vnum: 6399
  name: The Lair of Arachnos
  description: "This is the lair of the Empress Spider, Arachnos.  A lavishly\n\radorned
    rainbow web, her lair allows her to move to any universe\n\rshe wishes by using
    her magical strands to the Prime Material Plane.\n\rCoffers upon coffers of gold,
    magical jewels and gems await.  Unfor-\n\rtunately Arachnos is a baggy spider
    too, and webs all her treasures\n\rto her beautiful silken body.\n\r"
  room_flags: 0
