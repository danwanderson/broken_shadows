- vnum: 6380
  name: Mahatma's Inescapable Trap
  description: "Mahatma, that silly thief, is here, and he steals everything you\n\rhave.
    \ He says, 'Here, have a quick trip to the Temple of Midgaard.'\n\rHe plunges
    a black dagger into your back ...\n\r"
  room_flags: 4
  sector: 0
  owner:
  exits: []
  extra_descs: []
- vnum: 6390
  name: The Entrance to the Arachnos' Lair
  description: "All strands inevitably lead here, the center of the web, the\n\rentrance
    to Arachnos' Lair.\n\r"
