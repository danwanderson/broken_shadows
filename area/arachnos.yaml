    to_vnum: 6320
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6308
  extra_descs: []
- vnum: 6310
  name: Fuzzy Tree Limb
  description: "You are on a \"fuzzy\" tree limb.  Interesting, since the branches\n\rseem
    to have \"hairs\" sprouting from its bark.  As you look\n\rcloser you see millions
    of aphids covering each limb.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6309
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6311
  extra_descs: []
- vnum: 6311
  name: Tree Trunk
  description: "You feel that you can rest here safely.  There is evidence of\n\rwebbing
    here, but it is of a finer quality.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6310
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6312
  extra_descs: []
- vnum: 6312
  name: Tree Lair Entrance
  description: "It seems the inhabitant of this place does not web her\n\rvictims,
    as evidenced by the remains before you.  The area\n\ris cluttered with desiccated
    corpses, apparently bitten\n\rbut unwebbed, and drained of their life juices.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6311
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6313
  extra_descs: []
- vnum: 6313
  name: Wolf Spider Lair
  description: "Very dark, as all lairs of spiders are.  Not much of furnishings\n\rsave
    an exit.  The wolf spider keeps no corpses here, but rather\n\rthrows them out
    at her leisure.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6312
  extra_descs: []
- vnum: 6320
  name: The Webless Path
  description: "Strange.  No webbing here.  In fact, no sounds whatsoever.\n\rThe
    path continues northward, where you find that you may have to\n\rtightrope your
    way across a ravine.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6309
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6321
  extra_descs: []
- vnum: 6321
  name: Above the Ravine
  description: "Stranger still.  Your feet get a real firm grip on the spiderline.\n\rYou
    are above a deep ravine.  This line connects you between two trees.\n\rBelow you
    can see a prismatic web with lots of animal bones caught in it:\n\rsome bear and
    small deer bones in fact.  No human skeletons are visible\n\r(yet).\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6320
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6323
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6322
  extra_descs: []
- vnum: 6322
  name: The Rainbow Web
  description: "This is the rainbow web--each strand, each link, a hue of violently\n\rsharp
    colors and contrasts.  The resident here seems to have a command\n\rof light as
    well.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6321
  extra_descs: []
- vnum: 6323
  name: The Web Forest
  description: "The trees here take on a different appearance--they are not trees\n\ranymore,
    but disjointed make-shift silken made shafts, sticky to the touch,\n\rand webby
    in texture.  This is another world it would appear.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6321
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6324
  extra_descs: []
- vnum: 6324
  name: The Slave Pit
  description: "You have entered the slave pit.  A voice blares in the distance,\n\r\"Get
    back to work, maggots!\"  Rails upon rails of mined gold and silver\n\rclutter
    the trail beneath you.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6325
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6323
  extra_descs: []
- vnum: 6325
  name: The Tether Path
  description: "Another tether path just like the rest of them.  Surprisingly well\n\r-lit
    by the golden orbs that hang from the sides, you can see the paths\n\rbecome finer
    and finer in quality.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6326
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6324
  extra_descs: []
- vnum: 6326
  name: A Road Crossing
  description: "Another shifty little strand of webs, almost ethereal in nature.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6325
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6327
  extra_descs: []
- vnum: 6327
  name: A Leader Strand
  description: "This strand is weightier, more sturdy.  It shimmers as you step on\n\rit.
    \ You are definitely not in the Midgaardian realms anymore.  Just\n\rwhere you
    are you can't tell.  It feels like you're moving through\n\rether.  You can still
    get back down to more surer lands.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6328
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6326
  extra_descs: []
- vnum: 6328
  name: The Entrance of the Ethereal Web
  description: "You are at the entrance to ethereal web.  Flickering in and out,\n\rin
    and out, each strand reveals a different hue from black to green\n\rto blue.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6327
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6331
  extra_descs: []
- vnum: 6330
  name: The Young Wormkin's Crib
  description: "A playpen of sorts, with maggots of wasps and other baby vermin\n\rlying
    about.  You feel that humans have been played with here too,\n\rand eaten later.
    \ You sense that the maker of this place has\n\ran appetite for dragon meat, and
    uses this room as a breeding\n\rarea.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6331
  extra_descs: []
- vnum: 6331
  name: The Base of the Web
  description: "Large strands connect at this point.  The node shimmers and\n\rflickers
    within the ether.  You see many flying creatures--\n\rinsects, pegasi, and dragon
    wormkins--navigate the dangerous\n\rpassages of the web.  Exits go in many directions.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6330
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6332
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6333
  extra_descs: []
- vnum: 6332
  name: Through the Trees
  description: "This part of the web intersects through the branches of some\n\rtrees.
    \ Various leaves and other debris that the many drones\n\rhave not picked up yet
    lie here.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6331
  extra_descs: []
- vnum: 6333
  name: Above the Clouds
  description: "You can see all of Midgaard in this ethereal web.  Many\n\rof the
    larger dragons that do wish to fly seem to fly\n\raway from the sticky strands
    of the web.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6331
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6334
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6335
  extra_descs: []
- vnum: 6334
  name: On A Cloud
  description: "Rather thick in consistency.  You realize this is not\n\ra typical
    cloud, but it might be the nest of an aerial creature.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6333
  extra_descs: []
- vnum: 6335
  name: A Link in the Ethereal Web
  description: "This is another link in the ethereal web.  Various creatures\n\rseem
    to get caught (or hypnotized) by its sticky strands.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6333
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6336
  extra_descs: []
- vnum: 6336
  name: The Tenuous Strand
  description: "Very windy here since it goes up into the sky somewhat.\n\rStill,
    it's safe enough to move around.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6335
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6340
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6341
  extra_descs: []
- vnum: 6340
  name: The Elder Wormkin's Room
  description: "A more mature wormkin it seems resides here.  Various tomes of\n\rarcane
    lore clutter the area, along with shards of armor and weaponry.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6336
  extra_descs: []
- vnum: 6341
  name: Another Tree Limb
  description: "Once again the web crosses another tree limb.  To the side you\n\rsee
    the possible entrance to another creatures lair.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6336
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6342
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6345
  extra_descs: []
- vnum: 6342
  name: The Bird Spider's Lair
  description: "This is a big game hunter among most spiders.  Crush jewels\n\rand
    other weapons suggest the inhabitant must have powerful jaws.\n\rBeware!\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6341
  extra_descs: []
- vnum: 6345
  name: A Link in the Ethereal Web
  description: "This is another link in the ethereal web.  Various creatures\n\rseem
    to get caught (or hypnotized) by its sticky strands.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6341
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6350
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6346
  extra_descs: []
- vnum: 6346
  name: The Quiet Tree Top
  description: "Here is a quiet tree top.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6345
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6347
  extra_descs: []
- vnum: 6347
  name: On The Web
  description: "RRRRRRRRRRROOOOOOOOOOOOOAAAAAAAAAAAAAARR!  You hear the roar\n\rof
    a powerful beast.  Dragon, you think.  You shiver in your boots\n\ras you tiptoe
    on this section of the web.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6346
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6355
  extra_descs: []
- vnum: 6350
  name: The Ki-Rin Chamber
  description: "A wise ki-rin was entrapped here many years ago.  It is from her\n\rthat
    the ruler of this realm steals his magical strength.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6345
  extra_descs: []
- vnum: 6355
  name: A Link in the Ethereal Web
  description: "This is another link in the ethereal web.  Various creatures\n\rseem
    to get caught (or hypnotized) by its sticky strands.  To\n\rthe north you sense
    the heavy breathing of a fiery animal.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6347
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6360
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6365
  extra_descs: []
- vnum: 6360
  name: Yevaud's Lair
  description: "Yevaud, the Usurper of Midgaard, resides here.  A voice cries\n\rout,
    \"BEWARE, the Usurper of Midgaard lives here!  FLEE while you can!\"\n\rBut even
    Yevaud has his master...or so you deduce.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6355
  extra_descs: []
- vnum: 6365
  name: A Link in the Ethereal Web
  description: "This is another link in the ethereal web.  Various creatures\n\rseem
    to get caught (or hypnotized) by its sticky strands.  A single\n\rspider line
    lies to the north, while ghastly seemings are due\n\rsouthward.  The grim entrance
    of Arachnos' Lair is downward.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6371
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6366
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6390
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6355
  extra_descs: []
- vnum: 6366
  name: Entrance to the Donjonkeep
  description: "A dark path at the end of the web strand, you see ahead\n\ra torch
    lit chamber where the souls of unavenged adventurers\n\rcome and gnash their teeth.
    \ The howls and screams of many echo\n\rthrough the hall ways.  You see one definite
    path ahead.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6367
  extra_descs: []
- vnum: 6367
  name: The Guardian's Room
  description: "A chair sits here for a tireless guardian who ensures that no\n\rsoul
    escapes.  The room is undecorated.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6368
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6366
  extra_descs:
  - keywords: chair
    description: "An ordinary chair, well used, glued to the ground by spiderweb.\n\r"
- vnum: 6368
  name: Realm of the Hopeless
  description: "Here you see many misguided souls who think they still live.\n\rThey
    search for those who killed them without warrant, and seek the\n\rfree souls of
