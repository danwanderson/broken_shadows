- vnum: 6371
  name: The Single Spider Line
  description: "A single spider line supports you once more.  As you look\n\racross
    the ether you seen a single shack up ahead with a light in\n\rthe window.  You
    sense a great evil coming from the east and feel\n\rinclined to go back on the
    ethereal web and take your chances there.\n\r"
