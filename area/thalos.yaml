- vnum: 5210
  name: A Side Street
  description: "You are in the common section of the city. Ruined buildings made of\n\rclay
    and stone is all the view has to offer. Most of these homes are\n\rnothing but
    piles of rubble, but some look almost safe enough to venture\n\rinto. The street
    continues north and south and buildings line the street.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5209
