  name: The tapestry stand
  description: "Tattered and torn tapestries and rugs lie heaped in piles. Fancy\n\rrobes
    and various articles of clothing are now just rags. You stare at\n\rthe strange
    piles for a long time until a piercing howl makes you\n\rthink these might be
    beds.\n\r"
  room_flags: 0
