  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5253
  - dir: 3
    desc: "It looks in bad shape inside, but structurally intact.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5235
  extra_descs: []
- vnum: 5256
  name: A trail at the end of the dwarf forest
  description: "The trail ends here, with short, dry stumps of trees all around you.\n\rTo
    the west, you can see the ruins of a huge city.  Something about it gives\n\ryou
    an uneasy feeling.  To the east is your way back to home and safety.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc: "You see the trail.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5257
  - dir: 3
    desc: "You see Thalos!\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5200
  extra_descs: []
- vnum: 5257
  name: A trail at the end of the dwarf forest
  description: "A side trail here leads from the dwarf forest.  It is definitely drier\n\rand
    hotter here.  The trail continues to the west, and to the east, you see\n\rthe
    T-intersection.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc: "You see the intersection.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5258
  - dir: 3
    desc: "You see the trail continue on.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5256
  extra_descs: []
- vnum: 5258
  name: The dwarf forest
  description: "You see more stunted trees here.  A side trail leads west from here.\n\rTo
    the east, you THINK you see a trail, but you can never be sure.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "You see the trail lead back north.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5259
  - dir: 1
    desc: "You can't see into the gloom of this forest.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5262
  - dir: 3
    desc: "You see the trail branch off.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5257
  extra_descs: []
- vnum: 5259
  name: The dwarf forest
  description: "You see more stunted trees here.  It looks almost as if this place
    was\n\rcursed by a god to be short and dry.  The trail leads north and south.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
