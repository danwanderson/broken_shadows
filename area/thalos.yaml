  description: "You see more stunted trees here.  It looks almost as if this place
    was\n\rcursed by a god to be short and dry.  The trail leads east and west.  It
    looks\n\rdark toward the east.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 1
    desc: "You see a darker part of the forest.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5263
  - dir: 3
