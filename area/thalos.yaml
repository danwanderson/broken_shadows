  name: The market place
  description: "You stand in the middle of a large square lined on each side with\n\rbaskets,
    carts, and stands of all shapes and sizes. Abandoned, these\n\rlittle shops still
    contain some of their goods once sold to a demanding\n\rpublic.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
