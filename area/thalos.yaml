    to_vnum: 5254
  extra_descs: []
- vnum: 5253
  name: A back alley
  description: "A narrow alley leads south to one of the city watchtowers.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The alley continues to the north.\n\r"
    keywords:
    exit_flags: 0
