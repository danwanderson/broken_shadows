- vnum: 5255
  name: A back alley
  description: "A narrow alley leads north to the main street, and south toward a
    tall\n\rwatchtower.  A ruined building is to the west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see main street.\n\r"
    keywords:
    exit_flags: 0
