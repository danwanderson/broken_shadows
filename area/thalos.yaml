  name: The south-east watchtower
  description: "You stand atop one of the city watchtowers. The view is magnificent\n\rfrom
    here and you can see all the way to the western mountains. To the\n\rsouth the
    desert stretches to the horizon. No wonder this place stood\n\rfor so long.  There
    is a small plaque on the stones.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 5
    desc: "The city lies below.\n\r"
    keywords:
