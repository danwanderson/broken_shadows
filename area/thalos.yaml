- vnum: 5202
  name: Main Street
  description: "This was once a magnificent street, but now is in total ruin. The\n\rstreets
    are barren and windswept and the silence is unending. On one\n\rside is a collapsed
    house while on the other is the entrance to a large\n\rruined mansion. Eerie sounds
    echo within the mansion. Near the center of\n\rtown you see a large domed building,
    relatively intact.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The remnants of a store lie this way.\n\r"
