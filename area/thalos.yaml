  - dir: 2
    desc: "The market place is deserted.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5207
  - dir: 3
    desc: "Next to you is a stand full of ruined clothes and rugs.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5222
  extra_descs: []
- vnum: 5226
  name: A ruined clay dwelling
  description: "This was once a very plain house with nothing more than a few chairs\n\rand
    a bed. A cold fireplace suggests that the city has been abandoned\n\rfor quite
    a while. Almost nothing remains of this humble abode.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "Outside is a small side street.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5210
  extra_descs: []
- vnum: 5227
  name: A collapsed stone dwelling
  description: "This small house has completely collapsed upon itself leaving piles\n\rof
    debris here and there. A few rafters still stand with thatched straw\n\rhanging
    down and a hot wind gusts through the hollow dwelling.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "A small side street runs past the house.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5211
  extra_descs: []
- vnum: 5228
  name: A back alley
  description: "A narrow alley leads east to one of the city watchtowers and west
    to\n\ra small side street.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5209
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5224
  extra_descs: []
- vnum: 5229
  name: An abandoned shop
  description: "From the outside this place looks like an ordinary pile of rubble,\n\rbut
    inside these cramped quarters you discover what used to be a shop\n\rfilled with
    armor, weapons, and various other goods. A small sign flutters\n\rin the wind.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "A small side street runs past the shop.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5214
  extra_descs: []
- vnum: 5230
  name: The Tavern of the Sun
  description: "A glorious place in it's prime, this tavern now lies in ruin; tables\n\rand
    chairs are broken scattered, bottles and glasses shattered, and\n\ra small performance
    stage crushed. Musical instruments and personal\n\rbelongings lie under the rubble,
    but the people they once belonged to are\n\rnot with them. Looking up you see
    that the entire second floor and roof\n\rhas fallen in, leaving a gaping hole
    above.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 3
    desc: "A small side street runs past the tavern.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5213
  extra_descs: []
- vnum: 5231
  name: South wing of the city hall
  description: "You stand in a large room attached to this end of the hallway which\n\rleads
    back north to the reception area.  Pedestals and columns have fallen\n\rand most
    of the valuable items have been taken, leaving worthless debris.\n\rA few chairs
    have survived, as well as a large curved desk. To the east\n\ris a vine-covered
    archway leading out into a private courtyard.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The long hallway leads back to the main reception area of the city hall.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5232
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5234
  extra_descs: []
- vnum: 5232
  name: The city hall
  description: "This is the main reception area of Thalos' city hall. The walls have\n\rbeen
    charred and scored massively and debris is spread from wall to wall.\n\rA large
    gaping hole in the west wall allows you to see out to one of\n\rthe city's side
    streets. Obviously no one will be seeing you through today.\n\rHallways lead south
    and east.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "Main street runs past the city hall.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5202
  - dir: 1
    desc: "A hallway leads to the east wing of the city hall.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5233
  - dir: 2
    desc: "A hallway leads to the south wing of the city hall.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5231
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5212
  extra_descs: []
- vnum: 5233
  name: East wing of the city hall
  description: "Here lies the remnants of a fancy office, possibly the mayor's. A
    few\n\rwithered plants and broken pieces of furniture make this place anything\n\rbut
    fancy, though. The only thing remaining intact here is a large\n\rglass cabinet.
    A long hallway leads west back to the reception area and\n\ran ivy-covered archway
    leads south into a private courtyard.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5234
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5232
  extra_descs: []
- vnum: 5234
  name: The private gardens and courtyard of Thalos
  description: "What a shame that this mass destruction also touched this once\n\rbeautiful
    place. The temple's garden path has nothing on this garden.\n\rFlowers and trees
    have been smashed into the ground and lawn benches\n\rthrown through walls. A
    large marble fountain in the center of the\n\rcourtyard still stands, though,
    defying any attempts to destroy its\n\rbeauty. Above stands the remnants of one
    of the watchtowers. Archways\n\rnorth and west lead back into the city hall.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5233
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5231
  extra_descs: []
- vnum: 5235
  name: A small guard house
  description: "This was once the barracks for Thalos' cityguards. Now just an empty\n\rshell,
    this small shack still stands guarding the entrance both to the\n\rcity and to
    the city hall.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "The alley runs by this building.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5255
  extra_descs: []
- vnum: 5236
  name: A collapsed home
  description: "All that's left of this house is a few scattered piles of rubble\n\rand
    a very large blast crater. Obviously someone or something important\n\rwas once
    housed here. A shrieking howl chills your blood.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 2
    desc: "Main street runs past this ruined home.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5202
  extra_descs: []
- vnum: 5237
  name: A tall dwelling
  description: "This seems to be the tallest structure remaining in the city. At\n\rone
    time this could have been an inn of some sort, but now it's just\n\ra mess. The
    back wall as been completely knocked down revealing an\n\rentrance into another
    building through yet another collapsed wall.\n\rBetween the two buildings are
    a few blast craters and boulders. An old\n\rset of wooden steps leads up to a
    creaking second floor.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5238
  - dir: 3
    desc: "A small side street winds past the dwelling.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5211
  - dir: 4
    desc: "The stairs and even the entire second floor itself looks very unsafe\n\rfor
      travel. Gusts of wind make them creak and shudder.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5245
  extra_descs: []
- vnum: 5238
  name: A small shack
  description: "This cramped dwelling could not have housed more than one person.
    Now\n\rwith the back wall missing, it could hold many more. Looking around you\n\rfind
    broken shelves and workbenches with various vials and pouches spilling\n\rcontents
    all across the floor. This was possibly the magic shop of the\n\rcity. The doorway
    to the east is blocked, making the only exit back west.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5237
  extra_descs: []
- vnum: 5239
  name: A back alley
  description: "A narrow back alley goes south to main street and north towards\n\ra
    watchtower. A mass of howls catches you of guard.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5240
  - dir: 2
    desc: "Main street runs past here.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5201
  extra_descs: []
- vnum: 5240
  name: A back alley
  description: "A narrow back alley leads north to one of the city watchtowers\n\rand
    south towards main street. To the west is a doorway to a small\n\rhouse blocked
    by debris.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "A tall watchtower stands a silent vigil over the city.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5241
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5239
  extra_descs: []
- vnum: 5241
  name: Under a watchtower
  description: "You stand under a tall watchtower. Narrow back alleys lead west and\n\rsouth
    and a very weak looking ladder leads up into the tower.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5240
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5243
  - dir: 4
    desc: "Winds howl high above your head in the tower above.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5248
  extra_descs: []
- vnum: 5242
  name: A bath house
  description: "This was once the bath house for the commoners of the city. Hot\n\rsteamy
    water still wells up from a hole in the floor. Obviously there\n\ris a hot spring
    located under the city (making the decision to put\n\ra city here seem much more
    reasonable). Closer inspection of the water\n\ryields a dead body floating around
    in it, skin melted away from months\n\rof floating in there. The west wall has
    collapsed revealing another\n\rcollapsed house.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5243
  - dir: 3
    desc: "The wall has collapsed on the adjoining house, creating a new opening\n\rin
      it.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5244
  extra_descs: []
- vnum: 5243
  name: A back alley
  description: "A narrow back alley leads west to a small side street and east to
    one\n\rof the city watchtowers. Great amounts of steam issue forth from the\n\rbuilding
    to the south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "A watchtower stands a silent vigil over the city.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5241
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5242
  - dir: 3
    desc: "A side street runs by here.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5209
  extra_descs: []
- vnum: 5244
  name: An upright house
  description: "This home is practically the only one around that is still standing.\n\rExcept
    for the massive hole in the east wall, everything else looks\n\rintact, including
    the windows. Great amounts of steam issue forth from\n\rthe hole in the east wall.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5242
  - dir: 3
    desc: "A small side street runs past the house.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5210
  extra_descs: []
- vnum: 5245
  name: On the second floor
  description: "The minute you step off onto this floor you realize it was a mistake.\n\rThe
    old rotted floorboards suddenly give way and you fall down, impaling\n\ryourself
    on jagged boards below.\n\r\n\rYou've fallen, and you can't get up!!!\n\r"
  room_flags: 4
  sector: 1
  owner:
  exits: []
  extra_descs: []
- vnum: 5246
  name: The north-west watchtower
  description: "You stand atop one of the city watchtowers. The view is magnificent\n\rfrom
    here and you can see all the way to the western mountains. No wonder\n\rthis place
    stood for so long.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 5
    desc: "The city lies below.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5224
  extra_descs: []
- vnum: 5247
  name: The south-west watchtower
  description: "You stand atop one of the city watchtowers. The view is magnificent\n\rfrom
    here and you can see all the way to the western mountains. To the\n\rsouth the
    desert stretches to the horizon. No wonder this place stood\n\rfor so long.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 5
    desc: "The city lies below.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5215
  extra_descs: []
- vnum: 5248
  name: The north-east watchtower
  description: "You stand atop one of the city watchtowers. The view is magnificent\n\rfrom
    here and you can see a great floating pyramid to the north-east.\n\rDesert sand
    stretches to the horizon. No wonder this place stood for so\n\rlong.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 5
    desc: "The city lies below.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5241
  extra_descs: []
- vnum: 5250
  name: The Temple of Thalos
  description: "You stand within one of the most holy places in the realm. This\n\rstunning
    domed temple once housed the city's worshipers en masse.\n\rUnfortunately, it
    succumbed to the destruction brought on this city.\n\rLong benches lie toppled
    and the altar desecrated. Large chunks of stone\n\rhave fallen from the walls
    and roof, sending sunlight streaming in on\n\ryou. A few books lie about, conveying
    to you a holy message in a\n\rstrange tongue.\n\r     Wind gusts through the four
    archways and howls and screams can be\n\rheard from all parts of the city.\n\r"
  room_flags: 136
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "A side street leads to the northern half of the city.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5205
  - dir: 1
    desc: "Main street leads out to the main gate of the city.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5203
  extra_descs: []
- vnum: 5251
  name: A back alley
  description: "A narrow alley leads east to a wider street and west to one of\n\rthe
    city watchtowers.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "A tall watchtower stands a silent vigil over the city.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5252
  - dir: 3
    desc: "A small side street greets you.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5214
  extra_descs: []
- vnum: 5252
  name: Under a ruined watchtower
  description: "You stand at the base of a tall watchtower built to protect the city\n\rfrom
    invaders. From the looks of things, it did not do a good job.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5253
