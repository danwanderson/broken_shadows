- vnum: 5212
  name: A side street
  description: "This small side street leads south away from the temple into the\n\rbusiness
    section of town. The destruction that leveled this city was not\n\rbiased; these
    important looking buildings have been almost totally\n\rdestroyed. There is a
    hole in the wall of a very large structure to the\n\reast.\n\r"
  room_flags: 0
  sector: 1
  owner:
