  extra_descs: []
- vnum: 5203
  name: A Garden Path
  description: "A circular path surrounds a magnificent domed temple in the center
    of\n\rthe city. Flowers have withered away and the once lush trees are bare.\n\rVines
    and ivy snake up the sides of the temple and entangle themselves\n\raround your
    feet. A sudden volley of howls pierces the air.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The garden path continues around the building.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5204
  - dir: 1
    desc: "This is the main street leading to the city's entrance\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5202
  - dir: 2
    desc: "The garden path continues around the building.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5206
  - dir: 3
    desc: "Inside the temple, small patches of light shoot through each doorway as\n\rwell
      as a few holes in the ceiling.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5250
  extra_descs: []
