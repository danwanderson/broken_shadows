  name: A side street
  description: "This small side street is lined with the remains of once great\n\rbuildings.
    To the north is a dark, foreboding structure while to the\n\rsouth lies the entrance
    to a small tavern. The street continues north\n\rand south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5212
  - dir: 1
    desc: "From the looks of it, this was once a two story abode. The entire second\n\rfloor
      has collapsed leaving a very little part of the bar still free\n\rfrom debris.\n\r"
    keywords:
    exit_flags: 0
    key: 0
