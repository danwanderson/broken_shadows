  name: The guild house
  description: "You are standing in what once was this city's ONLY guild house.\n\rTables
    and chairs have been smashed and broken weapons lie strewn about\n\rthe floor
    as if some massive battle had taken place here. Draped along\n\rthe back wall
    is a tattered, jet-black banner with the symbol of the\n\rDarkside set upon it.\n\r"
  room_flags: 8
