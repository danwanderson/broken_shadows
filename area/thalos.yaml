- vnum: 5200
  name: The Grand Gate of Thalos
  description: "You stand in the archway of a gigantic stone archway. The two\n\rsteel
    gates have been forced open and have rusted in place. A hollow\n\rgust of wind
    blows by you into the deserted, and seemingly destroyed,\n\rcity.\n\r"
  room_flags: 4
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "You see a trail out of this blasted place.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5256
  - dir: 3
    desc: "You see devastation everywhere. Houses lie in ruin and skeletons litter\n\rthe
      streets. You see strange beasts stalking the shadows.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5201
  extra_descs: []
- vnum: 5201
  name: Main Street
  description: "This was once a magnificent street, but now is in total ruin. The\n\rstreets
    are barren and windswept and the silence is unending.  A dark alley\n\rleads north
    and south.  Howls and screams echo through the deserted city.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
