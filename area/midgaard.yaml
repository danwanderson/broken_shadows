  name: Wall Road
  description: "Wall road extends north and south along the eastern walls of the city.\n\rThe
    east gate is north of you, south is an intersection with a dark alley. You\n\rcheck
    to make sure you still have your wallet.\n\r"
  room_flags: S
  sector: 1
