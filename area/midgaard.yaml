- vnum: 3357
  name: The Bar
  description: "A long mahogany bar is set in the back of the pub.  Mugs line a shelf\n\rbehind
    the bar.  Bottles of strong, nasty looking liquids decorate one\n\rof the lower
    shelves.  A large cask rests on a table behind the bar.  A\n\rstrong but friendly-looking
    bartender stands next to the cask polishing\n\rglasses.  A couple of the bar maids
    stand in a corner and throw the most \n\rinviting glances your way.\n\rA sign
    is on the wall.\n\r"
  room_flags: S
  sector: 0
  owner:
