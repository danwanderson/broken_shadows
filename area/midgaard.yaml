- vnum: 3317
  name: Questmaster's Home
  description: "As you step into this small house, you look around and can't help
    but be\n\ramazed at the treasures displayed in each room.  The lavish entry hall
    opens\n\rin to a decent-sized sitting room, where a small man raises his gaze
    to meet\n\ryou.  He looks you over and offers you a seat on a small, comfortable
    couch,\n\rwhile he returns to a worn rocker in the corner.  All around you are\n\rpriceless
    treasures and, behind each, a tale almost as elaborate as the item\n\ritself.
    \ Before you know it, the elderly gentleman begins a story, retelling\n\rthe history
    of one of these treasures.  \n\r"
  room_flags: DS
