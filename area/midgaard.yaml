- vnum: 3205
  name: On the River
  description: "The river enters from a hole in the eastern city wall.  The hole has
    been\n\rblocked by several vertically positioned iron bars set into the wall.
    Overhead\n\ryou can see the stone buttresses of the eastern bridge.\n\r"
  room_flags: S
  sector: 7
  owner:
  exits:
  - dir: 1
    desc: "The iron bars are broken, allowing passage through the hole in the wall.\n\rBeyond
      the bars you see a dark tunnel.\n\rbars"
