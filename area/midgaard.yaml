    description: "The walls are marked with lots of scratches.  Some of them spell
      sentences\n\rlike \"JAIL IS BETTER THAN SQL\" and \"INGRES STRIKES AGAIN\".\n\r"
- vnum: 3150
  name: Kate's Diner
  description: "The smells of baking bread and simmering stew lead you dancing through\n\rthe
    doorway of the diner.  No greasy spoons to be seen here-- the\n\rbooth walls are
    covered in casual paisleys; the chairs are carved wood,\n\rrescued from garage
    sales.  Most tables have chess or backgammon boards\n\rcarved and painted on their
    fingertip-smooth tops.  The refrain of some\n\rmusical or other from the 1930's
    blends with the dusty golden light and the\n\rwonderful smells to put you completely
    at ease.  A huge picture window\n\rlooks out over the Midgaard River, and a doorway
    leads north onto the dock\n\rand the South Bank river landing, while the main
    entrance to the south\n\rreturns you to Austral Square.\n\rOn most days you will
    find Kate here, testing a batch of stew or brewing\n\ra special pot of cinnamon
    coffee, eerily just in time for your arrival\n\rPull up a chair, perhaps play
    a game, and take time out to talk.\n\r"
  room_flags: DKS
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "A small boat landing lets boats land at the diner.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3203
  - dir: 2
    desc: "You see Austral Square.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3103
  - dir: 4
    desc: "You see the far-off halls of Valhalla.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1219
  extra_descs:
  - keywords: window landing
    description: "You can see a rickety bridge to your northwest, leading back into\n\rCentral
      Midgaard.  A rustic dock connects the Diner with the Midgaard\n\rRiver, and
      a boat or two floats lazily past.  Across the river you can see\n\rthe Levee
      and the Guild of Thieves, but they seem very far away from all\n\rof this...\n\r"
- vnum: 3160
  name: Melancholy's Maps
  description: "As you walk in, a sudden gust of wind enters the shop and sends several\n\rscraps
    of paper fly around the room.  You blink as the dust you've stirred \n\rup stings
    your eyes, and take a look around the shop.  This shop is cluttered \n\rwith old
    pieces of parchment, stacks of books, and odd scraps.  A desk with \n\rslightly
    less clutter than the rest of the shop is in front of you.  A scroll \n\rcase
    full of scrolls is behind the desk.  A bookcase is to the left of you, \n\rand
    to the left is a window overlooking the Common Square.  A small door, \n\rhalf
    hidden by a stack of books, leads to a room in the back of the shop.\n\r"
  room_flags: BCS
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "A sign on the door says, \"Unauthorized Personel Prohibited\".\n\r"
    keywords: door
    exit_flags: ABCD
    key: 3161
    to_vnum: 3161
  - dir: 2
    desc: "To the south is the Poor Alley.  Across the alley, you see the Grubby Inn.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3024
  extra_descs:
  - keywords: window
    description: "You peer out the window and see a cityguard beating up an old lady.\n\r"
  - keywords: bookcase
    description: "You see many cartographer journals and topographical studies.  You
      also see\n\rquite a few tomes written by someone named \"Anson MacDonald\".\n\r"
- vnum: 3161
  name: Melancholy's Room
  description: "A faint smell of incense teases your nose as you enter this room.
    \ You \n\rstep onto a soft bearskin rug and look around.  A simple bed lies against\n\rthe
    far wall.  At the foot of it is a sturdy, ironbound chest, most likely\n\rfull
    of Melancholy's trappings from her adventuring days.  On a small table\n\runder
    a window to the east is a vase with a single white rose.  Other than\n\rthat,
    the room is quite bare.  \n\r"
  room_flags: BCJS
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "A small door to the south leads out into the map shop.\n\r"
    keywords: door
    exit_flags: ABCD
    key: 3161
    to_vnum: 3160
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1219
  extra_descs:
  - keywords: chest
    description: "This chest is firmly locked, and the device by which it opens is
      beyond your\n\rreckoning.\n\r"
- vnum: 3170
  name: Temple Of Stupid
  description: "As you enter the abandoned warehouse your eyes blink violently to\n\radjust
    to the almost total darkness.  You wonder where the windows are\n\ras you step
    into a mud puddle in the middle of the floor.  As your eyes\n\radjust, you realize
    that there are mud puddles all around the room, and\n\rthis is some weird version
    of windows.  In a flash of revelation, you\n\rrealize that you've entered the
    Temple of Stupid.\n\r"
  room_flags: DS
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "Poor Alley is to the north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3044
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1219
  extra_descs:
  - keywords: puddle puddles
    description: "The puddles on the floor are filthy and exude a foul stench.\n\r"
- vnum: 3200
  name: Under the Bridge
  description: "The arch under the bridge is covered by seaweed for one foot above
    the\n\rsurface of the river.  The water gently flows through an opening in the
    lower\n\rpart of the city wall.\n\r"
  room_flags: S
