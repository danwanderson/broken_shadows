  - keywords: sign
    description: "Free instructions provided by the store:\n\r\n\r   Buy  - Will buy
      you some bread or pastry.\n\r   List - The baker will kindly tell you the price
      and sort of the bread in\n\r          his bakery.\n\r"
  - keywords: danish pastry
    description: "You see that this is truly delicious pastry.  Must be made by a
      Dane from\n\rDenmark (which surely is not the capital of Sweden!).  Former ruler
      of\n\rScandinavia, England, Northern Germany, Northern France, Russia, Greenland,\n\rIceland,
      Estonia etc. etc.\n\r   The sight of those large, wholesome chokoladeboller
      makes your mouth water\n\rand your soul sing.\n\r\n\r"
