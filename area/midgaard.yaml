- vnum: 3359
  name: The Inn
  description: "You are standing upstairs from Andy's Pub at Andy's Inn.  A few chairs\n\rand
    a couple of end tables give the room a `homey' atmosphere.  A large\n\rstone fireplace
    burns brightly against one wall and warms the room.  A\n\rlarge oak desk is nestled
    in one corner of the room.  A small man with \n\rwire-framed glasses sits behind
    the desk working dilligently on his books.\n\rHe looks up as you enter the room.
    \ He looks at you quizzically.  He is \n\rprobably waiting for you to ask him
    for a room.\n\r"
