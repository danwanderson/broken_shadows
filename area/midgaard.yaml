- vnum: 3251
  name: Wall Road
  description: "You are walking along the eastern wall of the city, on a road extending
    \n\rbetween the east gate and a bridge to the south.  A dark, dirty alley lies
    east \n\rof here.  You step carefully around a pool of liquid...who knows what
    it could \n\rbe in a place this foul...\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "Wall road continues to the north, heading towards the gate.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3250
  - dir: 2
    desc: "Wall road continues to the south, towards a bridge over the Midgaard river.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3252
  - dir: 3
    desc: "A dirty, unlight alley lies to the west...it looks like a perfect spot
      for a\n\rmugging.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3046
  extra_descs: []
- vnum: 3252
  name: Wall Road
  description: "The walls of Midgaard tower above you to the east, keeping the city
    safe\n\rfrom its enemies...you hope.  An intersection with a dark alley lies north,\n\rand
    a bridge over the Midgaard river is south.  Beyond the bridge wall road \n\rturns
    in the concourse.\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see an intersection with a dark alley.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3251
  - dir: 2
    desc: "The eastern bridge crosses the river to the south.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3253
  extra_descs: []
- vnum: 3253
  name: On the Bridge
  description: "You are crossing a strong stone bridge, which spans the Midgaard river.\n\rBelow
    you, the river flows into an opening in the city wall, sealed with\n\rstrong metal
    bars.  North of you is wall road, south of here the concourse\n\rloops around
    the inside of the city walls.\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "Wall road continues to the north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3252
  - dir: 2
    desc: "The concourse stretches around the southern parts of Midgaard.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3104
  extra_descs:
  - keywords: opening bars river
    description: "Hmm...some of the bars have been ripped out of the wall.  Enough
      to pass a\n\rgood sized raft or canoe, or perhaps even a barge.  You wonder
      what sort of\n\rbeast had the strength to do this.\n\r"
- vnum: 3254
  name: The South Bridge
  description: "You are standing on a small, rickety bridge leading from the Midgaard\n\rCity
    Dump to the much more attractive promenade of the southern parts of \n\rMidgaard.
    \ You can smell the stench of the dump to the north, the fresher\n\rair of the
    promenade seems preferable.  Below you are the swift-moving \n\rcurrents of the
    Midgaard river.\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You can see the clutter of the City Dump.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3030
  - dir: 2
    desc: "The beautiful promenade lies along the river.  What a romantic place to
      visit!\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3102
  extra_descs: []
- vnum: 3255
  name: Inside the South Gate of Midgaard
  description: "Two strong stone towers surround a heavy wooden gate set into the
    city wall,\n\rto guard against the goblins that lurk in the southern forests.
    \ You can exit\n\rthe city to the south, if you dare, or walk down the concourse
    to the east\n\ror west.\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "The concourse heads east along the inside of the city wall.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3129
  - dir: 2
    desc: "You see the southern gate.\n\r"
    keywords:
    exit_flags: A
    key: 3133
    to_vnum: 3256
  - dir: 3
    desc: "The concourse heads west along the inside of the city wall.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3128
  extra_descs: []
- vnum: 3256
  name: Outside the South Gate of Midgaard
  description: "You are standing outside the strong wooden gate on the southern walls
    of\n\rMidgaard.  Guards eye you suspiciously from the two towers on either side
    of\n\rthe gate, as they stand watch to protect the city from the goblins of this\n\rforest.
    \ The trees and goblins of the Miden'nir are south, the gate back to \n\rMigaard
    lies north.\n\r"
  room_flags: S
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "You see the southern gate.\n\r"
    keywords:
    exit_flags: A
    key: 3133
    to_vnum: 3255
  - dir: 2
    desc: "The green forests of the Miden'nir are south, hiding countless goblin warriors.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3505
  extra_descs: []
- vnum: 3257
  name: Wall Road
