  name: First National Bank of Midgaard
  description: "The opulence of this bank is astounding.  You begin to wonder where
    all\n\rthe money to pay for this came from.  The finely crafted furniture is\n\rarranged
    around a large desk in the far corner of the room.  \n\r"
