- vnum: 3002
  name: Cleric's Inner Sanctum
  description: "This is the inner sanctum.  A picture of the mighty Mota is hanging
    on\n\rthe wall, just above the altar which is set against the western wall.  A
    well\n\rin the middle of the floor leads down into darkness.  Vile smells waft
    from\n\rthe depths.\n\r"
