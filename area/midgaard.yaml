- vnum: 3009
  name: The Bakery
  description: "You are standing inside the small bakery.  A sweet scent of Danish
    and\n\rfine bread fills the room.  The bread and Danish are arranged in fine order\n\ron
    the shelves, and seem to be of the finest quality.  A small sign is on\n\rthe
    counter.  \n\r"
