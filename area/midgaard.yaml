    description: "Type \"help purchase\" for a list of what's available.\n\r"
- vnum: 3355
  name: Andy's Pub
  description: "The busy pub is filled with patrons.  People are laughing and singing.\n\rA
    minstrel plays his lute in another part of the pub, and a few people \n\rare even
    dancing.  Andy, the pubs owner, wanders around and checks to see\n\rthat the needs
    of his customers are met.  The bar is to your south.  East\n\rof you is another
    section of the pub.  You know that there are rooms to\n\rbe had somewhere around
    here...\n\r"
  room_flags: S
