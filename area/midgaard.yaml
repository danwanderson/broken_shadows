    description: "The writing is small and close.  You don't want to strain your eyes
      looking\n\rat it.\n\r"
- vnum: 3354
  name: A Florists Shop
  description: "The fragrant scent of flowers in full bloom embraces you as you enter
    the\n\rshop.  Pots and bowls with roses, petunias, daisies, tulips, and carnations\n\rline
    the shelves along the walls.  Smaller pots of herbs and spices rest on\n\rtables
    near the front of the room.  A counter stands in the back of the\n\rroom.  A woman
    is there, trimming some sort of small, green plant.  On the\n\rwall is a sign.
    \ \n\r"
  room_flags: S
