- vnum: 3054
  name: By the Temple Altar
  description: "You are by the temple altar in the northern end of the Temple of Mota.\
    \  A\nhuge altar made from white polished marble is standing in front of you and\n\
    behind it is a ten foot tall sitting statue of Odin, the King of the Gods. \n\
    The back of the altar opens into a beautiful atrium, above which can be seen\n\
    a rainbow.  \n"
  room_flags: CDKS
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: |
      You see the southern end of the temple.
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 3001
  - dir: 4
    desc: |
      Bifrost, the Rainbow Bridge, hangs in the sky above you.
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 1215
  extra_descs:
  - keywords: statue Mota king god
    description: |
      The statue represents the Great God Mota, holding his staff.  He has long, grey
      hair and beard and a kindly look on his face.  His staff is topped by a painted
      cube, the 6 faces of which represent the 6 aspects of his power.
  - keywords: altar
    description: |
      Even though the altar is more than ten feet long it appears to be made from a
      single block of white virgin marble.
- vnum: 3056
  name: The Fountain of Youth Apothecary
  description: |
    An old man putters around behind the counter, making strange love potions
    and curative philtres.  He turns as you enter, and looks on with avarice.
    Judging from the furnishings, he's been made very wealthy by his trade.
  room_flags: DKS
  sector: 0
  owner: ''
