- vnum: 3001
  name: The Temple Of Mota
  description: "You are in the southern end of the temple hall in the Temple of Mota.\n\rThe
    temple has been constructed from giant marble blocks, eternal in\n\rappearance,
    and most of the walls are covered by ancient wall paintings\n\rpicturing gods,
    giants and peasants.\n\r   Large steps lead down through the grand temple gate,
    descending the huge\n\rmound upon which the temple is built and ends on the temple
    square below.\n\r   Equally large steps lead UP through a small door into the
    ENTRANCE to MUD \n\rSCHOOL.  (type 'up' to go to MUD SCHOOL.)  A small plaque
    is on this wall.\n\r"
  room_flags: CDS
  sector: 0
  owner:
