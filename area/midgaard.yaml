  description: "This is the Magical Experiments Laboratory.  Dark smoke-stained stones\n\rarch
    over numerous huge oaken tables, most of these cluttered with strange-\n\rlooking
    pipes and flasks.  The floor is covered with half-erased pentagrams\n\rand even
    weirder symbols, and a blackboard in a dark corner has only been\n\rpartially
    cleaned, some painful-looking letters faintly visible.  A well in\n\rthe middle
    of the floor leads down into darkness.  Vile smells waft from the\n\rdepths.\n\r"
