  - keywords: bookcase
    description: |
      You see many cartographer journals and topographical studies.  You also see
      quite a few tomes written by someone named "Anson MacDonald".
- vnum: 3161
  name: Melancholy's Room
  description: "A faint smell of incense teases your nose as you enter this room.\
    \  You \nstep onto a soft bearskin rug and look around.  A simple bed lies against\n\
    the far wall.  At the foot of it is a sturdy, ironbound chest, most likely\nfull\
    \ of Melancholy's trappings from her adventuring days.  On a small table\nunder\
    \ a window to the east is a vase with a single white rose.  Other than\nthat,\
    \ the room is quite bare.  \n"
