  description: "A few strategically placed lanterns keep this shop well-lit in the
    \n\rabsence of any windows.  The room is surprisingly well appointed with  \n\rtapestries
    hanging on the walls.  Large oak cases are situated in the \n\rback of the room,
    obviously designed for displaying jewellery.  A simple \n\rwork bench is located
    to the front of the shop and a few tools are strewn\n\rabout on it.  There is
    a heavy door in the back of the room.  You assume\n\rthat it leads to the jewellers
    back room where he stores his valuables.\n\r"
  room_flags: S
