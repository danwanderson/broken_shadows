  - keywords: sign signs numbers
    description: "The sign says: Please take a number.  \n\rThe top number is: 42\n\r"
- vnum: 3352
  name: Grebe's Tavern
  description: "Dive.  That's all you can say about this place; its a\n\rdive.  You
    step carefully over the dead and/or drunk sailors\n\ron the floor toward the center
    of the room.  There's no\n\rdecorations on the wall; they've all been ripped down
    in anger\n\ror for use as weapons at one time or another.  Looking around,\n\ryou
    search vainly for a clean table to sit at, and then give up.\n\r"
  room_flags: DS
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "A dark alley is to the south.\n\r"
    keywords:
