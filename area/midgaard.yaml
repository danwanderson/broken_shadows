    is\n\rbuilt out from the western city wall and the river flows west through an\n\ropening
    in the wall ten feet below the bridge.\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see the road.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3047
  - dir: 2
    desc: "You see the Concourse.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3100
  extra_descs:
  - keywords: wall
    description: "It is built from large grey rocks that have been fastened to each
      other with\n\rsome kind of mortar.  It is far too high to climb.\n\r"
  - keywords: opening
    description: "You cannot really see it from here as it is somewhere beneath your
      feet.\n\r"
  - keywords: bridge
    description: "It is built from large grey rocks that have been fastened to each
      other with\n\rsome kind of mortar, just like the wall.\n\r"
- vnum: 3052
  name: Outside the West Gate of Midgaard
  description: "You are by two small towers that have been built into the city wall
    and\n\rconnected with a footbridge across the heavy wooden gate.  To the west
    you\n\rcan see the edge of a big forest. A small dusty trail leads north along
    the\n\rwall.\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "The trail continues around the City of Midgaard.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3900
  - dir: 1
    desc: "The city gate is to the east.\n\r"
    keywords: gate
    exit_flags: A
    key: 3133
    to_vnum: 3040
  - dir: 3
    desc: "The forest edge is to the west.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6000
  extra_descs:
  - keywords: wall
    description: "It is built from large grey rocks that have been fastened to each
      other with\n\rsome kind of mortar.  It is far too high to climb.\n\r"
  - keywords: tower towers
    description: "Both of the towers are built from large grey rocks that have been
      fastened to\n\reach other with some kind of mortar, just like the city wall.\n\r"
  - keywords: gate
    description: "It is a set of very big double doors made from hard wood.  They
      have been\n\rreinforced with large iron bands to make them even more sturdy.
      \ One of the\n\rdoors is equipped with a very big lock.\n\r"
  - keywords: bridge footbridge
    description: "It is too high up to reach but it looks as if one easily could walk
      across it\n\rfrom one tower to the other.\n\r"
- vnum: 3053
  name: Outside the East Gate of Midgaard
  description: "You are by two small towers that have been built into the city wall
    and\n\rconnected with a footbridge across the heavy wooden gate.  To the east
    the\n\rplains stretch out in the distance. To the north a small dusty trail follow\n\rthe
    city wall.\n\r"
  room_flags: S
  sector: 1
  owner:
  exits:
