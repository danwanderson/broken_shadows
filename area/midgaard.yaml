- vnum: 3335
  name: A Butcher's Shop
  description: "An somewhat unpleasant smell assaults your nose as you walk through
    \n\rthe open door of the shop.  The scent of raw meat, blood and sweat are \n\rare
    among the more recognizable odors.  They seem to be the standard \n\raromas of
    a good butchers shop.  Various slabs and shoulders of beef, \n\rdeer, rabbit and
    other animals hang on large hooks along the walls and \n\rin rest piles on butchering
    blocks.  A sign hangs nearby. Large wooden \n\rnumbers hang from a large nail
    on the sign.\n\r"
  room_flags: S
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "Market Road is through the door to the south.\n\r"
    keywords:
