  description: "As you step into this small house, you look around and can't help\
    \ but be\namazed at the treasures displayed in each room.  The lavish entry hall\
    \ opens\nin to a decent-sized sitting room, where a small man raises his gaze\
    \ to meet\nyou.  He looks you over and offers you a seat on a small, comfortable\
    \ couch,\nwhile he returns to a worn rocker in the corner.  All around you are\n\
    priceless treasures and, behind each, a tale almost as elaborate as the item\n\
    itself.  Before you know it, the elderly gentleman begins a story, retelling\n\
