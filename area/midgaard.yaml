- vnum: 3356
  name: A Room in the Pub
  description: "This part of the pub is filled with dancing and singing.  A wandering\n\rminstrel
    is on a chair in a corner with his lute.  A busty red headed\n\rwoman is standing
    near him and singing a tale of comedic heroism. Drunk\n\rmen sit laughing at their
    tables and busy bar maids weave through the\n\rcrowd with full mugs and horns
    of ale and mead.  Another part of the pub\n\ris located to your west. The bar
    is to the south.  A set of steps occupy\n\rin a corner of the room.  They lead
    up to the inn section of this \n\rprosperous establishment.  \n\r"
  room_flags: S
