- vnum: 3138
  name: The Mayor's Office
  description: "You are in the not very big office of the Mayor of Midgaard.  A large
    and\n\rpolished but completely empty desk is standing in front of an armchair
    that\n\rlooks so comfortable that it most of all resembles a bed with the head
    end\n\rraised slightly.\n\r"
