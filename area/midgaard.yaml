- vnum: 3054
  name: By the Temple Altar
  description: "You are by the temple altar in the northern end of the Temple of Mota.
    \ A\n\rhuge altar made from white polished marble is standing in front of you
    and\n\rbehind it is a ten foot tall sitting statue of Odin, the King of the Gods.
    \n\rThe back of the altar opens into a beautiful atrium, above which can be seen\n\ra
    rainbow.  \n\r"
  room_flags: CDKS
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see the southern end of the temple.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3001
  - dir: 4
    desc: "Bifrost, the Rainbow Bridge, hangs in the sky above you.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1215
  extra_descs:
  - keywords: statue Mota king god
    description: "The statue represents the Great God Mota, holding his staff.  He
      has long, grey\n\rhair and beard and a kindly look on his face.  His staff is
      topped by a painted\n\rcube, the 6 faces of which represent the 6 aspects of
      his power.\n\r"
  - keywords: altar
    description: "Even though the altar is more than ten feet long it appears to be
      made from a\n\rsingle block of white virgin marble.\n\r"
- vnum: 3056
  name: The Fountain of Youth Apothecary
  description: "An old man putters around behind the counter, making strange love
    potions\n\rand curative philtres.  He turns as you enter, and looks on with avarice.\n\rJudging
    from the furnishings, he's been made very wealthy by his trade.\n\r"
  room_flags: DKS
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see the eastern end of alley.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3046
  extra_descs: []
- vnum: 3057
  name: In the air...
  description: "WOW you can fly!  You are floating in the air above Temple Square
    of Midgaard.\n\r"
  room_flags: CS
  sector: 9
  owner:
  exits:
  - dir: 4
    desc: "More of the same.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1017
  - dir: 5
    desc: "Back down on the earth where you should be!\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3005
  extra_descs: []
