    description: "Bare, except for the holes.\n\r"
  - keywords: table tables
    description: "You find a table that's relatively vomit-free.\n\r"
- vnum: 3353
  name: The Trading Post
  description: "Bolts of cloth are stacked in monstrous heaps around the room.  Barrells
    \n\rof spices fill the corners.  Crates and boxes are stacked in a haphazard\n\rmanner
    about the room.  Merchants wander in and out of a back door, moving\n\rstrange
    boxes filled with mysterious goods and bound for exotic locations.\n\rA schedule
    for the various caravans is posted on the walls.  This is the\n\rlocal trading
    post.  It hums and buzzes with excitement.\n\r"
  room_flags: S
  sector: 0
  owner:
  exits:
