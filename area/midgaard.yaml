  - keywords: tower towers
    description: "Both of the towers are built from large grey rocks that have been
      fastened to\n\reach other with some kind of mortar, just like the city wall.\n\r"
  - keywords: gate
    description: "It is a set of very big double doors made from hard wood.  They
      have been\n\rreinforced with large iron bands to make them even more sturdy.
