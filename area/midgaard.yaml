  description: "You are standing in the bar.  The bar is set against the northern
    wall, old\n\rarchaic writing, carvings and symbols cover its top.  A fireplace
    is built into\n\rthe western wall, and through the southeastern windows you can
    see the temple\n\rsquare.  This place makes you feel like home.\n\rA small sign
    with big letters is fastened to the bar.\n\r"
