- vnum: 20240
  name: Third Floor of the Center Tower
  description: "This is a small room that looks like it was nothing more that a small\n\
    library.  It has a few small shelves that hold few books.  It looks like it\n\
    held some tomes in addition to the large library on the main floor of the\npalace.\
    \  To the south is a door which is large and painted black.  To the\nwest is a\
    \ small archway which leads to another room.   \n"
