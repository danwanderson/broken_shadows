      bone china and you are sure the mugs alone are worth thousands.  \n"
- vnum: 20204
  name: The Kitchen of the Innes Street Inn
  description: "This is a rather large kitchen.  There are large open flame fires\
    \ with\nlong spits slowly being turned over them.  On the spits you can't really\n\
    make out what they are but you believe that they look to be something either\n\
    human or at least humanoid.  There are many slaves running around here\ncleaning\
    \ and cooking although they don't look to be of much interest.  There\nis one\
    \ door to the south and the door leads back to the dining hall to the\nwest. \
    \ You start to wonder just what goes on around here.   \n"
