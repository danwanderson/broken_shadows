- vnum: 20128
  name: Far Northern Navigator Way
  description: "This is the last block to the north before the palace fence.  The\n\
    southern wall is far to the south, perhaps 6 city blocks with intersections\n\
    along the way.  There is the high castle wall to the east and to the west is\n\
    a small shop...  You are not sure what kind.  This part of town is still\npretty\
    \ busy although you are not sure why.   \n"
  room_flags: '0'
