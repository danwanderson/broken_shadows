- vnum: 20234
  name: Second Floor of the Center Tower
  description: "This is the first room of the second floor.  The stairs that you just\n\rtraveled
    up are in good condition.  There is a small window here looking out\n\rover the
    castle.  There isn't as much fog when looking from here as there\n\rwas below.
    \ To the north is a small archway leading to another small room. \n\rThe floors
    here are clean stone as are the walls.  \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
