- vnum: 20171
  name: Bottom Floor of the SW Tower
  description: "This is the lowest level of the SW guard tower.  There is a small\
    \ table\nhere for the off duty guards and there are a few small, now empty, quarters.\n\
    The dust is thick as there is little going on in these towers anymore. \nThese\
    \ were once the second line of defense for the Castle.  The guards used\nto flood\
    \ out of the towers and annihilate anything in there way...  Course\nthat was\
    \ the past.   \n"
