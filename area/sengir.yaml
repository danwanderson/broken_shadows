- vnum: 20146
  name: Southern Navigator Way
  description: "This is the eastern most north/south road in the castle proper.  This\n\
    road links the palace fence with the SE tower.  To the east is the Central\nCourtyard\
    \ and to the north are some houses then ultimitely the palace.  The\nhigh wall\
    \ that protects the Castle is to the east.   \n"
