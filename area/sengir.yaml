  extra_descs: []
- vnum: 20235
  name: Second Floor of the Center Tower
  description: "This is just another room in the long path to the top of the tower.
    \n\rThe walls and floors are uncovered stone with interesting work done within\n\rthe
    stone itself.  There is a small archway to the south leading to the\n\rstairwell
    down.  To the east is a door leading to another room.   \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 3
