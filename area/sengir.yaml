  extra_descs: []
- vnum: 20164
  name: Upstairs of Sengir House
  description: "This floor is in as good of condition as the first floor was.  The
    soft\n\rcarpeting of the floor makes you realize that this ws once owned by a\n\rnobleman
    of Sengir.  The rooms are all opened as there are no doors.  The\n\rclock still
    ticks even today.  The only exit is back down the steps.  As far\n\ras you can
    tell the only thing bizarre about this room is that the windows\n\rare blacked
    out and the bed has been replaced by four small coffins.  You\n\rwonder why there
    would be coffins in a house...   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
