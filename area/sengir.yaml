- vnum: 20175
  name: Second Level of SE Tower
  description: "Many remains of human guards lay scattered along this second level
    of\n\rthe tower.  The stairs lead up to the top and down to the courtyard.  You\n\rare
    most surprised by the thick boards that make up the battlements to the\n\rsouth
    and the east.  This small room has nothing else of interest.   \n\r"
  room_flags: 4
  sector: 0
