    exit_flags: 35
    key: 0
    to_vnum: 20103
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20101
  extra_descs: []
- vnum: 20103
  name: The Alcove
  description: "The break in the bush offers a small alcove cut into the hedge.  The\n\rhigh
    walls and razor sharp thorns offer you protection from the elements as\n\rwell
    as black, flying creatures..  The air almost feels warmer here as if\n\rthere
    is someone wathing over you.  There is a bed here offering a safe\n\rplace to
    sleep.   \n\r"
  room_flags: 1028
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 35
    key: 0
    to_vnum: 20102
  extra_descs:
  - keywords: bed
    description: "The large bed invites you to sleep.  The calming room and gentle
      touch of\n\rthe healer calls out...  \n\r"
- vnum: 20104
  name: The Path Outside of the Castle
  description: "The path continues quite haphazardly in a northern direction.  You
    can\n\rbarely see for the night?  Is thrust into complete darkness.  You start
    to\n\rdoubt yourself as you pass the large gates you saw from afar.  You now\n\rrealize
    that the fence surrounded nothing except a large wall.  The doorway\n\ris now
    only a short distance away.  You want to turn around but you trek\n\ronward...
    \ The wall is now in front of you...  The cold gray stone extend to\n\rthe east
    and west.  The walls end in high towers on both sides.   \n\r"
  room_flags: 4
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
