- vnum: 20151
  name: Sengir Street
  description: "This was the main street within the Castle.  To the west is an old\n\
    magic shop.  To the east is an old armor shop.  The ground is a hard packed\n\
    dirt and the shops are made of the same gray stone of the castle.  Some of\nthe\
    \ shops along the way do have second floors but you wonder if the floors\ncould\
    \ hold your weight anyway.  The palace lies to the north, and is looking\nquite\
    \ interesting.   \n"
