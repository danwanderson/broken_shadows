      that\n\rresembles a key with a skull engraved on it.  You wonder what could
      be\n\rhidden behind such thick doors.  \n\r"
- vnum: 20162
  name: Sengir Noble House
  description: "Although quite similar to the house across the street in size and\n\rappearance,
    this house has been almost destroyed.  The stairs have been\n\rreduced to rubble
    and the furniture could be mistaken for matchsticks.  You\n\rrumage through what
    you can and you still can't find anything of value.  The\n\ronly place to go is
    back out the door you came in.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 7
    key: 0
    to_vnum: 20161
  extra_descs: []
- vnum: 20163
  name: Sengir Noble House
  description: "This house has been untouched.  There are still vases perched up on
    a\n\rshelf with an inch thick layer of dust on it.  You notice a second level
    to\n\rthis building and consider staggering up them.  You see that there is nice\n\rfurniture
    throughout the lower level and wonder who owned this house.  The\n\rdoor behind
    you takes you to the street and the beautifully forged steps\n\rwill take you
    to the second floor.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
