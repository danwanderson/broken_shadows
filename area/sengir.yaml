- vnum: 20246
  name: Fifth Floor of the Center Tower
  description: "You can feel unending dread here.  You can't quite put your finger\
    \ on\nthe cause but you know that many things have died at the hand of what is\n\
    directly above you.  The room you are in has nothing except the stairs... \nBut\
    \ you are scared...  So scared of what is above you.   \n"
