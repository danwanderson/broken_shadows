    front of you piercing the sky with its high towers.  To the south is a path\n\
    leading to the front of the palace.  The fence which is pretty high itself\nprotects\
    \ the palace further even though the castle walls surround the palace\nin it's\
    \ entirety.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20273
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20271
  extra_descs: []
- vnum: 20273
  name: Outside the East Wall of the Palace
  description: "This path is nothing more than a place that the guards can search.\
    \  The\narea in between the palace and the fence is in good condition even though\n\
    there are almost always guards floating through here.  To the north is the\npath\
    \ going around the corner of the palace and to the south the same.  To\nthe west\
    \ it the palace itself and to the east is the fence.  \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20272
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20274
  extra_descs: []
- vnum: 20274
  name: Outside the SE Tower of the Palace
  description: "Here is where the path turns and leads north around the corner of\
    \ the\npalace.  In front of you is the tower which serves as more protection for\n\
    the king.  To west is the actually entrance to the palace and to the south\nis\
    \ the palace fence.  \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20273
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20275
  extra_descs: []
- vnum: 20275
  name: Outside the South Wall of the Palace
  description: "A small path leads away from the entrance to the palace.  You are\
    \ now\nwithin the fence of the palace.  To the east and west are paths which seem\n\
    to lead all around the palace.  To the north is the palace itself and to the\n\
    south is the fence which protects the palace from siege although the castle\n\
    walls completely enclose the palace itself.  \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20274
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20105
  extra_descs: []
- vnum: 20276
  name: Third Floor of the SW Tower
  description: "This is an open air floor of the tower.  You can see the start of\
    \ the\nWinkle street.  The tower seems to be in good condition and there is little\n\
    damage like there were on some of the other towers.  There is a small spiral\n\
    staircase leading back down to the palace proper.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 5
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20111
  extra_descs: []
- vnum: 20277
  name: Third Level of the SE Tower
  description: "This is the third level to the SE tower.  There are empty hot oil\n\
    cauldrons that were used to douse the enemy trying to climb the walls. \nThere\
    \ is a small spiral stairwell leading back down into the palace.  Other\nthan\
    \ that there is nothing of interest.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 5
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20133
  extra_descs: []
- vnum: 20278
  name: King's Retreat
  description: "This small room once was built for the king to retreat to if there\
    \ was\nan attempt on his life.  The room is plain, although it still has that\
    \ royal\ntouch of a grand gold boardered painting on the north wall.  Perhaps\
    \ a\ncloser look at the painting would be appropriate.  To the south is the only\n\
    exit which leads to the western antechamber.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20168
  extra_descs:
  - keywords: painting
    description: "This painting is truely magnificent.  You look closely at it and\
      \ see\nthe delicate colors and the perfect brush strike that was used to create\n\
      such a fine peace.  You also notice that there is a perfectly hidden passage\n\
      that the painting covers.  Perhaps you should ENTER PAINTING.   \n"
- vnum: 20279
  name: Hidden Passageway
  description: "This is amazing...  You step through the passage into the painting\
    \ and\nend up here.  You are not sure where here is but you know that the\npassageway\
    \ you just came through is no longer open.  The painting swung back\nand sealed\
    \ itself leaving nowhere to go but into the darkness...  To the\nnorth.   \n"
  room_flags: AC
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20280
  extra_descs: []
- vnum: 20280
  name: Hidden Passage
  description: "The passageway continues to the north and back to the south.  There\n\
    is really nothing to be seen in the darkness.  The walls are a smooth stone\n\
    with no lighting nor decoration.  The ground is a hard packed dirt with no\ncovering.\
    \  Perhaps a search farther to the north will show something of\ninterest.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20281
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20279
  extra_descs: []
- vnum: 20281
  name: Hidden Passage
  description: "This is just another passageway.  There appears to be a large room\
    \ to\nthe north that is lit with a number of torches.  The passageway leads back\n\
    to the south and appears to lead no where important.  You can feal the evil\n\
    to the north.  Approach with fear.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20282
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20280
  extra_descs: []
- vnum: 20282
  name: Hidden Chamber
  description: "This appears to be the room where the queen is rushed during times\
    \ of\nseige.  You don't recall the decline in altitude but you realize that the\n\
    room seems to be below the ground.  The room is cool and fairly well lit. \nThere\
    \ are two thrones sitting on the northern half of the room and a\npassageway to\
    \ the south.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20281
