- vnum: 20106
  name: The Foyer of the Palace
  description: "Your light cuts through the darkness producing an ornate foyer.  You\n\
    feel the warmth of the light because the room is brightly decorated.  The\nfloor\
    \ is covered in bright, colorful rugs and the walls are covered with\npainting.\
    \  There is a stairway leading up to the next level, although you\ncan't see for\
    \ the lack of light.  The large door remains open behind you and\nthere are archways\
    \ leading to the east and west.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
