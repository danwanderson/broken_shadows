- vnum: 20131
  name: Eastern Part of the East/West Hallway
  description: "This is the farthest east in the hallway.  The only thing left to
    the\n\reast is a tower which would be the SE tower.  To the north is a small door\n\rleading
    to a guest bedroom.  To the west is the hallway leading off to the\n\rSW tower.
    \ The floor is cold and the hall has a terrific breeze, which is\n\rcold...  Very
    cold.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
