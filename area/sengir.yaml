- vnum: 20199
  name: Southeastern Sengir Square
  description: "A small hole was dug here by a large creature.  It isn't nearly as
    deep\n\ras the one to the west of here but still noticable.  The two houses here
    are\n\rstill in good shape and can be entered by way of the closed doors to the\n\rsouth
    and east of here.  To the North is Innes Street and to the west is\n\rSengir Street.
    \ Other than that there isn't really anything of interest.  \n\r"
