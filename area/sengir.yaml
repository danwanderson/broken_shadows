- vnum: 20130
  name: Flying in Front of Castle Sengir
  description: "You are flying up to the battlements.  The cool air refreshes you
    as you\n\rglide up the smooth rock.  You are almost atop the 30' wall.   Better\n\rwatch
    out.  There may be guards.  \n\r"
  room_flags: 0
