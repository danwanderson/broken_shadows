- vnum: 20109
  name: Base of the SW Tower
  description: "This is the bottom of the stair leading up to the top of the SW tower.\
    \ \nThe stairs are in good condition still with the handrails still intact. \n\
    There is an archway leading back to the east and up you can see a second\nlanding\
    \ a story or so up.   \n"
  room_flags: '0'
