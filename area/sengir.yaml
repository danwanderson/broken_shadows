- vnum: 20133
  name: Second Level of the SE Tower
  description: "This is just another level of the tower.  To the west is the hallway\n\rwhich
    links the two corner towers.  The tower is still in good condition\n\rconsidering
    the fierce battles that took place here.  The stairs lead both\n\rup and down.
    \  \n\r"
  room_flags: 0
