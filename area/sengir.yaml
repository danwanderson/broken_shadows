  description: "This, being the eastern half of the courtyard, is covered in lush\
    \ green\ngrass.  You wonder if there is anything of interest in this tall grass,\
    \ but\nyou won't know until you look through it.  The SE tower is to your south\
    \ or\neast and the Central courtyard is to the west.  A small alleyway leads to\n\
