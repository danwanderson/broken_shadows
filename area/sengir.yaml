- vnum: 20127
  name: Outside the Eastern Wall
  description: "The light shines off of the tall gray wall.  You notice that each\
    \ brick\nis set into the wall almost perfectly.  The path is only a few meters\
    \ wide\nand there is a sheer cliff opposite the great wall.  The cliff drops several\n\
    dozen feet and ends in a small patch of stalagmites.  The path leads north\nand\
    \ south, there is no way down the cliff.   \n"
