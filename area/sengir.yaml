- vnum: 20122
  name: Outside the Western Wall
  description: "This wall has long black streaks down it.  The streaks were obviously\n\
    oil being poured down them in the effort of protection these once sacred\nwalls.\
    \  The ground is still covered in gray earth which compliments the dark\ngray\
    \ stone of the wall.  The path leads south and north.   \n"
