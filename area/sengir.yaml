- vnum: 20136
  name: Hall Leading to the Inner Rooms of the Palace
  description: "This is the hall that leads from the foyer to the inner sanctum of
    the\n\rpalace.  This sanctum is where the throne room and the private quarters
    of\n\rthe king is...  Or was.  The hall is in pristene condition with polished\n\rwalls
    and floors.  The tile is even kept warm here by some unknown source. \n\rTo the
    south is the foyer, to the north the sanctum.  The sun slowly\n\rdisappears in
    the west.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
