- vnum: 20175
  name: Second Level of SE Tower
  description: "Many remains of human guards lay scattered along this second level\
    \ of\nthe tower.  The stairs lead up to the top and down to the courtyard.  You\n\
    are most surprised by the thick boards that make up the battlements to the\nsouth\
    \ and the east.  This small room has nothing else of interest.   \n"
