- vnum: 20212
  name: Portal to the Other World
  description: "There is a tall portal that rises out of the ground on the north wall.
    \n\rThe tall skinny portal can be examined for more detail but you are sure that\n\ryou
    do not want to attack whatever you are about to encounter here.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
