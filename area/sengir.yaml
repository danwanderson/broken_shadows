- vnum: 20244
  name: Fourth Floor of the Center Tower
  description: "This room has been stripped of all furnishings.  There are burns across\n\
    the entire floor and the walls are scorched also.  You can sense great evil\n\
    was here...  And not too long ago.  To the south is another stairwell\nleading\
    \ up and to the west is another guard room.   \n"
