- vnum: 20145
  name: Corner of Navigator and Innes Streets
  description: "Here is where two of the largest streets run together beside the\n\
    Eastern Wall.  The corner is busy and there are many people milling about. \n\
    To the south is the SE tower and to the north is the palace fence a couple\nof\
    \ blocks up.  Back to the east is the center square of the castle.  There\nis\
    \ an unusually pleasant odor in the air...  It doesn't even smell like\nburning\
    \ flesh anymore.   \n"
