  name: Northwestern Sengir Square
  description: "The famous Innes street is to the southwest, starting the area where\n\rthe
    nobles were to have lived.  There is a small house to the north of you\n\rand
    there is a tiny shack to the west.  You know that these were probrably\n\rlarge
    houses but the wars were quite fierce in this section of town.  Sengir\n\rstreet
    is to the west hidden amongst some tall grass.   \n\r"
