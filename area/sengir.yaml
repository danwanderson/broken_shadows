- vnum: 20150
  name: Central Courtyard
  description: "As you walk into this massive fortress you realize that there is a\n\
    smaller palace within the main walls.  There is a path leading to the west\nand\
    \ to the east.  These paths lead to what look to be old stores and other\nstreets.\
    \  The main road leads straight ahead and toward the Palace of\nSengir.  There\
    \ are human remains scattered around the castle.  You surge\nforward.   \n"
