- vnum: 20209
  name: End of Winkle Street
  description: "This is the western front of the palace fence.  There is a large wooden\n\rfence
    still in wonderful condition in front of you.  The fence looks as\n\rthough it
    hasn't been touched in years.  There is a dull glow from the fence\n\rwhich makes
    you think that it is magically protected.  To the west is the\n\rfront gate leading
    to the palace proper.  To south leads back to the\n\rintersection which is home
    to the square.   \n\r"
  room_flags: 0
