- vnum: 20197
  name: Northeastern Sengir Square
  description: "This is the NW corner of the castle's once busy square.  This corner\n\rwas
    once the locatation of the famous Innes Street Inn.   This fine\n\restablishment
    was known throughout the region as the world's finest inn. \n\rPeople used to
    travel from miles around to hear the stories of the bards and\n\rsee the juggling
    of the finest jugglers in the land.  Since then, the third\n\rstory has been destroyed
    but the lower levels seem to be in good shape.  The\n\rstands open to the north.
    \  \n\r"
  room_flags: 0
