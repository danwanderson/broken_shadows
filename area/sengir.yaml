- vnum: 20140
  name: Front Portulagus of Castle Sengir
  description: "The front of the castle has old banners hanging from the battlements.\
    \ \nThe dark gray stone has stains of oil and blood as it looks to have been the\n\
    home of a great battle not to far in the past.  The arrow slits are still\nwide\
    \ open and you are quite fearful that an arrow could still exit the small\nopening.\
    \  The huge grate is raised and you just know that you shouldn't\ncontinue much\
    \ farther but something drives you onward.  There are two small\nguard rooms on\
    \ either side of the grate as you walk into the castle.   \n"
  room_flags: '0'
