  extra_descs: []
- vnum: 20165
  name: Bedroom of Sengir House
  description: "This is an ornate room in the back of the house.  This is where the\n\
    coffins are.  You examine the coffins and notice that they are clean and\nhave\
    \ been used?  Recently.  You again notice that there are no windows and\nthe rooms\
    \ are completely dark.  The stairs are to the west.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
