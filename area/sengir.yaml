  extra_descs: []
- vnum: 20166
  name: Hall of Kings
  description: "The throne is only a dozen feet away and you already feel the sheer\n\
    power radiating from it.  You start to realize that the king was a kind and\n\
    just ruler and was heartlessly slain by the undead that now control his\nkingdom.\
    \  The hall is still immaculate and you can see your reflection in\nthe highly\
    \ polished marble pillars.  To the south is more of the hall\nincluding the rest\
    \ of the palace.  To the north is the precious throne.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
