- vnum: 20116
  name: Small Washroom
  description: "There is a small washbasin here and there is a hole which looks to\
    \ be\nsome sort of urinal facility.  There is a door leading back to the east.\
    \ \nThere is a contraption which looks like a fireplace.  You realize that it\n\
    was used to heat the water for baths which took place in the huge cast-iron\n\
    tub.   \n"
