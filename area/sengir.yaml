- vnum: 20223
  name: Southern Winkle Street
  description: "This part of town got completely destroyed in the battle.  The once\n\rlarge
    beautiful houses are now just piles of rubble.  There are long slashes\n\rin the
    ground and the pieces of stone are now all but powder.  There is the\n\rcourtyard
    to the south and more of Winkle Street to the north.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
