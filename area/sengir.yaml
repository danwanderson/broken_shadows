- vnum: 20137
  name: Guard Station before the Inner Sanctum
  description: "This is the guard station checking for would be assassins.  These\
    \ are\npart of the King's high guard and are second in power only to the king's\n\
    personal bodyguard.  The station includes four bunks for the rotating guard.\n\
    To the east is the bunkhouse proper and through the portugulus to the north\n\
    is the Hall of Kings.   \n"
