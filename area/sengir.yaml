- vnum: 20247
  name: Sixth Floor of the Center Tower
  description: "You are practically frozen with fear as you enter this level.  Your\n\
    sheer willpower is all that is helping you go on.  Above you is something so\n\
    evil that only the strongest and most powerful beings should antagonize. \nNot\
    \ just one person should attack either...  Many many people should go on. \nYou\
    \ can flee down or continue on above but either way you still feel the\nevil.\
    \   \n"
