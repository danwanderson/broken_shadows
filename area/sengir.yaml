- vnum: 20161
  name: Sengir Street
  description: "This is the same road as before.  Here there are houses in between\
    \ a\nline of shops.  The area isn't as badly damaged as the surrounding area.\
    \ \nYou can still make out some of the signs that are still in the ground here.\
    \ \nYou can continue north toward the palace or to the south toward the front\
    \ of\nthe castle.  The houses to the east and west look appealing also.   \n"
