- vnum: 20147
  name: Navigator Way
  description: "This is a normal road in the Castle.  There is a small house to the\n\
    east and a burned out house to the west.  The ground here is soft and\nexposed,\
    \ turned up by something large.  To the north continues the road\nleading to the\
    \ palace fence and to the south is the courtyard.  Perhaps an\nexamination of\
    \ the eastern house would be appropriate.   \n"
