  description: "This is just another room in the long path to the top of the tower.\
    \ \nThe walls and floors are uncovered stone with interesting work done within\n\
    the stone itself.  There is a small archway to the south leading to the\nstairwell\
    \ down.  To the east is a door leading to another room.   \n"
