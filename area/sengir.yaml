- vnum: 20232
  name: First Floor of the Center Tower
  description: "This small room has been damaged by some sort of attack.  The small\n\rwindow
    that once looked out over the countryside now is much larger.  The\n\rfloor is
    scorched here and there are blood stains across a good part of the\n\rground.
    \ To the south is an archway leading to a starwell up and to the west\n\ris an
    archway leading to another room.   \n\r"
  room_flags: 8192
  sector: 0
