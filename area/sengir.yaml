- vnum: 20172
  name: Second level of SW Tower
  description: "This is the battlement level of the tower.  The battlements go to\
    \ the\nsouth and west.  The long spiral stairs continue up or down.  This room\
    \ is\nsmall and has little of importance.  There is an empty weapons rack here.\
    \ \nMany arrows and arrow slits line the walls as do fire pits for the hot oil\n\
    cualdrons.   \n"
