- vnum: 20135
  name: Kitchen of the Palace
  description: "This is the large kitchen that serves as the food providor of the\
    \ whole\npalace.  There are little slaves that run around making all the delicious\n\
    food that is served(or was served) here.  The kitchen table has scraps of\nhuman\
    \ flesh strewn about it.  The floor is a bloody mess with dirt caked in\namoungst\
    \ the blood.  To the south is the dining room.   \n"
