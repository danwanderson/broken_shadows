    to_vnum: 20130
  extra_descs: []
- vnum: 20121
  name: The NW Tower Outside the Castle
  description: "The tall, thin tower rises up out of the dark soil.  It is almost
    70'\n\rtall with what seems to be a small guard room on the top.  A single blacked\n\rout
    window faces this northerly direction.  The path returns you to the\n\rfront entrance
    to the east and around to the western wall to the north.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20122
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20120
  extra_descs: []
- vnum: 20122
  name: Outside the Western Wall
  description: "This wall has long black streaks down it.  The streaks were obviously\n\roil
    being poured down them in the effort of protection these once sacred\n\rwalls.
    \ The ground is still covered in gray earth which compliments the dark\n\rgray
    stone of the wall.  The path leads south and north.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20123
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20121
  extra_descs: []
- vnum: 20123
  name: The SE Tower Outside the Castle
  description: "As with the other towers, this one has a single blacked out window\n\rfacing
    the south.  The high tower walls are clean and the gray rock seems\n\rbleached
    by the sun.  The smooth rock reflects the dim sunlight and you can\n\rbarely see
    the top of this tower.  To the east you see a thin trail leading\n\rto the north
    wall and to the south is the western wall.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20124
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20122
  extra_descs: []
- vnum: 20124
  name: Outside the Southern Wall
  description: "You wonder why this castle wasn't equiped with a \"backdoor\" until
    you\n\rtake a peek over the cliff to the south.  The castle's walls are still\n\rheavily
    stained with oil and tar stains as well as bits of armor strewn\n\rabout the thin
    path leading off in both directions.  The south is a cliff,\n\rthe north is the
    castle, the west is a path, and the east is a path.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20126
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20123
  extra_descs: []
- vnum: 20125
  name: The NE Tower Outisde the Castle
  description: "This wall rises up out of the landscape posing an inpenetrable boundry\n\rto
    the south.  There is great staining and burn scars all along the wall. \n\rThis
    was obviously a key position for the battle that conquered this realm. \n\rA pile
    of rubble lies to the east and blocks the path to the SE tower.  A\n\rpath returns
    you to the front gate.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20127
