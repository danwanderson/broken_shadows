  description: "This part of Sengir Square hooks Innes street to Sengir street.  This\n\
    part of town was heavily damaged during the wars.  There are still many\nbroken\
    \ weapons and arrows lying here.  The grass is pretty high here and you\ncan't\
    \ really see anything to the west.  To the east you see the center of\nthe square\
    \ and the little gurgling fountain.  The sun is particularly warm\nhere and you\
