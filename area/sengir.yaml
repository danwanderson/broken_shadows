- vnum: 20228
  name: Base of the Center Tower
  description: "This is the largest of the towers.  Starting here on the second floor,\n\rthe
    center tower is where the Royal suite was.  A magnificent set of stairs\n\rstarts
    here leading up out of sight.  The floor is clean and polished as is\n\reverything
    in sight.  To the north leads some guest bedrooms as does the\n\rhall to the south.
    \  \n\r"
  room_flags: 8192
  sector: 0
