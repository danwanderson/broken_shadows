- vnum: 20124
  name: Outside the Southern Wall
  description: "You wonder why this castle wasn't equiped with a \"backdoor\" until\
    \ you\ntake a peek over the cliff to the south.  The castle's walls are still\n\
    heavily stained with oil and tar stains as well as bits of armor strewn\nabout\
    \ the thin path leading off in both directions.  The south is a cliff,\nthe north\
    \ is the castle, the west is a path, and the east is a path.   \n"
