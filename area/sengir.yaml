- vnum: 20146
  name: Southern Navigator Way
  description: "This is the eastern most north/south road in the castle proper.  This\n\rroad
    links the palace fence with the SE tower.  To the east is the Central\n\rCourtyard
    and to the north are some houses then ultimitely the palace.  The\n\rhigh wall
    that protects the Castle is to the east.   \n\r"
  room_flags: 0
  sector: 0
