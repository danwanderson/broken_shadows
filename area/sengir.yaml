- vnum: 20210
  name: Entrance to the Lair
  description: "This it a dark hole that leads to the home of a rather large beast.\
    \ \nYou are not sure that you want to meet something as big as the beast that\n\
    scratched a cave like this.  There is 8 feets worth of clearance to the\nceiling\
    \ and there are 10-12 feet between walls.  The path leads to the\nnorth.  \n"
  room_flags: C
