    exit_flags: 0
    key: 0
    to_vnum: 20201
  extra_descs:
  - keywords: table
    description: "These tables are made of a fine hardwood found only on an island\n\rthousands
      of miles away.  The mugs which the beer is in is made of a fine\n\rbone china
      and you are sure the mugs alone are worth thousands.  \n\r"
  - keywords: tables
    description: "These tables are made of a fine hardwood found only on an island\n\rthousands
      of miles away.  The mugs which the beer is in is made of a fine\n\rbone china
      and you are sure the mugs alone are worth thousands.  \n\r"
- vnum: 20204
  name: The Kitchen of the Innes Street Inn
  description: "This is a rather large kitchen.  There are large open flame fires
    with\n\rlong spits slowly being turned over them.  On the spits you can't really\n\rmake
    out what they are but you believe that they look to be something either\n\rhuman
    or at least humanoid.  There are many slaves running around here\n\rcleaning and
    cooking although they don't look to be of much interest.  There\n\ris one door
    to the south and the door leads back to the dining hall to the\n\rwest.  You start
    to wonder just what goes on around here.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
