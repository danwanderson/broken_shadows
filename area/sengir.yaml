- vnum: 20140
  name: Front Portulagus of Castle Sengir
  description: "The front of the castle has old banners hanging from the battlements.
    \n\rThe dark gray stone has stains of oil and blood as it looks to have been the\n\rhome
    of a great battle not to far in the past.  The arrow slits are still\n\rwide open
    and you are quite fearful that an arrow could still exit the small\n\ropening.
    \ The huge grate is raised and you just know that you shouldn't\n\rcontinue much
    farther but something drives you onward.  There are two small\n\rguard rooms on
    either side of the grate as you walk into the castle.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
