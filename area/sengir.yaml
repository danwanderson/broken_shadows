- vnum: 20202
  name: The Small Office of the Innes Street Inn.
  description: "This was the administrative area of the Inn.  There is a desk that
    was\n\robviously used for the bookkeeping and a small cabinet which was used to\n\rkeep
    the money.  Both have been broken into and looted long ago.  The small\n\rdoor
    to the south leads back to the Lobby.  You notice the smell of burnt\n\rhair faintly
    permeating this room.   \n\r"
  room_flags: 0
  sector: 0
