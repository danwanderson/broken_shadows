  description: "This is the top of the NW tower.  There was a large battle here\n\
    whenever the main siege was occuring.  There is a set of stairs which leads\n\
    down to the second level of the palace and to the bedrooms and other parts\nof\
    \ the palace.  The tower is still intact although there are many\nbloodstains\
