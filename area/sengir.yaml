- vnum: 20119
  name: A Guest Bedroom
  description: "Another nice, large guest bedroom, this room has a bed right in the\n\rmiddle
    of the room.  There is a small wash basin for cleaning up and there\n\ris a fireplace
    to heat the room.  The floor is cold tile and there is no\n\rplace to put any
    type of clothing at all.  Back to the south is the hallway.\n\r> \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20118
  extra_descs: []
- vnum: 20120
  name: Outside Northwest Wall
  description: "The high gray walls stand about 30' high.  The smooth rock makes\n\rclimbing
    impossible although a magical being could perhaps fly up to the\n\rbattlements.
    \ The path leads back to the front of the castle and to the west\n\rto the corner
    of the wall.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20104
  - dir: 3
