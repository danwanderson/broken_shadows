- vnum: 20127
  name: Outside the Eastern Wall
  description: "The light shines off of the tall gray wall.  You notice that each
    brick\n\ris set into the wall almost perfectly.  The path is only a few meters
    wide\n\rand there is a sheer cliff opposite the great wall.  The cliff drops several\n\rdozen
    feet and ends in a small patch of stalagmites.  The path leads north\n\rand south,
    there is no way down the cliff.   \n\r"
