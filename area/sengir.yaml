- vnum: 20112
  name: East/West Hallway
  description: "This is the hallway which links the SE tower with the SW tower.  It
    has\n\rmany furs covering the cold tile and there is a large tapestry here.  There\n\ris
    a door leading north into a bedroom and to the east you see a stairwell\n\roff
    in the hall.  There is a tower to the west.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 3
