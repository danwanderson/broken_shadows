  - keywords: documents
    description: "These are the official papers of the castle.  These were the names\
      \ and\nranks of the fallen soldiers.  There is little left on them that you\
      \ can\nread for they have been stained with a thick coating of blood.   \n"
  - keywords: document
    description: "These are the official papers of the castle.  These were the names\
      \ and\nranks of the fallen soldiers.  There is little left on them that you\
      \ can\nread for they have been stained with a thick coating of blood.   \n"
  - keywords: record
    description: |
      Log of the Month of Futility
      1st-Small Raid on Castle 3 human casualties 12 enemy casualties(orc)
      6th-Large raid 24 human casualties 83 enemy casualties(zombies)
      9th-Small raid on castle 0 human casualties 10 enemy (human raiders)
      10th-large raid 10 human casualties 121 enemy (skeletons)
      16th-Huge raid 21 human casualties 221 enemy casualties (skeletons)
      17th-Small raid 0 human casualties 9 enemy 1 known flee (dark elves)
      18th-large raid 11 human casualties 33 enemy casualties (skeletons)
      30th-Giagantic raid 81 human casualties 442 known enemy casualties...(zombies)
      Comments: The raids are coming more and more frequently. I am not afraid to die but I fear for my life. I hope the best for the castle and for Lord Sengir. God bless all that protect it.
  - keywords: record
    description: ''
  - keywords: books
    description: "This is a record of all the wars that took place in this castle\
      \ up\nuntil the castle was overtaken a couple of weeks into the war.  The books\n\
      are in great condition and it seems that whoever took the castle either\nwanted\
      \ these records to be seen or they didn't know what they were. \nNevertheless\
      \ these books are very interesting even if not valuable.  You are\nquite sure\
      \ that they are safer here than on your person so you leave them\nhere.  \n"
  - keywords: book
    description: "This is a record of all the wars that took place in this castle\
      \ up\nuntil the castle was overtaken a couple of weeks into the war.  The books\n\
      are in great condition and it seems that whoever took the castle either\nwanted\
      \ these records to be seen or they didn't know what they were. \nNevertheless\
      \ these books are very interesting even if not valuable.  You are\nquite sure\
      \ that they are safer here than on your person so you leave them\nhere.  \n"
  - keywords: table
    description: "The table is covered in books and documents you should look at.\
      \  \n"
- vnum: 20143
  name: Guard Sleeping Quarters
  description: "This is where the guards sleep when they are not on duty.  You are\n\
    quite sure that these beds are not standard issue.  The long beds are\ncovered\
    \ in a soft quilt.  The normal millitary quarters have been taken over\nby someone\
    \ or something else.  You start to wonder who would try to\ntransform normal quarters\
    \ into someplace nice.  Do not make a rash decision.\n \n"
  room_flags: '0'
