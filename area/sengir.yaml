    to_vnum: 20142
  extra_descs: []
- vnum: 20144
  name: Eastern Innes Street
  description: "The sky seems more clear here as you stray from the center of the\n\rcastle.
    \ The clouds are thin and raspy with dark tints beside the fluff. \n\rThe street
    itself is well traveled and there are many hoofprints along this\n\rpath.  To
    the north is a small garden with hanging plants.  The garden seems\n\rpleasent
    enough until you realize that this has been the only plantlife\n\rshort of the
    grass.  To the south is an old burned down warehouse. \n\rContinuing to the east
    is a north/south intersection.   \n\r"
  room_flags: 0
  sector: 0
