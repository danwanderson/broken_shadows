  extra_descs: []
- vnum: 20168
  name: Western Antechambers
  description: "Another of the King's chambers, this room sits mostly empty except
    for\n\rthe rug on the ground.  This room was once richly decorated but now it
    sits\n\rwithout much in it.  To the east is the Throne room.  In the northern
    wall\n\ris an archway which leads off into another group of chambers.   \n\r"
  room_flags: 0
