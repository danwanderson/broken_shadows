- vnum: 20167
  name: Hall of Kings
  description: "Here you stand in front of the mighty King of Sengir.  The floor is\n\rscattered
    with rose petals and there are feight signs of burns across the\n\rfloor.  The
    King's bodyguards stand, one on each side, with grim looks\n\racross there gentle
    faces.  The throne itself is 9 feet tall with solid gold\n\rposts and a leather
    based chair.  There are passages going to the east and\n\rwest here.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
