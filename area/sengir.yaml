    to_vnum: 20133
  extra_descs: []
- vnum: 20135
  name: Kitchen of the Palace
  description: "This is the large kitchen that serves as the food providor of the
    whole\n\rpalace.  There are little slaves that run around making all the delicious\n\rfood
    that is served(or was served) here.  The kitchen table has scraps of\n\rhuman
    flesh strewn about it.  The floor is a bloody mess with dirt caked in\n\ramoungst
    the blood.  To the south is the dining room.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
