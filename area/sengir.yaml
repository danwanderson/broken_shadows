- vnum: 20226
  name: In Front of Sengir Palace
  description: "You stand right in front of the large palace.  To the east and west
    are\n\rthe courtyards of this once immaculate royal house.  Although the building\n\ritself
    is still in great condition, there are large burns up and down a few\n\rof the
    towers.  There is a large door which leads into the palace proper to\n\rthe north
    and back to the south is the fence.   \n\r"
  room_flags: 0
  sector: 0
