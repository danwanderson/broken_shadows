  extra_descs:
  - keywords: nightmare
    description: "Who wants to feel bad about eating human flesh?\n\r"
  - keywords: nightmares
    description: "Who wants to feel bad about eating human flesh?\n\r"
- vnum: 20206
  name: Small Shack
  description: "This is a small shack that was once a slave quarters when this part
    of\n\rtown was affluent.  The low ceiling has hides covering up the holes but\n\rsomehow
    this place feels safe.  The room has a large circle in it and there\n\ris a strange
    symbol in the circle.  You feel very powerful wards in this\n\rroom.  And for
    some reason they are of a good nature.   \n\r"
  room_flags: 1028
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20195
  extra_descs: []
- vnum: 20207
  name: Small Noble House
  description: "This is a small house that also has very powerful wards on it.  The\n\rsmall
    foyer opens up to a large room where the bed and kitchen are.  There\n\rare no
    doors to anywhere and the room is very messy with clothes thrown\n\rabout the
    area.  The bed is unmade and there are stacks of dishes in a\n\rbucket.  You think
    you smell some stew brewing but you are not sure, why\n\rwould there be food worthy
    of mortals in a place of the undead?  \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20195
  extra_descs: []
- vnum: 20208
  name: Northern Winkle Street
  description: "An otherwising uninteresting part of town.  This was once where the
    old\n\rarena was but of course it is nothing but rubble.  To the south is the
    road\n\rleading to the square and to the north is the palace courtyard.  The ground\n\rhere
    is pretty well traveled and there is a slight odor in the air.   \n\r"
  room_flags: 0
  sector: 0
