- vnum: 20202
  name: The Small Office of the Innes Street Inn.
  description: "This was the administrative area of the Inn.  There is a desk that\
    \ was\nobviously used for the bookkeeping and a small cabinet which was used to\n\
    keep the money.  Both have been broken into and looted long ago.  The small\n\
    door to the south leads back to the Lobby.  You notice the smell of burnt\nhair\
    \ faintly permeating this room.   \n"
