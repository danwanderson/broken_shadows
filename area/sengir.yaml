- vnum: 20142
  name: Eastern Guard Station
  description: "This is the small room in which the castle guards monitor the people\n\
    who enter and exit the castle.  The room has a large table covered in\ninteresting\
    \ documents which you think may be worth looking at.  The weapon\nrack sitting\
    \ beside the door is empty as is the stand for the guard's armor.\nThere is a\
    \ door leading to the east which you suppose is a place where the\nguards sleep.\
    \  To the west is the castle gate, which stands open.   \n"
