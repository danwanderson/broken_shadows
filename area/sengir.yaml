  extra_descs: []
- vnum: 20148
  name: Small House
  description: "This is the ground floor of a small house.  There are stairs that
    lead\n\rup into another level.  Here the once elegant hardwood floors were scratched\n\rbeyond
    repair by some sort of claw or claws.  The furniture has been moved\n\raround
    and sits in a somewhat orderly fashion around a single burning\n\rcandle.  The
    small candle burns without heat and without wax.  To the west\n\ris the exit to
    the house.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
