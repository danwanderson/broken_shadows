- vnum: 20132
  name: A Small Guest Bedroom
  description: "This is by far the smallest of the guest bedrooms.  There is only\
    \ a\nsingle bed and it is not too ornate.  There are large burn marks across the\n\
    middle of the room and were there was once a tapestry there is nothing but a\n\
    pile of ash.  To the south is the hallway.   \n"
