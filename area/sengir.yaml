- vnum: 20138
  name: Bunkhouse of the Inner Sanctum
  description: "This is where the guards sleep.  Although simply decorated with various\n\
    pictures of the guard's families, there is a certain amount of class\nconveyed\
    \ here.  There are four simple beds with four footlockers.  There is\nnothing\
    \ of interest upon examination though.   \n"
