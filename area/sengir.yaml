- vnum: 20248
  name: Seventh Floor of the Center Tower
  description: "This is the royal suite.  This is where the King slept when he used\
    \ to\nhave to sleep.  Now the room is covered in webs and absolute blackness.\
    \  The\nentire room is painted black and the windows are covered in total darkness.\
    \ \nYou can see nothing but you feel something here...  Actually not\nsomething...\
    \  Somethings...  You have just walked into a room of vampires...\nAnd their leader...!\
    \   \n"
