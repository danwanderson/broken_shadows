  name: Bottom Floor of the SE Tower
  description: "This is the bottom level of the SE Tower.  There are stairs leading
    up\n\rto the second level and an exit leading outside to the north and west. \n\rThere
    is really nothing of interest in this small room.  It seems to have\n\rbeen a
    small guard room at one time but it has been long since abandoned. \n\r \n\r"
