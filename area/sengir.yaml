    exit_flags: 3
    key: 0
    to_vnum: 20114
  extra_descs: []
- vnum: 20116
  name: Small Washroom
  description: "There is a small washbasin here and there is a hole which looks to
    be\n\rsome sort of urinal facility.  There is a door leading back to the east.
    \n\rThere is a contraption which looks like a fireplace.  You realize that it\n\rwas
    used to heat the water for baths which took place in the huge cast-iron\n\rtub.
    \  \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20115
  extra_descs: []
- vnum: 20117
  name: Middle of the Second Floor
  description: "This is where the stairwell leads down to the first floor.  There
    is\n\ranother hallway leading north and to the east and west are halls leading
    to\n\rthe towers.  The little foyer is down below you and you can see it off of
    a\n\rlittle balcony.  The floor is covered here with more furs and this was once\n\ran
    unbelievable view.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
