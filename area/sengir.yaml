- vnum: 20109
  name: Base of the SW Tower
  description: "This is the bottom of the stair leading up to the top of the SW tower.
    \n\rThe stairs are in good condition still with the handrails still intact. \n\rThere
    is an archway leading back to the east and up you can see a second\n\rlanding
    a story or so up.   \n\r"
  room_flags: 0
  sector: 0
