    description: "These houses belong to the rich of the town.  You could gain access\
      \ to a\ntour...  If you had a key.  You notice a small insignia on the sign\
      \ that\nresembles a key with a skull engraved on it.  You wonder what could\
      \ be\nhidden behind such thick doors.  \n"
