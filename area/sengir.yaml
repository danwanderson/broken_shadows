- vnum: 20171
  name: Bottom Floor of the SW Tower
  description: "This is the lowest level of the SW guard tower.  There is a small
    table\n\rhere for the off duty guards and there are a few small, now empty, quarters.\n\rThe
    dust is thick as there is little going on in these towers anymore. \n\rThese were
    once the second line of defense for the Castle.  The guards used\n\rto flood out
    of the towers and annihilate anything in there way...  Course\n\rthat was the
    past.   \n\r"
  room_flags: 0
