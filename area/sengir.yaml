  name: Outside Northwest Wall
  description: "The high gray walls stand about 30' high.  The smooth rock makes\n\
    climbing impossible although a magical being could perhaps fly up to the\nbattlements.\
    \  The path leads back to the front of the castle and to the west\nto the corner\
