- vnum: 20139
  name: Hall of Kings
  description: "This is the Hall where the King himself rules from.  The hall itself\
    \ is\nabout 100 feet long with huge pillars and ornate ornamentations all about\n\
    the hall.  The pillars reach to the top of the high ceiling with torches\nlighting\
    \ the marble and gold detail work.  To the north is far more hall\nuntil in the\
    \ distance you can see a large golden throne with a big man\nsitting in the throne.\
    \  The man is flanked by two big armored men wielding\npolearms.   \n"
  room_flags: '0'
