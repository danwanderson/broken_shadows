  extra_descs: []
- vnum: 20158
  name: Wares of the Average Man
  description: "This seems to be a simple enough room.  There are old flasks and skins\n\
    hanging from the walls.  There is also a counter with what look to be some\nsort\
    \ of vegetable soaked in some sort of preservative.  They look really\ngood. \
    \ Other than that this room is pretty PLAIN.   \n"
  room_flags: '0'
