- vnum: 20134
  name: First Floor of the SE Tower
  description: "This is the first floor of the SE tower.  There is an archway leading\n\
    west and stairs leading up into darkness.  The floor isn't covered and the\nwalls\
    \ are nothing except bare stone.  The stairs are made of chipped up\nmarble although\
    \ they were once very beautiful.   \n"
