- vnum: 20190
  name: Eastern Courtyard of Castle Sengir
  description: "This, being the eastern half of the courtyard, is covered in lush
    green\n\rgrass.  You wonder if there is anything of interest in this tall grass,
    but\n\ryou won't know until you look through it.  The SE tower is to your south
    or\n\reast and the Central courtyard is to the west.  A small alleyway leads to\n\rthe
    north.  You feel like just curling up and having a nap on this soft\n\rground.
    \  \n\r"
