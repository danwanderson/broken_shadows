  name: East/West Hallway
  description: "This is the hallway which links the SE tower with the SW tower.  It\
    \ has\nmany furs covering the cold tile and there is a large tapestry here.  There\n\
    is a door leading north into a bedroom and to the east you see a stairwell\noff\
    \ in the hall.  There is a tower to the west.   \n"
