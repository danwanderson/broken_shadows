- vnum: 20100
  name: The Forest
  description: "You are at the edge of the forest.  Ahead of you, behind a wide moat,\
    \ you\ncan see a large fortress.  Whoever lives here must not like visitors much.\
    \ \nAs you pick your way through the underbrush, the drawbridge opens and a\n\
    rider passes over it, heading for a small path off to your right. \nFortunately,\
    \ he didn't see you.  \n"
  room_flags: C
  sector: 3
  owner: ''
  exits: []
  extra_descs: []
- vnum: 20101
  name: Entrance to Castle Sengir
  description: "The huge palace is surrounded by a large metal fence.  You pull your\n\
    cloak tighter as the wind picks up.  Looking up you see a large black stone\n\
    palace with five towers, one extending high above the rest.  The gate creaks\n\
    as you go onward on the path.  Looking south you see a path leading away\nfrom\
    \ this quite intimidating Castle.  Looking north you see the path, which\nleads\
    \ to the Castle.   \n"
  room_flags: '0'
  sector: 4
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20102
  - dir: 2
