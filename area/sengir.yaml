- vnum: 20114
  name: East/West Hallway
  description: "Another part of the hallway.  There isn't anything of interest here\n\rexcept
    for the door leading to the north.  There isn't any fur covering the\n\rtile here
    and you can feel the cool draft whipping up through the hall.   \n\r"
  room_flags: 0
  sector: 0
