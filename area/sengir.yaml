    to_vnum: 9783
  extra_descs: []
- vnum: 20102
  name: The Path Leading to the Castle
  description: "The path is made up of a hard, packed dirt, although there is no dust.\
    \ \nThe path leads up to what appears to be two huge doors, several hundred\n\
    yards to the north.  There is a huge hedge to the east and west of you which\n\
    stands around 12' high.  The razor sharp thorns forces you to continue north\n\
    or south.  You think you see a break in the hedge big enough to go through\nto\
    \ the northeast but you can't be sure.   \n"
  room_flags: '0'
  sector: 4
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
