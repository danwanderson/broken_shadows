  description: "A small elegantly room amongst many that aren't so well decorated.\
    \ \nThis room has an open window looking over the castle.  You think you can\n\
    hear something flapping loudly outside but you can't see anything.  To the\neast\
    \ is an archway leading to another room.  To the south is the stairwell\nleading\
    \ down into another level of rooms.   \n"
