  description: "This small room was once used for the rest of the royal family when\n\
    there was a siege or battle close by.  There are three small but clean beds\n\
    across the three walls away from the door.  There is a small rack where\nweapons\
    \ were once kept which is now empty.  There is little else of interest\nin here\
    \ though.   \n"
