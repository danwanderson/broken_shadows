  extra_descs: []
- vnum: 20147
  name: Navigator Way
  description: "This is a normal road in the Castle.  There is a small house to the\n\reast
    and a burned out house to the west.  The ground here is soft and\n\rexposed, turned
    up by something large.  To the north continues the road\n\rleading to the palace
    fence and to the south is the courtyard.  Perhaps an\n\rexamination of the eastern
    house would be appropriate.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
