- vnum: 20115
  name: Guest Bedroom
  description: "This is one of the nicer guest bedrooms.  The canopy bed is in perfect\n\rcondition
    and The drawing on the ceiling depicts a battle where many many\n\rhumans died.
    \ There is a small desk here and there is also a dresser.  There\n\risn't anything
    of interest in them though.  To the south is the hallway and\n\rto the east is
    a small washroom.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 3
    key: 0
