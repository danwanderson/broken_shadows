  extra_descs: []
- vnum: 20156
  name: Sengir Street
  description: "The street contiunues on toward the palace.  The shops are in the\
    \ same\nbad condition as the shops on the first half of the street.  The hard\
    \ packed\ndirt kicks up dust as you walk.  To the east you see an old weaponsmiths\n\
    shop and to the west you see an old general store.  The south leads you back\n\
    to the front gate and the north takes you toward the magnificant palace. \nThe\
    \ tower that was so visible through the midnight black sky is now directly\nin\
    \ front of you.  It extends over a 100' high and is decorated with gold\ntrim\
    \ on a dark stone foundation.  It is a work of art.   \n"
