- vnum: 20209
  name: End of Winkle Street
  description: "This is the western front of the palace fence.  There is a large wooden\n\
    fence still in wonderful condition in front of you.  The fence looks as\nthough\
    \ it hasn't been touched in years.  There is a dull glow from the fence\nwhich\
    \ makes you think that it is magically protected.  To the west is the\nfront gate\
    \ leading to the palace proper.  To south leads back to the\nintersection which\
    \ is home to the square.   \n"
  room_flags: '0'
