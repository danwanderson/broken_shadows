- vnum: 20173
  name: Top of SW Tower
  description: "This is the top of the tower.  You could see for miles from up here\n\rwere
    it not for the thick fog that envelops the land.  This was a marksmans'\n\rspot
    for shooting down raiders and invaders so there are many broken bow\n\rstrings
    and such littering the cold stone floor.  The tower is well\n\rprotected as it
    is some 50' tall and has stone walls protecting it.  To the\n\rnorth you can make
    out parts of the small Sengir town along with the ornate\n\rPalace in the north
    part of town.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20172
  extra_descs: []
- vnum: 20174
  name: Southern Battlements
  description: "This level runs right behind the huge front wall of the castle.  This\n\ris
    where the arrows and the oil are released from.  The huge cualdrons are\n\rstill
    filled with oil.  The quivers still sit leaning against the wall where\n\rthey
    are still filled with dozens of arrows.  There are several sets of\n\rremains
    laying strewn about here.  The battlement leads to the SE and the SW\n\rtowers
    in there respective directions.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
