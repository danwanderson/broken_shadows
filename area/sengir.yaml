- vnum: 20225
  name: Palace of Sengir Guard Post
  description: "There is a small guard house here with a heavy gate closing the gate\n\rfrom
    intruders.  The ground here is heavily worn and there are shouts coming\n\rfrom
    within the shack itself.  The palace itself rises up in front of you as\n\ra magestic
    high roofed building.  There are the standard 5 towers in the\n\rpalace with 4
    in the corners and one huge one rising up in the middle.  Back\n\rto the south
    you see the majority of the fortress.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
