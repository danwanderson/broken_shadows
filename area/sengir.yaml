- vnum: 20225
  name: Palace of Sengir Guard Post
  description: "There is a small guard house here with a heavy gate closing the gate\n\
    from intruders.  The ground here is heavily worn and there are shouts coming\n\
    from within the shack itself.  The palace itself rises up in front of you as\n\
    a magestic high roofed building.  There are the standard 5 towers in the\npalace\
    \ with 4 in the corners and one huge one rising up in the middle.  Back\nto the\
    \ south you see the majority of the fortress.   \n"
