  extra_descs: []
- vnum: 20105
  name: The Palace Doors
  description: "You look up at the largest doors you have ever seen.  These 30' high\n\rdoors
    are as black as the night you just came in on.  The mohogony is\n\raccented with
    reinforced iron plates which are, of course, jet-black.  The\n\rarched doorway
    is a deep grey stone which extends to the two towers which\n\rare visible to you
    from here.  You wonder if you can even open the massive\n\rdoors without an army.
    \ Nevertheless you must try.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
