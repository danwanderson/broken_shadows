    to_vnum: 20163
  extra_descs: []
- vnum: 20165
  name: Bedroom of Sengir House
  description: "This is an ornate room in the back of the house.  This is where the\n\rcoffins
    are.  You examine the coffins and notice that they are clean and\n\rhave been
    used?  Recently.  You again notice that there are no windows and\n\rthe rooms
    are completely dark.  The stairs are to the west.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20164
  extra_descs: []
- vnum: 20166
  name: Hall of Kings
  description: "The throne is only a dozen feet away and you already feel the sheer\n\rpower
    radiating from it.  You start to realize that the king was a kind and\n\rjust
    ruler and was heartlessly slain by the undead that now control his\n\rkingdom.
    \ The hall is still immaculate and you can see your reflection in\n\rthe highly
    polished marble pillars.  To the south is more of the hall\n\rincluding the rest
    of the palace.  To the north is the precious throne.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
