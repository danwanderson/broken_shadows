- vnum: 20230
  name: First Floor of the Center Tower
  description: "This is the first floor leading up to the Royal suite.  There is a\n\rstairwell
    leading down and a archway to the north.  The room is clean and\n\rthere is a
    small window looking out over the castle proper.  Other than the\n\rwindow there
    isn't much of interest.   \n\r"
  room_flags: 8192
  sector: 0
