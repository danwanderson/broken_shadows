- vnum: 20178
  name: Eastern Battlements of Castle Sengir
  description: "The wall is in perfect condition here.  It seems that there was\n\
    absolutly no battles held on this quadrant of the castle.  The dirt is thick\n\
    here for it hasn't been cleaned in quite some time but other than that it is\n\
    pretty normal.  The battlement leads to the NE Tower and the SE Tower.  You\n\
    can see quite far through the fog...  You still can't see anything of\nimportance.\
    \   \n"
  room_flags: '0'
  sector: 0
  owner: ''
