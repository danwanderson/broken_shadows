  extra_descs:
  - keywords: plain
    description: "Plain Hmm...  Maybe too plain...  I would look around a bit more.\
      \  \n"
- vnum: 20159
  name: The Hidden Pet Shop of Sengir
  description: "This is a completely hidden room.  You would never have thought it\
    \ here. \nIt is hidden in a tiny little niche in the wall.  Oh well you can still\
    \ buy\na pet from here.  There may be a nice one for you to use.  It is always\
    \ nice\nto have a companion.  \n"
