  description: "This is the first room of the second floor.  The stairs that you just\n\
    traveled up are in good condition.  There is a small window here looking out\n\
    over the castle.  There isn't as much fog when looking from here as there\nwas\
    \ below.  To the north is a small archway leading to another small room. \nThe\
    \ floors here are clean stone as are the walls.  \n"
