  name: A Guest Bedroom
  description: "Another nice, large guest bedroom, this room has a bed right in the\n\
    middle of the room.  There is a small wash basin for cleaning up and there\nis\
    \ a fireplace to heat the room.  The floor is cold tile and there is no\nplace\
    \ to put any type of clothing at all.  Back to the south is the hallway.\n> \n"
