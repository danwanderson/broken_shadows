  description: "The wall of the Castle is directly to the west.  It is not damaged\
    \ here\nand the ground looks as if it had a glyph cast on to it.  To the south\
    \ you\ncan see the southern wall of the castle.  To the north, far in the distance,\n\
    you can see the palace.   \n"
