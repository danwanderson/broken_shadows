- vnum: 20220
  name: Entrance to Nobleman's House
  description: "Tall grass covers this once immaculate property.  The dark gate that\n\rsurrounds
    the property is almost invisible among the thick reeds that cover\n\rthe land.
    \ A small pond has grown in the fron of the house but there\n\risn't anything
    of interest in or around it.  To the North is the noble house\n\rin all it's glory,
    and to the south is Innes street.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20219
  extra_descs:
  - keywords: grass
    description: "There is a large patch of a bluish grass here although there isn't\n\ranything
      of interest in it.   \n\r"
  - keywords: pond
    description: "The pond is small with little waterfowl flapping around all near
      it. \n\rThe small pond is also full of fish, although you don't think that you
      want\n\rto fish here.   \n\r"
- vnum: 20221
  name: Corner of Winkle and Innes Streets
  description: "The famous Innes Street starts here and extends to the east.  To the\n\rwest
    is the large castle wall and to the north is the palace.  The air is\n\rcomfortable
    and the sun shines brightly here during the day.  There are many\n\rpeople to
    the east near the square as if there is something important there.\n\rSmall stone
    cover the normally dirt ground, especially in the direction of\n\rthe northern
    palace.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
