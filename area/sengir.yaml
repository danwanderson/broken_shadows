- vnum: 20106
  name: The Foyer of the Palace
  description: "Your light cuts through the darkness producing an ornate foyer.  You\n\rfeel
    the warmth of the light because the room is brightly decorated.  The\n\rfloor
    is covered in bright, colorful rugs and the walls are covered with\n\rpainting.
    \ There is a stairway leading up to the next level, although you\n\rcan't see
    for the lack of light.  The large door remains open behind you and\n\rthere are
    archways leading to the east and west.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
