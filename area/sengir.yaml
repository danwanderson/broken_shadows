- vnum: 20157
  name: Cutting Stone
  description: "The walls are covered in beautiful creations of the anvil.  There
    are\n\rsharp edged swords, axes, and daggers everywhere.  The quality of\n\rworkmanship
    is unmatched in all of your travels.  The prices of the items\n\rshow you why.
    \ Nevertheless, this room is in excellent condition even\n\rthrough the war that
    this part of town endured.  The silver blades shine\n\reven today.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20156
  extra_descs: []
- vnum: 20158
  name: Wares of the Average Man
  description: "This seems to be a simple enough room.  There are old flasks and skins\n\rhanging
    from the walls.  There is also a counter with what look to be some\n\rsort of
    vegetable soaked in some sort of preservative.  They look really\n\rgood.  Other
    than that this room is pretty PLAIN.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
