- vnum: 20148
  name: Small House
  description: "This is the ground floor of a small house.  There are stairs that\
    \ lead\nup into another level.  Here the once elegant hardwood floors were scratched\n\
    beyond repair by some sort of claw or claws.  The furniture has been moved\naround\
    \ and sits in a somewhat orderly fashion around a single burning\ncandle.  The\
    \ small candle burns without heat and without wax.  To the west\nis the exit to\
    \ the house.   \n"
