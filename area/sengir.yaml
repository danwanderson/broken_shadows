  extra_descs: []
- vnum: 20179
  name: Eastern Antechambers
  description: "These are where the King retires to when he is not on the throne.\
    \  A\nlarge room with a desk in one corner.  This room also has a door leading\n\
    south into another set of chambers.  This room is elegently decorated with\nfurs\
    \ and other warm things.  There is a fireplace in the corner of the room\nwhich\
    \ is burning hotly.    \n"
  room_flags: '0'
