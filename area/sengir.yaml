- vnum: 20216
  name: Empty House
  description: "A small room with a large pool in the middle of it makes you think\
    \ that\nthis wasn't a house.  Perhaps a bath house at some point, but certainly\
    \ not\na residence.  There is a solid iron rod that surrounds the bath tub.  The\n\
    steps that lead into the tub are broken although with some effort you think\n\
    that you could make it down into the bottom.  The water was deep at some\npoint\
    \ but of course now it is empty.  You can see anything at the bottom of\nthe pool.\
    \   \n"
  room_flags: '0'
