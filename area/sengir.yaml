- vnum: 20105
  name: The Palace Doors
  description: "You look up at the largest doors you have ever seen.  These 30' high\n\
    doors are as black as the night you just came in on.  The mohogony is\naccented\
    \ with reinforced iron plates which are, of course, jet-black.  The\narched doorway\
    \ is a deep grey stone which extends to the two towers which\nare visible to you\
    \ from here.  You wonder if you can even open the massive\ndoors without an army.\
    \  Nevertheless you must try.   \n"
  room_flags: '0'
