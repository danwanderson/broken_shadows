  extra_descs: []
- vnum: 20177
  name: Air Above SE Tower
  description: "This is where the flapping sound was coming from alright.  This seems
    to\n\rbe the airspace of a rather unhappy creature.  You think that you would
    be\n\rbetter off down on the tower where you can protect yourself better.  \n\r"
  room_flags: 0
