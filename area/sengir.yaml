      This is extremely tough creature. If you are not with many high level heros or chararcters turn around...
      CR will be a pain here...Perhaps you should get Zorvax to help .
      Good Luck.
- vnum: 20214
  name: Lair of the Beast
  description: "You don't know what to think.  This Beast sits on top of a massive\
    \ pile\nof treasure.  His huge gaping teeth instill the fear of God upon you but\
    \ yet\nyou fight onward.  Perhaps you can get all the treasure when you kill this\n\
    menace to the generations to coem.  Nevertheless...  Good luck...  You are\ngoing\
    \ to need it.   \n"
  room_flags: '0'
