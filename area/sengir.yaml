    to_vnum: 20161
  extra_descs: []
- vnum: 20163
  name: Sengir Noble House
  description: "This house has been untouched.  There are still vases perched up on\
    \ a\nshelf with an inch thick layer of dust on it.  You notice a second level\
    \ to\nthis building and consider staggering up them.  You see that there is nice\n\
    furniture throughout the lower level and wonder who owned this house.  The\ndoor\
    \ behind you takes you to the street and the beautifully forged steps\nwill take\
    \ you to the second floor.   \n"
  room_flags: '0'
