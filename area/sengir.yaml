    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20170
  extra_descs:
  - keywords: powder
    description: "The powder seems to be some sort of granite powder.  It isn't worth\n\ranything
      but is certainly interesting.  \n\r"
- vnum: 20224
  name: End of Sengir Street
  description: "This is the end of the Sengir Street.  There is a medium height wooden\n\rfence
    which surrounds the palace.  To the west is another road off in the\n\rdistance
    as is the case to the east.  South is the square of the city\n\rproper.   \n\r"
  room_flags: 0
