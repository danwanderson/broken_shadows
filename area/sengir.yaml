- vnum: 20226
  name: In Front of Sengir Palace
  description: "You stand right in front of the large palace.  To the east and west\
    \ are\nthe courtyards of this once immaculate royal house.  Although the building\n\
    itself is still in great condition, there are large burns up and down a few\n\
    of the towers.  There is a large door which leads into the palace proper to\n\
    the north and back to the south is the fence.   \n"
