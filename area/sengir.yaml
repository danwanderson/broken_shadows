- vnum: 20208
  name: Northern Winkle Street
  description: "An otherwising uninteresting part of town.  This was once where the\
    \ old\narena was but of course it is nothing but rubble.  To the south is the\
    \ road\nleading to the square and to the north is the palace courtyard.  The ground\n\
    here is pretty well traveled and there is a slight odor in the air.   \n"
  room_flags: '0'
