- vnum: 20193
  name: Southwestern Sengir Square
  description: "This corner of the square is completely barren.  There were once two\n\rbig
    houses here but some rather large creature has reduced them to rubble. \n\rYou
    start to wonder what kind of creature could do this kind of mass\n\rdestruction.
    \ The rest of the sqaure seems to be in fair to good condition\n\rbut this corner
    has large cuts deep into the ground and then there are large\n\rpiles of rock.
    \ Innes street runs east and west to your north and Sengir\n\rstreet runs North
    and South to your east.   \n\r"
