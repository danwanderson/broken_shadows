  name: Second Level of the SE Tower
  description: "This is just another level of the tower.  To the west is the hallway\n\
    which links the two corner towers.  The tower is still in good condition\nconsidering\
    \ the fierce battles that took place here.  The stairs lead both\nup and down.\
    \   \n"
