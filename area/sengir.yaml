- vnum: 20107
  name: Dining Room
  description: "This huge room is as sterotypical a dining room as it gets.  There
    is a\n\rlong table in the middle of the room which has chairs on either side.
    \ The\n\rwalls are richly decorated with paintings and tapestries.  The only thing\n\rthat
    is strange about this room is that the windows are blacked out.  The\n\rthick
    layer of dust points out how long this place has been uninhabited for\n\ra while.
    \ There is still the remains of a long forgotten meal on the table. \n\rYou start
    to wonder where the people who were eating it went.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
