- vnum: 20207
  name: Small Noble House
  description: "This is a small house that also has very powerful wards on it.  The\n\
    small foyer opens up to a large room where the bed and kitchen are.  There\nare\
    \ no doors to anywhere and the room is very messy with clothes thrown\nabout the\
    \ area.  The bed is unmade and there are stacks of dishes in a\nbucket.  You think\
    \ you smell some stew brewing but you are not sure, why\nwould there be food worthy\
    \ of mortals in a place of the undead?  \n"
  room_flags: '0'
