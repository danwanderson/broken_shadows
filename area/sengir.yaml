- vnum: 20167
  name: Hall of Kings
  description: "Here you stand in front of the mighty King of Sengir.  The floor is\n\
    scattered with rose petals and there are feight signs of burns across the\nfloor.\
    \  The King's bodyguards stand, one on each side, with grim looks\nacross there\
    \ gentle faces.  The throne itself is 9 feet tall with solid gold\nposts and a\
    \ leather based chair.  There are passages going to the east and\nwest here. \
    \  \n"
  room_flags: '0'
