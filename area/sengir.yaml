- vnum: 20155
  name: The Blacksmith's Abode
  description: "This is what is left of the armorer's house.  You wonder if he was\n\rmarried
    and if he had kids.  The small four room area has no doors left and\n\rthe whole
    area can be searched in a matter of seconds.  The rest of the\n\rapartment has
    little left in it except for the human remains of a young\n\rperson.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 5
    desc:
