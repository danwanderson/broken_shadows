- vnum: 20218
  name: Small House
  description: "This house is just a small home that was probrably owned by the person\n\
    who operated the bath house or the deskkeeper of the Innes Street Inn.  You\n\
    can't see anything of interest and there is no steps leading up.  There is a\n\
    small carpet in the middle of the room, and the edges are frayed and\ndecaying.\
    \  There isn't anything on the walls and the ceiling shows nothing\nexcept watermarks.\
    \  To the west is the only exit.   \n"
