- vnum: 20128
  name: Far Northern Navigator Way
  description: "This is the last block to the north before the palace fence.  The\n\rsouthern
    wall is far to the south, perhaps 6 city blocks with intersections\n\ralong the
    way.  There is the high castle wall to the east and to the west is\n\ra small
    shop...  You are not sure what kind.  This part of town is still\n\rpretty busy
    although you are not sure why.   \n\r"
  room_flags: 0
