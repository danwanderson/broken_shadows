- vnum: 20170
  name: Western Courtyard of Castle Sengir
  description: "Here is where the largest battle of the town was fought.  The southern\n\rwall
    been damaged and the ground is still scorched.  The SW guard tower is\n\rto the
    west or south of you here.  It rises many feet above you.  Winkle\n\rstreet is
    directly north of you and the entrence to the Castle is to the\n\reast.  There
    are areas of absolute armaggedon and then areas untouched by\n\ranything.  You
    wonder why.   \n\r"
  room_flags: 0
  sector: 0
