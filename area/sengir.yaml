  description: "You are only a block or two from the palace now.  The tall grass is\n\
    starting to thin as you apprach the northern half of Sengir Street.  The\ngrass\
    \ starts to give way to the hard packed dirt of the well-traveled city\nstreets.\
    \  To the east and west you can see little houses and shops.  A\npretty fountain\
