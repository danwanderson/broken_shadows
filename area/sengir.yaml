- vnum: 20198
  name: Eastern Sengir Square
  description: "This part of Sengir Square hooks Innes street to Sengir street.  This\n\rpart
    of town was heavily damaged during the wars.  There are still many\n\rbroken weapons
    and arrows lying here.  The grass is pretty high here and you\n\rcan't really
    see anything to the west.  To the east you see the center of\n\rthe square and
    the little gurgling fountain.  The sun is particularly warm\n\rhere and you think
    you can almost see a break in the clouds too.   \n\r"
