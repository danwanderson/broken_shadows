    description: "Through the portal you can see the large beast curled up resting\
      \ with\nit's large wings wrapped around it's body.  \n"
- vnum: 20213
  name: Portal to the Other World
  description: "This is the final room before the beast.  You can see through the\n\
    transparent walls his large sharp teeth and the light that glistens off of\nhis\
    \ maw.  You are not sure what is driving you to attack this beast but you\nthink\
    \ that you need to do it.  You see a sign here.  I would suggest\nreading it.\
    \  \n\n"
  room_flags: '0'
