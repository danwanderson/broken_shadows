- vnum: 20118
  name: East/West Hallway
  description: "This is a small hallway that leads from the SW tower to the SE tower.
    \n\rThere is a small door leading to the north which appears to be a guest\n\rbedroom.
    \ To the east is the SE tower and to the west is more hallway\n\rleading to the
    SW tower.  There isn't anything of interest otherwise.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
