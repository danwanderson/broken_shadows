  extra_descs:
  - keywords: pond
    description: "The pond is small with little waterfowl flapping around all near\
      \ it. \nThe small pond is also full of fish, although you don't think that you\
      \ want\nto fish here.   \n"
  - keywords: grass
    description: "There is a large patch of a bluish grass here although there isn't\n\
      anything of interest in it.   \n"
- vnum: 20221
  name: Corner of Winkle and Innes Streets
  description: "The famous Innes Street starts here and extends to the east.  To the\n\
    west is the large castle wall and to the north is the palace.  The air is\ncomfortable\
    \ and the sun shines brightly here during the day.  There are many\npeople to\
    \ the east near the square as if there is something important there.\nSmall stone\
    \ cover the normally dirt ground, especially in the direction of\nthe northern\
    \ palace.   \n"
