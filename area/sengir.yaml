    to_vnum: 20149
  extra_descs: []
- vnum: 20149
  name: Second Floor of Small House
  description: "This is the small upstairs loft of the small house.  There isn't any\n\rfurniture
    left here although there is a small washbasin.  From the southern\n\rwindow you
    can see across the southern half of the castle and off into the\n\rdeep fog just
    outside of the castle.  You see the guards below and the small\n\rcitizens from
    here.  Down is the first, main floor, of the house.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20148
  extra_descs: []
- vnum: 20150
  name: Central Courtyard
  description: "As you walk into this massive fortress you realize that there is a\n\rsmaller
    palace within the main walls.  There is a path leading to the west\n\rand to the
    east.  These paths lead to what look to be old stores and other\n\rstreets.  The
    main road leads straight ahead and toward the Palace of\n\rSengir.  There are
    human remains scattered around the castle.  You surge\n\rforward.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
