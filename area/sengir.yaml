- vnum: 20152
  name: The Magical Hack
  description: "This room is filled with small vials and scrolls.  There was once
    a\n\rsecond floor but it was lost in some sort of battle long ago.  You think\n\rthat
    you could maybe get up there...  But you decide the risk is not worth\n\rit as
    you start up the rubble.  There are no exits from the room except for\n\rthe door
    to the west.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20151
  extra_descs: []
- vnum: 20153
  name: The Magical Anvil
  description: "Armor and shields lay strewn around the ground as you enter this small\n\rshop.
    \ There is a huge anvil in the middle of the room, obviously used to\n\rforge
    protective plates and shields.  There is an upstairs to this place and\n\rit seems
    that it could support your weight.  The only exit is to the west. \n\rOr of course
    you could to climb up the rubble.   \n\r"
  room_flags: 0
  sector: 0
