    to_vnum: 20172
  extra_descs: []
- vnum: 20174
  name: Southern Battlements
  description: "This level runs right behind the huge front wall of the castle.  This\n\
    is where the arrows and the oil are released from.  The huge cualdrons are\nstill\
    \ filled with oil.  The quivers still sit leaning against the wall where\nthey\
    \ are still filled with dozens of arrows.  There are several sets of\nremains\
    \ laying strewn about here.  The battlement leads to the SE and the SW\ntowers\
    \ in there respective directions.   \n"
  room_flags: '0'
