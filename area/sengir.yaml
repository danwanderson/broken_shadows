- vnum: 20173
  name: Top of SW Tower
  description: "This is the top of the tower.  You could see for miles from up here\n\
    were it not for the thick fog that envelops the land.  This was a marksmans'\n\
    spot for shooting down raiders and invaders so there are many broken bow\nstrings\
    \ and such littering the cold stone floor.  The tower is well\nprotected as it\
    \ is some 50' tall and has stone walls protecting it.  To the\nnorth you can make\
    \ out parts of the small Sengir town along with the ornate\nPalace in the north\
    \ part of town.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 5
    desc: ''
    keywords: ''
    exit_flags: '0'
