  description: "This is the largest of the towers.  Starting here on the second floor,\n\
    the center tower is where the Royal suite was.  A magnificent set of stairs\n\
    starts here leading up out of sight.  The floor is clean and polished as is\n\
    everything in sight.  To the north leads some guest bedrooms as does the\nhall\
    \ to the south.   \n"
