  description: "This is the air above the NW Tower.  The cold wind blows as you rise\
    \ up\nabove the cold tile of the tower.  You fly here looking in all directions\n\
    but you don't see anywhere else to go.  You can see the scorch marks\nfrom way\
    \ up here and you think it spells out a word.  \n"
