    exit_flags: 0
    key: 0
    to_vnum: 20140
  extra_descs:
  - keywords: table
    description: "The table is covered in books and documents you should look at.
      \ \n\r"
  - keywords: book
    description: "This is a record of all the wars that took place in this castle
      up\n\runtil the castle was overtaken a couple of weeks into the war.  The books\n\rare
      in great condition and it seems that whoever took the castle either\n\rwanted
      these records to be seen or they didn't know what they were. \n\rNevertheless
      these books are very interesting even if not valuable.  You are\n\rquite sure
      that they are safer here than on your person so you leave them\n\rhere.  \n\r"
  - keywords: books
    description: "This is a record of all the wars that took place in this castle
      up\n\runtil the castle was overtaken a couple of weeks into the war.  The books\n\rare
      in great condition and it seems that whoever took the castle either\n\rwanted
      these records to be seen or they didn't know what they were. \n\rNevertheless
      these books are very interesting even if not valuable.  You are\n\rquite sure
      that they are safer here than on your person so you leave them\n\rhere.  \n\r"
  - keywords: record
    description:
  - keywords: record
    description: "Log of the Month of Futility\n\r1st-Small Raid on Castle 3 human
      casualties 12 enemy casualties(orc)\n\r6th-Large raid 24 human casualties 83
      enemy casualties(zombies)\n\r9th-Small raid on castle 0 human casualties 10
      enemy (human raiders)\n\r10th-large raid 10 human casualties 121 enemy (skeletons)\n\r16th-Huge
      raid 21 human casualties 221 enemy casualties (skeletons)\n\r17th-Small raid
      0 human casualties 9 enemy 1 known flee (dark elves)\n\r18th-large raid 11 human
      casualties 33 enemy casualties (skeletons)\n\r30th-Giagantic raid 81 human casualties
      442 known enemy casualties...(zombies)\n\rComments: The raids are coming more
      and more frequently. I am not afraid to die but I fear for my life. I hope the
      best for the castle and for Lord Sengir. God bless all that protect it.\n\r"
  - keywords: document
    description: "These are the official papers of the castle.  These were the names
      and\n\rranks of the fallen soldiers.  There is little left on them that you
      can\n\rread for they have been stained with a thick coating of blood.   \n\r"
  - keywords: documents
    description: "These are the official papers of the castle.  These were the names
      and\n\rranks of the fallen soldiers.  There is little left on them that you
      can\n\rread for they have been stained with a thick coating of blood.   \n\r"
- vnum: 20143
  name: Guard Sleeping Quarters
  description: "This is where the guards sleep when they are not on duty.  You are\n\rquite
    sure that these beds are not standard issue.  The long beds are\n\rcovered in
    a soft quilt.  The normal millitary quarters have been taken over\n\rby someone
    or something else.  You start to wonder who would try to\n\rtransform normal quarters
    into someplace nice.  Do not make a rash decision.\n\r \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
