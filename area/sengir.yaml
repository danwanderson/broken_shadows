  extra_descs: []
- vnum: 20181
  name: Second Level of the NW Tower
  description: "This is just another floor in the Tower.  The battlements lead to
    the\n\reast and to the south.  There is one little table covered in paper here.
    \n\rOther than that there is nothing of any interest here.   \n\r"
  room_flags: 4
