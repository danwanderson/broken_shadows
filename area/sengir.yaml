- vnum: 20132
  name: A Small Guest Bedroom
  description: "This is by far the smallest of the guest bedrooms.  There is only
    a\n\rsingle bed and it is not too ornate.  There are large burn marks across the\n\rmiddle
    of the room and were there was once a tapestry there is nothing but a\n\rpile
    of ash.  To the south is the hallway.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
