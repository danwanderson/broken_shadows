  extra_descs: []
- vnum: 20145
  name: Corner of Navigator and Innes Streets
  description: "Here is where two of the largest streets run together beside the\n\rEastern
    Wall.  The corner is busy and there are many people milling about. \n\rTo the
    south is the SE tower and to the north is the palace fence a couple\n\rof blocks
    up.  Back to the east is the center square of the castle.  There\n\ris an unusually
    pleasant odor in the air...  It doesn't even smell like\n\rburning flesh anymore.
    \  \n\r"
  room_flags: 0
