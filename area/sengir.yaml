- vnum: 20141
  name: Western Guard Station
  description: "This is just a normal guard room.  There is a small empty table sitting\n\
    in the middle of the room.  There are playing cards scattered all about the\n\
    room.  The chairs that once accompanied the table are now smashed into\nsplinters\
    \ and you think that something strong must have done the damage. \nThe only exit\
    \ is to the west and even after searching the room you realize\nthat there are\
    \ no other exits but west.   \n"
