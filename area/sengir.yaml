- vnum: 20168
  name: Western Antechambers
  description: "Another of the King's chambers, this room sits mostly empty except\
    \ for\nthe rug on the ground.  This room was once richly decorated but now it\
    \ sits\nwithout much in it.  To the east is the Throne room.  In the northern\
    \ wall\nis an archway which leads off into another group of chambers.   \n"
  room_flags: '0'
