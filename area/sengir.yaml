    exit_flags: 35
    key: 0
    to_vnum: 20153
  extra_descs: []
- vnum: 20156
  name: Sengir Street
  description: "The street contiunues on toward the palace.  The shops are in the
    same\n\rbad condition as the shops on the first half of the street.  The hard
    packed\n\rdirt kicks up dust as you walk.  To the east you see an old weaponsmiths\n\rshop
    and to the west you see an old general store.  The south leads you back\n\rto
    the front gate and the north takes you toward the magnificant palace. \n\rThe
    tower that was so visible through the midnight black sky is now directly\n\rin
    front of you.  It extends over a 100' high and is decorated with gold\n\rtrim
    on a dark stone foundation.  It is a work of art.   \n\r"
