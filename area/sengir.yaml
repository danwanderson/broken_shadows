- vnum: 20182
  name: Northern Battlements
  description: "This small walkway joins the NW and the NE tower.  Tradicionally\n\
    speaking, battlements were used in the protection of the castle.  These\nsmall\
    \ planks are protected with about 3 feet of cement and stone.  The\nbattlements\
    \ were where the volleys of arrows would rain down on enemies\napproaching the\
    \ castle.  From the battlements huge cauldrons of hot oil\nwould also be poured\
    \ on the heads of unsuspecting troops.  You could go east\nand west to either\
    \ of the towers.   \n"
