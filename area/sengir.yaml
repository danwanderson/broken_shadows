  extra_descs:
  - keywords: table
    description: "You hope for some cool scrolls or something but you find nothing.\n\r"
- vnum: 20182
  name: Northern Battlements
  description: "This small walkway joins the NW and the NE tower.  Tradicionally\n\rspeaking,
    battlements were used in the protection of the castle.  These\n\rsmall planks
    are protected with about 3 feet of cement and stone.  The\n\rbattlements were
    where the volleys of arrows would rain down on enemies\n\rapproaching the castle.
    \ From the battlements huge cauldrons of hot oil\n\rwould also be poured on the
    heads of unsuspecting troops.  You could go east\n\rand west to either of the
    towers.   \n\r"
  room_flags: 0
  sector: 0
