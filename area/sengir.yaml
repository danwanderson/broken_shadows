    description: "A huge pile of covers a small trapdoor leading up into a second
      level.  \n\r"
- vnum: 20154
  name: Northern Navigator Way
  description: "You are approaching the palace fence.  It rises up in front of you
    like\n\ra huge tower...  Which makes you realize that it IS a tower in front of
    you.\n\rTo the north continues Navigator Way and to the south is the intersection\n\rleading
    to the square.  There is a large wall to the east and a burned out\n\rhouse to
    your east.   \n\r"
