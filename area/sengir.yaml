rooms:
- vnum: 20100
  name: The Forest
  description: "You are at the edge of the forest.  Ahead of you, behind a wide moat,
    you\n\rcan see a large fortress.  Whoever lives here must not like visitors much.
    \n\rAs you pick your way through the underbrush, the drawbridge opens and a\n\rrider
    passes over it, heading for a small path off to your right. \n\rFortunately, he
    didn't see you.  \n\r"
  room_flags: 4
  sector: 3
  owner:
  exits: []
  extra_descs: []
- vnum: 20101
  name: Entrance to Castle Sengir
  description: "The huge palace is surrounded by a large metal fence.  You pull your\n\rcloak
    tighter as the wind picks up.  Looking up you see a large black stone\n\rpalace
    with five towers, one extending high above the rest.  The gate creaks\n\ras you
    go onward on the path.  Looking south you see a path leading away\n\rfrom this
    quite intimidating Castle.  Looking north you see the path, which\n\rleads to
    the Castle.   \n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20102
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 9783
  extra_descs: []
- vnum: 20102
  name: The Path Leading to the Castle
  description: "The path is made up of a hard, packed dirt, although there is no dust.
    \n\rThe path leads up to what appears to be two huge doors, several hundred\n\ryards
    to the north.  There is a huge hedge to the east and west of you which\n\rstands
    around 12' high.  The razor sharp thorns forces you to continue north\n\ror south.
    \ You think you see a break in the hedge big enough to go through\n\rto the northeast
    but you can't be sure.   \n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20104
  - dir: 1
    desc:
