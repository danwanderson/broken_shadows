- vnum: 20197
  name: Northeastern Sengir Square
  description: "This is the NW corner of the castle's once busy square.  This corner\n\
    was once the locatation of the famous Innes Street Inn.   This fine\nestablishment\
    \ was known throughout the region as the world's finest inn. \nPeople used to\
    \ travel from miles around to hear the stories of the bards and\nsee the juggling\
    \ of the finest jugglers in the land.  Since then, the third\nstory has been destroyed\
    \ but the lower levels seem to be in good shape.  The\nstands open to the north.\
    \   \n"
