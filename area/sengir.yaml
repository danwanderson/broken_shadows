- vnum: 20220
  name: Entrance to Nobleman's House
  description: "Tall grass covers this once immaculate property.  The dark gate that\n\
    surrounds the property is almost invisible among the thick reeds that cover\n\
    the land.  A small pond has grown in the fron of the house but there\nisn't anything\
    \ of interest in or around it.  To the North is the noble house\nin all it's glory,\
    \ and to the south is Innes street.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
