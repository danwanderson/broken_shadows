- vnum: 20183
  name: Second Level of the NE Tower
  description: "This is the second level of the NE tower.  There is nothing here of\n\rinterest.
    \ The hard gray stone floor is covered in dust.  There are stairs\n\rleading up
    and down.  The battlements lead to the other towers of the\n\rcastle.   \n\r"
  room_flags: 4
  sector: 0
