  extra_descs:
  - keywords: tapestry
    description: "This ornate tapestry depicts a large number of undead and demons
      lying\n\rsiege to the castle and the palace.  There are flames and fire everywhere\n\rwith
      people lying dead or dying.   \n\r"
- vnum: 20113
  name: Eastern Guest Bedroom
  description: "This is one of the many guest bedrooms of the palace.  It is still
    in\n\rgood condition with a large canopy bed in the middle of the room.  To the\n\rsouth
    is the door which lead into here.  There is a small washbasin where\n\rthe people
    staying here could freshen up.  The ceiling is pretty high with a\n\rnice drawing
    on it.   \n\r"
  room_flags: 0
  sector: 0
