- vnum: 20144
  name: Eastern Innes Street
  description: "The sky seems more clear here as you stray from the center of the\n\
    castle.  The clouds are thin and raspy with dark tints beside the fluff. \nThe\
    \ street itself is well traveled and there are many hoofprints along this\npath.\
    \  To the north is a small garden with hanging plants.  The garden seems\npleasent\
    \ enough until you realize that this has been the only plantlife\nshort of the\
    \ grass.  To the south is an old burned down warehouse. \nContinuing to the east\
    \ is a north/south intersection.   \n"
