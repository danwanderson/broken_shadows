  name: Sengir Center Square
  description: "This was the center of the once powerful Castle Sengir.  It is now\n\rreduced
    to an overgrown field surrounded by walls.  The Palace looms to the\n\rnorth of
    you and the exit to the castle is to the south.  Innes Street runs\n\reast and
    west of here and offers some interesting advenures in both\n\rdirections.   \n\r"
