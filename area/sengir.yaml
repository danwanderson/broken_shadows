  name: Second Floor of the Center Tower
  description: "You can sense some sort of great evil here.  Although you can't\n\
    actually see anything particularly bad here you still sense something very\nevil\
    \ although quite distant.  The floors and the walls are a cold stone and\nthey\
    \ have been painted a dull black color.  To the east is a door leading\ninto another\
    \ room.  To the south is an archway leading to another room...  A\nroom with a\
    \ stairwell.   \n"
