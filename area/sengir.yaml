- vnum: 20223
  name: Southern Winkle Street
  description: "This part of town got completely destroyed in the battle.  The once\n\
    large beautiful houses are now just piles of rubble.  There are long slashes\n\
    in the ground and the pieces of stone are now all but powder.  There is the\n\
    courtyard to the south and more of Winkle Street to the north.   \n"
