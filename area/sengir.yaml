  - keywords: tables
    description: "These tables are made of a fine hardwood found only on an island\n\
      thousands of miles away.  The mugs which the beer is in is made of a fine\n\
      bone china and you are sure the mugs alone are worth thousands.  \n"
  - keywords: table
    description: "These tables are made of a fine hardwood found only on an island\n\
