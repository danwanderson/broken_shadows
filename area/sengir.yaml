- vnum: 20184
  name: Top of the NE Tower
  description: "This is the top of the NE tower.  You can see for miles around from\n\rhere.
    \ The cool wind blows across the open aired tower and sends a chill\n\rthrough
    your cloak.  You hear a strange flapping sound but you aren't sure\n\rwhat is
    causing it.  The stairs lead down to the battlements.   \n\r"
  room_flags: 0
