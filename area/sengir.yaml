- vnum: 20192
  name: Southern Sengir Square
  description: "This is what joins Sengir Square and Sengir Street.  The hard packed\n\rdirt
    of the street gives way to the lush green grass.  To the north you\n\rstill see
    the tall palace and it's tower.  There are various houses and\n\rshops in the
    square and you see the exit of the castle to the south.  There\n\rcenter of the
    square is north, and you see a pretty fountain still pouring\n\rwater.   \n\r"
