    exit_flags: 0
    key: 0
    to_vnum: 20211
  extra_descs:
  - keywords: portal
    description: "Through the portal you can see the large beast curled up resting
      with\n\rit's large wings wrapped around it's body.  \n\r"
- vnum: 20213
  name: Portal to the Other World
  description: "This is the final room before the beast.  You can see through the\n\rtransparent
    walls his large sharp teeth and the light that glistens off of\n\rhis maw.  You
    are not sure what is driving you to attack this beast but you\n\rthink that you
    need to do it.  You see a sign here.  I would suggest\n\rreading it.  \n\r\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 31
    key: 20214
    to_vnum: 20214
  - dir: 2
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20212
  extra_descs:
  - keywords: sign
    description: "*********Warning*******\n\rThis is extremely tough creature. If
      you are not with many high level heros or chararcters turn around...\n\rCR will
      be a pain here...Perhaps you should get Zorvax to help .\n\rGood Luck.\n\r"
- vnum: 20214
  name: Lair of the Beast
  description: "You don't know what to think.  This Beast sits on top of a massive
    pile\n\rof treasure.  His huge gaping teeth instill the fear of God upon you but
    yet\n\ryou fight onward.  Perhaps you can get all the treasure when you kill this\n\rmenace
    to the generations to coem.  Nevertheless...  Good luck...  You are\n\rgoing to
    need it.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 31
    key: 20214
    to_vnum: 20213
  extra_descs: []
- vnum: 20215
  name: Northern Sengir Street
  description: "This road leads straight to the palace.  The tall sloping roof of
    the\n\rpalace is straight in front of you.  To the east and west are the remnants\n\rof
    houses.  To the south is the town square.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20224
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20196
  extra_descs: []
- vnum: 20216
  name: Empty House
  description: "A small room with a large pool in the middle of it makes you think
    that\n\rthis wasn't a house.  Perhaps a bath house at some point, but certainly
    not\n\ra residence.  There is a solid iron rod that surrounds the bath tub.  The\n\rsteps
    that lead into the tub are broken although with some effort you think\n\rthat
    you could make it down into the bottom.  The water was deep at some\n\rpoint but
    of course now it is empty.  You can see anything at the bottom of\n\rthe pool.
    \  \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20199
  - dir: 5
    desc:
