- vnum: 20201
  name: The Lobby of the Innes Street Inn
  description: "This is the main lobby of the once great inn.  The front desk is right\n\rin
    front of you and there is a grand staircase that is on both sides of the\n\rdesk.
    \ The cathedral high ceilings are covered in an ornate gold trim and\n\rthe smooth
    painted walls are now covered in fine, beautifully painted\n\rtapestries.  You
    examine the hard floor and see that there was once a carpet\n\rthat covered the
    entire floor.  The commonroom is to the east through a\n\rgrand archway.  There
    is a small office to the north, behind the desk.   \n\r"
  room_flags: 4
  sector: 0
