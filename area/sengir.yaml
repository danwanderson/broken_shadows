- vnum: 20206
  name: Small Shack
  description: "This is a small shack that was once a slave quarters when this part\
    \ of\ntown was affluent.  The low ceiling has hides covering up the holes but\n\
    somehow this place feels safe.  The room has a large circle in it and there\n\
    is a strange symbol in the circle.  You feel very powerful wards in this\nroom.\
    \  And for some reason they are of a good nature.   \n"
  room_flags: CK
