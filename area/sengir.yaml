  description: "Several long scorch marks run along this top floor.  The jagged burns\n\
    are black and sink several inches into the cement.  You wonder what kind of\n\
    horrific creature could cause such a cut in the stone of a tower.  The view,\n\
    you suppose, would be spectacular from here were it not so foggy out.  The\nonly\
    \ exit is down.   \n"
