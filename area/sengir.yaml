  description: "This is the base of the stairwell leading up.  There is a small archway\n\
    leading north into another small room that appears to be heavily damaged. \nThe\
    \ room you are in now is in moderate condition with a small sofa that\nserved\
    \ as a landing comfort.  The floor is uncovered although it is clean\nhowever\
    \ cold.   \n"
