- vnum: 20231
  name: First Floor of the Center Tower
  description: "Another room in the center tower.  This room has an archway to the\n\rsouth
    and to the east.  There isn't anything of interest here though.  The\n\rfloor
    and walls are slightly worn but other than that nothing.   \n\r"
  room_flags: 8192
