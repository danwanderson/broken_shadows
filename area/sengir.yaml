- vnum: 20227
  name: North/South Hall
  description: "This is the Hall which connects the north half of the palace with
    the\n\rsouth part.  The walls are hard gray slate.  The floor is cold and hard.
    \ To\n\rthe north is the NE and NW hall and to the south is the SW and SE towers.
    \n\r \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
