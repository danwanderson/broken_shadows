  name: Southern Sengir Square
  description: "This is what joins Sengir Square and Sengir Street.  The hard packed\n\
    dirt of the street gives way to the lush green grass.  To the north you\nstill\
    \ see the tall palace and it's tower.  There are various houses and\nshops in\
    \ the square and you see the exit of the castle to the south.  There\ncenter of\
    \ the square is north, and you see a pretty fountain still pouring\nwater.   \n"
