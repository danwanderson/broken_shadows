- vnum: 20242
  name: Fourth Floor of the Center Tower
  description: "This room looks as if it were used for music at some point.  There\
    \ are\nsheets of words all over the place.  There is a small wooden board with\n\
    different length slats lying across the board.  There are small mallets\nlying\
    \ beside the object.  There is also a small drum and a few bells here\ntoo.  To\
    \ the north is another room and there is a small spiral stairwell\nleading down\
    \ to the third level.   \n"
