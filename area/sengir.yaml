- vnum: 20141
  name: Western Guard Station
  description: "This is just a normal guard room.  There is a small empty table sitting\n\rin
    the middle of the room.  There are playing cards scattered all about the\n\rroom.
    \ The chairs that once accompanied the table are now smashed into\n\rsplinters
    and you think that something strong must have done the damage. \n\rThe only exit
    is to the west and even after searching the room you realize\n\rthat there are
    no other exits but west.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20140
  extra_descs: []
- vnum: 20142
  name: Eastern Guard Station
  description: "This is the small room in which the castle guards monitor the people\n\rwho
    enter and exit the castle.  The room has a large table covered in\n\rinteresting
    documents which you think may be worth looking at.  The weapon\n\rrack sitting
    beside the door is empty as is the stand for the guard's armor.\n\rThere is a
    door leading to the east which you suppose is a place where the\n\rguards sleep.
    \ To the west is the castle gate, which stands open.   \n\r"
  room_flags: 4
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20143
  - dir: 3
