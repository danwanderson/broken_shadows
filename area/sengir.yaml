- vnum: 20203
  name: The Commonroom of the Innes Street Inn
  description: "Ahh!!!  You bet there were some good times here.  There are many\n\
    tables here still with large mugs of beer.  There is a stage to the north of\n\
    you that was where the jugglers and bards used to entertain the high class\npeople\
    \ who frequented this fine establishment.  There is a doorway, which\nstands opens,\
    \ to the east that leads to the kitchen.  The room is more\nbrightly lit than\
    \ anywhere else you have seen in the castle and you can see\nall the decorations\
    \ which are all over the room.  The only complaint of such\na place is the odor\
    \ of burning hair.  Nevertheless this room is one of the\nnicest that you have\
    \ ever seen.  The archway to the west leads back to the\nlobby of the inn.   \n"
  room_flags: '0'
