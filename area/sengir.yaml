- vnum: 20115
  name: Guest Bedroom
  description: "This is one of the nicer guest bedrooms.  The canopy bed is in perfect\n\
    condition and The drawing on the ceiling depicts a battle where many many\nhumans\
    \ died.  There is a small desk here and there is also a dresser.  There\nisn't\
    \ anything of interest in them though.  To the south is the hallway and\nto the\
    \ east is a small washroom.   \n"
