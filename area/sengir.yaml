- vnum: 20194
  name: Western Sengir Square
  description: "The famous Innes street is to the west, starting the area where the\n\
    nobles were to have lived.  The soft grass is much shorter here but is still\n\
    quite thick.  The cool air blows down the corridor of the houses causing you\n\
    to bundle up a little more.  Sengir Street is to the west of you as is the\ncenter\
    \ of the square.  You can see a little fountain sputtering out some\nfresh water\
    \ from this part of the square.  You continue onward.   \n"
