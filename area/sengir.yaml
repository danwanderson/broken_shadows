- vnum: 20129
  name: End of Navigator Way
  description: "The huge palace fence sits in front of you.  There is a tower above\
    \ you\nwith guards sitting in them looking down across the castle.  To the east\
    \ is\nthe gate leading into the palace, complete with guards and outposts.  To\
    \ the\nsouth continues the way and you can see many people in the distance.  \
    \ \n"
