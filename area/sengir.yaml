  description: "This is the Hall which connects the north half of the palace with\
    \ the\nsouth part.  The walls are hard gray slate.  The floor is cold and hard.\
    \  To\nthe north is the NE and NW hall and to the south is the SW and SE towers.\
    \ \n \n"
