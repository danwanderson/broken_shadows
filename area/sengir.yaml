- vnum: 20176
  name: Top of the SE Tower
  description: "Through the dense fog you can make out the cliff edges that protect
    the\n\rcastle to the East, West, and South.  The gray stone shows its' years here\n\rfor
    it ws obviously key in protecting the castle at one point.  The smooth,\n\rhard
    rock looks inviting to your tired soul, yet you know that you are in\n\rdanger
    here...  You hear the flapping of wings here but you don't know if\n\ryou can
    see anything.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 4
