  extra_descs: []
- vnum: 20236
  name: Second Floor of the Center Tower
  description: "You can sense some sort of great evil here.  Although you can't\n\ractually
    see anything particularly bad here you still sense something very\n\revil although
    quite distant.  The floors and the walls are a cold stone and\n\rthey have been
    painted a dull black color.  To the east is a door leading\n\rinto another room.
    \ To the south is an archway leading to another room...  A\n\rroom with a stairwell.
    \  \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20237
  - dir: 3
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20235
  extra_descs: []
- vnum: 20237
  name: Second Floor of the Center Tower
  description: "This small room has been painted black also.  There are small markings\n\raround
    the room indicating that this room is used by something for\n\rsomething.  There
    was once a small sofa sitting here but now it has been\n\rreduced into ash.  To
    the north is a small room also painted black.  There\n\ris a spiral stairwell
    leading up into another set of rooms...  Much closer\n\rto the royal suite.   \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20236
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20238
  extra_descs: []
- vnum: 20238
  name: Third Floor of the Center Tower
  description: "This is the third floor of the tower.  You are not quite sure how
    many\n\rlevels the center tower has but you are sure it is more than five.  There
    is\n\ra stairwell that leads down into the second level of the tower.  To the\n\rnorth
    is another small room that looks to be well decorated.  You can sense\n\revil
    here...  A bit stronger.   \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20239
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20237
  extra_descs: []
- vnum: 20239
  name: Third Floor of the Center Tower
  description: "A small elegantly room amongst many that aren't so well decorated.
    \n\rThis room has an open window looking over the castle.  You think you can\n\rhear
    something flapping loudly outside but you can't see anything.  To the\n\reast
    is an archway leading to another room.  To the south is the stairwell\n\rleading
    down into another level of rooms.   \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20240
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20238
  extra_descs: []
- vnum: 20240
  name: Third Floor of the Center Tower
  description: "This is a small room that looks like it was nothing more that a small\n\rlibrary.
    \ It has a few small shelves that hold few books.  It looks like it\n\rheld some
    tomes in addition to the large library on the main floor of the\n\rpalace.  To
    the south is a door which is large and painted black.  To the\n\rwest is a small
    archway which leads to another room.   \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20241
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20239
  extra_descs: []
- vnum: 20241
  name: Third Floor of the Center Tower
  description: "This is a small sitting room.  There is a spiral stairwell leading
    up\n\rout of sight.  There is a small door leading north although you are pretty\n\rsure
    it is not locked.  There are curtains around a blacked out window and\n\ryou can
    see small blood stains on the curtains.   \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 3
    key: 0
    to_vnum: 20240
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20242
  extra_descs: []
- vnum: 20242
  name: Fourth Floor of the Center Tower
  description: "This room looks as if it were used for music at some point.  There
    are\n\rsheets of words all over the place.  There is a small wooden board with\n\rdifferent
    length slats lying across the board.  There are small mallets\n\rlying beside
    the object.  There is also a small drum and a few bells here\n\rtoo.  To the north
    is another room and there is a small spiral stairwell\n\rleading down to the third
    level.   \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20243
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20241
  extra_descs: []
- vnum: 20243
  name: Fourth Floor of the Center Tower
  description: "This looks to be another guard room.  There are small arms here and\n\rthere
    is a pile of shields lying here.  There are two beds here although\n\rthey do
    not have any linens on them now.  To the east is another room and\n\ryou can see
    a stairwell to the south.   \n\r"
  room_flags: 8192
