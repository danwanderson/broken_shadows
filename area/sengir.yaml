  description: "This is a small sitting room.  There is a spiral stairwell leading\
    \ up\nout of sight.  There is a small door leading north although you are pretty\n\
    sure it is not locked.  There are curtains around a blacked out window and\nyou\
    \ can see small blood stains on the curtains.   \n"
