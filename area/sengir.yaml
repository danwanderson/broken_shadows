      with people lying dead or dying.   \n"
- vnum: 20113
  name: Eastern Guest Bedroom
  description: "This is one of the many guest bedrooms of the palace.  It is still\
    \ in\ngood condition with a large canopy bed in the middle of the room.  To the\n\
    south is the door which lead into here.  There is a small washbasin where\nthe\
    \ people staying here could freshen up.  The ceiling is pretty high with a\nnice\
    \ drawing on it.   \n"
