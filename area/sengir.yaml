- vnum: 20170
  name: Western Courtyard of Castle Sengir
  description: "Here is where the largest battle of the town was fought.  The southern\n\
    wall been damaged and the ground is still scorched.  The SW guard tower is\nto\
    \ the west or south of you here.  It rises many feet above you.  Winkle\nstreet\
    \ is directly north of you and the entrence to the Castle is to the\neast.  There\
    \ are areas of absolute armaggedon and then areas untouched by\nanything.  You\
    \ wonder why.   \n"
  room_flags: '0'
