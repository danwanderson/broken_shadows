- vnum: 20123
  name: The SE Tower Outside the Castle
  description: "As with the other towers, this one has a single blacked out window\n\
    facing the south.  The high tower walls are clean and the gray rock seems\nbleached\
    \ by the sun.  The smooth rock reflects the dim sunlight and you can\nbarely see\
    \ the top of this tower.  To the east you see a thin trail leading\nto the north\
    \ wall and to the south is the western wall.   \n"
