- vnum: 20210
  name: Entrance to the Lair
  description: "This it a dark hole that leads to the home of a rather large beast.
    \n\rYou are not sure that you want to meet something as big as the beast that\n\rscratched
    a cave like this.  There is 8 feets worth of clearance to the\n\rceiling and there
    are 10-12 feet between walls.  The path leads to the\n\rnorth.  \n\r"
  room_flags: 4
