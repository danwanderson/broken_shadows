- vnum: 20211
  name: Hall Leading to the Lair
  description: "This is the Hall that leads to the lair of the beast.  You can tell\n\rfrom
    all the dust that the creatuire has wings.  You examine the depth of\n\rthe scratches
    and you realize that the claws are about 7-8 inches long each.\n\rYou arean't
    quite sure if you want to continue but you surge forth anyway. \n\r \n\r"
  room_flags: 0
