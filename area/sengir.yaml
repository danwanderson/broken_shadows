- vnum: 20161
  name: Sengir Street
  description: "This is the same road as before.  Here there are houses in between
    a\n\rline of shops.  The area isn't as badly damaged as the surrounding area.
    \n\rYou can still make out some of the signs that are still in the ground here.
    \n\rYou can continue north toward the palace or to the south toward the front
    of\n\rthe castle.  The houses to the east and west look appealing also.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
