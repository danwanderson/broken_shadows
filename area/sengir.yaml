- vnum: 20107
  name: Dining Room
  description: "This huge room is as sterotypical a dining room as it gets.  There\
    \ is a\nlong table in the middle of the room which has chairs on either side.\
    \  The\nwalls are richly decorated with paintings and tapestries.  The only thing\n\
    that is strange about this room is that the windows are blacked out.  The\nthick\
    \ layer of dust points out how long this place has been uninhabited for\na while.\
    \  There is still the remains of a long forgotten meal on the table. \nYou start\
    \ to wonder where the people who were eating it went.   \n"
  room_flags: '0'
