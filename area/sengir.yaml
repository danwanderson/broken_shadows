- vnum: 20188
  name: Top Floor of NW Tower
  description: "Several long scorch marks run along this top floor.  The jagged burns\n\rare
    black and sink several inches into the cement.  You wonder what kind of\n\rhorrific
    creature could cause such a cut in the stone of a tower.  The view,\n\ryou suppose,
    would be spectacular from here were it not so foggy out.  The\n\ronly exit is
    down.   \n\r"
