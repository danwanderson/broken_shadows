- vnum: 20111
  name: Second Floor of the SW Tower
  description: "This is the second level of the SW tower.  There is an archway leading\n\rback
    to the east and there are still several floors above you.  There is a\n\rsmall
    opening, like an arrow slit here and you look out upon the southern\n\rcourtyards
    of the palace.  The floor here is clean and there is even a faint\n\rglow coming
    from the tile which makes up the floor and walls.   \n\r"
  room_flags: 0
  sector: 0
