- vnum: 20222
  name: South Winkle Street
  description: "The wall of the Castle is directly to the west.  It is not damaged
    here\n\rand the ground looks as if it had a glyph cast on to it.  To the south
    you\n\rcan see the southern wall of the castle.  To the north, far in the distance,\n\ryou
    can see the palace.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
