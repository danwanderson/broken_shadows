  description: "This small room has been damaged by some sort of attack.  The small\n\
    window that once looked out over the countryside now is much larger.  The\nfloor\
    \ is scorched here and there are blood stains across a good part of the\nground.\
    \  To the south is an archway leading to a starwell up and to the west\nis an\
    \ archway leading to another room.   \n"
