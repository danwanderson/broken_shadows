    there is now piles of broken up wood and burned books.  Obviously whomever\ntook\
    \ over the palace thought that it is better not to have such propaganda\nsitting\
    \ around here.  To the south is the study and to the north is the\ntower.  This\
    \ room is very large with no windows and no intact furniture.  \n"
