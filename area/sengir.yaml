- vnum: 20136
  name: Hall Leading to the Inner Rooms of the Palace
  description: "This is the hall that leads from the foyer to the inner sanctum of\
    \ the\npalace.  This sanctum is where the throne room and the private quarters\
    \ of\nthe king is...  Or was.  The hall is in pristene condition with polished\n\
    walls and floors.  The tile is even kept warm here by some unknown source. \n\
    To the south is the foyer, to the north the sanctum.  The sun slowly\ndisappears\
    \ in the west.   \n"
  room_flags: '0'
