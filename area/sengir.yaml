- vnum: 20153
  name: The Magical Anvil
  description: "Armor and shields lay strewn around the ground as you enter this small\n\
    shop.  There is a huge anvil in the middle of the room, obviously used to\nforge\
    \ protective plates and shields.  There is an upstairs to this place and\nit seems\
    \ that it could support your weight.  The only exit is to the west. \nOr of course\
    \ you could to climb up the rubble.   \n"
