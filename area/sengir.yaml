  extra_descs: []
- vnum: 20233
  name: First Floor of the Center Tower
  description: "This is the base of the stairwell leading up.  There is a small archway\n\rleading
    north into another small room that appears to be heavily damaged. \n\rThe room
    you are in now is in moderate condition with a small sofa that\n\rserved as a
    landing comfort.  The floor is uncovered although it is clean\n\rhowever cold.
    \  \n\r"
  room_flags: 8192
  sector: 0
  owner:
  exits:
