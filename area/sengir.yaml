- vnum: 20125
  name: The NE Tower Outisde the Castle
  description: "This wall rises up out of the landscape posing an inpenetrable boundry\n\
    to the south.  There is great staining and burn scars all along the wall. \nThis\
    \ was obviously a key position for the battle that conquered this realm. \nA pile\
    \ of rubble lies to the east and blocks the path to the SE tower.  A\npath returns\
    \ you to the front gate.   \n"
