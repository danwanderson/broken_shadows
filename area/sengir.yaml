- vnum: 20110
  name: Underground Tunnel
  description: "You are caught by surprise as you find this secret area.  The entrance\n\
    you just came through is now gone.  The tunnel leads to the south and there\n\
    is,of course, no light to speak of.  A soft breeze startles you as you are\nforced\
    \ to head into the darkness.   \n"
