  name: Second Floor of the Center Tower
  description: "This small room has been painted black also.  There are small markings\n\
    around the room indicating that this room is used by something for\nsomething.\
    \  There was once a small sofa sitting here but now it has been\nreduced into\
    \ ash.  To the north is a small room also painted black.  There\nis a spiral stairwell\
    \ leading up into another set of rooms...  Much closer\nto the royal suite.  \
    \ \n"
