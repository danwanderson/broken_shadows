- vnum: 20152
  name: The Magical Hack
  description: "This room is filled with small vials and scrolls.  There was once\
    \ a\nsecond floor but it was lost in some sort of battle long ago.  You think\n\
    that you could maybe get up there...  But you decide the risk is not worth\nit\
    \ as you start up the rubble.  There are no exits from the room except for\nthe\
    \ door to the west.   \n"
