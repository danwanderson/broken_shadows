  extra_descs: []
- vnum: 20151
  name: Sengir Street
  description: "This was the main street within the Castle.  To the west is an old\n\rmagic
    shop.  To the east is an old armor shop.  The ground is a hard packed\n\rdirt
    and the shops are made of the same gray stone of the castle.  Some of\n\rthe shops
    along the way do have second floors but you wonder if the floors\n\rcould hold
    your weight anyway.  The palace lies to the north, and is looking\n\rquite interesting.
    \  \n\r"
  room_flags: 0
  sector: 0
