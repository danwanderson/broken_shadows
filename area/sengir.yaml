- vnum: 20134
  name: First Floor of the SE Tower
  description: "This is the first floor of the SE tower.  There is an archway leading\n\rwest
    and stairs leading up into darkness.  The floor isn't covered and the\n\rwalls
    are nothing except bare stone.  The stairs are made of chipped up\n\rmarble although
    they were once very beautiful.   \n\r"
  room_flags: 0
  sector: 0
