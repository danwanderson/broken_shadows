- vnum: 20176
  name: Top of the SE Tower
  description: "Through the dense fog you can make out the cliff edges that protect\
    \ the\ncastle to the East, West, and South.  The gray stone shows its' years here\n\
    for it ws obviously key in protecting the castle at one point.  The smooth,\n\
    hard rock looks inviting to your tired soul, yet you know that you are in\ndanger\
    \ here...  You hear the flapping of wings here but you don't know if\nyou can\
    \ see anything.   \n"
  room_flags: '0'
