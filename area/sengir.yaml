- vnum: 20126
  name: The SE Tower Outside the Castle
  description: "You stand at the base of a huge tower.  The base of a cliff is directly\n\
    behind you.  The long smooth stone wall runs to the south and to the west. \n\
    Your mind starts to wander as you walk along the wall but as you turn the\ntight\
    \ corner onto the eastern half of the castle a strong gust of wind\nalmost blows\
    \ you off the ground.  You crouch down and pull your cloak\ntighter just knowing\
    \ it is going to be a long night...   \n"
