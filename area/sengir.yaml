- vnum: 20108
  name: Study
  description: "This elegently decorated room has a soft couch in the middle with
    a\n\rsingle arm chair to it's side.  There is an archway leading back to the\n\rfoyer
    or there is an archway leading to the north.  The only thing you\n\rnotice about
    this room is that the windows are blacked out.  You look around\n\rand think you
    see some kind of latch or keyhole but you are not sure.   \n\r"
  room_flags: 0
