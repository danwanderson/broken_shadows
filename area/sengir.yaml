    to_vnum: 20217
  extra_descs: []
- vnum: 20217
  name: Bottom of the Bath
  description: "This is the bottom of the pool.  There are several spouts which lead
    to\n\rthe large pipes under the city.  You don't feel that you need to explore\n\rdown
    there although you can see some lights to the south.  The pipes are\n\rcovered
    in slime and there is a trail of blood leading into the biggest\n\rpipe, which
    is to the north.  You know that you can fit due to your\n\requipment but you want
    to try...   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20216
  extra_descs: []
- vnum: 20218
  name: Small House
  description: "This house is just a small home that was probrably owned by the person\n\rwho
    operated the bath house or the deskkeeper of the Innes Street Inn.  You\n\rcan't
    see anything of interest and there is no steps leading up.  There is a\n\rsmall
    carpet in the middle of the room, and the edges are frayed and\n\rdecaying.  There
    isn't anything on the walls and the ceiling shows nothing\n\rexcept watermarks.
    \ To the west is the only exit.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20199
  extra_descs: []
- vnum: 20219
  name: Western Innes Street
  description: "You are walking among the nobleman's houses of the Castle.  The large\n\rhomes
    are still in good condition, with the second stories still intact. \n\rThere are
    two house entrences, one to the north and one to the south.  Innes\n\rstreet continues
    to the intersection of Winkle Street and Innes to the west.\n\rThere are more
    house there, although they are not as nice as the two you see\n\rhere.  The Sengir
    Square is to the east.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
