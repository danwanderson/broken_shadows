- vnum: 20129
  name: End of Navigator Way
  description: "The huge palace fence sits in front of you.  There is a tower above
    you\n\rwith guards sitting in them looking down across the castle.  To the east
    is\n\rthe gate leading into the palace, complete with guards and outposts.  To
    the\n\rsouth continues the way and you can see many people in the distance.   \n\r"
  room_flags: 0
  sector: 0
