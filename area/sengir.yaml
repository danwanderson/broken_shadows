- vnum: 20126
  name: The SE Tower Outside the Castle
  description: "You stand at the base of a huge tower.  The base of a cliff is directly\n\rbehind
    you.  The long smooth stone wall runs to the south and to the west. \n\rYour mind
    starts to wander as you walk along the wall but as you turn the\n\rtight corner
    onto the eastern half of the castle a strong gust of wind\n\ralmost blows you
    off the ground.  You crouch down and pull your cloak\n\rtighter just knowing it
    is going to be a long night...   \n\r"
  room_flags: 0
