    to_vnum: 20167
  extra_descs: []
- vnum: 20180
  name: Western Battlement
  description: "Barely together, this part of the wall is nearly destroyed.  The huge\n\
    concrete blocks that once formed a dark gray wall is now reduced to rubble. \n\
    You wonder what could have caused such mass destruction.  The walkway to the\n\
    north, leading to the NW Tower, is almost impassible but you think that you\n\
    can make it across.  It would be a long way to fall if the walkway fails. \n \n"
  room_flags: '0'
