- vnum: 20194
  name: Western Sengir Square
  description: "The famous Innes street is to the west, starting the area where the\n\rnobles
    were to have lived.  The soft grass is much shorter here but is still\n\rquite
    thick.  The cool air blows down the corridor of the houses causing you\n\rto bundle
    up a little more.  Sengir Street is to the west of you as is the\n\rcenter of
    the square.  You can see a little fountain sputtering out some\n\rfresh water
    from this part of the square.  You continue onward.   \n\r"
