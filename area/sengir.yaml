- vnum: 20245
  name: Fourth Floor of the Center Tower
  description: "This is the final room in the square floors, from here on up is one\n\
    room complete with a spiral stairwell leading up and down.  There is nothing\n\
    in this room of interest except for the chill you get as you enter the room.\n\
    A small trapdoor leads up to the next level and to the north is another\nroom.\
    \   \n"
