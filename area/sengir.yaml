    to_vnum: 20201
  extra_descs: []
- vnum: 20203
  name: The Commonroom of the Innes Street Inn
  description: "Ahh!!!  You bet there were some good times here.  There are many\n\rtables
    here still with large mugs of beer.  There is a stage to the north of\n\ryou that
    was where the jugglers and bards used to entertain the high class\n\rpeople who
    frequented this fine establishment.  There is a doorway, which\n\rstands opens,
    to the east that leads to the kitchen.  The room is more\n\rbrightly lit than
    anywhere else you have seen in the castle and you can see\n\rall the decorations
    which are all over the room.  The only complaint of such\n\ra place is the odor
    of burning hair.  Nevertheless this room is one of the\n\rnicest that you have
    ever seen.  The archway to the west leads back to the\n\rlobby of the inn.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
