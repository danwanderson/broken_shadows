- vnum: 20155
  name: The Blacksmith's Abode
  description: "This is what is left of the armorer's house.  You wonder if he was\n\
    married and if he had kids.  The small four room area has no doors left and\n\
    the whole area can be searched in a matter of seconds.  The rest of the\napartment\
    \ has little left in it except for the human remains of a young\nperson.   \n"
  room_flags: '0'
