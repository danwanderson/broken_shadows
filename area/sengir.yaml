- vnum: 20217
  name: Bottom of the Bath
  description: "This is the bottom of the pool.  There are several spouts which lead\
    \ to\nthe large pipes under the city.  You don't feel that you need to explore\n\
    down there although you can see some lights to the south.  The pipes are\ncovered\
    \ in slime and there is a trail of blood leading into the biggest\npipe, which\
    \ is to the north.  You know that you can fit due to your\nequipment but you want\
    \ to try...   \n"
