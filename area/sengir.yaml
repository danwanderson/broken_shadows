- vnum: 20138
  name: Bunkhouse of the Inner Sanctum
  description: "This is where the guards sleep.  Although simply decorated with various\n\rpictures
    of the guard's families, there is a certain amount of class\n\rconveyed here.
    \ There are four simple beds with four footlockers.  There is\n\rnothing of interest
    upon examination though.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20137
  extra_descs: []
- vnum: 20139
  name: Hall of Kings
  description: "This is the Hall where the King himself rules from.  The hall itself
    is\n\rabout 100 feet long with huge pillars and ornate ornamentations all about\n\rthe
    hall.  The pillars reach to the top of the high ceiling with torches\n\rlighting
    the marble and gold detail work.  To the north is far more hall\n\runtil in the
    distance you can see a large golden throne with a big man\n\rsitting in the throne.
    \ The man is flanked by two big armored men wielding\n\rpolearms.   \n\r"
  room_flags: 0
  sector: 0
