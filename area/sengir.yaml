- vnum: 20196
  name: Northern Sengir Square
  description: "You are only a block or two from the palace now.  The tall grass is\n\rstarting
    to thin as you apprach the northern half of Sengir Street.  The\n\rgrass starts
    to give way to the hard packed dirt of the well-traveled city\n\rstreets.  To
    the east and west you can see little houses and shops.  A\n\rpretty fountain is
    to the south as well as the exit of the castle.   \n\r"
