  description: "This is where the stairwell leads down to the first floor.  There\
    \ is\nanother hallway leading north and to the east and west are halls leading\
    \ to\nthe towers.  The little foyer is down below you and you can see it off of\
    \ a\nlittle balcony.  The floor is covered here with more furs and this was once\n\
