- vnum: 20172
  name: Second level of SW Tower
  description: "This is the battlement level of the tower.  The battlements go to
    the\n\rsouth and west.  The long spiral stairs continue up or down.  This room
    is\n\rsmall and has little of importance.  There is an empty weapons rack here.
    \n\rMany arrows and arrow slits line the walls as do fire pits for the hot oil\n\rcualdrons.
    \  \n\r"
  room_flags: 0
  sector: 0
