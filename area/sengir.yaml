- vnum: 20149
  name: Second Floor of Small House
  description: "This is the small upstairs loft of the small house.  There isn't any\n\
    furniture left here although there is a small washbasin.  From the southern\n\
    window you can see across the southern half of the castle and off into the\ndeep\
    \ fog just outside of the castle.  You see the guards below and the small\ncitizens\
    \ from here.  Down is the first, main floor, of the house.   \n"
