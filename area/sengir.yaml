    to_vnum: 20176
  extra_descs: []
- vnum: 20178
  name: Eastern Battlements of Castle Sengir
  description: "The wall is in perfect condition here.  It seems that there was\n\rabsolutly
    no battles held on this quadrant of the castle.  The dirt is thick\n\rhere for
    it hasn't been cleaned in quite some time but other than that it is\n\rpretty
    normal.  The battlement leads to the NE Tower and the SE Tower.  You\n\rcan see
    quite far through the fog...  You still can't see anything of\n\rimportance.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20183
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20175
  extra_descs: []
- vnum: 20179
  name: Eastern Antechambers
  description: "These are where the King retires to when he is not on the throne.
    \ A\n\rlarge room with a desk in one corner.  This room also has a door leading\n\rsouth
    into another set of chambers.  This room is elegently decorated with\n\rfurs and
    other warm things.  There is a fireplace in the corner of the room\n\rwhich is
    burning hotly.    \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20167
  extra_descs: []
- vnum: 20180
  name: Western Battlement
  description: "Barely together, this part of the wall is nearly destroyed.  The huge\n\rconcrete
    blocks that once formed a dark gray wall is now reduced to rubble. \n\rYou wonder
    what could have caused such mass destruction.  The walkway to the\n\rnorth, leading
    to the NW Tower, is almost impassible but you think that you\n\rcan make it across.
    \ It would be a long way to fall if the walkway fails. \n\r \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
