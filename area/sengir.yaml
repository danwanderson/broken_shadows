      \ behind such thick doors...  \n"
- vnum: 20162
  name: Sengir Noble House
  description: "Although quite similar to the house across the street in size and\n\
    appearance, this house has been almost destroyed.  The stairs have been\nreduced\
    \ to rubble and the furniture could be mistaken for matchsticks.  You\nrumage\
    \ through what you can and you still can't find anything of value.  The\nonly\
    \ place to go is back out the door you came in.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: A
