- vnum: 20189
  name: Air above NW Tower
  description: "This is the air above the NW Tower.  The cold wind blows as you rise
    up\n\rabove the cold tile of the tower.  You fly here looking in all directions\n\rbut
    you don't see anywhere else to go.  You can see the scorch marks\n\rfrom way up
    here and you think it spells out a word.  \n\r"
