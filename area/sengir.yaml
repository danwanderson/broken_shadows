- vnum: 20110
  name: Underground Tunnel
  description: "You are caught by surprise as you find this secret area.  The entrance\n\ryou
    just came through is now gone.  The tunnel leads to the south and there\n\ris,of
    course, no light to speak of.  A soft breeze startles you as you are\n\rforced
    to head into the darkness.   \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 33
    key: 0
    to_vnum: 20108
