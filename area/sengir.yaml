- vnum: 20219
  name: Western Innes Street
  description: "You are walking among the nobleman's houses of the Castle.  The large\n\
    homes are still in good condition, with the second stories still intact. \nThere\
    \ are two house entrences, one to the north and one to the south.  Innes\nstreet\
    \ continues to the intersection of Winkle Street and Innes to the west.\nThere\
    \ are more house there, although they are not as nice as the two you see\nhere.\
    \  The Sengir Square is to the east.   \n"
