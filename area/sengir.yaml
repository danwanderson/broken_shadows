- vnum: 20177
  name: Air Above SE Tower
  description: "This is where the flapping sound was coming from alright.  This seems\
    \ to\nbe the airspace of a rather unhappy creature.  You think that you would\
    \ be\nbetter off down on the tower where you can protect yourself better.  \n"
