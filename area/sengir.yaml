  extra_descs:
  - keywords: signs
    description: "These houses belong to the rich of the town.  You could gain access
      to a\n\rtour if you had a key...  You notice a small insignia on the sign that\n\rresembles
      a key with a skull engraved on it.  You wonder what could be\n\rhidden behind
      such thick doors...  \n\r"
