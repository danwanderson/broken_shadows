- vnum: 20224
  name: End of Sengir Street
  description: "This is the end of the Sengir Street.  There is a medium height wooden\n\
    fence which surrounds the palace.  To the west is another road off in the\ndistance\
    \ as is the case to the east.  South is the square of the city\nproper.   \n"
