- vnum: 20131
  name: Eastern Part of the East/West Hallway
  description: "This is the farthest east in the hallway.  The only thing left to\
    \ the\neast is a tower which would be the SE tower.  To the north is a small door\n\
    leading to a guest bedroom.  To the west is the hallway leading off to the\nSW\
    \ tower.  The floor is cold and the hall has a terrific breeze, which is\ncold...\
    \  Very cold.   \n"
