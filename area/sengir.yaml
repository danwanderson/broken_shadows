  extra_descs: []
- vnum: 20103
  name: The Alcove
  description: "The break in the bush offers a small alcove cut into the hedge.  The\n\
    high walls and razor sharp thorns offer you protection from the elements as\n\
    well as black, flying creatures..  The air almost feels warmer here as if\nthere\
    \ is someone wathing over you.  There is a bed here offering a safe\nplace to\
    \ sleep.   \n"
  room_flags: CK
  sector: 0
  owner: ''
  exits:
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: AF
    key: 0
    to_vnum: 20102
  extra_descs:
  - keywords: bed
    description: "The large bed invites you to sleep.  The calming room and gentle\
      \ touch of\nthe healer calls out...  \n"
- vnum: 20104
  name: The Path Outside of the Castle
  description: "The path continues quite haphazardly in a northern direction.  You\
    \ can\nbarely see for the night?  Is thrust into complete darkness.  You start\
    \ to\ndoubt yourself as you pass the large gates you saw from afar.  You now\n\
    realize that the fence surrounded nothing except a large wall.  The doorway\n\
    is now only a short distance away.  You want to turn around but you trek\nonward...\
    \  The wall is now in front of you...  The cold gray stone extend to\nthe east\
    \ and west.  The walls end in high towers on both sides.   \n"
  room_flags: C
  sector: 4
  owner: ''
  exits:
  - dir: 0
