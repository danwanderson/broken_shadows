- vnum: 20205
  name: Kitchen Storeroom
  description: "This is a large storeroom that has nothing in it.  You see some spices\n\rand
    a little bit of food for yourself so why not...  Help yourself.  The\n\rworst
    that that can happen is that you will have nightmares for a while... \n\r \n\r"
  room_flags: 0
