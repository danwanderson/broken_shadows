- vnum: 20157
  name: Cutting Stone
  description: "The walls are covered in beautiful creations of the anvil.  There\
    \ are\nsharp edged swords, axes, and daggers everywhere.  The quality of\nworkmanship\
    \ is unmatched in all of your travels.  The prices of the items\nshow you why.\
    \  Nevertheless, this room is in excellent condition even\nthrough the war that\
    \ this part of town endured.  The silver blades shine\neven today.   \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 3
