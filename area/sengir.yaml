- vnum: 20193
  name: Southwestern Sengir Square
  description: "This corner of the square is completely barren.  There were once two\n\
    big houses here but some rather large creature has reduced them to rubble. \n\
    You start to wonder what kind of creature could do this kind of mass\ndestruction.\
    \  The rest of the sqaure seems to be in fair to good condition\nbut this corner\
    \ has large cuts deep into the ground and then there are large\npiles of rock.\
    \  Innes street runs east and west to your north and Sengir\nstreet runs North\
    \ and South to your east.   \n"
