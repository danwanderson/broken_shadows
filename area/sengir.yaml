  description: "This is the third floor of the tower.  You are not quite sure how\
    \ many\nlevels the center tower has but you are sure it is more than five.  There\
    \ is\na stairwell that leads down into the second level of the tower.  To the\n\
    north is another small room that looks to be well decorated.  You can sense\n\
    evil here...  A bit stronger.   \n"
