- vnum: 128
  name: Gargamel's Castle
  description: "This is Gargamel's Castle.  His big black kettle is in the middle
    of the room.\n\rWhere else would he put it?  The place has only one room.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 2
    desc: "Outside Gargamel's Castle\n\r"
