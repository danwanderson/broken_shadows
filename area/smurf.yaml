  name: Smurfberry Patch
  description: "The northernmost of the smurfberry patches grows here.  It looks just\n\ras
    scrumptious as all the rest.  Just take a few; they'll never know.  Smurfy\n\rRoad
    is to the west.  A smurfberry patch is to the south.\n\r"
