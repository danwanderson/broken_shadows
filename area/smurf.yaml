- vnum: 127
  name: Outside Gargamel's Castle
  description: "You are standing outside Gargamel's Castle.  You can hear him screaming
    at\n\rAzreal from inside.  You can also him cursing out those wretched smurfs.\n\rHis
    Castle is to the north while Smurfy Road is to the south.\n\r"
