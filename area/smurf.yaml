  extra_descs: []
- vnum: 125
  name: Papa Smurf's Home
  description: "It's the home of the leader of the smurfs.  Papa Smurf has a nicely
    decorated\n\rhome.  He takes pride in his work.  You could get to know him or
    just squash\n\rhim.  If Papa Smurf is not here he is probably at Smurfette's putting
    the\n\rmoves on her.  A stone path lies to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "Stone Path\n\r"
    keywords: door
    exit_flags: 1
