- vnum: 121
  name: Hefty Smurf's Home
  description: "Hefty is anything but wimpy.  So is his house.  It actually took you
    a \n\rcouple of minutes to destroy his house.  Better watch out -- he might be\n\ra
    little mad at you.  Smurfy Road is back to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "Smurfy Road\n\r"
    keywords:
    exit_flags: 0
    key: -1
