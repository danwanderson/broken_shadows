- vnum: 120
  name: Handy Smurf's Home
  description: "This home was well built.  Of course, until you rip it apart you big
    meany\n\ryou.  Tools are all over the place.  Too small for you to use.  Smurfy
    Road is\n\rback to the west.\n\r"
  room_flags: 0
  sector: 1
  owner:
