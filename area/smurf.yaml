- vnum: 119
  name: Brainy Smurf's Home
  description: "You rip the roof of the home to get a good look inside.  You see\n\rmany
    smurfy books.  The print is so small you couldn't even read it\n\rwith a magnifying
    glass.  I wonder if Brainy Smurf minds if you\n\rdestroy his home?  Smurfy Road
    is back to the south.\n\r"
  room_flags: 0
  sector: 1
  owner:
