  name: Smurfette's House
  description: "This house is conveniently next to Papa Smurfs.  Makes it easier for
    Papa\n\rSmurf to sneak over at night.  I hope he uses protection.  I would hate
    to\n\rhave little smurfs running around.  The only exit is to the east.\n\r"
  room_flags: 0
