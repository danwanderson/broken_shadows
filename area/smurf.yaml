  extra_descs: []
- vnum: 122
  name: Sleepy Smurf's Home
  description: "Be vewy vewy quiet.  Sleepy Smurf is probably sleeping.  You see so
    many\n\rbeds you can't even tell if he is here.  Maybe you should quietly go back
    to\n\rSmurfy Road to the east.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "Smurfy Road\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 112
  extra_descs: []
- vnum: 123
  name: Grumpy Smurf's Home
  description: "This is Grumpy Smurf's home.  He is pissed at you.  Of course, he
    is pissed\n\rat everyone.  So don't take it bad.  Maybe you'd better leave before
    he really\n\rgets mad.  Smurfy Road to the east is your only salvation.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
