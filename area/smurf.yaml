  extra_descs: []
- vnum: 124
  name: Jokey Smurf's Home
  description: "You pull the top of his house and it explodes in your face.  That
    Jokey\n\rSmurf, what a kidder.  You can hear his laughter as you wipe the ashes
    off\n\ryour face.  You better get even.  Smurfy Road is to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "Smurfy Road\n\r"
    keywords:
    exit_flags: 0
    key: -1
