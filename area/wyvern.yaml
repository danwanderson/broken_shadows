- vnum: 1601
  name: Rough East-West Path
  description: "You are on a very rough and overgrown path heading east-west over
    rugged\n\rterrain.  To the east the path passes between low hills.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
