    to_vnum: 1702
  extra_descs: []
- vnum: 1602
  name: Rough Path Between the Hills
  description: "Here the path passes between low hills. The going is very rough, but\n\rto
    the east the ground is smoother. In that direction a pair of tower\n\rlooms above
    the hills.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 1
    desc: "You see a pair of tall towers in the distance.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1603
  - dir: 3
    desc: "The road continues.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1601
  extra_descs: []
- vnum: 1603
  name: Path through an Open Area
  description: "You are on a path through an open area. East of here loom two tall
    towers,\n\rjoined by a barbican and surrounded by a murky moat. West the path
    passes\n\rbetween low hills.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc: "Two fantastic towers surrounded by a moat rise before you.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1604
  - dir: 3
    desc: "The road continues.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1602
  extra_descs: []
- vnum: 1604
  name: West Side of Moat
  description: "You stand on the west side of a moat that encircles two towers, each\n\rover
    50 feet high. You will need a boat to go east across the moat. A\n\rrugged path
    heads west, and another one heads north to a cluster of low \n\rbuildings.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "A worn path leads to a cluster of low buildings.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1605
  - dir: 1
    desc: "The Towers loom directly over you, just beyond the moat.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1620
  - dir: 3
    desc: "An old ill-kept roads leads away to the west.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1603
  extra_descs: []
- vnum: 1605
  name: Path North of Moat
  description: "You walk on a faint path heading south toward the west side of the
    moat,\n\rand north to three small buildings.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "Several low buildings lie this way.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1606
  - dir: 2
    desc: "The path ends west of the moat.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1604
  extra_descs: []
- vnum: 1606
  name: Cluster of Buildings
  description: "You are in the middle of a cluster of small buildings. There is a
    building\n\rto the north, east, and west.  A sign over the eastern building says\n\r'House
    of Pancakes'.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "There is an entrance to a building.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1609
  - dir: 1
    desc: "A sign over the door reads 'House of Pancakes'.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1607
  - dir: 2
    desc: "A path heads south toward the west side of the towers.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1605
  - dir: 3
    desc: "There is an entrance to a building here.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1608
  extra_descs: []
- vnum: 1607
  name: House of Pancakes
  description: "The moment you enter this room, the ceiling descends and crushes you\n\rinto
