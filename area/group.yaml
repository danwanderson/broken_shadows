area: null
helps:
- level: -1
  keyword: '''RACE HELP'' ''RACE'' ''RACES'''
  text: |
    Borken Shadows has the following races for player characters:
      Human   the standard race
      Dwarf   good warriors and priests, cost 8 creation points
      Elf     good thieves and mages, cost 5 creation points
      Giant   huge, tough warriors, cost 6 creation points
      Troll   good warriors and thieves, cost 12 creation points
      Hobbit  good thieves, mages, clerics, cost 5 creation points
      Drow    good mages, thieves, cost 5 creation points
      Gnome   good thieves, cost 8 creation points
      H-elf   good mages, thieves, clerics, cost 3 creation points
      Wyvern  good warriors, cost 20 creation points  <remort race>
      Vampire good mages and clerics, cost 8 creation points <remort race>

    Different races have different starting statistics, and also different
    stat maximums for magic items and training.

    Creation points increase the amount of experience it takes to gain a level.
    For more information, see the help files for each race (i.e. 'help dwarf')
- level: -1
  keyword: DROW DROWS DROW-ELF "DROW ELF"
  text: |
    Drow elves, like their cousins, are slightly taller than humans, but
    have a much lighter build. They, too, lack the strength and stamina of
    the other races, but are for more agile, both in body and mind.  Drows are
    superb mages and thieves, but have at best fair talent as warriors,
    priests, or paladins. They are more likely than their cousins to turn
    toward disreputable trades, such as thieving.

    Drow elvess resist charm spells most effectively, due to their magical
    nature. However, they are burned by the touch of iron, and so are barred
    from the use of iron or steel in their adventuring careers.  Drow elves
    are notoriously hard to spot, especially with their dark skin, and so
    drow warriors and thieves recieve the sneak and hiding automatically. They
    may see in the dark with infravision.
- level: -1
  keyword: VAMPIRE VAMPIRES
  text: |
    Vampires, once living humans, now the living undead, have much the same
    characterisitics as humans, but have a lower strength and a lower
    dexterity. This is partially compensated by their high intelligence and
    slightly higher wisdom. Because of this, vampires make excellent mages and
    clerics, but at best mediocre warriors, paladins, and theives.

    Vampires regenerate health much more quickly than does a human and are
    immune to poison, cold, and negative energies. They are, however
    vulnerable to holy attacks.
- level: -1
  keyword: GNOME GNOMES
  text: |
    Gnomes are built much as their cousins, dwarves, only smaller. Like dwarves,
    the lifespan of the average gnome is a few hundred years. Gnomes have a high
    dexterity and wisdom, but a poor constitution. Their fascination with
    shiny objects makes many turn to theft.

    Gnomes are resistant to magic, poison, and disease. They make excellent
    thieves, decent clerics, but at best, mediocre warriors and paladins.
- level: -1
  keyword: HALF-ELF "HALF ELF" H-ELF
  text: |
    Half-elves are a cross between elves and humans. When a child is born of
    human and elven parents, the family tree is traced back. If the child has
    more human ancestors than eleven ones, the child is human. Otherwise, they
    are half-elven, for elves can only descend from true elves.

    Half-elves are almost as versatile as humans. They do well in any class,
    but aren't quite as strong as humans, nor as well built as a result of
    their elven ancestors.

    Half-elves, like true elves, can see in the dark with infrared and are
    resistant to charm.
- level: -1
  keyword: WYVERN WYVERNS
  text: |
    Wyverns, or dragons, are large sentient creatures, usually weighting
    several hundred pouds as youngsters. At an early age, wyverns develop
    wings and quickly become adept at flying. Using their large, powerful
    claws, they can grab onto most surfaces.

    While not especially quick, wyverns are intelligent and live for hundreds
    of years. This combined with their large body mass and exceptional
    strength make them well suited as warriors, decent mages, clerics, and
    paladins, but are poor thieves.

    As magical creatures, wyverns can see invisible and hidden objects, and
    can cast breath spells. They also get bash for free.
- level: -1
  keyword: TROLL TROLLS
  text: |
    Trolls are large, rather ugly creatures. They tend to stay in dark, dingy
    caves. Trolls have a high strength and constitution, but poor dexterity.
    They are not overly intelligent and don't have a high wisdom. Trolls make
    excellent warriors, mediocre thieves and paladins, and poor mages or
    clerics.

    Trolls are resistant to charm and bashing, but vulnerable to fire and
    acid. They have infravision and regenerate health rather quckly.
- level: -1
  keyword: HOBBIT HOBBITS
  text: |
    Hobbits are short, pudgy human-like creatures. They prefer living at home
    to adventuring and tend to live for about 150 years. Hobbits have a high
    dexterity and decent constitution, but a low strength. Their wisdom and
    intelligence are about the same as a human's. Hobbits make good thieves
    and mediocre mages and clerics, but poor warriors and paladins.

    Hobbits are resistant to magic, poison and disease, however, they are
    vulnerable to drowning. They get hide and sneak for free and can see in
    the dark with infrared.
- level: -1
  keyword: DWARF DWARVES
  text: "Dwarves are short, stocky demi-humans, known for foul temper and great\n\
    stamina.  Dwarves have high strength and constitution, but poor dexterity.\nThey\
    \ are not as smart as humans, but are usually wiser due to their long \nlifespans.\
    \  Dwarves make excellent fighters, priests, and paladins, but\nare very poor\
    \ mages or thieves.  \n\nDwarves are resistant to magic, poison and disease, but\
    \ cannot swim, and\nso are very vulnerable to drowning.  They recieve the berserk\
    \ skill for free\n(if warriors), and can see in the dark with infravision.\n"
- level: -1
  keyword: ELF ELVES
  text: "Elves are slightly taller than humans, but have a much lighter build.  They\n\
    lack the strength and stamina of the other races, but are for more agile,\nboth\
    \ in body and mind.  Elves are superb mages and thieves, but have at\nbest fair\
    \ talent as warriors, priests, or paladins.\n\nElves resist charm spells most\
    \ effectively, due to their magical nature.\nHowever, they are burned by the touch\
    \ of iron, and so are barred from the\nuse of iron or steel in their adventuring\
    \ careers.  Elves are notoriously \nhard to spot, and so elven warriors and thieves\
    \ recieve the sneak and hiding\nautomatically. They may see in the dark with infravision.\n"
- level: -1
  keyword: HUMAN HUMANS MAN
  text: |
    Humans are the most common race in the world, and make up the majority of
    adventurers. Although they have no special talents like the other races,
    they are more versitile, being skilled in all four classes. Humans may
    also train their primary stat higher than any other race, and are able to
    gain more benefit from magical devices.
- level: -1
  keyword: GIANT GIANTS
  text: "Giants are the largest of the races, ranging from 9-12 feet in height.  They\n\
    are stronger than any other race, and almost as durable as the dwarves.  \nThey\
    \ aren't too bright, however, and their huge size makes them more clumsy\nthan\
    \ the other races.  Giants make the best warriors of any race, but are\nill-suited\
    \ for any other profession.\n\nGiants resist heat and cold with nary a mark, due\
    \ to their huge mass.  However,\ntheir slow minds make them extremely vulnerable\
    \ to mental attacks.  Giants,\ndue to their size and stamina, receive the fast\
    \ healing and bash skills for\nfree. (Only giant warriors recive bash).\n"
- level: -1
  keyword: WANDS STAVES SCROLLS
  text: "Magical items require training to use properly.  If your character lacks\
    \ the\nnecessary skill to use an item, he will fail, possibly destroying it. \
    \ The\nitem skills are as follows:\n\nscrolls\t\tThe reading of magical scrolls\
    \ and books (see 'help recite')\nstaves\t\tThe use of staves and similar devices\
    \ (see 'help brandish')\nwands\t\tThe use of wands and similar items (see 'help\
    \ zap') \n"
- level: -1
  keyword: '''GROUP HEADER'''
  text: |
    The following skills and groups are available to your chacter:
    (this list may be seen again by typing list)
- level: -1
  keyword: '''GROUP HELP'''
  text: "The following commands are available:\nlist         display all groups and\
    \ skills not yet bought\nlearned      show all groups and skills bought \npremise\
    \      brief explanation of creation points and skill groups\nadd <name>   buy\
    \ a skill or group\ndrop <name>  discard a skill or group\ninfo <name>  list the\
    \ skills or spells contained within a group\nhelp <name>  help on skills and groups,\
    \ or other help topics\ndone\t     exit the character generation process\n"
- level: -1
  keyword: '''MENU CHOICE'''
  text: Choice (add,drop,list,help)?
- level: -1
  keyword: '''GROUPS'' ''INFO'' ''PREMISE'''
  text: "The ROM skill system allows you to fully customize your new character, making\n\
    him or her skilled in the skills you choose.  But beware, the skills you pick\n\
    at character creation are the only skills you will ever learn.  Skills are \n\
    paid for with creation points, and the more creation points you have, the\nharder\
    \ it is to gain a level.  Furthermore, higher-cost skills are harder to\npractice.\n\
    \nSkill groups are like package deals for characters -- sets of skills or spells\n\
    that are closely related, and hence can be learned as a unit.  There is a \ndefault\
    \ skill group for each class, which can be selected for a balanced \nselection\
    \ of skills at a somewhat reduced cost.\n"
- level: -1
  keyword: BASICS 'ROM BASICS'
  text: "The basic skills:\n\nEvery character starts with two skill groups, one for\
    \ their class and a default\nset that all characters receive.  The default skills\
    \ are:\n\nrecall  \tessential escape skill (see help recall)\nscrolls\t\treading\
    \ of scrolls and other magical volumes\nstaves\t\tuse of magical staves\nwands\t\
    \tuse of magical wands\n\nfor class defaults, check the classes themselves.\n"
- level: -1
  keyword: MAGE 'MAGIC-USER' 'MAGE BASICS' 'MAGE DEFAULT'
  text: "Mages specialize in the casting of spells, offensive ones in particular.\n\
    Mages have the highest-powered magic of any class, and are the only classes\n\
    able to use the draconian and enchanting spell groups.  They are also very\nskilled\
    \ at the use of magical items, though their combat skills are the \nweakest of\
    \ any class.\n\nAll mages begin with skill in the dagger. Any other weapon skills\
    \ must be\npurchased, at a very high rate.  The default skill selection for mages\
    \ is\nas follows:\n\nskills:\nlore\t\tthe lore of magical items\n\nspell groups:\n\
    beguiling\tspells that control the mind\ncombat\t\toffensive magics, such as fireball\
    \ and chill touch\ndetection\tinformational magics, such as detect magic and identify\n\
    enhancement\tspells that maximize physical potential, such as haste\nillusion\t\
    magics for concealing and deceiving\nmaladictions\ta selection of curses fit for\
    \ any witch\nprotective\tdefensive magics, ranging from armor to stone skin\n\
    transporation\tspells for getting from here to there\nweather\t\tspells for conjuring\
    \ and mastering the elements\n"
- level: -1
  keyword: CLERIC 'CLERIC BASICS' 'CLERIC DEFAULT'
  text: "Clerics are the most defensively orientated of all the classes.  Most of\
    \ their\nspells focus on healing or defending the faithful, with their few combat\
    \ spells\nbeing far less powerful than those of mages. However, clerics are the\
    \ best \nclass by far at healing magics, and they posess an impressive area of\n\
    protective magics, as well as fair combat prowess.\n\nAll clerics begin with skill\
    \ in the mace.  Other weapon or shield skills must\nbe purchased, many at a very\
    \ dear cost.  The default skill selection for \nclerics is as follows:\n\nskills:\n\
    flail\t\tthe proper use of flails\n\nspell groups:\nattack\t\ta selection of offensive\
    \ magics\ncreation\tthe making of physical objects, such as food and water\ncurative\t\
    spells that cure the sick and feeble of their ailments\nbenedictions\tpowerful\
    \ magics that grant the blessings of the gods\ndetection\tinformational magics,\
    \ such as detect magic and identify\nhealing\t\tspells for treating wounds, from\
    \ scratches to death blows\nmaladictions\tan assortment of curses\nprotective\t\
    defensive magics, including the powerful sanctuary spell\ntransportation\tspells\
    \ for getting from here to there\nweather         spells for conjuring and mastering\
    \ the elements\n"
- level: -1
  keyword: THIEF 'THIEF BASICS' 'THIEF DEFAULT'
  text: "Thieves are a marginal class. They do few things better than any other class,\n\
    but have the widest range of skills available.  Thieves are specialists at\nthievery\
    \ and covert actions, being capable of entering areas undetected where\nmore powerful\
    \ adventurers would fear to tread.  They are better fighters than\nclerics, but\
    \ lack the wide weapon selection of warriors.\n\nAll thieves begin with the dagger\
    \ combat skill, and are learned in steal as \nwell.  Any other weapon skills must\
    \ be purchased, unless the default selection\nis chosen.  This default skill package\
    \ includes:\n\nskills:\nmace\t\tthe use of maces and other blunt weapons\nsword\t\
    \tswordplay and fencing\nbackstab\tthe art of hitting your oponent by surprise\n\
    disarm\t\tused to deprive your oponent of his weapon\ndodge\t\tthe best way to\
    \ take a punch is not to be there\nsecond attack\twith training, the skilled thief\
    \ can hit twice as fast\ntrip\t\ta good way to introduce an oponent to the floor\n\
    hide\t\tthe art of remaining undetected in a room\npeek\t\tused to look into a\
    \ person's belongings\npick lock\ta useful skill for breaking and entering\nsneak\t\
    \twith this skill, a thief can walk into a room undetected\n"
- level: -1
  keyword: PALADIN 'PALADIN BASICS' 'PALADIN DEFAULT'
  text: "Paladins are noble and heroic warriors, symbols of all that is right and\n\
    true in the world. They are part fighter and part cleric.\n\nPaladins begin with\
    \ knowledge of sword and get a second attack in combat.\nThe default skill package\
    \ includes:\n\nskills:\nweaponsmaster\tthis group provides knowledge of all weapon\
    \ types\nshield block\tthe art of parrying with a shield\nbash\t\ta forceful rush\
    \ with the body, designed to flatten your foes\nparry\t\tthe art of parrying with\
    \ weapons\n\nspell groups:\nbenedictions\tpowerful magics that grant the blessings\
    \ of the gods\ndetection\tinformational magics, such as detect magic and identify\n\
    healing\t\tspells for treating wounds, from scratches to death blows\ncurative\t\
    spells that cure the sick and feeble of their ailments\n"
- level: -1
  keyword: WARRIOR 'WARRIOR BASICS' 'WARRIOR DEFAULT'
  text: "Warriors live for combat and the thrill of battle. They are the best fighters\n\
    of all the classes, but lack the subtle skills of thieves and the magical\ntalents\
    \ of mages and priests.  Warriors are best for those who don't mind\ntaking the\
    \ direct approach, even when another method might be called for.\n\nWarriors begin\
    \ with skill in the sword, and gain a second attack in combat.\nOther weapon skills\
    \ may be purchased cheaply, or gained in the default skill\npackage, which includes\
    \ the following:\n\nskills:\nweaponsmaster\tthis group provides knowledge of all\
    \ weapon types\nshield block\tthe art of parrying with a shield\nbash\t\ta forceful\
    \ rush with the body, designed to flatten your foes\nenhanced damage\tthis skill\
    \ multiplies your damage in battle\nparry\t\tthe art of parrying with weapons\n\
    rescue\t\tallows you to take the blows aimed for a companion\nthird attack\tallows\
    \ the skilled warrior to land three blows in one round\n"
- level: -1
  keyword: EXOTIC WEAPONS WEAPON WEAPONSMASTER AXE DAGGER FLAIL MACE POLEARM SPEAR
    SWORD WHIP
  text: "Each weapon skill applies to a specific group of armaments, and determines\
    \ how\nwell a character fights with a particular weapon.  The weaponsmaster group\n\
    provides talent in all weapons (save exotics), from chair legs to halberds.\n\
    If the character has the parry skill as well, he can parry incoming attacks.\n\
    The chance of parrying is best if the character in question is skilled at \nboth\
    \ his weapon and his opponent's.\n\nThe weapon skills consist of the following:\n\
    \nweaponsmaster\tskill group of all weapons listed below (save exotic weaponry)\n\
    axe\t\tthe use of axes, ranging from hand to great (but not halberds)\ndagger\t\
    \tthe use of knives and daggers, and other stabbing weapons\nflail\t\tskill in\
    \ ball-and-chain type weapons\nmace\t\tthis skill includes clubs and hammers as\
    \ well as maces\npolearm\t\tthe use of pole weapons (except spears), including\
    \ halberds\nspear\t\tthis skill covers both spears and staves, but not polearms\n\
    sword\t\tthe warrior's standby, from rapier to claymore\nwhip\t\tthe use of whips,\
    \ chains, and bullwhips\nexotic\t\tthe use of strange magical weapons\n\nThe exotic\
    \ skill cannot be purchased, and is dependent soley upon level.\n"
- level: -1
  keyword: '''SHIELD BLOCK'''
  text: |
    Shield block is a rather fancy name for the art of parrying with a shield.
    Characters with no shield block skill will not be able to defend themselves
    well with a shield.  All classes may learn shield block, but only warriors and
    clerics are good at it.  Beware, flails ignore shield blocking attempts, and
    whips have an easier time getting around them.  Axes may split shields in two.
- level: -1
  keyword: ATTACK
  text: "The attack spells are essentially powerful curses, fueled by divine energy\n\
    rather than magical power (like the combat spells are). They are less powerful\n\
    than the combat spells, but can still deal out a stinging blow.  Mages and \n\
    thieves cannot use this group.  The attack spell group consists of the \nfollowing\
    \ spells:\n\ndemonfire\ta powerful, but very evil, spell\ndispel evil\ttorments\
    \ evil foes\ndispel good\tcalls down unholy power on good creatures\nearthquake\t\
    brings the power of earth to bear against your foes\nflamestrike\tsends a column\
    \ of flame from the heavens\nhellfire\tcalls forth the flames of Hell on your\
    \ enemy\nthunderbolt     sends a bolt of thunder at your foe\nheat metal\theats\
    \ metal equipment to searing tempatures\nray of truth\tsends forth a blinding\
    \ ray of holy energy\n"
- level: -1
  keyword: BEGUILING
  text: "This insideous spell group is used to invade the minds of others.  It consists\n\
    of various charming magics, well suited for turning your foes to your cause.\n\
    Only mages and thieves have access to the beguiling magics, which consist of\n\
    the following:\n\ncharm person\tturns an enemy into a trusted friend\nsleep\t\t\
    puts a foe into enchanted slumber\nresurrect\tbrings corpses back to life as your\
    \ servant\n"
- level: -1
  keyword: BENEDICTIONS
  text: "Benedictions are priestly spells, used to bestow divine favor upon your allies.\n\
    They are often restricted to those of like alignment.  Only clerics and \nwarriors\
    \ may use these spells.  The benedictions spell group consists of the\nfollowing:\n\
    \nbless\t\tbestows divine favor upon the target\ncalm\t\tif successful, stops\
    \ all fighting in the room\nfrenzy\t\tputs the recipient into beserker rage\n\
    holy word\taids your allies while calling divine wrath upon your foes\nremove\
    \ curse\tremoves malevolent magic from players and items\nregeneration\tallows\
    \ the body to heal more quickly  \n"
- level: -1
  keyword: COMBAT
  text: "These sorcerous spells are, in the words of one famous mage, just 'more ways\
    \ to\ntoss energy around'.  They are the most powerful of the damaging spells,\
    \ and\nconsidered an essential part of most wizards' collections. Clerics, thieves,\
    \ \nand warriors do not have access to these spells.  The combat spell group \n\
    contains the following magics:\n\nmagic missile\tsend a weak energy bolt into\
    \ a foe\nchill touch\tweakens your enemy with a frigid grasp\nburning hands\t\
    sends a blast of fire into your foe\nshocking grasp\tsends a powerful jolt into\
    \ a foe\nlightning bolt\tsends forth a single bolt of lightning into an enemy\n\
    colour spray\tblasts your opponent with a rainbow spray, which may blind him\n\
    fireball\ta powerful spell, great for burning your enemy to ashes\nacid blast\t\
    sends forth a stream of acid to eradicate your foes\nchain lightning\tsends lightning\
    \ bolts arcing through foes \nmulti missile   sends a group of magic missiles\
    \ at your enemy\nflame sword     creates a magical sword (DO NOT NEED THE SWORD\
    \ SKILL)\nice ray         sends a ray of ice towards your foes\nmeteor swarm \
    \   sends a group of fireballs at your foes\ndisintegrate    disintegrates parts\
    \ of your foes\nfirewind        calls forth flaming winds\nice storm       sends\
    \ a group of ice rays at your foes\nflash fire      calls forth a flash fire\n\
    inferno         calls forth a raging inferno to consume your foes\nthunderbolt\
    \     sends a thunderbolt at your foes\ninstant death   a very powerful spell\
    \ that can kill some creatures instanly\n"
- level: -1
  keyword: CREATION
  text: "The creation spell group is used to create objects, of temporary or permanent\n\
    duration.  Skill creators can travel without food or drink, and use their \npowers\
    \ to create nourishment as required.  All classes may become learned in\nthis\
    \ group, which contains these spells:\n\ncontinual light\tcreates an eternal light\
    \ source\ncreate food\tproduces a nourishing mushroom\ncreate rose\tcreates a\
    \ beautiful red rose\ncreate spring\tcalls forth a small but pure spring from\
    \ the ground\ncreate water\tfills any available container with water\n"
- level: -1
  keyword: CURATIVE
  text: "The curative spells are used to heal various unpleasant conditions that can\n\
    befall an adventurer.   For healing of damage, see the healing spell group.\n\
    Curative spells cannot be used by mages or thieves.\n\ncure blindness\trestored\
    \ sight to the blind\ncure disease\theals the plague\ncure poison\tremoves the\
    \ harmful effects of poison\n"
- level: -1
  keyword: DETECTION
  text: "The detection spells have may uses, all related to gathering information.\
    \ They\ncan be used to see hidden objects, give information about treasure, or\
    \ even\nscry out the true nature of your foe.  All classes except warriors can\
    \ use \ndetection spells.\n\ndetect evil\treveals the aura of evil monsters\n\
    detect good\tsimilar to above, only for good monsters\ndetect hidden\tshows the\
    \ whereabouts of hidden foes\ndetect invis\tallows the caster to see the unseeable\n\
    detect magic\treveals magical auras to the caster\ndetect poison\tdetermines if\
    \ food is safe to eat\nidentify\tgives information about the nature of an object\n\
    know alignment\tdetermines the moral character of a monster or person\nlocate\
    \ object\tfinds a specific item\nvision\t\tlets you see distant foes\n"
- level: -1
  keyword: DRACONIAN
  text: "The Draconian spell group deals with the magic of dragons -- in this case,\
    \ \nbringing forth the devastating power of their breath weapons upon your foes.\n\
    Only mages have the mental training necessary to cast these spells, and few\n\
    of them ever reach the level of mastery required to use them.\n\nacid breath\t\
    \ uses the black dragon's attack upon an enemy\nfire breath\t calls forth the\
    \ flames of a red dragon\nfrost breath\t drains the life from a foe with the power\
    \ a white dragon\ngas breath\t suffocates your enemies with poison gas\nlightning\
    \ breath summons the electrical fury of a blue dragon \n"
- level: -1
  keyword: ENCHANTMENT
  text: "The enchantment spell group is used to imbue items with magical properties.\n\
    Currently, this spell group consists of enchant weapon and enchant armor, \nalthough\
    \ more will be added in the future.  Only mages may enchant.\n\nenchant weapon\t\
    increases the hit and damage bonuses of a weapon\nenchant armor\tincreases the\
    \ protective value of armor\nfireproof       shields items from the harmful effects\
    \ of fire and acid\nrecharge\trestores power to a depleted wand or staff\n"
- level: -1
  keyword: ENHANCEMENT
  text: "The enhancement spells improve upon the body's pontential, allowing feats\
    \ of\nsuperhuman strength and speed.  However, these spells may often have harmful\n\
    effects upon the recipient.\n\ngiant strength\tgrants increased strength\nhaste\t\
    \tdoubles the speed of the target, but slows down healing\ninfravision\tallows\
    \ monsters to be seen in the dark\nrefresh\t\trestores energy to tired adventurers\n"
- level: -1
  keyword: HARMFUL
  text: "This spell group is the opposite of healing.  The harmful spells are designed\n\
    to tear flesh from bone, rupture arteries, and generally turn the body against\n\
    itself.  Only priests may use this spell group.\nIn order of power, the harmful\
    \ spells are:\n\ncause light\tinflicts minor wounds on an enemy\ncause serious\t\
    inflicts wounds on a foe\ncause critical  causes major damage to the target\n\
    harm\t        harmful spell\ngreater harm    causes the most harm to a target\n"
- level: -1
  keyword: HEALING
  text: "The healing spells are used to cure the wounds that adventurers inevitably\n\
    suffer in battle.  For curing other conditions, such as poison, see the\ncurative\
    \ spell group.  Only warriors and priests have access to this group.\nIn order\
    \ of power, the healing spells are:\n\ncure light\theals minor wounds\nrefresh\t\
    \trestores vigor to a tired adventurer\ncure serious\theals wounds\ncure critical\t\
    closes all but the worst wounds\nheal\t\ta powerful healing spell\nmass healing\t\
    casts a heal spell on each player in the room\nrestoration\ta more powerful healing\
    \ spell\ngreater heal    the most powerful heaing spell\n"
- level: -1
  keyword: ILLUSION
  text: "The illusions spells are dedicated to deception and trickery.  They can be\n\
    used to mask appearances, or create distractions for the party.  Currently,\n\
    the illusion group is very small, but it will be expanded in the future.\nOnly\
    \ thieves and mages can cast illusion spells, which consist of the \nfollowing:\n\
    \ninvis\t\tturns the target invisible\nmass invis\tturns the caster's group invisible\n\
    ventriloquate\tallows the caster to put words in someone's mouth\n"
- level: -1
  keyword: MALADICTIONS
  text: "Maladictions are a group of curses and other baneful spells, designed to\n\
    cripple, inconvinience, or torture, rather than kill outright.  These spells\n\
    may be cast by any class.\n\nblindess\tstrikes the target blind\nchange sex\t\
    turns the target into a new man (or woman)\ncurse\t\tprevents recalling and weakens\
    \ the target in combat\nenergy drain\tdrains experience and mana, while strengthening\
    \ the caster\nplague\t\tcauses the target to suffer a slow, painful death from\
    \ plague\npoison\t\tweaker than plague, but often fatal\nslow\t\tslows your enemies\
    \ down, reducing their rate of attack\t\nweaken\t\tdrains the strength of the\
    \ target\n"
- level: -1
  keyword: PROTECTIVE
  text: "The protective spells are used to shield against harm, whether from spells\
    \ or\nphysical attack.  They range from the weak armor spell to the sought-after\n\
    sanctuary charm.  Also included in this group are several spells for dispeling\n\
    hostile magics. Any class may use this group, which consists of the following\
    \ \nspells:\n\narmor\t\tprovides the target with an extra layer of defense\nfireproof\t\
    shields items from the harmful effects of fire and acid\ncancellation\ta powerful\
    \ dispel, used for removing spells from friends\ndispel magic\tremoves spells\
    \ from enemies, not as effective as cancel\nprotection evil\tprovides defense\
    \ from the attacks of evil creatures\nprotection good protects from the attacks\
    \ of good beings\nsanctuary\treduces all damage taken by the recipient by half\n\
    shield\t\tputs a shimmering shield between you and your enemies\nstoneskin\tturns\
    \ skin hard as stone, providing a huge armor boost\nfear\t\tmakes victims flee\
    \ the battle\n"
- level: -1
  keyword: TRANSPORTATION
  text: "The transportation group is used for travel, whether by flight, magical\n\
    teleportation, or walking through walls.  All classes may learn these spells,\n\
    which are among the most useful in the game.\n\nfly\t\tallows the target to fly\
    \ over nearly all obstacles\ngate\t\ttransports the caster to the target\nnexus\t\
    \tforms a two-way portal to a far off destination\npass door\tallows the caster\
    \ to walk through walls\nportal\t\tcreates a one-way portal to a destination\n\
    summon\t\ttransports the target to the caster\nteleport\tsends the target to a\
    \ random location\nword of recall\ttransports the caster to safety in Midgaard\n"
- level: -1
  keyword: WEATHER
  text: "These spells allow the caster to manipulate local weather conditions, as\
    \ well\nas summon fog clouds, lightning, or even electrical glows.  This group\
    \ is\nusable by all classes.\n\ncall lightning\tsummons a huge bolt from the heavens,\
    \ if the weather is right\ncontrol weather\tchanges the weather in the manner\
    \ desired by the caster\nfaerie fire\tsurrounds the target in a glowing aura\n\
    faerie fog\treveals all hidden creatures in the room\nlightning bolt\tsends a\
    \ bolt of electricity into the target\n\n(the weather command, unrelated to this\
    \ group, shows local weather conditions)\n"
- level: -1
  keyword: BACKSTAB
  text: "Backstab is the favored attack of  thieves, murderers, and other rogues.\
    \  It \ncan be used with any weapon type, but is most effective with piercing\
    \ weapons.\nThe damage inflicted by a backstab is determined by the attacker's\
    \ level, his\nweapon skill, his backstab skill, and the power of his opponent.\n\
    Only thieves may learn the backstab.\n"
- level: -1
  keyword: CIRCLE
  text: |
    Circle is a favorite "move" of thieves and murderers. It allows the
    attacker to circle behind the opponent and attack the back side of the
    opponent. It can be used with weapons of any type, but is most effective
    with piercing weapons. The damage inflisted is based on the attacker's
    level, his weapon skill, and the power of his opponent.
    Only thieves may learn to circle.
- level: -1
  keyword: BASH
  text: |
    The bash skill is a warrior talent, a brute-force attack designed to knock
    your foe to his knees.  Its success depends on many factors, including the
    bash rating, your weight, and the size of your opponent.  Bashing a dragon
    is not generally a wise idea.
- level: -1
  keyword: BERSERK
  text: "Only powerful warriors can master berserking, the ability to enter insane\
    \ rage\nin combat.  Its effects are not altogether unlike the frenzy spell --\
    \ a huge\nsurge of combat prowess, coupled with a disregard for personal safety.\
    \  \nBerserking warriors are more resistant to the effects of magic.\n"
- level: -1
  keyword: DIRT 'DIRT KICKING'
  text: "Consider by some to be a cowardly skill, dirt kicking gives the clever \n\
    combatant a chance to blind his opponent by casting dirt into his eyes.  The\n\
    blindness does not last long, but can provide an edge in combat.  Dexterity\n\
    helps in hitting or avoiding a dirt kick.  Only warriors and thieves may\nlearn\
    \ this skill.\n"
- level: -1
  keyword: DISARM
  text: |
    Disarm is a somewhat showy and unreliable skill, designed to relieve your
    opponent of his weapon.  The best possible chance of disarming occurs when you
    are skilled both your own and your opponent's weapon. Only talented thieves
    and warriors may learn this skill.
- level: -1
  keyword: DODGE
  text: "In the words of one wise warrior, 'the best way to block a blow is to not\n\
    be where it lands'.  The dodge skill honors this tradition, by improving the\n\
    character's natural agility to the point where many blows will miss the \ntarget.\
    \ The chance of dodging is also affected by the dexterity of the\nattacker and\
    \ the target.  Any class may learn dodging.\n"
- level: -1
  keyword: '''ENHANCED DAMAGE'''
  text: |
    Warriors and skilled thieves can become skilled enough in combat that they are
    able to inflict more damage than other classes.  Enhanced damage is checked
    for with each hit, although with a low skill, the chance of receiving a bonus
    is very low indeed.
- level: -1
  keyword: '''HAND TO HAND'''
  text: |
    Hand to hand combat is a rare skill in the lands of Midgaard.  Learning this
    style of fighting gives the player a weapon even when disarmed -- bare hands.
    Trained hand to hand experts are far more effective than many swordsmen.
    Clerics and warriors are the best at this skill, although thieves and mages
    may also learn it.
- level: -1
  keyword: KICK
  text: |
    Kicking allows the adventurer to receive an extra attack in combat, a powerful
    kick. However, a failed kick may throw an unwary fighter off balance.  Fighters
    and clerics are the most skilled at kicking, although thieves may also learn
    it.
- level: -1
  keyword: PARRY
  text: "If at first you fail to dodge, block it.  Parry is useful for deflecting\
    \ \nattacks, and is succesful more often than dodge.  Parry requires a weapon\
    \ for\nfull success, the hand-to-hand skill may also be used, but results in reduced\n\
    damage instead of no damage.  The best chance of parrying occurs when the\ndefender\
    \ is skilled in both his and his opponent's weapon type.\n"
- level: -1
  keyword: RESCUE
  text: |
    A friend in need is a friend indeed.  And when in combat, a warrior with
    the rescue skill is just the friend you need.  Rescue allows you to intercede
    in combat, protecting weaker characters from bodily harm. Hopefully the
    favor will be returned.  Success in rescuing depends on the skill rating, as
    well as a comparision of level, dexterity, and speed between the character and
    the target. (note: you rescue a friend, not the monster)
- level: -1
  keyword: TRIP
  text: |
    Back by popular demand.  Trip is a somewhat dastardly attack, and involves
    using any one of a number of methods to bring your opponent down to the ground.
    Tripping large monsters is generally not a good idea, and agile ones will
    find the attack easy to avoid.  Thieves and warriors may learn trip.
- level: -1
  keyword: '''SECOND ATTACK'''
  text: "Training in second attack allows the character a chance at additional strikes\n\
    in combat -- allow a 100% second attack does NOT guarantee 2 attacks every\nround.\
    \  Any class may learn this skill, although clerics and mages have a \nvery hard\
    \ time with it.\n"
- level: -1
  keyword: '''THIRD ATTACK'''
  text: |
    Training in third attack allows the character a chance at an additional strike
    in a combat, and increases the chance of a second attack as well.  Perfect
    third attack does NOT assure three attacks per round.  Only warriors and highly
    skilled thieves may learn this skill.
- level: -1
  keyword: HIDE SNEAK
  text: |
    Hide and sneak are similar skills, both related to remaining undetected.
    Hide has a very high chance of success, but only works for as long as the
    character remains stationary.  Sneak may be used when moving (including to
    sneak by monsters), but has a lower chance of success.  Only warriors and
    thieves may learn these skills.
- level: -1
  keyword: '''FAST HEALING'''
  text: "The fast healing skill improves wound healing rates, whether walking, resting,\n\
    or sleeping. It represents knowledge of healing herbs or just general \ntoughness\
    \ and stamina.  Fast healing is checked every tick, and it is \npossible for it\
    \ to fail.  All class may learn this skill, but mages find it\nvery difficult\
    \ to master, due to their bookish lifestyle.\n"
- level: -1
  keyword: LORE
  text: |
    Lore is a general skill, consisting of knowledge of myths and legends. Use
    of the lore skill gives a chance of obtaining information on an object,
    concerning its power and uses.  It also may occasionaly increase the value
    of an object, because more will be known about its worth.  All classes may
    learn lore, although thives are best at it, and warriors find it very hard
    to use.
- level: -1
  keyword: HAGGLE HAGGLING
  text: "Haggling is an indispensable skill to the trader.  It allows a character\
    \ to\nmatch wits with a merchant, seeking to get a better price for merchandise,\n\
    or to buy at the lowest possible cost.  Unfortunately, most merchants are \nalready\
    \ very skilled at haggling, so the untrainined adventurer had best \nguard his\
    \ treasure closely.  Thieves are natural masters at haggling, \nalthough other\
    \ classes may learn it as well.\n"
- level: -1
  keyword: PEEK
  text: |
    The peek skill is useful for seeing what a player or monster is carrying,
    the better to use the steal command with.  More intelligent characters are
    harder to peek at.  All characters may learn peek, but thieves are the most
    common practicioners.
- level: -1
  keyword: PICK 'PICK LOCK'
  text: "Lock picking is one of the prime skills of thieves, allowing them to gain\n\
    access to many secured areas.  Lock picking chances are improved by  \nintelligence,\
    \ and hindered by the difficulty of the lock. Other classes may\nlearn to pick\
    \ locks, but they will never find it easy.\n"
- level: -1
  keyword: MEDITATION
  text: |
    This skill is similar to fast healing, but relies on the concentration and
    mantras to increase mana recovery when the character is sleeping or resting.
    Thieves and warriors, with their troubled minds and violent attitudes, have
    much trouble learning to meditate.
- level: -1
  keyword: STEAL
  text: "Theft is the defining skill of the thief, and is only available to that class.\n\
    It allows items to be stolen from the inventory of monsters and characters,\n\
    and even from shops!  But beware, shop keepers gaurd their merchandise \ncarefully,\
    \ and attempting to steal from a character earns you a THIEF flag\nif you are\
    \ caught (making you free game for killing).\n"
- level: -1
  keyword: '''DETECT GOOD'''
  text: "Syntax: cast 'detect good'\n \nThis spell enables the caster to detect good\
    \ characters, which will\nreveal a characteristic golden aura.\n"
- level: -1
  keyword: '''DISPEL GOOD'''
  text: "Syntax: cast 'dispel good' <victim>\n \nDispel good brings forth evil energies\
    \ that inflict horrific torment on \nthe pure of heart.  Good-aligned characters\
    \ use this dark magic at their\nperil.\n"
- level: -1
  keyword: '''HEAT METAL'''
  text: "Syntax: cast 'heat metal' <target>\n\nHeat metal is a powerful clerical attack\
    \ spell, with effects that vary \naccording to the armor of the victim.  It heats\
    \ up the metal equipment\n(assumed to be all weapons and armor at this point in\
    \ time) on the target,\ncausing him or her to drop them if possible, taking serious\
    \ burns in the\nprocess (possibly fatal if the equipment is too heavy to remove\
    \ easily).\nThis spell does no damage to creatures who are immune to fire.\n"
- level: -1
  keyword: '''HOLY WORD'''
  text: "Syntax: cast 'holy word'\n\nHoly word involves the invocation of the full\
    \ power of a cleric's god, with\ndisasterous effects upon the enemies of the priest\
    \ coupled with powerful\nblessings on the priest's allies.  All creatures of like\
    \ alignment in the\nroom are blessed and filled with righteous divine wrath, while\
    \ those of\nopposite morals (or both good and evil in the case of neutral priests)\n\
    are struck down by holy (or unholy might) and cursed.  The cleric suffers\ngreatly\
    \ from the strain of this spell, being left unable to move and \ndrained of vitality.\
    \  Experience loss is no longer associated with the spell.\n"
- level: -1
  keyword: FRENZY
  text: "Syntax: cast 'frenzy' <target>\n\nThe frenzy spell fills the target with\
    \ righteous fury, greatly increasing\nhis or her attack skill and damaging capacity.\
    \  Unfortunately, this divine\nwrath is coupled with a tendency to ignore threats\
    \ to personal safety, \nmaking the character easier to hit.  Frenzy provides immunity\
    \ to the calm\nspell (see 'help calm'), and may only be used on those of the caster's\
    \ \nalignment.\n"
- level: -1
  keyword: CALM
  text: "Syntax: cast 'calm' \n\nOne of the most useful and often overlooked abilities\
    \ of the master cleric is\nthe calm spell, which can put an end to all violence\
    \ in a room.  Calmed\ncreatures will not attack of their own volition, and are\
    \ at a disadvantage\nin combat as long as the spell soothes their minds.  The\
    \ more violence \nactivity there is in a room, the harder the spell, and it is\
    \ all or nothing --\neither all combat in the room is ended (with the exception\
    \ of those who\nare immune to magic) or none is.\n"
- level: -1
  keyword: HASTE
  text: |
    Syntax: cast 'haste' <target>

    The haste spell increases the speed and agility of the recipient, allowing
    an extra attack (or even a backstab) in combat, and improving evasive
    abilities in combat.  However, it produces a great strain on the system,
    such that recuperative abilities are halved.  Haste is capable of negating
    the slow spell. (see 'help slow').
- level: -1
  keyword: SLOW
  text: |
    Syntax: cast 'slow' <target>

    Despite popular mythology, slow is not the opposite of haste, but is a spell
    with it's own unique set of effects.  When cast on an unfortunate victim,
    it slows its movements, making it easier to hit and reducing its rate
    of attack.  The effect of slow also double movement costs and halve healing
    rates, due to reduced metabolism.
- level: -1
  keyword: PLAGUE
  text: |
    Syntax: cast 'plague' <target>

    The plague spell infests the target with a magical disease of great virulence,
    sapping its strength and causing horrific suffering, possibly leading to
    death.  It is a risky spell to use, as the contagion can spread like
    wildfire if the victim makes it to a populated area.
- level: -1
  keyword: '''CREATE ROSE'''
  text: |
    Syntax: cast 'create rose'

    A romantic spell that creates a fragrant red rose, with utterly no game
    use whatsoever.
- level: -1
  keyword: '''PROTECTION GOOD'' ''PROTECTION EVIL'''
  text: "Syntax: cast 'protection evil' <target>\n\tcast 'protection good' <target>\n\
    \nThe protection spells reduce damage taken from attackers of the appropriate\n\
    ethos, and improve saving throws against all forms of magic. They may not\nbe\
    \ cast on others, and one person cannot carry both defenses at the same\ntime.\n"
- level: 0
  keyword: '''GIANT STRENGTH'''
  text: "Syntax: cast 'giant strength' <character>\n \nThis spell increases the strength\
    \ of the target character.\n"
- level: -1
  keyword: '''CHAIN LIGHTNING'''
  text: "Syntax: cast 'chain lightning' <target>\n\nChain lightning is a deadly spell,\
    \ producing a powerful bolt of lightning\nthat arcs from target to target in the\
    \ room, until its force is fully\nexpended.  Allies of the caster may be hit by\
    \ this spell if they are members \nof a clan, while the caster himself will not\
    \ be struck unless no other\nviable target remains.  Chain lightning is most effective\
    \ when used on\ngroups of creatures.\n"
- level: -1
  keyword: MASS HEALING
  text: "Syntax: cast 'mass healing' \n\nThe mass healing spell, as its name might\
    \ suggest, performs a healing spell\non all players in the room.  It also throws\
    \ in a refresh spell for good\nmeasure.\n"
- level: -1
  keyword: FIREPROOF
  text: |
    Syntax: cast 'fireproof' <object>

    The fireproof spell creates a short-lived protective aura around an object,
    to protect it from the harmful effects of acid and flame.  Items protected
    by this spell are not harmed by acid, fire, or the heat metal spell.
    Although inexpensive to use, the spell's short duration makes it impractical
    for protecting large numbers of objects.
- level: -1
  keyword: '''RECHARGE'''
  text: |
    Syntax: cast 'recharge' <item>

    The recharge spell is used to restore energy to depleted wands and staves.
    Fully exhausted items cannot be recharged, and the difficulty of the spell
    is proportional to the number of charges used.  Magic items can only be
    recharged one time successfully.
- level: -1
  keyword: '''RAY OF TRUTH'''
  text: "Syntax: cast 'ray of truth' <target>\n\nRay of truth opens a portal to the\
    \ planes of positive energy, bringing forth\na beam of light of sufficient purity\
    \ to harm or or annihilate the servants\nof evil.  It cannot harm the pure of\
    \ heart, and will turn and strike \ncasters who are tainted by evil.\n"
- level: -1
  keyword: '''HEAT METAL'''
  text: "Syntax: cast 'heat metal' <target>\n\nHeat metal is a powerful clerical attack\
    \ spell, with effects that vary \naccording to the armor of the victim.  It heats\
    \ up the metal equipment\n(assumed to be all weapons and armor at this point in\
    \ time) on the target,\ncausing him or her to drop them if possible, taking serious\
    \ burns in the\nprocess (possibly fatal if the equipment is too heavy to remove\
    \ easily).\nThis spell does no damage to creatures who are immune to fire.\n"
- level: -1
  keyword: ENVENOM
  text: "The envenom skill is a cowardly skill practiced only by thieves, designed\
    \ to\nwin a battle through alchemy and treachery rather than skill or strength.\n\
    Or, put another way, it's a skill used by the smart to kill the foolish.\nFood,\
    \ drink, and weapons may be envenomed, with varying effects. Poisoned\nfood or\
    \ drink puts a mild poison spell on the consumer, and is unlikely to\nbe more\
    \ than a minor inconvience (after all, the typical adventurer could\ndrink sewer\
    \ water with only a trace of the runs).  A poisoned weapon, on\nthe other hand,\
    \ can inflict serious damage on an opponent as the poison \nburns through his\
    \ bloodstream.  But be careful, blade venom evaporates \nquickly and is rendered\
    \ almost powerless by repeated blows in combat.\n"
- level: -1
  keyword: '''PORTAL'''
  text: |
    Syntax: cast 'portal' <target>

    The portal spell is similar to gate, but creates a lasting one-way portal
    to the target creature, instead of transporting the caster.  Portals are
    entered using 'enter' or 'go' command, as in 'go portal'.  Portals cannot
    be made to certain destinations, nor used to escape from gate-proof rooms.
    Portal requires a special source of power to be used, unfortunately the
    secret of this material component has been lost...
- level: -1
  keyword: '''NEXUS'''
  text: "Syntax: cast 'nexus' <target>\n\nThis spell is virtually identical to portal\
    \ (see 'help portal'), with the\nonly difference being that while portal creates\
    \ a one-way gate, a nexus \nspell makes a two-sided gate.  It also lasts longer\
    \ than the lower-powered\nportal spell.  Both spells require an additional power\
    \ source, the secret\nof which has been lost...\n"
- level: -1
  keyword: '''RESURRECT'''
  text: |
    Syntax: cast 'resurrect'

    This spell allows you to resurrect the corpse of a dead mobile. The
    resurrected zombie then follows you as a pet.
- level: -1
  keyword: FEAR
  text: |
    Syntax: cast fear <victim>

    This spell, when cast successfully, makes the victim flee the battle.
