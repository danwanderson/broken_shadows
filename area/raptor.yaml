- vnum: 10451
  name: '`RA Small Clearing in the Dark Wood`w'
  description: "You seem to have stumbled upon a small forested spot in the middle
    of the\n\rDark Wood.  It is nice and calm, and some sunlight shines in between
    the\n\rtops of the surrounding trees.  You feel safe, as if nothing could attack\n\ryou
    here.  \n\r"
