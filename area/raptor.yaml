  name: '`RArmorer of Legends`w'
  description: "Here you stand, before Shakespeare.  You think, \"Shakespeare runs
    an\n\rarmory?\"  But you must realize that poetry has weaved itself into the fabric\n\rof
    reality in this land, with many strange effects on life here. \n\rShakespeare
    offers to show you a piece he just finished this morning.  \n\r"
