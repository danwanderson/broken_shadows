  name: '`RThe Mayor''s House`w'
  description: "You have entered the mansion of the Cheshire Mayor.  It is a beautiful\n\rbuilding,
    with columns in the front, outer walls made of imported red brick.\n\rInside it
    is warm and comfy, and there servants to bring you anything you\n\rwant at a gesture.
    \ There appears to be a kitchen off to the west, and to\n\rthe north is the Mayor's
    bedroom.  \n\r"
  room_flags: DS
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "This door leads to the Mayor's bedroom.  I'd stay out of there if I were
