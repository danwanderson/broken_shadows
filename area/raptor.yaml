  description: "This is a western part of Dodgson Drive.  To the north is a weapons
    shop,\n\rand to the south is an armor shop.  To the east is the town center.  Off
    in\n\rthe distance to the west is a residential area.  Go ahead, meet some of
    the\n\rlocals.  They'll probably read some of their poetry to you!  \n\r"
