- vnum: 10404
  name: '`RCheshire Town Hall`w'
  description: "This is the Cheshire Town Hall.  To the east is the Mayor's office,
    and\n\rexits to the north and west lead outside.  On the wall is the great seal
    of\n\rthe town of Cheshire.  The citizens are really proud of their town.  \n\rThere
    is a stairway here, leading down.\n\r"
