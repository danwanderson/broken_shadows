  name: '`RNear the Tumtum Tree`w'
  description: "You walk around the tree, and it suddenly gets very dark.  The tree-tops\n\rhere
    seem to be closer together, so that even in the middle of the day,\n\ralmost no
    light comes through.  You can still feel the tree, so you think\n\ryou can continue
    on around it.  Maybe there will be more light as you\n\rproceed, but you doubt
    it.  \n\r"
