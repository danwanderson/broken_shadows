- vnum: 10460
  name: '`RBefore the TumTum Tree`w'
  description: "You stand before the mighty Tumtum tree, and wonder how it got it's
    name.\n\rThere seems to be an odd moss growing on the tree off to the west.  You
    are\n\ralso curious as to why this \"horrible monster\" the villagers were so
    afraid\n\rof hasn't appeared yet.  You notice a sign, stuck into the ground here.
    \ \n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 1
