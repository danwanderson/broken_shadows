  name: '`RThe Cave Temple`w'
  description: "You wander about this temple curiously, because you've never seen
    a\n\rtemple built underground before.  But then you realize that this temple was\n\rbuilt
    for `RRaptor`w, and a cave would make a fitting temple for a dwarf. \n\rYou feel
