- level: 0
  keyword: DAMAGE
  text: |
    When one character attacks another, the severity of the damage is shown in the
    verb used in the damage message.  Here are all the damage verbs listed from
    least damage to most damage:

        miss        wound        MUTILATE     DEMOLISH      BUTCHER
        scratch     maul         PULVERIZE    DEVASTATE     DISEMBOWEL
        graze       decimate     DISMEMBER    OBLITERATE    EVISCERATE
        hit         devastate    MASSACRE     ANNIHILATE    DISINTEGRATE
        injure      maim         MANGLE       ERADICATE     LACERATE

        And, at the far reaches of damaging power, you can ravage, do unspeakable
    things (or maybe worse...).
- level: 0
  keyword: COLOR
  text: "Use the color command to switch between color ON and OFF.\n\n`YC`Bo`Rl`Co`Mr`w\
    \ is accessed with the ` character.\n\nJust type ` followed by one of the following:\n\
    \n\t`k k - Black  `K K - Light Black\n\t`y y - Yellow `Y Y - Light Yellow\n\t\
    `g g - Green  `G G - Light Green\n\t`b b - Blue   `B B - Light Blue\n\t`r r -\
    \ Red    `R R - Light Red\n\t`c c - Cyan   `C C - Light Cyan\n\t`m m - Magenta`M\
    \ M - Light Magenta\n\t`w w - Normal `W W - White `w\n"
- level: 0
  keyword: COLORS
  text: "Use the color command to toggle between colors ON and OFF.\n\n`YC`Bo`Rl`Co`Mr`w\
    \ is accessed with the ` character.\n\nJust type ` followed by one of the following:\n\
    \n\t k - Black   K - Light Black\n\t y - Yellow  Y - Light Yellow\n\t g - Green\
    \   G - Light Green\n\t b - Blue    B - Light Blue\n\t r - Red     R - Light Red\n\
    \t c - Cyan    C - Light Cyan\n\t m - Magenta M - Light Magenta\n\t w - Normal\
    \  W - White\n"
- level: 0
  keyword: DEATH
  text: "When your character dies, you are reincarnated back at the Altar of the Temple\n\
    of Midgaard.  Your corpse is left behind in the room where you were killed,\n\
    together with all of your equipment.  Your gold stays with you. \n\nAny spells\
    \ which were affecting you are canceled by death.\n\nFollowing and groups are\
    \ not affected by death.\n\nYou lose experience points for dying.  The amount\
    \ you lose is half-way back to\nthe beginning of your level.  Thus if you have\
    \ a bad day and die several times,\nthe penalties won't clobber you.\n\nCorpses\
    \ decay after time, and the objects inside corpses decay with them.\nPlayer corpses\
    \ last *roughly* 30 hours of game time (15 minutes of real time).\nOnly the player\
    \ who died, or someone in the same group, can retrieve objects\nfrom a player's\
    \ corpse.\n\n"
- level: 0
  keyword: EXPERIENCE LEVEL XP
  text: "Your character advances in power by gaining experience.  The amount of xp\n\
    needed to gain a level depends upon how many creation points you spend\nduring\
    \ character creation.  \n\nYou gain experience by:\n\n    being part of a group\
    \ that kills a monster\n\nYou lose experience by:\n\n    fleeing from combat\n\
    \    recalling out of combat\n    being the target of certain spells\n    dying\n\
    \nThere is a small amount of random variation in the amount of xp you recieve\
    \ \nfrom killing a certian mobile, although it is fairly consistant.\n\nYou may\
    \ type LEVEL or LEVELS at any time in the game to get a listing of\nhow much xp\
    \ you need to reach the next 4 levels in the game.\n"
- level: 0
  keyword: SCAN
  text: |
    Syntax: scan

    Typing scan lists all characters in any rooms adjacent within three steps
    in all directions from you.
- level: 0
  keyword: PET PETS
  text: "You can buy pets in the pet shop.  You may own only one pet at a time, after\
    \ \nthe old one dies you may purcahse a replacement.\n\nNew pets are planned for\
    \ a shop in New Thalos.\n"
- level: 0
  keyword: TICK
  text: |
    Many of the game actions are based upon interval timers, including combat,
    most autonomous monster actions, hp/mana/move regeneration, spell duration,
    weather, and area resetting.

    Of these timers, the hp/mana/move regeneration timer is popularly called the
    'tick'.  Ticks on this mud average 30 seconds of real time, but the actual
    amount varies randomly from 15 seconds to 45 seconds.

    Area resetting happens roughly every 3 minutes if no one is in the area; less
    often (15 minutes) if some one is.  Also note that objects lying on the ground
    will not be regenerated if anyone is in the area when it resets.
- level: 0
  keyword: '!'
  text: |
    Syntax: !

    ! repeats the last command you typed.
- level: 0
  keyword: NORTH SOUTH EAST WEST UP DOWN
  text: |
    Syntax: north
    Syntax: south
    Syntax: east
    Syntax: west
    Syntax: up
    Syntax: down

    Use these commands to walk in a particular direction.
- level: 0
  keyword: CAST
  text: |
    Syntax: cast <spell> <target>

    Before you can cast a spell, you have to practice it.  The more you practice,
    the higher chance you have of success when casting.  Casting spells costs mana.
    The mana cost decreases as your level increases.

    The <target> is optional.  Many spells which need targets will use an
    appropriate default target, especially during combat.

    If the spell name is more than one word, then you must quote the spell name.
    Example: cast 'cure critic' frag.  Quoting is optional for single-word spells.
    You can abbreviate the spell name.

    When you cast an offensive spell, the victim usually gets a saving throw.
    The effect of the spell is reduced or eliminated if the victim makes the
    saving throw successfully.

    See also the help sections for individual spells.
- level: 0
  keyword: EXITS
  text: |
    Syntax: exits

    Tells you the visible exits of the room you are in.  Not all exits are visible.
    You can use the 'bump' technique to find hidden exits.  (Try to walk in a
    certain direction and see what you bump into).
- level: 0
  keyword: DROP GET GIVE PUT TAKE
  text: |
    Syntax: drop <object>
    Syntax: drop <amount> coins
    Syntax: get  <object>
    Syntax: get  <object> <container>
    Syntax: give <object> <character>
    Syntax: give <amount> coins <character>
    Syntax: put  <object> <container>

    DROP drops an object, or some coins, on the ground.

    GET gets an object, either lying on the ground, or from a container, or even
    from a corpse.  TAKE is a synonym for get.

    GIVE gives an object, or some coins, to another character.

    PUT puts an object into a container.

    DROP, GET and PUT understand the object names 'ALL' for all objects and
    'ALL.object' for all objects with the same name.
- level: 0
  keyword: EQUIPMENT INVENTORY
  text: |
    Syntax: equipment
    Syntax: inventory

    EQUIPMENT lists your equipment (armor, weapons, and held items).
    INVENTORY lists your inventory.
- level: 0
  keyword: COMPARE
  text: "Syntax: compare <object-1> <object-2>\nSyntax: compare <object>\n \nCOMPARE\
    \ compares two objects in your inventory.  If both objects are weapons,\nit will\
    \ report the one with the better average damage.  If both objects are\narmor,\
    \ it will report the one with the better armor class.\n \nCOMPARE with one argument\
    \ compares an object in your inventory to the object\nyou are currently wearing\
    \ or wielding of the same type.\n \nCOMPARE doesn't consider any special modifiers\
    \ of the objects.\n"
- level: 0
  keyword: FLEE
  text: |
    Syntax: flee
    Syntax: rescue   <character>

    Once you start a fight, you can't just walk away from it.  If the fight
    is not going well, you can attempt to FLEE, or another character can
    RESCUE you.  (You can also RECALL, but this is less likely to work,
    and costs more experience points, then fleeing).

    If you lose your link during a fight, then your character will keep
    fighting, and will attempt to RECALL from time to time.  Your chances
    of making the recall are reduced, and you will lose much more experience.
- level: 0
  keyword: EXAMINE LOOK
  text: |
    Syntax: look
    Syntax: look    <object>
    Syntax: look    <character>
    Syntax: look    <direction>
    Syntax: look    <keyword>
    Syntax: look in <container>
    Syntax: look in <corpse>
    Syntax: examine <container>
    Syntax: examine <corpse>

    LOOK looks at something and sees what you can see.

    EXAMINE is short for 'LOOK container' followed by 'LOOK IN container'.
- level: 0
  keyword: ORDER
  text: |
    Syntax: order <character> command
    Syntax: order all command

    ORDER orders one or all of your charmed followers (including pets) to
    perform any command.  The command may have arguments.  You are responsible
    for the actions of your followers, and others who attack your followers
    will incur the same penalty as if they attacked you directly.

    Most charmed creatures lose their aggresive nature (while charmed).

    If your charmed creature engages in combat, that will break the charm.
- level: 0
  keyword: REST SLEEP STAND WAKE
  text: "Syntax: rest\nSyntax: sleep\nSyntax: stand\nSyntax: wake\n\nThese commands\
    \ change your position.  When you REST or SLEEP, you \nregenerate hit points,\
    \ mana points, and movement points faster.\nHowever, you are more vulnerable to\
    \ attack, and if you SLEEP,\nyou won't hear many things happen.\n\nUse STAND or\
    \ WAKE to come back to a standing position.  You can\nalso WAKE other sleeping\
    \ characters.\n"
- level: 0
  keyword: GTELL ; REPLY SAY TELL CTELL
  text: |
    Syntax: gtell <message>
    Syntax: say   <message>
    Syntax: tell  <character> <message>
    Syntax: ctell <message>

    All of these commands send messages to other players.  GTELL sends a message to
    all of the characters in your group, wherever they are, even if they are
    sleeping or stunned or dying.  ';' is a synonym for GTELL.

    SAY sends a message to all awake players in your room.  The single quote '''
    is a synonym for SAY.

    TELL sends a message to one awake player anywhere in the world.

    REPLY sends a message to the last player who sent you a TELL.  REPLY will work
    even if you can't see the player, and without revealing their identity.  This
    is handy for talking to invisible or switched immortal players.

    CTELL sends a message to everyone in your clan, if you belong to one.
- level: 0
  keyword: NOTE 'NOTE WRITE' 'NOTE READ' BOARD 'NOTE SYSTEM' BOARDS
  text: |
    Syntax:

    board [number|name]                     Shows or changes board.
    note                                    Reads next note.
    note read [number]                      Reads a certain note.
    note remove <number>                    Removes a note written by you.
    note list [number]                      Shows up to number notes.
    note write                              Posts a note.
    note catchup                            Marks all notes in this board read.

    These commands are used for the new note system. Instead of just one board,
    there are several, each with its special purpose.

    Changing between the boards is accomplished using the BOARD command. BOARD
    without any arguments gives you a list of all boards together with number of
    unread message. To change, type BOARD <number> or BOARD <name of the board>.

    To read next unread note, type NOTE. To read a note with a specified number,
    type NOTE READ <number>. Typing NOTE while in a board with no unread notes
    shifts you to the next board. Note that unlike the standard note system, a
    note has the same number in NOTE LIST and NOTE READ.

    Posting a message is as simple as writing NOTE WRITE. You will be moved
    into interactive mode, where all you see are prompts for the fields like
    To:, From: etc. You will be automatically put AFK while writing a note.

    To see the list of the notes in the current board, type NOTE LIST. Typing
    NOTE LIST <number> will list only <number> of the last notes in the area.

    You can remove your own note by using NOTE REMOVE <number>. Implementors may
    remove other people's notes. Implementors can also select how many days
    their note is kept before being purged. Purging happens automatically at
    bootup. Purged notes are not deleted, but saved into a file.

    To let only immortals see your note, address it to "imm". To let players of
    a specific level and above, address it to that level (no other recipients may
    appear in that case).
- level: 0
  keyword: GOSSIP . SHOUT YELL GRATS FLAME
  text: |
    Syntax: gossip  <message>
    Syntax: shout   <message>
    Syntax: yell    <message>
    Syntax: grats   <message>
    Syntax: flame   <message>

    SHOUT sends a message to all awake players in the world.  To curb excessive
    shouting, SHOUT imposes a three-second delay on the shouter.

    GOSSIP is a variant of SHOUT (without the delay).  '.' is a synonym
    for GOSSIP. (You do not have to be awake to hear these.)

    YELL sends a message to all awake players within your area.

    GRATS is used to congratulate others. It is very similar to GOSSIP.

    FLAME is also similar to GOSSIP, but is the only channel on which swearing
    is allowed. (NOTE: This does not mean you can say anything you want)

    Type a channel name by itself to turn it off.
- level: 0
  keyword: TANK
  text: "The tank is the enemy of your enemy (ie, who your enemy is attacking).\n\
    In most cases this is you, however if you are in a group and one member\nattacks\
    \ a mob, the mob will attack him back.  Then, if you assist that\ngroup member,\
    \ HE is still the tank, and HE still takes damage from the\nmobs attacks.  \n\n\
    Use the %l prompt code to display the tank's current condition when \ngrouped,\
    \ and you will know if he needs to be RESCUED.  When you are \nnot grouped, %l\
    \ will show your current status, or nothing if you are\nnot fighting.\n"
- level: 0
  keyword: PROMPT PROMPTS
  text: "PROMPT is used to configure your prompt (the information displayed while\n\
    the system is awaiting input from you).  You can include any text or color\ncodes\
    \ in your prompt, as well as the following codes which are replaced\nas indicated.\n\
    \n  %h - current hit points       %H - maximum hit points\n  %m - current mana\
    \             %M - maximum mana\n  %v - current move points      %V - maximum\
    \ move points\n  %t - MUD time (24hr)      \t%T - system time (24hr)\n  %d - current\
    \ (system) date \n  %s - your status (ie: \"nasty wounds and scratches\")\n  %e\
    \ - enemy status (as above)\n  %l - tank status (as above) - See help tank\n \
    \ %r - new line\n  %A - Act bits AFK,KILLER,THIEF,WIZI(immort only)\n  %x - current\
    \ xp               %X - xp left to level\n  %# - current room vnum(immort only)\n\
    \nAlso, you may replace the %h, %m, and %v codes with the following, which\nwill\
    \ show the current value in red if the value is under 33% of max, \nyellow if\
    \ under 66% of max, and white if over 66%.\n\n  %i - variable color current hit\
    \ points\n  %n - variable color current mana\n  %w - variable color current movement\n\
    \nThere are two default prompts accessible using prompt default and \nprompt combat.\
    \ \n"
- level: 0
  keyword: EMOTE ; POSE PMOTE SOCIAL
  text: |
    Syntax: emote <action>
    Syntax: pose

    EMOTE is used to express emotions or actions.  Besides EMOTE, there are
    several dozen built-in social commands, such as CACKLE, HUG, and THANK.

    PMOTE is similar to emote, but will substitute you and your for a target's
    name (i.e. pmote bonks Alander will be read as bonks you by Alander, and
    as bonks Alander by everyone else).

    POSE is a variant of EMOTE.
- level: 99
  keyword: PROTECT
  text: |
    Syntax: protect <character>

    Protect is used to protect a character from unwanted snooping.  Removing
    protected status from a character WILL be seen by that character.
- level: 92
  keyword: SMOTE
  text: |
    Syntax: smote <action>

    Smote works exactly like pmote, except you must place your name somewhere in
    the string, and it will show that string to everyone in the room.
- level: 0
  keyword: HOLD REMOVE WEAR WIELD
  text: |
    Syntax: hold   <object>
    Syntax: remove <object>
    Syntax: wear   <object>
    Syntax: wear   all
    Syntax: wield  <object>

    Three of these commands will take an object from your inventory and start using
    it as equipment.  HOLD is for light sources, wands, and staves.  WEAR is for
    armor.  WIELD is for weapons.

    WEAR ALL will attempt to HOLD, WEAR, or WIELD each suitable item in your
    inventory.

    You may not be able to HOLD, WEAR, or WIELD an item if its alignment does not
    match yours, if it is too heavy for you, or if you are not experienced enough
    to use it properly.

    REMOVE will take any object from your equipment and put it back into your
    inventory.
- level: 0
  keyword: CREDITS
  text: |
    Syntax: credits

    This command shows the list of the original Diku Mud implementors.
- level: 0
  keyword: AREAS COMMANDS REPORT SCORE TIME AFFECTS EFFECTS
  text: "AREAS shows you a list of areas in the game.\n\nCOMMANDS shows you all the\
    \ commands in the game.\n\nREPORT shows your current statistics to you and also\
    \ announces them to other\nplayers in the room.  \n\nSCORE shows much more detailed\
    \ statistics to you only.  Your attributes \n(strength, constitution, etc) are\
    \ shown with pluses or minuses due to \nspell effects or items beside them.  \n\
    \nTIME shows the game time, as well as the time the mud was last started,\nand\
    \ the current local time for the host computer.\n\nWEATHER shows the current game\
    \ weather.\n"
- level: 0
  keyword: WHO
  text: "Syntax: who\nSyntax: who <level-range>\nSyntax: who <class or race>\nSyntax:\
    \ who <class or race> <level-range>\n\nWHO shows the people currently in the game.\
    \  Some people may choose to\nremain unseen and won't appear on the WHO\n \nWHO\
    \ without any arguments shows all of the (visible) people currently playing.\n\
    \nWith arguments, WHO can show players of certain classes or levels.\nFor example:\n\
    \ \nwho 10          lists all players of level 10 or above\nwho 15 20       lists\
    \ all players between level 15 and 20\nwho cleric      lists all clerics playing\n\
    who immortal    lists all immortals playing\nwho cleric 1 5  lists all clerics\
    \ between levels 1 and 5\nwho elf cleric  lists all elven clerics\n\nClasses and\
    \ races may be abbreviated.\n"
- level: 0
  keyword: WHERE
  text: |
    Syntax: where
    Syntax: where <character>

    WHERE without an argument tells you the location of visible players in the same
    area as you are.

    WHERE with an argument tells you the location of one character with that name
    within your area, including monsters.
- level: 0
  keyword: HELP
  text: |
    Syntax: help
    Syntax: help <keyword>

    HELP without any arguments shows a one-page command summary.

    HELP <keyword> shows a page of help on that keyword.  The keywords include
    all the commands, spells, and skills listed in the game.
- level: 0
  keyword: DESCRIPTION DESC
  text: |
    Syntax: description <string>
    Syntax: description + <string>

    Sets your long description to the given string.  If the description string
    starts with a '+', the part after the '+' is appended to your current
    description, so that you can make multi-line descriptions.
- level: 0
  keyword: PASSWORD
  text: |
    Syntax: password <old-password> <new-password>

    PASSWORD changes your character's password.  The first argument must be
    your old password.  The second argument is your new password.

    The PASSWORD command is protected against being snooped or logged.
- level: 0
  keyword: TITLE
  text: |
    Syntax: title <string>

    Sets your title to a given string.

    The game supplies a title when your character is created and when you
    advance a level.  You can use TITLE to set your title to something else.
- level: 0
  keyword: WIMPY
  text: |
    Syntax: wimpy
    Syntax: wimpy <number>

    WIMPY sets your wimpy value.  When your character takes damage that reduces
    your hit points below your wimpy value, you will automatically attempt to flee.
    You will only flee if your character is not in a wait state -- i.e. has not
    been using combat commands like cast, trip and bash, and has not been
    tripped or bash by an enemy.

    WIMPY with no argument sets your wimpy value to 20% of your maximum hit points.

    Some monsters are wimpy.
- level: 0
  keyword: OPEN CLOSE LOCK UNLOCK PICK
  text: |
    Syntax: open   <object|direction>
    Syntax: close  <object|direction>
    Syntax: lock   <object|direction>
    Syntax: unlock <object|direction>
    Syntax: pick   <object|direction>

    OPEN and CLOSE open and close an object or a door.

    LOCK and UNLOCK lock and unlock a closed object or door.  You must have
    the requisite key to LOCK or UNLOCK.

    PICK can open a lock without having the key.  In order to PICK successfully,
    you must practice the appropriate skill.
- level: 0
  keyword: DRINK EAT FILL
  text: |
    Syntax: drink <object>
    Syntax: eat   <object>
    Syntax: fill  <object>

    When you are thirsty, DRINK something.

    When you are hungry, EAT something.

    FILL fills a drink container with water.
- level: 0
  keyword: BUY LIST SELL VALUE
  text: |
    Syntax: buy  [#] <object>
    Syntax: list
    Syntax: sell  <object>
    Syntax: value <object>

    BUY buys an object from a shop keeper.
    When multiple items of the same name are listed, type 'buy n.item', where n
    is the position of the item in a list of that name.  So if there are two
    swords, buy 2.sword will buy the second.  You may buy multiples of items
    by using an optional number value before the object name.

    LIST lists the objects the shop keeper will sell you.
    List <name> shows you only objects of that name.

    SELL sells an object to a shop keeper.

    VALUE asks the shop keeper how much he, she, or it will buy the item for.
- level: 0
  keyword: SACRIFICE JUNK
  text: |
    Syntax: sacrifice <object>
    Syntax: junk <object>

    SACRIFICE offers an object to the gods, who may reward you.
    The nature of the reward depends upon the type of object.

    JUNK is the same as SACRIFICE, except that it takes obects from your
    inventory.  Be careful with this, the gods will not hear complaints
    about mistakenly junked eq.
- level: 0
  keyword: SCROLL
  text: "Syntax: scroll\nSyntax: scroll <number>\n\nThis command changes the number\
    \ of lines the mud sends you in a page (the \ndefault is 24 lines).  Change this\
    \ to a higher number for larger screen\nsizes, or to 0 to disabling paging.\n"
- level: 0
  keyword: BRANDISH QUAFF RECITE ZAP
  text: |
    Syntax: brandish
    Syntax: quaff    <potion>
    Syntax: recite   <scroll> <target>
    Syntax: zap      <target>
    Syntax: zap

    BRANDISH brandishes a magical staff.  QUAFF quaffs a magical potion (as opposed
    to DRINK, which drinks mundane liquids).  RECITE recites a magical scroll; the
    <target> is optional, depending on the nature of the scroll.  ZAP zaps a
    magical wand at a target.  If the target is not specified, and you are fighting
    someone, then that character is used for a target.

    You must HOLD a wand or a staff before using BRANDISH or ZAP.

    All of these commands use up their objects.  Potions and scrolls have a single
    charge.  Wands and staves have multiple charges.  When a magical object has no
    more charges, it will be consumed.

    These commands may require an item skill to be succesful, see the help entries
    on the skills scrolls, staves, and wands for more information.
- level: 0
  keyword: CONSIDER
  text: |
    Syntax: consider <character>

    CONSIDER tells you what your chances are of killing a character.
    Of course, it's only a rough estimate.
- level: 0
  keyword: FOLLOW GROUP
  text: |+
    Syntax: follow <character>
    Syntax: group
    Syntax: group <character>

    FOLLOW starts you following another character.  To stop following anyone else,
    just FOLLOW <yourself>.

    GROUP <character> makes someone who is following you a member of your group.
    Group members share experience points from kills and may use the GTELL and
    SPLIT commands.  If anyone in your group is attacked, you will automatically
    join the fight.

    If the <character> is already a member of your group, then GROUP will
    kick out the <character> from your group.  Characters can also leave your
    group by using a FOLLOW command to stop following you.

    GROUP with no argument shows statistics for each character in your group.

- level: 0
  keyword: VISIBLE
  text: |
    VISIBLE cancels your hiding and sneaking, as well as any invisibility,
    making you visible again.
- level: 0
  keyword: QUIT RENT SAVE
  text: |
    Syntax: QUIT
    Syntax: RENT ... not!
    Syntax: SAVE

    SAVE saves your character and object.  The game saves your character every
    15 minutes regardless, and is the preferred method of saving.

    Some objects, such as keys and potions, may not be saved.

    QUIT leaves the game.  You may QUIT anywhere, although there is an experience
    penalty for quitting outside of Midgaard.  When you re-enter the game you will
    be back in the same room.

    QUIT automatically does a SAVE, so you can safely leave the game with just one
    command.  Nevertheless it's a good idea to SAVE before QUIT.  If you get into
    the habit of using QUIT without SAVE, and then you play some other mud that
    doesn't save before quitting, you're going to regret it.

    There is no RENT in this mud.  Just SAVE and QUIT whenever you want to leave.
- level: 0
  keyword: RECALL /
  text: "Syntax: RECALL\n\nRECALL prays to the gods for miraculous transportation\
    \ from where you are back to \nthe Temple of Midgaard.  '/' is a synonym for RECALL.\n\
    \nIf you RECALL during combat, you will lose experience (more than for fleeing),\n\
    and you will have a chance of failing (again, more than for fleeing).  This\n\
    chance is based on your recall skill, although a 100% recall does not \ninsure\
    \ success.\n\nRECALL costs half of your movement points.\n\nRECALL doesn't work\
    \ in certain god-forsaken rooms.  Characters afflicted by a\ncurse may not recall\
    \ at all.\n"
- level: 0
  keyword: SPLIT
  text: |
    Syntax: SPLIT <amount>

    SPLIT splits some gold between you and all the members of your
    group who are in the same room as you.  It's customary to SPLIT
    the gold after a kill.
- level: 0
  keyword: STEAL
  text: |
    Syntax: STEAL coins <character>
    Syntax: STEAL <object> <character>

    STEAL attempts to steal coins, or an object, from a character.

    There are penalties for using STEAL on other players.

    In order to STEAL successfully, you must practice the appropriate skill.
- level: 0
  keyword: PRACTICE
  text: |
    Syntax: PRACTICE
    Syntax: PRACTICE <skill|spell>

    PRACTICE without an argument tells you your current ability level in all
    the skills and spells available to you.  You can check this anywhere.

    PRACTICE with an argument practice that skill or spell.  Your learning
    percentage varies from 0% (unlearned) to a some maximum between 80% and 100%,
    depending on your class.  You must be at a guild master to practice.

    The higher your intelligence, the more you will learn at each practice
    session.  The higher your wisdom, the more practice sessions you will
    have each time you gain a level.  Unused sessions are saved until you
    do use them.
- level: 0
  keyword: SGROUPS
  text: |
    Syntax: sgroups

    SGROUPS shows the skill/spell groups that your character has taken.
- level: 0
  keyword: TRAIN
  text: |
    Syntax: train <str int wis dex con hp mana>

    TRAIN increases one of your attributes.  When you start the game, your
    character has standard attributes based on your class, and several
    initial training sessions.  You can increase your attributes by
    using these sessions at a trainer (there are several in town).

    It takes one training session to improve an attribute, or to increase
    mana or hp by 10.  You receive one session per level.

    The best attributes to train first are WIS and CON.  WIS gives you more
    practice when you gain a level.  CON gives you more hit points.
    In the long run, your character will be most powerful if you train
    WIS and CON both to 18 before practising or training anything else.
- level: 100
  keyword: ADVANCE
  text: |
    Syntax: advance <character> <level>

    ADVANCE sets a character's level to the specified value.  It is the
    only way to create new immortal characters within the game.  ADVANCE
    may also be used to demote characters.
- level: 100
  keyword: TRUST
  text: |
    Syntax: trust <character> <level>

    TRUST sets a character's trust to the specified level.  This is similar to
    advancing the character for accessing immortal commands, but has no effect
    on combat strength, et cetera.  You can give more trust to mortal (or
    immortal) characters to give them access to more power without messing up
    the character.  You can also restrict a player's trust to less than their
    natural level.

    A trust of 0 means to use the character's natural level again.
- level: 98
  keyword: ALLOW BAN PERMBAN
  text: |
    Syntax: allow   <site>
            ban     <site> <newbies|all|permit>
            ban

    BAN <site> prohibits players from that site from logging in.  BAN with
    no arguments lists the banned sites.  ALLOW <site> removes a site from
    the ban list, if the remover is of equal or higher level than the banner.

    A site may have all players, new players, or non-permitted players (set
    by editing the player file) banned, by changing the argument after the site.

    *s may be used to ban either by suffix (*.edu), prefix (labmac*), or
    content (*andrews*), but be careful not to accidently lock out too many
    sites with a wildcard.  Bans do not save unless the permban command is
    used.
- level: 99
  keyword: REBOOT SHUTDOWN HARDREBOOT
  text: "Syntax: reboot\n\tshutdown\n\nhardreboot shuts down the server.  When the\
    \ normal 'startup' script is\nused to control the server, a delay of fifteen seconds\
    \ will ensue (to\nallow old connections to die), followed by a reboot.\n\nShutdown\
    \ shuts down the server and prevents the normal 'startup' script\nfrom restarting\
    \ it.\n\nReboot performs a hardreboot without the players losing link.\n\nNever,\
    \ ever, shutdown the mud without consulting Rahl.\n"
- level: 96
  keyword: WIZLOCK NEWLOCK
  text: "Syntax: wizlock\n\tnewlock\n\nWizlock and newlock both block login attempts\
    \ to Rivers of Mud.  Wizlock locks\nout all non-gods (i.e. level less than 91),\
    \ except for link-dead players\nwho are returning.  Newlock only locks out new\
    \ character generation,\ntypically used for preventing a spammer from returning.\
    \  Wizlocking should\nbe avoided, and newlocking should be accompanied by mail\
    \ or a note to\nRahl.\n\nA god must be at least Supreme level to wizlock the game.\n"
- level: 99
  keyword: DENY
  text: |
    Syntax: deny <name>

    Deny locks a character out of a game permanently, rendering their character
    name unusable.  It may only be removed by editing the file, for this reason
    freeze is usually preferred.
- level: 97
  keyword: DISCONNECT
  text: |
    Syntax: disconnect <name>

    Disconnect breaks a player's link to the game, dumping them back to the telnet
    prompt.  This is a non-lethal way of getting rid of spammers and annoying
    players.
- level: 92
  keyword: FREEZE
  text: "Syntax: freeze <name>\n\nFREEZE <character> is a toggle which prevents a\
    \ character from issuing any\ncommands at all. It can be removed from within the\
    \ game, so freezing a \ntroublemaker is usually a better option than they deny\
    \ command.\n"
- level: 93
  keyword: FORCE
  text: "Syntax: force <character> <command>\nSyntax: force all <command>\n\nFORCE\
    \ forces one character to execute a command, except of course delete\n(unless\
    \ you are an Implementor).\n\nBelow level 97 (Deity) force can only be used on\
    \ mobiles, and force all is\nunavailable.  You also cannot 'force orc murder hugo',\
    \ for example. \n\nFORCE 'all' forces all player characters to execute a command.\n\
    This is typically used for 'force all save'.\n"
- level: 96
  keyword: SOCKETS
  text: "Syntax: sockets\n\tsockets <name> \n\nSOCKETS reports all of the visible\
    \ users connected to the server, including \nusers in the process of logging in.\
    \  The two numbers inside brackets are the \nchannel number and the 'connected'\
    \ state.  The 'connected' states are listed in \nmerc.h: 0 is CON_PLAYING; non-zero\
    \ values are various states of logging in.\n\nThe optional name argument shows\
    \ the site of a player, or optional can be used\nto identify switched gods (i.e.\
    \ socket orc shows the name of anyone switched\ninto an orc).\n"
- level: 92
  keyword: LOAD
  text: "Syntax: load mob <vnum>\n\tload obj <vnum> <level>\n\nThe load command is\
    \ used to load new objects or mobiles (use clone to \nduplicate strung items and\
    \ mobs).  The vnums can be found with the vnum\ncommand, or by stat'ing an existing\
    \ mob or object.\n\nLoad puts objects in inventory if they can be carried, otherwise\
    \ they are\nput in the room.  Mobiles are always put into the same room as the\
    \ god. Old\nformat objects must be given a level argument to determine their power,\
    \ new\nformat objects have a preset level that cannot be changed without set.\n\
    (see also clone, vnum, stat)\n"
- level: 98
  keyword: SET
  text: "Syntax: set mob   <mobile> <field> <value>\n\tset obj   <object> <field>\
    \ <value>\n\tset room  <number> <field> <value>\n\tset skill <char>   <name> \
    \ <rating>\n\tset skill <char>   all     <rating>\n\tset char  <name>   <field>\
    \ <value>\n\nThe set command is used to change the numerical values of the various\
    \ data\nstructures. Type set <class> without an argument to see a listing of options.\n\
    Set skill all (pc's only) will set all the character's skills to the value\ngiven.\
    \  Use string to change the strings on an object or mobile.\n(see also string,\
    \ stat)\n"
- level: 95
  keyword: STRING
  text: "Syntax: string obj  <field> <string>\n\tstring mob  <field> <string>\n\t\
    string char <name>  <field>  <string>\n\nThe string command changes the various\
    \ strings associated with an object or\nmobile.  A full list of fields can be\
    \ viewed by typing string obj, string\nmob, or string char.  Sorry, multi-line\
    \ strings are not yet supported.\n"
- level: 93
  keyword: WIZSLAP
  text: |
    Syntax: wizslap <character>

    Wizslap is a command for when you're annoyed at someone, but not quite to
    the point of nochanneling/deleting. It sends the target character to a
    random room on the MUD and gives them a 5 tick curse and weaken. It
    doesn't last long, but it's around -20 to str, con, hitroll and damroll.
- level: 99
  keyword: BONUS
  text: "Syntax: bonus <character> <type> <amount>\n\nType \"bonus\" without an argument\
    \ to show the currently available types \nand the current syntax.\n\nBonus gives\
    \ the target character the specified amount of experience, \ntrains, questpoints,\
    \ etc. This is used for reimbursements, quest prizes, etc.\n\nIt can, with a negative\
    \ value entered, also be used as a penalty.\n"
- level: 93
  keyword: NOCHANNEL NOEMOTE NOSHOUT NOTELL
  text: "Syntax: nochannel <character>\n\tnoemote   <character>\n\tnoshout   <character>\n\
    \tnotell    <character>\n\nNoemote, noshout, and notell are used to muffle other\
    \ characters, by\npreventing them from emoting, shouting, and telling, respectively.\n\
    Characters who are noshout'ed or no'telled will also not receive those\nforms\
    \ of communication.\n\nThe nochannel command is similar, but more drastic. It\
    \ prevents the victim\nfrom using any of the channels (gossip, auction, Q/A, music)\
    \ on the game.\nNochannels usually result from swearing or spamming on public\
    \ channels.\n"
- level: 100
  keyword: PARDON
  text: "Syntax: pardon <character> killer\n\tpardon <character> thief\n\nPardon pardons\
    \ a player for their crimes.  Don't pardon a player unless you\nare sure they\
    \ deserve it.  Being killed by Hassan acts as an automatic\npardon.  This command\
    \ can also be used to remove freeze, log, and killer \nflags. "
- level: 92
  keyword: PURGE
  text: "Syntax: purge\n\tpurge <character>\n\tpurge <object>\n\nPurge is used to\
    \ clean up the world.  Purge with no arguments removes all the\nNPC's and objects\
    \ in the current room.  Purge with an argument purges one\ncharacter from anywhere\
    \ in the world.\n\nPurge will not get rid of PC's, or objects or mobiles with\
    \ a NOPURGE flag\nset (i.e. the pit, the fountain, shopkeepers, Hassan).  Mobiles\
    \ and \nobjects may be purged if they are called directly by name.\n"
- level: 96
  keyword: RESTORE
  text: "Syntax: restore <character>\n\trestore room\n\trestore all\n\nRestore restores\
    \ full hit points, mana points, and movement points to the\ntarget character.\
    \  It also heals poison, plague, and blindness.\n\nRestore room (or restore with\
    \ no argument) performs a restore on every player\nin the room, restore all does\
    \ the same for all connected players. Restore all\nis only usable by creators\
    \ and implementors.  Restore should be used sparingly\nor not at all.\n"
- level: 97
  keyword: SLAY SMITE
  text: "Syntax: slay <character> [message]\n\tsmite <character>\n\nSlay kills a character\
    \ in cold blood, no saving throw.  Best not to use this\ncommand on players if\
    \ you enjoy being a god.\n"
- level: 95
  keyword: TRANSFER TELEPORT
  text: "Syntax: transfer <character>\n\ttransfer all\n\ttransfer <character> <location>\n\
    \ttransfer all         <location>\n\nTransfer transfers the target character,\
    \ or ALL player characters,\nto your current location (default) or to a specified\
    \ location. Trans all \nshould almost never be used, as 100 players popping into\
    \ one room can have\nhorrible effects on slow links. Teleport is a synonym for\
    \ transfer.\nYou cannot transfer someone of a higher level. \n"
- level: 94
  keyword: AT
  text: |
    Syntax: at <location> <command>

    At executes the given command (which may have arguments) at the given
    location.  The location may be specified as a vnum, as the name of
    a mobile, or as the name of an object.

    At works by temporarily moving you to that location, executing the
    command, and then moving you back (if the command didn't change your
    location).
- level: 92
  keyword: ECHO GECHO PECHO
  text: "Syntax: echo  <message>\n\tgecho <message>\n\tpecho <character> <message>\n\
    \nThese commands all perform similar functions.  Echo sends the message to\nall\
    \ characters in the same room as the user, with no indication of who sent\nit.\
    \  Gecho does the same for all players connected to the game, and pecho\nsends\
    \ the message to the player specified as the target.  Any higher-level\ngod will\
    \ see a prompt in front of your message, informing him or her that it\nis an echo.\n"
- level: 92
  keyword: GOTO
  text: |
    Syntax: goto <location>

    Goto takes you to a location.  The location may be specified as a vnum,
    as the name of a mobile, or as the name of an object.

    You may not Goto a room if it is PRIVATE and has two (or more) characters
    already present, or if it is SOLITARY and has one (or more) characters
    already present. Some other rooms are barred to players below a certain
    god level.

    Implementors can use the violate command to get into private rooms.
- level: 92
  keyword: HOLYLIGHT WIZINVIS
  text: "Syntax: holylight\n\twizinvis <level>\n\nHolylight is a toggle that allows\
    \ you to see (almost) every character and\nmobile in the game.  With holy light,\
    \ you can see what's in the game more\neasily.  Without holy light, you can see\
    \ what mortal players see.\n\nWizinvis takes a level argument, and will mke you\
    \ invisible to all players of\na lower level than your invisibility level.  It\
    \ defaults to the maximum\n(your level) if no argument is given.  Wizi 100 characters\
    \ are totally \ninvisible.\n"
- level: 92
  keyword: MEMORY
  text: |
    Syntax: memory

    Memory reports the size of your mud.

    The 'Mobs' and 'Objs' lines report the number of types of mobiles and objects,
    not the number of instances currently in the game.

    The 'Strings' line shows memory used by area-file strings.  These strings have
    a maximum limit, which is also shown.

    The 'Perms' line shows permanently allocated memory blocks.  There is no limit
    on the number and size of these blocks.
- level: 92
  keyword: VNUM
  text: "Syntax: vnum <name>\n\tvnum <obj or mob> <name>\n\tvnum skill <name>\n\n\
    Vnum finds all objects and mobiles with a particular name, and prints out\nthe\
    \ results.  Use vnum obj or vnum mob to limit the search.  This vnum is\nvery\
    \ useful for loading. Vnum skill returns the skill number (for set) and\nthe slot\
    \ number (for making new zones) of a skill name.\n(see also load)\n"
- level: 92
  keyword: STAT
  text: "Syntax: stat <name>\n\tstat mob  <name>\n\tstat obj  <name>\n\tstat room\
    \ <number>\n\nThe stat command gives you detailed information on an object, mobile,\
    \ or room\nwithin the game.  Without a class argument, the command will return\
    \ a object\n(if found), a mobile (if no object exists, but a mobile does), or\
    \ a room \n(if a number is  given).  Stat room with no argument stats the room\
    \ you are\nstanding in.  Stat can be used to find room vnums for goto.\n(see also\
    \ goto, transfer)\n"
- level: 92
  keyword: MWHERE
  text: |
    Syntax: mwhere <name>

    Mwhere shows you the locations of all mobiles with a particular name.
- level: 95
  keyword: PEACE
  text: |
    Syntax: peace

    Peace causes all characters in a room to stop fighting. It also strips the
    AGGRESSIVE bit from mobiles.
- level: 92
  keyword: POOFIN POOFOUT
  text: |
    Syntax: poofin  <message>
    Syntax: pooffout <message>

    The standard messages for goto are 'arrives in a swirling mist' and
    'leaves in a swirling mist'.  You can replace these messages with messages of
    your own choosing using the poofin and poofout commands.  These messages
    must include your name somewhere in the string.

    Poofin and poofout only show to characters who can see you.
    (see also goto)
- level: 95
  keyword: LOG SNOOP
  text: "Syntax: log   <character>\n\tlog   all\n\tsnoop <character>\n\nLog <character>\
    \ causes all of a character's commands to be logged into\nthe server's log file.\
    \  Like Freeze, it is a permanent character toggle.\nLogs may only be used by\
    \ creators and implementors, and should be accompanied\nby mail to Rahl.\n\nCertain\
    \ commands (Password) are protected against log.  Conversely, certain\ncommands\
    \ (especially immortal commands) are always logged.\n\nLog all logs all character\
    \ commands.  It is a server-wide toggle; it does not\npersist across reboots.\
    \ Please do not use this unless you tell Rahl.\n\nSnoop shows you a copy of all\
    \ the input and output going to a character.\nThe character must have an open\
    \ channel.  You may snoop more than one\ncharacter at a time. Try to respect privacy.\n\
    \nSnoop yourself to cancel all outstanding snoops.\n"
- level: 94
  keyword: SWITCH RETURN
  text: "Syntax: switch <character>\n\treturn\n\nSwitch switches you into the body\
    \ of another character (who must not\nalready have a descriptor, e.g. you can't\
    \ switch into a PC). You also cannot\nswitch into link-dead PCs.\n\nReturn returns\
    \ you to your original body.\n"
- level: 91
  keyword: HERO >
  text: "Syntax: hero <message>\n\thero\n\nHero sends a message to all heros and immortals.\
    \ > is a synonym for hero.\nUsing this command with no argument turns off the\
    \ hero channel (or turns\nit back on).\n"
- level: 92
  keyword: IMMTALK ,
  text: "Syntax: immtalk <message>\n\timmtalk\n\nImmtalk sends a message to all immortals.\
    \  , is a synonym for immtalk.\nUsing this command with no argument turns off\
    \ the immortal channel (or\nturns it back on).\n"
- level: 91
  keyword: WIZHELP
  text: |
    Syntax: wizhelp

    Wizhelp provides a list of all the immortal commands.
- level: 94
  keyword: STATUS
  text: |
    Syntax: status

    Status shows the current game status.
    It gives information such as whether the game is newlocked, wizlocked,
    etc.
- level: 0
  keyword: ARMOR
  text: |
    Syntax: cast armor <character>

    This spell decreases (improves) the armor class of the target character
    by 20 points.
- level: 0
  keyword: BLESS
  text: |
    Syntax: cast bless <character>

    This spell improves the to-hit roll and saving throw versus spell of the
    target character by +1 each.
- level: 0
  keyword: BLINDNESS
  text: |
    Syntax: cast blindness <victim>

    This spell renders the target character blind.
- level: 0
  keyword: PUSH
  text: "Syntax: push <victim> <direction>\n\nThis skill will let you push your victim\
    \ into another room.\n\nThe direction must be either the first letter of the direction\
    \ or the \nentire word, ie. \"n\" or \"north\" for north, etc.\n"
- level: 0
  keyword: "'ACID BLAST' 'BURNING HANDS' 'COLOUR SPRAY' FIREBALL 'LIGHTNING BOLT'\n\
    \  'MAGIC MISSILE' 'SHOCKING GRASP' 'MULTI MISSILE' 'FLAME SWORD' 'ICE RAY'\n\
    \  'METEOR SWARM' 'DISINTEGRATE' 'FIREWIND' 'ICE STORM' 'FLASH FIRE'\n  'INFERNO'\
    \ 'THUNDERBOLT' 'INSANT DEATH'"
  text: |
    Syntax: cast 'acid blast'     <victim>
    Syntax: cast 'burning hands'  <victim>
    Syntax: cast 'colour spray'   <victim>
    Syntax: cast 'fireball'       <victim>
    Syntax: cast 'lightning bolt' <victim>
    Syntax: cast 'magic missile'  <victim>
    Syntax: cast 'shocking grasp' <victim>
    Syntax: cast 'multi missile'  <victim>
    Syntax: cast 'flame sword'    <victim>
    Syntax: cast 'ice ray'        <victim>
    Syntax: cast 'meteor swarm'   <victim>
    Syntax: cast 'disintegrate'   <victim>
    Syntax: cast 'firewind'       <victim>
    Syntax: cast 'ice storm'      <victim>
    Syntax: cast 'flash fire'     <victim>
    Syntax: cast 'inferno'        <victim>
    Syntax: cast 'thunderbolt'    <victim>
    Syntax: cast 'instant death'  <victim>

    These spells inflict damage on the victim.  The higher-level spells do
    more damage.
- level: 0
  keyword: '''CALL LIGHTNING'''
  text: |
    Syntax: cast 'call lightning'

    This spell works only out of doors, and only when the weather is bad.
    It calls down lightning bolts from the gods.
- level: 0
  keyword: '''CAUSE LIGHT'' ''CAUSE SERIOUS'' ''CAUSE CRITICAL'' HARM ''GREATER HARM''

    HELLFIRE'
  text: "Syntax: cast 'cause light'    <victim>\nSyntax: cast 'cause serious'  <victim>\n\
    Syntax: cast 'cause critical' <victim>\nSyntax: cast harm             <victim>\n\
    Syntax: cast 'greater harm'   <victim>\nSyntax: cast hellfire \t      <victim>\n\
    \nThese spells inflict damage on the victim.  The higher-level spells do\nmore\
    \ damage.\n"
- level: 53
  keyword: '''CHANGE SEX'''
  text: |
    Syntax: cast 'change sex' <victim>

    This spell changes the sex of the victim (temporarily).
- level: 0
  keyword: '''CHARM PERSON'''
  text: |
    Syntax: cast 'charm person' <victim>

    This spell, if successful, causes the victim to follow you and to take orders
    from you.  Use ORDER to order your charmed followers.

    You are responsible for the actions of your followers.  Conversely, other
    people who attack your followers will be penalized as if they attacked you.
- level: 0
  keyword: '''CHILL TOUCH'''
  text: |
    Syntax: cast 'chill touch' <victim>

    This spell inflicts damage on the victim and also reduces the victim's
    strength by one.
- level: 0
  keyword: '''CONTINUAL LIGHT'''
  text: |
    Syntax: cast 'continual light'

    This spell creates a ball of light, which you can hold as a light source.
    The ball of light will last indefinitely.
- level: 0
  keyword: '''CONTROL WEATHER'''
  text: |
    Syntax: cast 'control weather' better
    Syntax: cast 'control weather' worse

    This spell makes the weather either better or worse.
- level: 0
  keyword: '''CREATE FOOD'''
  text: |
    Syntax: cast 'create food'

    This spell creates a Magic Mushroom, which you or anyone else can eat.
- level: 0
  keyword: '''CREATE SPRING'''
  text: |
    Syntax: cast 'create spring'

    This spell brings forth a magical spring from the ground, which has the
    same properties as a fountain.
- level: 0
  keyword: '''CREATE WATER'''
  text: |
    Syntax: cast 'create water' <drink-container>

    This spell replenishes a drink container with water.
- level: 0
  keyword: '''CURE BLINDNESS'''
  text: |
    Syntax: cast 'cure blindness' <character>

    This spell cures blindness in one so unfortunate.
- level: 0
  keyword: '''CURE POISON'''
  text: |
    Syntax: cast 'cure poison' <character>

    This spell cures poison in one so unfortunate.
- level: 0
  keyword: '''CURE LIGHT'' ''CURE SERIOUS'' ''CURE CRITICAL'' HEAL RESTORATION ''GREATER

    HEAL'''
  text: |
    Syntax: cast 'cure light'    <character>
    Syntax: cast 'cure serious'  <character>
    Syntax: cast 'cure critical' <character>
    Syntax: cast 'heal'          <character>
    Syntax: cast 'restoration'   <character>
    Syntax: cast 'greater heal'  <character>

    These spells cure damage on the target character.  The higher-level spells
    heal more damage.

    (see 'help healer' for details on the heal command)
- level: 0
  keyword: CURSE
  text: |
    Syntax: cast 'curse' <character>

    This spell reduces the character's to-hit roll and save versus spells.
    It also renders the character unclean in the eyes of the gods and
    unable to RECALL.
- level: 0
  keyword: '''DETECT EVIL'''
  text: |
    Syntax: cast 'detect evil'

    This spell enables the caster to detect evil characters, which will
    reveal a characteristic red aura.
- level: 0
  keyword: '''DETECT HIDDEN'''
  text: |
    Syntax: cast 'detect hidden'

    This spell enables the caster to detect hidden creatures.
- level: 0
  keyword: '''DETECT INVIS'''
  text: |
    Syntax: cast 'detect invis'

    This spell enables the caster to detect invisible objects and characters.
- level: 0
  keyword: '''DETECT MAGIC'''
  text: |
    Syntax: cast 'detect magic'

    This spell enables the caster to detect magical objects.
- level: 0
  keyword: '''DETECT POISON'''
  text: |
    Syntax: cast 'detect poison' <object>

    This spell detects the presence of poison in food or drink.
- level: 0
  keyword: '''DISPEL EVIL'''
  text: |
    Syntax: cast 'dispel evil' <victim>

    This spell invokes the wrath of the gods on an evil victim.
- level: 0
  keyword: '''DISPEL MAGIC'' CANCELLATION'
  text: "Syntax: cast 'dispel magic' <character>\n\tcast 'cancellation' <characte>\n\
    \ \nBoth of these spells remove magical effects from the target.  Dispel magic\n\
    has a reduced chance of working, and is considering an attack spell.\nCancellation\
    \ can only be used on allies, but is much more effective and does\nnot provoke\
    \ attack.  Unfortunately, the spells do not discriminate between\nharmful and\
    \ benign spells.\n \nThe chance of dispelling is based on the level of the spell.\
    \ Permanent spells\n(such as mobile sanctuary) are much harder to remove.  Not\
    \ all spells may\nbe dispelled, notable examples are poison and plague.\n"
- level: 0
  keyword: EARTHQUAKE
  text: |
    Syntax: cast 'earthquake'

    This spell inflicts damage on every enemy character in the room.
    Beware that other characters who are not yet fighting may attack
    you as a result!
- level: 0
  keyword: '''ENCHANT WEAPON'''
  text: |
    Syntax: cast 'enchant weapon' <weapon>

    This spell magically enchants a weapon, increasing its to-hit and to-dam
    bonuses by one or two points.  Multiple enchants may be cast, but as the
    weapon grows more and more powerful, it is more likely to be drained or
    destroyed by the magic.  Also, every successful enchant increases the level
    of the weapon my one...and there is no turning back.
- level: -1
  keyword: '''ENCHANT ARMOR'''
  text: |
    The enchant armor spell imbues armor with powerful protective magics. It is
    not nearly as reliable as enchant weapon, being far more prone to destructive
    effects.  Each succesful enchant increases the plus of the armor by 1 or 2
    points, and raises its level by one.
- level: 0
  keyword: '''ENERGY DRAIN'''
  text: |
    Syntax: cast 'energy drain' <victim>

    This spell saps the experience points, mana, and movement points of its
    target.
- level: 0
  keyword: '''FAERIE FIRE'''
  text: |
    Syntax: cast 'faerie fire' <victim>

    This spell increases (makes worse) the armor class of its victim.  For each
    level of the caster, the victim's armor class is increased by two points.
- level: 0
  keyword: '''FAERIE FOG'''
  text: |
    Syntax: cast 'faerie fog'

    This spell reveals all manner of invisible, hidden, and sneaking creatures in
    the same room as you.
- level: 0
  keyword: FLAMESTRIKE
  text: |
    Syntax: cast 'flamestrike' <victim>

    This spell inflicts damage on the victim.
- level: 0
  keyword: FLY
  text: |
    Syntax: cast 'fly' <character>

    This spell enables the target character to fly.
- level: 0
  keyword: '''GIANT STRENGTH'''
  text: |
    Syntax: cast 'giant strength' <character>

    This spell increases the strength of the target character.
- level: 0
  keyword: IDENTIFY
  text: |
    Syntax: cast identify <object>

    This spell reveals information about the object.
- level: 0
  keyword: INFRAVISION
  text: |
    Syntax: cast infravision <character>

    This spell enables the target character to see in the dark.
- level: 0
  keyword: INVIS 'MASS INVIS'
  text: |
    Syntax: cast invis <character>
    Syntax: cast 'mass invis'

    The INVIS spell makes the target character invisible.  Invisible characters
    will become visible when they attack.

    The MASS INVIS spell makes all characters in the caster's group invisible,
    including the caster.
- level: 0
  keyword: '''KNOW ALIGNMENT'''
  text: |
    Syntax: cast 'know alignment' <character>

    This spell reveals the alignment of the target character.
- level: 0
  keyword: '''LOCATE OBJECT'''
  text: |
    Syntax: cast 'locate object' <name>

    This spell reveals the location of all objects with the given name.
- level: 0
  keyword: '''PASS DOOR'''
  text: |
    Syntax: cast 'pass door'

    This spell enables the caster to pass through closed doors.
- level: 0
  keyword: POISON
  text: |
    Syntax: cast poison <victim>

    This spell reduces the strength of the victim by two, as well as reducing the
    victim's regeneration rate.
- level: 0
  keyword: PROTECTION SANCTUARY
  text: |
    Syntax: cast protection
    Syntax: cast sanctuary  <character>

    The PROTECTION spell reduces the damage taken from any attack by an evil
    creature by one quarter.

    The SANCTUARY spell reduces the damage taken by the character from any attack
    by one half.

    These spells may be used simultaneously for cumulative effect.
- level: 0
  keyword: REFRESH
  text: |
    Syntax: cast refresh <character>

    This spell refreshes the movement points of a character who is out of movement
    points.
- level: 0
  keyword: '''REMOVE CURSE'''
  text: |
    Syntax: cast 'remove curse' <character>

    This spell removes a curse from a character.
- level: 0
  keyword: SHIELD 'STONE SKIN'
  text: |
    Syntax: cast shield
    Syntax: cast 'stone skin'

    These spells protect the caster by decreasing (improving) the caster's armor
    class.  SHIELD provides 20 points of armor.  STONE SKIN provides 40 points of
    armor.
- level: 0
  keyword: SLEEP
  text: |
    Syntax: cast sleep <victim>

    This spell puts its victim to sleep.
- level: 0
  keyword: SUMMON
  text: |
    Syntax: cast summon <character>

    This spell summons a character from anywhere else in the world into your room.
    Characters who are fighting may not be summoned.
- level: 0
  keyword: PK
  text: |+
    Syntax: Just type pk twice to activate.

    Typing pk twice activates your "player killer" flag.  This is NOT
    REVERSABLE!  No matter how much you beg or plead, no god is allowed
    to remove this flag (although the Imps MIGHT be convinced. ;)

    When you are tagged "player killer", you may only attack other players
    who are tagged as such, and you may only be attacked by other players who
    are tagged as such.

- level: 0
  keyword: TELEPORT
  text: |
    Syntax: cast <teleport>

    This spell takes you from your current location to a random location somewhere
    in the world.
- level: 0
  keyword: VENTRILOQUATE
  text: |
    Syntax: cast ventriloquate <speaker> <message>

    This spell throws your voice, making it appear that some other object or
    character in the room is saying your message.  Victims who make their saving
    throw will know that someone is using ventriloquism, but not who.  Victims who
    fail their saving throw will think that the object or character really did say
    your message.
- level: 0
  keyword: WEAKEN
  text: |
    Syntax: cast weaken <victim>

    This spell reduces the strength of the victim by two points.
- level: 0
  keyword: '''WORD OF RECALL'''
  text: |
    Syntax: cast 'word of recall'

    This spell duplicates the built-in RECALL ability.  It is provided solely for
    Merc-based muds which wish to eliminate the built-in ability while still
    providing the spell.
- level: 0
  keyword: '''ACID BREATH'' ''FIRE BREATH'' ''FROST BREATH'' ''GAS BREATH'' ''LIGHTNING
    BREATH'''
  text: |
    Syntax: cast 'acid breath'      <victim>
    Syntax: cast 'fire breath'      <victim>
    Syntax: cast 'frost breath'     <victim>
    Syntax: cast 'gas breath'
    Syntax: cast 'lightning breath' <victim>

    These spells are for the use of dragons.  Acid, fire, frost, and lightning
    damage one victim, whereas gas damages every PC in the room.  Fire and
    frost can break objects, and acid can damage armor.

    High level mages may learn and cast these spells as well.
- level: 0
  keyword: WEB
  text: |
    Syntax: cast 'web' <target>

    This spell creates sticky webs surrounding the target.  The webs restrict
    movement from the room.  There is a chance of breaking the webs depending
    on the level of the caster and the strength of the target.
- level: 0
  keyword: REGENERATION
  text: |
    Syntax: cast 'regeneration' <target>

    This spell imbues the targets body with regenative powers above their own.
    The target will regain hit and mana points twice per tick.  This has no
    affect on trolls.
- level: 0
  keyword: VISION
  text: |
    Syntax: cast 'vision' <target>

    This spell causes the caster to go into a trance and have a vision.  The
    vision is as if they caster was looking in the room of the target.  Several
    factors can cause the vision to fail.
- level: 0
  keyword: BUTCHER
  text: |
    Syntax: butcher corpse

    This skill allows you to butcher a corpse into 1-4 steaks, providing you
    with food for no cost.
- level: 0
  keyword: BREW BREWING
  text: "Syntax: brew 'spell name'\n\nThis skill can be learned by all classes, but\
    \ some are more adept at this \nskill than others.  First you must be holding\
    \ an adequate vial for \nbrewing the potion.  There are several criteria before\
    \ you can sucessfully \nbrew a potion.\n1. Must be holding vial\n2. Must know\
    \ the spell to be brewed\n3. Spell must be a defensive spell or target self only\
    \ spell\n4. Must have adequate mana(4 times the normal mana for the spell)\n5.\
    \ Pass the skill, intelligence and wisdom checks\n\nThe max number of spells able\
    \ to be brewed into one potion is 3, but\nthey get increasingly more difficult\
    \ to correctly brew.\n\nBeware a failed potion may explode in your face!\n"
- level: 0
  keyword: SCRIBE
  text: "Syntax: scribe 'spell name'\n\nThis skill can be learned by all classes,\
    \ but some are more adept at this \nskill than others.  First you must be holding\
    \ an adequate parchment for \nscribing the scroll.  There are several criteria\
    \ before you can sucessfully \nscribe a scroll.\n1. Must be holding a parchment\n\
    2. Must know the spell to be scribed\n3. Must have adequate mana(4 times the normal\
    \ mana for the spell)\n4. Pass the skill, intelligence and wisdom checks\n\nThe\
    \ max number of spells that may be scribed on one scroll is 3, but they\nget increasingly\
    \ difficult to correctly scribe.\n\nBeware a failed scroll may blow up in your\
    \ face!\n"
- level: 0
  keyword: ALIAS ALIASES UNALIAS
  text: |
    Syntax: alias <word> <string>
    Syntax: unalias <word>

    Aliases are abbreviations for strings of text.  Most easily explained by
    example. Here are few that might be of use.

    alias gac get all corpse
    alias p1 prompt <this is my regular prompt>
    alias p2 prompt <this is my combat prompt>
    alias kk kill guard
    alias zz recall
    alias fb cast 'fireball'
- level: 0
  keyword: CWHO
  text: |
    Syntax: cwho

    This shows a list of the players in the game and their `rC`RH`YA`RO`rS`w
    scores. This command is just for informational purposes and is only available
    during a `rC`RH`YA`RO`rS`w.
- level: 0
  keyword: CHAOS
  text: "Syntax: chaos (only IMPlementors may use this command)\n\nThis command is\
    \ used to put the game into `rC`RH`YA`RO`rS`w.  There are \nseveral effects of\
    \ this command.\n\n1. Once chaos is toggled using the 'chaos' command the game\
    \ is wizlocked\n2. Regen is at half rate for hit points and mana.\n3. Where command\
    \ is disabled for levels below HERO\n4. Teleport, summon, gate, and vision spells\
    \ are disabled\n5. When a character dies, they are disconnected. Characters eq\
    \ is moved\n   to the room. ie. They drop everything on death.\n6. Save and autosave\
    \ are disabled.\n7. Shutdown and reboot are disabled.\n\nNOTE: pfiles are not\
    \ saved!\n"
- level: 93
  keyword: MPSTAT
  text: |
    Syntax: mpstat <mob>

    This command is similiar to stat, except that it shows any Mob_Progs
    that belong to a mobile.
- level: 0
  keyword: BEACON
  text: "Syntax: beacon\n\tbeacon reset\n\nBeacon by itself sets your recall to the\
    \ room you are currently in.\nBeacon reset sets your recall to the temple.\n"
- level: 0
  keyword: POUR
  text: |
    Syntax: pour <container> out
    Syntax: pour <container1> <container2>

    This command is used to pour liquid out of or to transfer liquid between
    two drink containters.  This does not work with potions.
- level: 0
  keyword: QUEST QUESTS
  text: |
    Syntax: quest <parameter>

    Parameters:

    `WPOINTS:`w   tells you how many quest points you have.
    `WINFO:`w     tells you information about your current quest.
    `WTIME:`w     tells you how long you have on your current quest.
    `WREQUEST:`w  requests a quest from the questmaster. `R**`w
    `WCOMPLETE:`w finishes the quest. `R**`w
    `WLIST:`w     shows a list of quest prizes available. `R**`w
    `WBUY:`w      buys a prize with your quest points. `R**`w
    `WGIVEUP:`w   ends your current quest if you think you can't finish it.

    `R**`w You have to be at the questmaster to use these commands.
- level: 0
  keyword: GRIP
  text: "Syntax: grip primary\n\tgrip secondary\n\nThis makes your primary or secondary\
    \ weapon noremove for a time.\n"
- level: 92
  keyword: INCOGNITO
  text: "Syntax: incognito\n\tincognito <level>\n\nToggling your incognito status\
    \ will hide your presence from people\noutside the room you are in, but will leave\
    \ you visible to those who are\nwith you. It takes a level argument similar to\
    \ wisinvis, people of that\nlevel or higher can see you, regardless of location.\n"
- level: -1
  keyword: CRECALL
  text: |
    Syntax: crecall

    This command will take you to your clan hall, if you are in a clan.
- level: 92
  keyword: PAGE
  text: |
    Syntax: page <victim>

    This command will send a message to the victim, along with a beep,
    informing them that you wish to commumicate. The vicitm must be immortal
    and not switched.
- level: 92
  keyword: WIZNET
  text: "Syntax: wiznet \n\twiznet show\n\twiznet status\n\twiznet <field>\n\nWiznet\
    \ is sort of an immortal news service, to show important events to\nthe wiznetted\
    \ immoral.  Wiznet by itself turns wiznet on and off, \nwiznet show lists all\
    \ settable flags (they are not detailed here), \nwiznet status shows your current\
    \ wiznet settings, and wiznet <field> toggles\na field on and off.  The events\
    \ should be self-explanatory, if they are not,\nfiddle with them a while.  More\
    \ events are available at higher levels.\n"
- level: -1
  keyword: BALANCE DEPOSIT WITHDRAW
  text: "Syntax: balance\n\tdeposit <amount>\n\twithdraw <amount>\n\nBalance shows\
    \ you the current balance of your bank account.\n\nDeposit adds a the specified\
    \ amount of gold to your bank account.\n\nWithdraw takes the specified amount\
    \ of gold from your bank account.\n\nYou MUST be in a bank to deposit or withdraw\
    \ money.\n"
- level: 0
  keyword: ACCEPT
  text: |
    Syntax: accept <character>

    This will accept a new member into your clan, providing you are the clan
    leader and that the victim is not already in a clan.
- level: 0
  keyword: DISOWN
  text: |
    Syntax: disown <character>

    This will remove a character from your clan, providing you are the clan
    leader and that the victim is in your clan.
- level: 100
  keyword: RENAME
  text: |
    Syntax: rename <character> <new name>

    This renames a character, removes the old player file and creates a new
    one.
- level: 93
  keyword: OLEVEL MLEVEL
  text: "Syntax: olevel <level>\n\tmlevel <level>\n\nThis command shows all the mobs/objects\
    \ (depending on which command you\ntype) of the specified level.\n"
- level: 0
  keyword: BOUNTY BOUNTIES 'BOUNTY HUNTER' BOUNTYHUNTER
  text: |
    Syntax: bounty <character> <amount>

    This places a bounty on the character's head. Certain players, bounty
    hunters, may collect the bounty on that character by killing them.
    Bounty hunters need not be pk and must pay 250,000 gold to an implementor
    in order to get a bounty hunter flag.

    The minimum bounty on a player is 50,000 gold. Bounty hunters may not
    place bounties. Immortals cannot be bounty hunters.

    To see a list of online players with bounties, type "show bounty"
- level: 0
  keyword: AUCTION
  text: "Syntax: auction\t\t\t-shows current auction item's stats\nSyntax: auction\
    \ bid <bid>\t-places a bid on the item\nSyntax: auction <item>\t\t-places an item\
    \ up for auction\nSyntax: auction off\t\t-turns off the auction channel\nSyntax:\
    \ auction on\t\t-turns on the auction channel\nSyntax: auction stop\t\t-stops\
    \ the current auction, returns\n\t\t\t\t    the money to the last bidder,\n\t\t\
    \t\t    and gives the item to the immortal\n\nThis is the new, automated auction\
    \ channel by Erwin Andreasen. \n\nAuction stop may only be used by an immortal.\
    \ \n\nIf no bids are received on the object, the item is removed, not returned\n\
    to the seller.\n\nTo use the old auction channel, use \"oldauction <message>\"\
    \n"
- level: 0
  keyword: PLAY
  text: "Syntax: play <song>\n\tplay list\n\tplay stop\n    \tplay loud <song>\n\t\
    play list artist\n\nPlay list gives you a list of the songs available at the jukebox/music\n\
    device. Play list author gives you the authors of the song as well as the\nsong\
    \ titles.\n\nPlay <song> plays the selected song. Play loud <song> plays the song\n\
    globally.\n\nPlay stop stops the song.\n"
- level: 0
  keyword: GAME GAMES
  text: |
    Syntax: game <game name> <arguments>

    Game by itself gives you a list of the games available.

    Game <game name> gives you the syntax for that particular game.
- level: 92
  keyword: MURDER
  text: |
    Syntax: murder <player>

    This will attack the player, regardless of pk status. Remember: MURDERing
    players for no reason is BAD.
- level: 93
  keyword: JAIL
  text: |
    Syntax: jail <player>

    This sends the player to JAIL. The player does not pass go, he does not
    collect $200. It freezes the player and transfers the player and their pet
    to a no-exit, no-recall room.

    This command can also be used to release a player from jail.
- level: 0
  keyword: SHOW
  text: |
    SYNTAX: SHOW <item>

    Type SHOW by itself to show a list of items to be shown.

    Show <item> <name> will often yield more information, eg "show clan <clan
    name>"
- level: 92
  keyword: CLONE
  text: |
    Syntax:
      clone obj <object>
      clone mob <mobile>
      clone <name>

    The clone command duplicates an object or mobile.  The level of item or mobile
    that may be cloned depends on your level.  The target object or mob must be in
    the same room as you, or in your posession.  Strung and set information is
    preserved by clone, as well as any spell effects and container contents or
    mobile inventory, except for items which are too high for you to clone.
    Strung extended descriptions on objects are not kept, however.
- level: 0
  keyword: DONATE
  text: |
    Syntax: donate <item>
            donate all.<item>

    This will remove the item from your inventory and put it in the donation
    room for others to pick up.

    WARNING: If you type "donate all .<item>" and someone takes your
    equipment, the immortals are not responsible and will not reimburse you
    for your loss.
- level: 0
  keyword: EMAIL
  text: |
    Syntax: email <your address>

    This sets your email address, which can be seen with whois.
- level: 0
  keyword: COMMENT
  text: |
    Syntax: comment <comment>

    This sets your comment, which can be seen with whois.
- level: 0
  keyword: MESSAGE REPLAY
  text: |
    Syntax: message
            replay

    If you got any tells while sleeping or AFK, this lets you see them.
- level: 0
  keyword: WHIRLWIND
  text: |
    Syntax: whilrwind

    This skill allows warriors to do area-attack by spinning with their weapon
    high in the air, catching anyone around them with the blade in the
    process. At the current time, it doesn't allow you to attack other
    players.
- level: 0
  keyword: PETITION
  text: |
    Syntax: petition <clan>

    This will send a note to the clan leader informing him or her as to your
    desire to enter his or her clan.
- level: 95
  keyword: GRAB
  text: |
    Syntax: grab <item> <player>

    This reposesses an item from the player without having to force them to
    remove it and give it to you.

    This command is always logged.
- level: 92
  keyword: OWHERE
  text: |
    Syntax: owhere <item>

    This locates the item, much as locate, but the results are not affected by
    the no-locate flag.
- level: 0
  keyword: PURCHASE
  text: "Syntax: purchase <person> <item>\n        purchase <person> <item> <message>\n\
    \nYou can buy flowers and such for other players for various occasions. To \n\
    do this, you can use either of the above syntaxes. If the message is \nomitted,\
    \ it will place a simple message stating who the flowers are from.\nIf you add\
    \ a message, the card will contain that message.\n\n  Currently, you can buy:\n\
    \        a red rose          (RED)       200 gold\n        a white rose      \
    \  (WHITE)     200 gold\n        a black rose        (BLACK)     200 gold\n  \
    \      a pink rosebud      (PINK)      200 gold\n        a dozen red roses   (DOZEN)\
    \     500 gold\n        a corsage           (CORSAGE)   300 gold\n\nWhen buying\
    \ a selection, use the keywords in parenthesis () as the <item>.\n"
- level: 99
  keyword: DISABLE
  text: |
    Syntax: disable <command>

    This disables the specified command, making it unusable by anyone. Disable
    by itself shows the list of disabled commands.

    To re-enable a command, the syntax is the same as for disabling it.
- level: 0
  keyword: ENGRAVE
  text: "Syntax: engrave <item> <location> <message>\n\nFor a small fee, a specialized\
    \ engraver will customize any of your \nequipment. \n\nValid locations are \"\
    short\", \"long\", \"extended\", and \"name\"\n\nFor the \"extended\" location,\
    \ the first word is the keyword (ie, for\n\"examine <keyword>\")\n\nIf an immortal\
    \ or another player has a problem with your engraving, you \nmay be asked to change\
    \ it.\n"
- level: 0
  keyword: GOCIAL
  text: |
    Syntax: gocial <social>

    This will to the given social to anyone anywhere. The rest of the MUD will
    also see it as long as they have gossip on and aren't quiet.
- level: 99
  keyword: ADDAPPLY
  text: |
    Syntax: Type addapply to see the full syntax and options

    This will allow you to set permanent spell effects on objects, as well as
    stat increases.
- level: -1
  keyword: MARRY MARRIAGE SPOUSE SPOUSETALK DIVORCE
  text: |
    Ah, the beautiful ceremony that occurs when someone loves another so much
    that they wish to spend the rest of their lives together.  Unfortuneately,
    it turns sour sometimes.  Whether you're wanting to marry, or be divorced,
    it must be performed by an Immortal.  With marriage, comes the ability
    to communicate exclusively to your spouse via your own private talkline.

    Marriage code written by Ryouga (ryouga@jessi.indstate.edu).
- level: 0
  keyword: REMORT
  text: "Syntax: type remort twice to begin the remort process\n\nRemort allows players\
    \ who have reached hero level at least once to \nplay a new character with a the\
    \ same name.\n\nSkills and stats are not kept through the remort process (although\
    \ clan \nand clan status are), but remorted players can choose from races and\
    \ \nclasses not available to anyone else.\n\nOnce you have reached hero level,\
    \ you may remort. At any time after you \nhave remorted the first time, you may\
    \ remort again.\n"
- level: 0
  keyword: AREPORT
  text: "Syntax: areport\n\nThis command is similar to the \"report\" command, but\
    \ it reports the \nspells that you are affected by to the room.\n"
- level: 92
  keyword: STATES
  text: |
    Syntax: states

    This shows the connected state of everyone currently on the MUD.
- level: 92
  keyword: PREFIX
  text: "Syntax: prefix <strnig>\n\nThis will place the current string before anything\
    \ you type as part of \nthe command. For instance, \"prefix say\" will place the\
    \ word \"say\" before \nanything you type as part of the command (you will say\
    \ everything you type).\n"
- level: 92
  keyword: ZECHO
  text: |
    Syntax: zecho <message>

    This will send the message to everyone in the current area.
- level: 0
  keyword: GMOTE
  text: |
    Syntax: gmote <message>

    This works like emote, but can be seen by everyone who is not sleeping.
- level: 0
  keyword: PRAY
  text: |
    Syntax: pray <message>

    This sends the message to your god, if they are logged in.
- level: 0
  keyword: AFK
  text: |
    Syntax: afk <message>

    The AFK command sets you as being "Away From Keyboard." While you are
    set AFK, all tells are recorded and may be seen by typing REPLAY or
    MESSAGE.

    The message argument is optional. If given, the message is repeated
    to anyone who tells you something.

    All characters are set AFK if they have been idle for 10 ticks.
