- vnum: 3421
  name: Entrance Chamber to the Grand Hall of Kings
  description: "Whoever built this place must have been very rich indeed!  Though
    you did\n\renter through a rather small door this place has enough room to hold
    several\n\rscore of people.  The floor has a beautifully woven carpet, and the
    walls are\n\rcovered in finely crafted tapestries. You can tell that these things
    must have\n\rbeen worth much but they have not lasted well throughout the ages.
    \ Massive\n\rdoors lead off to the south and a large stone staircase leads up.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "Finely polished oak doors stand to the south.\n\r"
    keywords: oak
    exit_flags: 3
    key: -1
    to_vnum: 3422
  - dir: 4
    desc: "You see a large set of stone stairs leading upwards to a small stone door
      at\n\rthe top. \n\r"
    keywords: stone trapdoor door
    exit_flags: 15
    key: 3410
    to_vnum: 3405
  extra_descs:
  - keywords: stone door trapdoor
    description: "It's rather small and looks quite heavy but maybe with some kind
      of leverage\n\ryou could move it.  It has a queerly shaped hole that looks big
      enough\n\rfor an equally queerly shaped pole to fit inside.  If only you had
      it!\n\r"
  - keywords: tapestry tapestries
    description: "The tapestries were woven into beautiful and exciting scenes of
      battles\n\rlong ago.  One on the left your shows the historic battle between
      Jubal the\n\rBenevolent and Hroth Kragen's forces that eventually Jubal's army
      won (of\n\rcourse).\n\r"
  - keywords: staircase stairs
    description: "Though quite cracked they do look very stable.\n\r"
  - keywords: oak
    description: "They're HUGE!  They are at least 12 feet tall and about 10 feet
      wide.\n\rIf not for one thing they would be perfectly preserved.  There appears\n\rto
      be some letters crudely scratched into the wood.\n\r"
  - keywords: letters graffiti
    description: "'Beware here all of man, because past here lies only death.'\n\r\n\r
      \   Insho'rkthon brsskra-lehsn Roch'tar\n\r\n\rBeneath, there are two criss-crossing
      scratchmarks in an X formation that\n\rlook like someone (or something) raked
      their claws across the wood.\n\r"
- vnum: 3422
  name: The Grand Hall of Kings
  description: "A long hallway stretches east and west.  On the southern side of the
    hall\n\rthere are many doors, each with the name of a king who has died and is\n\rentombed
    here.  The hallway is beautiful yet chilling.  Even though the area\n\rhas been
    kept well by acolytes, there remains a stench of the undead.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords: oak
    exit_flags: 3
    key: -1
    to_vnum: 3421
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3427
  - dir: 2
    desc: "The door has written above it: 'May all the lands thank Crotus the Victor.\n\rWithout
      his guidance this kingdom would not have stood.'\n\r"
    keywords: door
    exit_flags: 3
    key: -1
    to_vnum: 3423
  - dir: 3
    desc:
    keywords:
