    oh and he seems quite blind.\n\r\n\rHe leers insanely at you and says 'heh heh
    what can I do for you children?\n\rPlease don't mind my wife, she is always like
    that ... hello dear can you\n\rmake some tea for our company?  Oh good!  Now sit
