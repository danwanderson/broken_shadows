- vnum: 3418
  name: The Shrine of Cristis
  description: "Different than the rest, this place has not been desecrated.  An altar
    still\n\rstands here and the walls show scenes from the life of Cristis the Kind,\n\ra
    ruler of the outlying regions west of Midgaard.  There is a stone staircase\n\rleading
    down.  The Ghost of Cristis the Kind stands here.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 3419
  - dir: 5
    desc:
    keywords: staircase
    exit_flags: 7
    key: -1
    to_vnum: 3416
  extra_descs:
  - keywords: altar
    description: "It stands 2 feet high with the remnants of candle-wax on top.  There
      is\n\ran inscription on the side:  'Praise the almighty Cristis the bringer
      of\n\rgood and justice to the world.  He who fought the evilest finally is at\n\rpeace.
      \ May the Gods remember him forever ...'\n\r"
  - keywords: ghost cristis
    description: "His rest has been disturbed by evil creatures who have invaded his
      domain\n\rand grave.  He holds up a parchment for you to read:\n\r\n\r     Hello
      stranger and last hope for Midgaard and this tomb!\n\r   This is a plea for
      aid by a man long since dead from this Earth.\n\r     The forces of evil have
      taken control of this tomb and the\n\r   Kings of old need your aid to free
      us and deliver us to peace\n\r   once again.  I think that I alone have been
      able to appear and\n\r   communicate with the mortal world.\n\r     Roch'tar,
      the reincarnate Vampire, now rules these tombs.\n\r   You must find and defeat
      him and his minions!\n\r     May God bless you on your Quest!\n\r"
