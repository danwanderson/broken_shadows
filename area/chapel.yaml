- vnum: 3472
  name: The Short Way to Hell ...
  description: "You fall ...\n\r            hmm .... it's getting really HOT!\n\rYou
    fall ...\n\r                        you fall ...\n\r     Slowly you are cooking
    as you fall further ... your skin is burning and\n\ryour hair evaporates ...\n\r\n\r
    \                                          you fall ...\n\r\n\r                 and
    fall ...\n\r\n\r                                     AND STOP!\n\r\n\rWelcome
    to HELL!\n\r\n\rBut even in Hell we give you another chance.\n\r\n\r"
  room_flags: 12
  sector: 0
  owner:
  exits: []
  extra_descs: []
