    description: "Above the door is some strange writing!  It is worn with age, but
      it refers\n\rto an ancient ruler named 'Shohan'.\n\r"
- vnum: 3413
  name: The Shrine of Shohan
  description: "BLOOD EVERYWHERE!\n\rThe walls are coated with blood, bits of bloody
    flesh lie at your feet,\n\rand torn clothing is scattered about.  It wouldn't
    disturb you in the least\n\rexcept that it is all FRESH!  What ever used to pass
    as an altar here,\n\rlies overturned and smashed.  Doors lead to the south and
    to the north.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
