  extra_descs: []
- vnum: 3423
  name: The Shrine of Crotus
  description: "Mostly rubble, this place used to be the shrine of the famous king
    Crotus,\n\rwho saved the northern regions from being overrun by the goblin hordes
    of\n\r100 years ago.  If not for him, Midgaard of course would have eventually
    been\n\rconquered as well.  Though Crotus was a goodly king, it was rumored that
    he\n\rturned to the dark ways in his dying years ... and died an evil man.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
