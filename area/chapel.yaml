  name: The Grand Hall of Kings
  description: "You are at the west end of the Grand Hall of Kings.  There is a doorway
    to the\n\rsouth with something strange written above it.  Also on the floor are
    dried\n\rblood stains, but their color seems a little wrong.\n\r"
