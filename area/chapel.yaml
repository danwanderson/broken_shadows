  extra_descs: []
- vnum: 3414
  name: The Tomb of Shohan
  description: "Once beautiful, this place has been turned into a slaughterhouse by
    the hands\n\rof evil beings ... even more blood and dead, rotting flesh.  This
    place looks\n\rlike the feeding grounds of beasts and monsters.  The overturned
    sarcophagus\n\rof the once powerful King Shohan lies here.  A door leads to the
    north and a\n\rdoorway has been hewn to the east.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
