- vnum: 4002
  name: End of the path
  description: "At this point the path has had enough. With a terrified shudder it
    cowers\n\rto the ground, only staying here because you're standing on it. with
    a slight\n\rfeeling of unease you look around noticing only a few bushes and a
    large sign\n\rcarved into the mountain.  You feel you can hear the cry of help
    from a\n\rthousand silent voices all coming from an even darker hole in the mountain
    to\n\rthe north marking the entrance to a cave (or a grave :-).\n\r"
  room_flags: C
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 4010
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 4001
  extra_descs:
  - keywords: bushes
    description: "Small crippled bushes desperately trying to grow south.\n\r"
  - keywords: sign
    description: "The sign says:\n\r\n\r        /---------------------\\\n\r        |
      The Mines of Moria! |\n\r        |                     |\n\r        | Four levels.
      \       |\n\r        |                     |\n\r        | Watch for mages!    |\n\r
      \       |                     |\n\r        \\---------------------/\n\r                 |
      |\n\r                 | |\n\r                 | |\n\r                 | |\n\r
      \                | |\n\r"
- vnum: 4010
  name: The cave
  description: "You are in a large cave. The ceiling is lost somewhere above the reach
    of\n\ryour light. The floor, however, is highly illuminated, your light flickering\n\rover
    several tombstones. Only one is whole, the rest have been shattered by\n\rsome
    savage blow. The remaining tombstone looks disturbingly new...\n\rA small breeze
    of fresh air enters from the south (probably lost too). Take a\n\rgood breath,
    it may be your last mouthful of air in a long, long time that\n\rothers haven't
    breathed before you.\n\rTo the north a small tunnel continues into the mountain.\n\r"
  room_flags: AD
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 4011
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 4002
  extra_descs:
  - keywords: tombstone
    description: "The stone is inscribed with the unfortunate player's famous last
      words:\n\r\n\r  \"What are you worrying about, it is just a small harmless snake\"\n\r"
- vnum: 4011
  name: The tunnel
  description: "You squeeze your way through a small, narrow tunnel. The sharp-edged
    rocks\n\rprotruding from the walls threaten to scratch and cut you. \n\rTo the
    south you sense a freshness in the air which is rather unusual in these\n\rdamp,
    stuffy tunnels. To the north the tunnel continues.\n\r"
