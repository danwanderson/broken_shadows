- vnum: 4001
  name: The hills
  description: "You are surrounded by dark and sinister hills. Although they seemed
    fairly\n\rsmall from a distance you now get the feeling that they're closing in
    on you,\n\rtowering over you, overwhelming you ...  The small path seems to have
    second\n\rthoughts about these hills because it starts winding unnecessarily,
    turning\n\rseveral times around itself.  To the south the hills have a lighter
    hue of\n\rdark. To the north however, the hills have become nightblack holes in
    the\n\rdistant mountains.\n\r"
  room_flags: C
  sector: 4
