- vnum: 4000
  name: The hills
  description: "You are on a small bewildered path winding its way between the hills
    in\n\rlack of better things to do. To the south you have a splendid view over
    the\n\rflat, vast, desolate plains. To the north the hills grow steadily darker
    and\n\rforeboding. This is the cause of no sunset, it is rather the power of evil\n\rpenetrating
    these quiet hills. Glancing around you notice only a single bird.\n\rThe mountains
    of the dwarven kingdom rise up to your east, you can barely\n\rmake out the queen's
    mines from here.\n\r"
  room_flags: C
  sector: 4
  owner:
