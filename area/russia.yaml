  description: "You can start to make out the form of St.  Petersburg in the distance\
    \ but\nyour view of the great city becomes distorted due to the driving wind and\n\
    the falling snow.  You pull your cloak around you to stay warm.  Not too\nlong\
    \ before you are safe within the walls of the city.  \n"
