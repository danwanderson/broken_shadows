  description: "You can now see the gates of the palace to the west.  Beyond the gates\n\
    and across Alexander Park you will see the enormous palace amongst the\nfountains\
    \ and finely manicured lawns.  \n"
  room_flags: '0'
  sector: 3
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11535
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11542
  extra_descs: []
- vnum: 11542
  name: The Alexander Palace
  description: "The Imperial Palace stands regally before you is all its mighty splendor.\n\
    You immediately realize that you can't simply walk through the front doors\nand\
    \ expect to be welcomed.  Better find your own way in.  \n"
  room_flags: '0'
  sector: 3
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11541
  extra_descs: []
- vnum: 11543
  name: An Underground Tunnel
  description: "You've discovered a secret tunnel behind the altar!  Could this be\
    \ like\nthe ones you've heard about in the Palace?  The altar slams shut behind\
    \ you,\nguess you're stuck down here.  \n"
  room_flags: A
  sector: 0
  owner: ''
  exits:
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11544
  extra_descs: []
- vnum: 11544
  name: An Underground Tunnel
  description: "It's damp, and dark, and cold down here.  What person could possibly\
    \ want\nto use this method?  You are getting discouraged.  \n"
  room_flags: A
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11543
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11545
  extra_descs: []
- vnum: 11545
  name: An Underground Tunnel
  description: "Guck oozes from the tunnel ceiling.  You are not amused.  You can't\
    \ see a\nthing.  \n \n"
  room_flags: A
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11544
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11546
  extra_descs: []
- vnum: 11546
  name: A Dead End
  description: "Nothing.  Absolutely nothing.  Now what do you do?  There MUST be\
    \ a way\nout!  \n"
  room_flags: A
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11545
  extra_descs: []
- vnum: 11550
  name: Semi-Circular Hall
  description: "This is the main hall of the Parade Rooms.  The walls are covered,\
    \ in\ntypical Russian style, in the same white marble as some of the other halls.\
    \ \nThe central doors of the apse open out onto a terrace overlooking the\nAlexander\
    \ Gardens.  White marble fireplaces are situated on either side of\nthe main entrance.\
    \  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11552
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11582
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11551
  extra_descs: []
- vnum: 11551
  name: Portrait Hall
  description: "This hall is sparsely furnished, with only a dozen or so chairs and\n\
    sofas, all guilded pieces covered in fine blue silk.  On the walls hang\nportraits\
    \ documenting several generations of the Romanov Dynasty.  Again,\nthese walls\
    \ are covered in the same white marble as the other Great Halls.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11550
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11584
  extra_descs: []
- vnum: 11552
  name: Billiard Hall
  description: "This room is rather large and is connected to the room on the right\
    \ by\nwide arched column arcades.  The walls are all covered in a white polished\n\
    marble and is the reason why some call this the \"Marble Hall\".  The false\n\
    windows over the cornices have clouds delicately painted on them.  There are\n\
    several oil paintings hanging on the walls, one is of the Tsarina Aleksandra\n\
    and there is even one of the great Queen Victoria herself.  To your north is\n\
    a huge guilded pier mirror and it may be worth your while to take a closer\nlook.\
    \  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11581
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11550
  extra_descs: []
- vnum: 11553
  name: Mountain Hall
  description: "Upon entering this room you immediately notice a great wooden slide!\
    \ \nThis is where the Tsar's children spent much of their time entertaining\n\
    friends.  Several bird cages are hung throughout the room holding\nmagnificent\
    \ parrots of all colors.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11584
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11554
  extra_descs: []
- vnum: 11554
  name: Great Library
  description: "This room is unlike any library you've ever seen!  Books of all sizes\
    \ and\nall topics fill the empire style mahogany bookcases.  Three great glass,\n\
    crystal and guilded bronze lanterns hang in a row down the center of the\nroom.\
    \  On top of the cases are models of mounted cavalrymen.  Several bronze\nstatuettes\
    \ and ship models are placed neatly on tables throughout the room. \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11553
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11555
  extra_descs: []
- vnum: 11555
  name: Smaller Library
  description: "This room is much smaller than the Great Library, but its appearance\
    \ is\njust as magnificent.  The same empire style mahogany bookcases line the\n\
    walls of this room and are all filled with a unique collection of rare and\nhistorical\
    \ books.  In the center of the room is a chippendale style table\nand chairs where\
    \ the Tsar and his family sometimes prefer to dine.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11556
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11554
  extra_descs: []
- vnum: 11556
  name: Smaller Library
  description: "More books!!  The size of this collection is outstanding!  You could\n\
    spend days in here just reading the covers of these books!  This library\ncontains\
    \ the private collection of the Royal Family.  Two mahogany desks are\nsituated\
    \ in the center of the room and are used by the two full time\nlibrarians employed\
    \ by the Tsar.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11555
  extra_descs: []
- vnum: 11557
  name: Palace Chapel
  description: "This room is long and very narrow with an arcade running along the\
    \ right\nside of the room.  The altar, in front of you, is quite spectacular.\
    \  There\nare several columns running the length of the chapel, the cornices and\n\
    capitals are intricately carved.  Artificial marble, in an icy sea green,\ncover\
    \ the columns and walls.  The wall panels are framed in a darker color\nmarble.\
    \  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11581
  extra_descs: []
- vnum: 11558
  name: The Tsar's Reception Room
  description: "This is where guests wait to be admitted to the Tsar's office.  The\
    \ walls\nare covered in a dark panelling and above this is a deep, rich blue fabric\n\
    stamped with a gold fleur-d-lis pattern.  A portrait of Aleksandra hangs on\n\
    the west wall.  The furniture is also dark wood and covered in a soft\nstudded\
    \ leather.  A mable-faced fireplace with a tall wooden chimney keeps\nthis room\
    \ warm and cozy.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11591
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11559
  extra_descs: []
- vnum: 11559
  name: Working Study
  description: "This room is dark and masuline and is decorated with only materials\
    \ of\nthe richest kind.  The walls are panelled half-way up in walnut and then\n\
    painted a deep red.  The furniture is all carved in dark oak or walnut, some\n\
    new, and some pieces of the Romanov family collection.  The Tsar's desk is\nL-shaped\
    \ and is covered with family pictures, folders, appointment books and\na clock.\
    \  There is also a marble-faced fireplace in this room, similar to\nthe one in\
    \ his reception room but on a smaller scale.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11558
  extra_descs: []
- vnum: 11560
  name: The Tsar's Bathroom
  description: "A giant heated swimming tubs sit on a platform on the north wall of\
    \ this\nmagnificent room.  On the west wall are two dressing tables and a cage\n\
    hanging from above holds a brightly colored parrot.  A table sits under the\n\
    window opposite the tub and on it are many of the Tsar's personal treasures\n\
    including gifts from his children.  Above the doorway is draped a\nembroidered\
    \ cloth with a double eagle.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11561
  extra_descs: []
- vnum: 11561
  name: Wardrobe Room
  description: "The Tsar's dressing room is not nearly as magnificent as the Tsarina's\n\
    but the size is just as grand.  The walls are covered in a dark mahogany\npanelling\
    \ as are the closet doors.  A comfortable looking armchair rests in\nthe corner,\
    \ other than that, there is no furniture at all.  The Tsar's\nwardrobe consists\
    \ mainly of uniforms, but when he's dressed up in one for a\nformal affair he\
    \ looks just as regal as his lovely wife.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11594
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11560
  extra_descs: []
- vnum: 11562
  name: New Study Room
  description: "This is where the Tsar takes care of any official affairs and is\n\
    therefore designed with an international flair.  The walls and ceiling are\npanelled\
    \ in a dark, tropical mahogany and grey Austrian marble columns\nrivited with\
    \ gilded bronze stand regally on either side of the Tsar's\nChippendale desk.\
    \  The Tsar also has a large pool table made of mahogany\nbehind his desk where\
    \ he sometimes passes the time with guests.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11595
  extra_descs: []
- vnum: 11563
  name: Formal Reception Room
  description: "This room is one of the sunniest areas of the palace.  Seven big windows\n\
    look out from this room onto the Alexander Park.  The walls are covered with\n\
    white artificial marble and topped by a beautifully molded entablature.  The\n\
    stark whiteness of the room is set off by heavy cranberry colored curtains. \n\
    Two ivory screens covered in tapestry bear the Royal Monogram.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11570
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11595
  extra_descs: []
- vnum: 11564
  name: Maple Room
  description: "This is one of the largest of Aleksandra's private rooms, and possibly\n\
    one of the most exquisite.  The walls of the room are painted pink with\ntrellises\
    \ of carved plaster cabbage roses rising into a swirled pale green\ncircle in\
    \ the center of the ceiling.  Bearskin rugs sprawl across the\ngray-green castor\
    \ carpet.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11595
  extra_descs: []
- vnum: 11565
  name: Pallisander Room
  description: "This is where the Tsar and Tsarina play hosts to their special guests\
    \ and\nclose friends.  The room is panelled in a highly polished rosewood, making\n\
    the room warm and inviting.  The furniture is of the same rosewood.  This is\n\
    where the family oftens sits down for tea together.  The Tsarina keeps most\n\
    of her personal treasures in this very room.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11594
  extra_descs: []
- vnum: 11566
  name: Mauve Room
  description: "This room got it's name from the opal colored silk on the walls and\
    \ was\nthe Tsarina's favorite.  The same silk, in a textured brocade, covers the\n\
    cream lemonwood furniture.  This room is the traditional family gathering\nroom\
    \ and contains many interesting and personal items belonging to the\nImperial\
    \ Royal Family.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11593
  extra_descs: []
- vnum: 11567
  name: The Imperial Bedroom
  description: "The walls of this room are covered in a lively cotton-chintz material,\n\
    printed with green wreaths laced with pink ribbon.  The room is divided into\n\
    two sections by a beautiful ivory silk curtain supported by two great\ncolumns.\
    \  The sitting area, is made up of a few chairs and a sofa all\ndarkwood that\
    \ has been painted ivory and covered in the same material as the\nwalls.  The\
    \ sleeping area has a majestic gilt bronze bed covered in silk and\nlace coverlets\
    \ and topped by piles of down-filled pillows.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11592
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11568
  extra_descs: []
- vnum: 11568
  name: Aleksandra's Dressing Room
  description: "This is where the Tsarina stores her many, many pieces of fine clothing.\
    \ \nThe room itself is small by royal standards and contains a couple of\narmchairs\
    \ in the same style as her bedroom.  It's amazing that one women\ncould wear all\
    \ these clothes in a lifetime!  The Tsarina changes her clothes\nan average of\
    \ 5 times daily.  Two maids make sure that her clothes are laid\nout and ready\
    \ for Aleksandra in a timely manner.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11567
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11591
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11569
  extra_descs: []
- vnum: 11569
  name: Aleksandra's Bathroom
  description: "For a bathroom, this isn't so bad.  One could live in this entire\
    \ space\nalone!  A huge, deep clawfoot bathtub sits on a raised platform and is\n\
    filled every evening (by hand) by the Tsarina's two chamber maids.  A\nbeautiful\
    \ ivory wood vanity rests against the wall and on it is many\npersonal momentos\
    \ of the Tsarina's.  One the opposite wall is a elegant\nmarble fireplace which\
    \ is also lit for the Tsarina's bath every evening to\nensure that her Royal Highness\
    \ doesn't catch a chill.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11568
  extra_descs: []
- vnum: 11570
  name: The Tsarina's Balcony
  description: "You find yourself on a large, beautiful and spacious balcony.  One\
    \ could\nquite easily entertain many guests here and the Tsarina does just that,\n\
    serving tea to a dozen or so guests.  The balocony overlooks Alexander Park\n\
    and in the distance you can see the spires of the cathedral.  \n"
  room_flags: '0'
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11563
  extra_descs: []
- vnum: 11571
  name: Children's Dining Room
  description: "This is where the children receive their meals, those that are not\
    \ taken\nwith their parents that is.  Unlike the formal dining room this one is\
    \ quite\ncomfortable.  The walls are decorated with a lively print and the furniture\n\
    is light oak.  The table is covered in a beautiful antique white, lace table\n\
    cloth.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11585
  extra_descs: []
- vnum: 11572
  name: Sitting Room
  description: "This is where the oldest of the children entertain their guests, or\
    \ just\ngather together for long talks.  The walls are panelled in a dark wood\
    \ and\nthe furniture is gilded bronze with deep, red velvet coverings.  Personal\n\
    pictures of the girls with their family and friends are placed on the tables\n\
    and hang on the walls.  A desk is in the corner and on it is writing paper\nand\
    \ ink for the Duchesses' personal correspondence.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11586
  extra_descs: []
- vnum: 11573
  name: Class Room
  description: "The classroom is very simple in appearance but still is not totally\
    \ free\nof Romanov elegance.  The walls are panelled in a rich mahogany with a\n\
    chalkboard on the west wall.  Mahogany desks are lined up facing the board\nin\
    \ an orderly fashion.  There are bookshelves along the other walls\ncontaining\
    \ the neccessary tools required for the children's daily studies\nwith their tutors.\
    \  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11587
  extra_descs: []
- vnum: 11574
  name: Bathroom
  description: "The girl's bathroom is fashioned in the same style as their mother's.\
    \  A\ndeep, clawfoot tub rests on a platform and there are four dressing tables\n\
    along the east and north walls.  Each of the girls have personal belongings\n\
    and momentos cluttering the tables as well as jeweled hairbrushes and\nmatching\
    \ mirrors.  This room, depite it's incredible size, doesn't seem like\nenough\
    \ room for four girls, but then again, is any room?  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11588
  extra_descs: []
- vnum: 11575
  name: Olga and Tatiana's Room
  description: "The walls of this room are painted pink and above the cornice they\
    \ are\nstencilled in a lively frieze of flowered vines and bronze colored\ndragonflies.\
    \  The same design is in the chintz material that covers the\nchairs and the fabric\
    \ partition that seperates Tatiana's sleeping area from\nthe rest of the room.\
    \  There are also chairs covered in a striped green\nsilk.  The furniture is all\
    \ made of maple, stained grey.  Photographs and\npaintings cover the walls and\
    \ personal mementos scatter this room as well.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11576
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11589
  extra_descs: []
- vnum: 11576
  name: Maria and Anastasia's Room
  description: "This room is very similar to their sisters' room to the west.  The\
    \ walls\nare painted the same pink and the same stencil runs around the top of\
    \ the\nroom.  Here, Anastasia is the one who sleeps behind the screen and Maria's\n\
    bed is placed neatly in the center of the room.  A beautiful fireplace,\nsurrounded\
    \ by German tiles keeps the dampness out of the room.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11590
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11575
  extra_descs: []
- vnum: 11577
  name: Playroom
  description: "This is the childern's playroom, and although it is named as such\
    \ it is\nstill as elegant and regal as any other room in the palace.  This is,\n\
    essentially, where the Grand Duchesses and the young Tsarevich entertain\ntheir\
    \ own guests.  The room, despite it's enormous size, can not hold all of\nthe\
    \ many toys and dolls that the children own and each evening they place an\norder\
    \ for the toys they require for the next day and the selected toys are\nbrought\
    \ up from the basement by palace servants before the children awake.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11578
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 11590
  extra_descs: []
- vnum: 11578
  name: Aleksey's Room
  description: "The Tsarevich's room is quite simple in fact.  The walls are covered\
    \ in a\nlight blue fabric and the furniture is dark oak.  On the west wall of\
    \ the\nroom is a display case housing many magnificent ikons from monsasteries\
    \ and\nholy convents across Russia.  These were all given to Aleksey in the hopes\n\
    that they will somehow aid him as he struggles against his dreadful disease.\n\
