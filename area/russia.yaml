  description: "As you continue your journey into the Russian capitol you start to\
    \ recall\nstories about the wandering monks that lurk in these parts.  The starets\
    \ are\nsaid to have mystical powers of the mind and can be very unpredictable.\
    \  You\nquickly check for your weapon before continuing.  \n"
