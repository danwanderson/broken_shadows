  name: A Winding Road
  description: "You are traveling along a winding road on your way to the great city\
    \ of\nSt.  Petersburg.  The peaks of the Gora Roman-Kos Mountain pierce the sky\
    \ to\nyour south.  You may continue your journey into the city or turn back now\
    \ to\nmore familiar territory.  \n"
