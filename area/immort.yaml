- vnum: 1202
  name: The Center of the Universe
  description: "You are at the centre of the universe, everything is filled with bright\n\rlight
    in all colors. You feel time and space no longer exist here.\n\rExits fill the
    room in all 42 dimensions, leading everywhere.\n\r"
  room_flags: DQ
  sector: 0
