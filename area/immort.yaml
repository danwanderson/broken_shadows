    keywords: door
    exit_flags: AC
    key: -1
    to_vnum: 1218
  extra_descs:
  - keywords: statue
    description: |
      A statue of Pontius Pilate is here.  On it's face is the expression of some
      age old contemplation.  Standing at the statues bronzy feet is a Blood red
      shield that glimmers like a pool of blood.
