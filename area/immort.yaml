- vnum: 1205
  name: The Eye of the Hurricane
  description: "The shrieking winds of a monstrous storm surround you, spinning you
    around\n\rin an endless web of fury. But then, in the middle of turmoil, you find
    a\n\rstrange calm. You find yourself hovering in the calm eye of a hurricane.
    All\n\raround you you can see the desruction caused by the powerful storm. White\n\rhot
    flashes of lightning flicker from the depths of the hurricane.  But\n\reverything
    is strangely peaceful in here, with the sun shining in from above\n\rand a flock
    of birds winging across the sky.  You stretch out and relax, this\n\rstorm is
    going to be here a while.\n\r"
  room_flags: CN
  sector: 9
  owner:
  exits: []
  extra_descs: []
- vnum: 1206
  name: Walking on the Moon
  description: "The proud and lonely silence of Mare Imbrium surrounds you, as you
    gaze upon\n\rthe sterile splendor of the moon.  All around is the velvet curtain
    of night,\n\rstudded with a thousand gleaming jewels.  Below you hangs the beautiful\n\rfields
    of Earth, looking fragile and far away, but full of hope.  A sense of\n\rwistful
    regret touches you, as you think about what might have been, and what\n\rwill
    be.\n\r"
  room_flags: CN
  sector: 0
  owner:
  exits: []
  extra_descs:
  - keywords: crater mare imbrium
    description: "A small shipping tag is pinned to the ground with a worn hunting
      knife.\n\rUpon it is a dedication to Robert Anson Heinlein, the father of the
      future.\n\r"
- vnum: 1207
  name: Tia's Study
  description: "Books, more books then you can possibly imagine cover every available\n\rinch
    of space, save for the small path leading to an antique writting desk\n\rin the
    corner.  Books from every time period in history overflow from the\n\rcluttered
    bookshelves and into stacks on the floor.  Despite the clutter,\n\rthe room has
    a cozy feel to it, with a small fire burning in the fireplace\n\rset flush with
    the wall.  Looking around, you can see the great deal of\n\rknowledge and wisdom
    contained in these volumes, and you wonder what a\n\rGoddess of deceit would find
    so interesting.  Then you notice the small\n\rplaque on the wall.  \n\r"
  room_flags: DJ
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1208
  extra_descs:
  - keywords: desk
    description: "The desk is old, but looks to be well taken care of.  There are
      various\n\rqwill pens, paper, and reference books scattered about the top as
      if Tia was\n\rrecently looking for something of importance.  \n\r"
  - keywords: plaque
    description: "The plaque is wooden, well worn, and appears to be hand carved.
      \ The\n\rwords of wisdom look back at you: Mans greatness is not found in his
      armies,\n\rfor all men have armies.  Mans greatness is found in his ability
      to stop\n\rwar, seek truth, and find courage instead.  \n\r"
- vnum: 1208
  name: A Sea Cave
  description: "You are in a small cave in the cliff next to a deep green sea.  Fine\n\rgold
    and pink sand blanket the floor.  Shells are scattered and strewn\n\rabout.  A
    blow hole in roof of the cave allows beams of light to stream\n\rin and illuminate
    the cave.  The wind blows outside the entrance, but\n\ryou are protected from
    the weather in your cozy cave.  The foamy surf\n\rnever seems to quite reach your
    feet.  Several boulders here have been\n\rworn by time into a shape similar to
    a comfortable chair.\n\r"
  room_flags: DJP
  sector: 0
  owner:
  exits:
