- vnum: 1209
  name: Office of WarBird/Thanatos (The War Room)
  description: "This is where WarBird and Thanatos plan strategy. The rooms walls
    are\n\rjust giant bookcases. Deep comfortable chairs form a half circle round
    a\n\rcrackling fireplace. Prominantly displayed is a large painting of Thanatos\n\rbecause
    people often forget what the absentee immort looks like. Lastly you\n\rnotice
    two huge oaken desks strewn with toy cannons, books of military\n\rhistory and
    various battle maps.\n\rThere is a sign on the wall.\n\r"
  room_flags: DJP
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "Valhalla lies to the south.\n\r"
    keywords: door
    exit_flags: AD
    key: -1
    to_vnum: 1203
  extra_descs:
  - keywords: sign
    description: "The sign says:\n\r\n\rAnd please.\n\rNo smoking.\n\r"
- vnum: 1210
  name: Bigfoot's Office
  description: "The first thing you notice about this office is the floor; it\n\ris
    a black & white checkerboard pattern, with 8 squares to a side.  The\n\rsouth
    wall is a HUGE picture window that produces a magnificent view of \n\rthe land.
    \ In front of the window is a large desk.  Completely covering\n\rthe east wall
    is a bookshelf, that is crammed full.  In the northwest\n\rcorner, you notice
    a statue.\n\r"
  room_flags: DJP
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "Valhalla is to the north\n\r"
    keywords: door
    exit_flags: AD
    key: -1
    to_vnum: 1217
  extra_descs:
  - keywords: desk
    description: "This desk is much larger than anyone could possibly need.  At one
      end you \n\rnotice a large, disorderly mass of papers; it must be all his immortal\n\rpaperwork.
      \ At the other end is a magnificent wooden inlaid board with\n\rhandcrafted
      ebony and hardwood pieces.\n\r"
  - keywords: statue
    description: "You recognize this as a statue of Robert James Fischer, one of the
      most \n\rcreative, if not eccentric, players of all time.  The inscription on
      the\n\rbase reads, \"I like the moment when I crush a man's ego.\"\n\r"
  - keywords: bookshelf
    description: "This is the most amazing collection of chess books you have ever
      seen.\n\rEverything from Damiano's manuscripts, to a complete collection of
      the\n\rEncyclopedia of Chess Openings, to the latest Imformants are all here.\n\r"
- vnum: 1211
  name: Arena of Judgement
  description: "The scene lain before you is one that gives you the feeling of being
    placed\n\runder a higher authority.  The jury is out.  A statue of Pontius Pilate
    is\n\rin the aft of the Arena.  Staring balefully, the statue faces a distant\n\rhillside
    where many aged crosses still stand.  The Arena is set in a wide\n\rpit-like field
    of trampled bloodstained grass, and is guarded by high walls\n\rof veinous marble.
    \ A bloodstone seat awaits the true paragon of Romanity.\n\r"
  room_flags: DJP
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "Valhalla is to the south.\n\r"
    keywords: door
    exit_flags: AD
    key: -1
    to_vnum: 1218
  extra_descs:
  - keywords: statue
    description: "A statue of Pontius Pilate is here.  On it's face is the expression
      of some\n\rage old contemplation.  Standing at the statues bronzy feet is a
      Blood red\n\rshield that glimmers like a pool of blood.\n\r"
- vnum: 1212
  name: The Realm of the Dead
  description: "You are standing on an immense, grey stone floor that stretches as
    far as you\n\rcan see in all directions.  Rough winds plunging from the dark,
    starless sky\n\rtear savagely at your fragile body.\n\r"
