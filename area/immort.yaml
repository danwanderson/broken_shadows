- vnum: 1204
  name: 'Priscilla''s Pleasure Palace '
  description: "As you look around you, you see the largest collection of erotic toys\n\rin
    the world!!!  On a table in the middle of the room lies a book titled :\n\r\"All
    You Ever Wanted to Know About Sex..But Were Afraid to Ask\"\n\rThere are things
    here that you never even imagined in your wildest dreams!\n\r"
  room_flags: DJP
  sector: 0
  owner:
  exits:
