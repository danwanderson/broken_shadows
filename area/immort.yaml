- vnum: 1203
  name: Valhalla
  description: "This is the huge Hall of Valhalla, where the Gods rule supreme.  The\n\rcavernous
    building stretches infinitely in all directions.  Valhalla \n\rcontinues to the
    east, and the gods make their homes north and south of\n\rthe halls.  The golden
    gates are to the west.  You know not what lies \n\rupward...\n\r"
  room_flags: DP
  sector: 0
  owner:
  exits:
