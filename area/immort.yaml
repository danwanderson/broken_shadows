    description: |
      The sign says:

      And please.
      No smoking.
- vnum: 1210
  name: Bigfoot's Office
  description: "The first thing you notice about this office is the floor; it\nis\
    \ a black & white checkerboard pattern, with 8 squares to a side.  The\nsouth\
    \ wall is a HUGE picture window that produces a magnificent view of \nthe land.\
    \  In front of the window is a large desk.  Completely covering\nthe east wall\
    \ is a bookshelf, that is crammed full.  In the northwest\ncorner, you notice\
    \ a statue.\n"
  room_flags: DJP
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: |
      Valhalla is to the north
    keywords: door
    exit_flags: AC
    key: -1
    to_vnum: 1217
  extra_descs:
  - keywords: desk
    description: "This desk is much larger than anyone could possibly need.  At one\
      \ end you \nnotice a large, disorderly mass of papers; it must be all his immortal\n\
      paperwork.  At the other end is a magnificent wooden inlaid board with\nhandcrafted\
      \ ebony and hardwood pieces.\n"
  - keywords: statue
    description: "You recognize this as a statue of Robert James Fischer, one of the\
      \ most \ncreative, if not eccentric, players of all time.  The inscription on\
      \ the\nbase reads, \"I like the moment when I crush a man's ego.\"\n"
  - keywords: bookshelf
    description: |
      This is the most amazing collection of chess books you have ever seen.
      Everything from Damiano's manuscripts, to a complete collection of the
      Encyclopedia of Chess Openings, to the latest Imformants are all here.
- vnum: 1211
  name: Arena of Judgement
  description: |
    The scene lain before you is one that gives you the feeling of being placed
    under a higher authority.  The jury is out.  A statue of Pontius Pilate is
    in the aft of the Arena.  Staring balefully, the statue faces a distant
    hillside where many aged crosses still stand.  The Arena is set in a wide
    pit-like field of trampled bloodstained grass, and is guarded by high walls
    of veinous marble.  A bloodstone seat awaits the true paragon of Romanity.
  room_flags: DJP
  sector: 0
  owner: ''
  exits:
