  name: Office of WarBird/Thanatos (The War Room)
  description: |
    This is where WarBird and Thanatos plan strategy. The rooms walls are
    just giant bookcases. Deep comfortable chairs form a half circle round a
    crackling fireplace. Prominantly displayed is a large painting of Thanatos
    because people often forget what the absentee immort looks like. Lastly you
    notice two huge oaken desks strewn with toy cannons, books of military
    history and various battle maps.
    There is a sign on the wall.
  room_flags: DJP
  sector: 0
  owner: ''
  exits:
