  name: The Chat Room
  description: "You are lounging in a quiet cosy parlour, warmed by a gentle magical
    fire\n\rwhich twinkles happily in a warm fireplace.  This is one of the many rooms\n\rwhere
    the heroes and gods come to socialize.  It is by far one of the most\n\rcomfortable!
    \n\r"
