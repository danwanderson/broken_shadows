- vnum: 1201
  name: Moses' Hangout
  description: "You see here a cozy little room with a fireplace.  You can tell it
    is\n\rMoses' room by the two stone tablets and a bible on a small ledge near the\n\rfireplace.
    \ This room was designed for total relaxation.  You can watch\n\rtelevision, listen
    to the stereo, even soak in a hot tub.  There is a bell\n\rhere for the butler.
    \ \n\r"
  room_flags: DQ
  sector: 0
  owner:
  exits:
