- vnum: 9345
  name: Along the seashore
  description: "You start to feel the heat of Summer.  Amongst the rocky beach you\
    \ notice\nhidden forms which could be camouflaged crabs. \n"
  room_flags: '0'
  sector: 2
  owner: ''
  exits:
  - dir: 1
