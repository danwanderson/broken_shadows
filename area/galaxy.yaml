- vnum: 9369
  name: Along the path of the Dipper
  description: "You see stars around you but nothing of special interest.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9368
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9370
  extra_descs: []
- vnum: 9370
  name: End of the Dipper
  description: "You have finished the path of the Dipper.  Here, the most prominent
    feature\n\ris a set of claw-marks.  You also notice a room to the south; it looks
    as\n\rif Polaris could lie here. \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9369
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9371
  extra_descs: []
- vnum: 9371
  name: The Polar Star
  description: "You have entered the private chamber of Polaris.  This is a room of
    great\n\rsignificance.  You can see a powerful telescope pointing down towards
    the\n\rUniverse (SNOOPING!).  It is from here that Polaris commands the Universe.\n\rYou
    feel you have come to end of your search in this galaxy ...\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 9370
