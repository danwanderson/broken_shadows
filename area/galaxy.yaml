    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9339
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9346
  extra_descs: []
- vnum: 9346
  name: Within the Deep Jungle
  description: "Nearby you can hear the roar of an animal.  Peering through the dense\n\rovergrowth
    you think you glimpse a pair of menacing eyes.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9345
  extra_descs: []
- vnum: 9347
  name: Inside a Luxurious Bedroom
  description: "A peaceful feeling overtakes you.  You see a magnificent four-poster
    bed.\n\rIt's a double bed and there is only room for one more!  Well, what now
    ... ?\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9348
  extra_descs: []
- vnum: 9348
  name: The Supreme Court
  description: "You are standing inside the dock of a court.  You feel an overwhelming\n\rsense
    of guilt and you want to protest your innocence!  You fear retribution\n\rand
    feel yourself exposed, just like the trees in Autumn.\n\r"
  room_flags: 8
  sector: 1
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9339
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9349
  extra_descs: []
- vnum: 9349
  name: In the Dry Desert
  description: "You are confused by the shifting sands around you.  Through the shimmering\n\rheat
    you see the hazy outline of a giant scorpion ... is this a mirage?\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9348
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9350
  extra_descs: []
- vnum: 9350
  name: In the Woods
  description: "You find yourself in the center of a Centaurion hunting party.  You'd
    better\n\rhide yourself before you become the 'center attraction'!\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9349
  extra_descs: []
- vnum: 9351
  name: On a Mountain Peak
  description: "You are on the highest peak of the Universe.  You look around and
    notice\n\rclouds below you.  One of the clouds resembles a goat-like form.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9352
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9339
  extra_descs: []
- vnum: 9352
  name: Inside a Waterfall
  description: "The noise is deafening.  You are about to take a drink when you realize\n\rthat
    the water is being poured out of a vessel of mind-boggling proportions!\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9351
  extra_descs: []
- vnum: 9353
  name: Inside a Gigantic Clam
  description: "You feel uneasy here as if some evil magic is being cast on you.\n\rYou
    suspect something fishy is going on in here.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9342
  extra_descs: []
- vnum: 9354
  name: End of the Mystic Chains
  description: "You have reached the end of the mystic chains.  Looking up, you notice
    a\n\rsmall landing on which you can climb.  However, there seems to be another\n\rforcefield
    blocking your way.  \n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 4
    desc: "You see the forcefield of Summer.\n\r"
    keywords: forcefield
    exit_flags: 15
    key: 9325
    to_vnum: 9355
  - dir: 5
    desc: "You see the forcefield of Spring.\n\r"
    keywords:
    exit_flags: 9
    key: 9324
    to_vnum: 9339
  extra_descs: []
- vnum: 9355
  name: On the Draco
  description: "You realize you are standing on scaly ground.  As you wonder what
    the ground\n\ris made of, you feel the ground move.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9356
  - dir: 5
    desc:
    keywords:
    exit_flags: 9
    key: 9325
    to_vnum: 9354
  extra_descs: []
- vnum: 9356
  name: Tail of the Draco
  description: "At last you realize that you are on a giant snake-like dragon called
    the\n\rDraco, the guardian of the inner galaxy.  You realize that the Draco is\n\ractually
    flying now! \n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9357
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9355
  extra_descs: []
- vnum: 9357
  name: Path of the Draco
  description: "As you struggle along this scaly creature you realize that the only
    way\n\ryou can reach to the inner galaxy is by going all the way to the head.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9358
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9356
  extra_descs: []
- vnum: 9358
  name: Near the Legs of Draco
  description: "You are approaching the leg part of this creature.  You look around
    and see\n\rthat the surrounding is all dark except for some faint lights from
    the\n\rdistant stars.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9359
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9357
  extra_descs: []
- vnum: 9359
  name: On the Back of Draco
  description: "At last you are half way through this long, weary journey. You can
    see\n\rthe wings are to the east but it seems that another forcefield is in the
    way.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 1
    desc: "You see the forcefield of Autumn.\n\r"
    keywords: forcefield
    exit_flags: 15
    key: 9326
    to_vnum: 9360
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9358
  extra_descs: []
- vnum: 9360
  name: Between the Wings of Draco
  description: "You hear some giant flapping sounds nearby.  You desperately try to
    get hold\n\rof something as the forceful gusts sweep you away.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9361
  - dir: 3
    desc:
    keywords:
    exit_flags: 9
    key: 9326
    to_vnum: 9359
  extra_descs: []
- vnum: 9361
  name: Near the Arms of Draco
  description: "From above you can faintly make out the gigantic arms which extend
    far\n\rbeyond into the darkness.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9362
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9360
  extra_descs: []
- vnum: 9362
  name: On the Neck of Draco
  description: "Your journey is now approaching the end.  However, this neck seems
    to be\n\rendless.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9361
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9363
  extra_descs: []
- vnum: 9363
  name: Approaching the Head of Draco
  description: "You have come to the end of Draco, but you can't find the head!\n\rYou
    see a forcefield to the south, some distance away, beyond reach.\n\rIf only the
    head were here ...\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9362
  - dir: 2
    desc: You see the forcefield of Winter.
    keywords: forcefield
    exit_flags: 15
    key: 9327
    to_vnum: 9364
  extra_descs: []
- vnum: 9364
  name: At the Entrance of the Great Dipper
  description: "Now you are in the innermost part of the galaxy.  What you are walking
    on now\n\ris the path of the Great Dipper or the Plough.  You notice that there
    are\n\rseven rooms in this zone, representing the seven stars of the Dipper.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: You see the forcefield of Winter.
    keywords: forcefield
    exit_flags: 9
    key: 9327
    to_vnum: 9363
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9365
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9366
  extra_descs: []
- vnum: 9365
  name: Cassiopeia's Throne
  description: "This is the Throne room of the Queen of the Universe.  From here you
    can see\n\revery star and constellation in the Universe. \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9364
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9367
  extra_descs: []
- vnum: 9366
  name: Along the Path of the Dipper
  description: "You see stars around you but nothing of special interest.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9364
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9367
  extra_descs: []
- vnum: 9367
  name: Cepheus' Throne
  description: "This is the Throne room of the King of the Universe.  From here you
    can see\n\revery star and constellation in the Universe. \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
