- vnum: 9301
  name: Inside a Tavern
  description: "You are inside a dimly-lit room.  The atmosphere makes you feel uncomfortable.\n\rIn
    front of you stands a mysterious gypsy.  She whispers 'Your fate and\n\rdestiny
    lie beyond this world.'  You are still wondering what she means when\n\ryou suddenly
    notice the crystal ball ... it glows fiercely and displays the\n\rUniverse!\n\r"
  room_flags: 8
