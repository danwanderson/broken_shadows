- vnum: 8917
  name: The greenhouse
  description: "This is Dragons' greenhouse. Green light filters in slantwise through\
    \ the\nplants, giving the room a subtropical ambience. It is not really hot in\
    \ here,\nthough, rather a pleasantly warm temperature. The walls are all windows,\
    \ except \nthe eastern one joining the greenhouse to the main building, but it\
    \ is hard to \nsee out for all the greenery here. There is a set of easy-chairs\
    \ and a glass\ncoffee table. To the south, there is a wide double door out to\
    \ a sunlit \nterrace.\n"
  room_flags: DJ
  sector: 0
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 8916
  - dir: 2
    desc: ''
    keywords: door
    exit_flags: A
    key: -1
    to_vnum: 8919
  extra_descs: []
- vnum: 8918
  name: The dining hall
  description: |
    This is Dragons' dining hall. There is a large long solid oak table,
    seating at least 24, with heavy, wooden chairs to match. The oak panel walls
    are filled with paintings. There are doors to the north and east, and to the
    west there is a wide double door opening out onto the sunlit terrace.
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: door
    exit_flags: A
    key: -1
    to_vnum: 8916
  - dir: 1
    desc: ''
    keywords: door
    exit_flags: A
    key: -1
    to_vnum: 8915
  - dir: 3
    desc: ''
    keywords: wide door
    exit_flags: A
    key: -1
    to_vnum: 8919
  extra_descs:
  - keywords: painting paintings
    description: "There are many, many beautiful paintings of famous dragons of history\
      \ and\nliterature. There is a big one of Smaug, a group picture of Cuspidorian\
      \ Toxic\nDragons, a rather fearsome picture of Norse Chaos incarnate, a grainy\
      \ black-\nand-white photograph of Vorgulremik the Steel Dragon, a romantic picture\
      \ of \nDalvenjah the Mindijaran and Allan the man become dragon. There are three\n\
      empty frames labeled 'The Chimerical', 'The Mythical' and 'The Hypothetical',\n\
      A panoramic picture of Strabo flying between the worlds dominate one wall, \n\
      while a dragons-eye view of Pern (with dragons in the foreground, of course)\
      \ \nfills another. There even are a few rare medieval renditions of the great\
      \ \nbeast of the Revelation. Over the head of the table hangs a rather modest\
      \ \nportrait of a silver Dragon, sparkling with blue lightening, looking amused.\n"
- vnum: 8919
  name: The terrace
  description: |
    You are standing on a sunlit terrace in front of Dragon's mansion. To the
    west, there is a splendid view over the field down over the lake. To the north
    is the greenhouse, its large windowpanes shimmering with weird and wonderful
    colors, while a double door leads into the house proper to the east. It is
    warm and calm here. There is a white-painted table with a parasol here,
    together with a matched set of chairs.
  room_flags: CD
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: door
    exit_flags: A
    key: -1
    to_vnum: 8917
  - dir: 1
    desc: ''
