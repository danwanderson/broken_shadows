- vnum: 8905
  name: The sacred glade
  description: "You are standing in the middle of the sacred glades, where the citizens
    of\n\rMidgaard come to celebrate the spring, where farmers give thanks for bountiful\n\rharvest
    in the fall, and where lovers stroll in summer. You feel seasons of\n\rremembered
    happiness and joy taking Your sorrows and worries away from You,\n\rleaving You
    calm and invigorated, ready for the world. Paths lead into the\n\rholy grove to
    the east, north and west, while to the south a wide, sunny field\n\rslopes down
    to a sparkling lake.  Above you is a strange shimmering, almost\n\rlike something
    from another world....\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "The path wind its way north, disappearing through the tall trees.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8902
  - dir: 1
    desc: "The path wind its way through the tall trees, disappearing out of sight.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8906
  - dir: 2
    desc: "To the south, a wide, sunny field stretch out, sloping down towards a brightly\n\rglittering
      lake.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8908
  - dir: 3
    desc: "The path wind its way west between stately poplars and oaks.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8904
  - dir: 4
    desc: "The shimmering grows in intensity as you look at it, beckoning you to reach\n\rupwards...\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9000
  extra_descs: []
- vnum: 8906
  name: The holy grove
  description: "You are standing amidst the ancient oaks and poplars in the holy grove.
    You\n\rcan feel a strange sensation of joy and calm seeping through You, as if
    great\n\rburdens have been lifted from Your shoulders. To the south, You glimpse
    an open\n\rarea through the trees, while paths lead away north and west.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "The path wind its way through the tall trees, disappearing out of sight.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8903
  - dir: 2
    desc: "To the south, just beyond the trees, you can see a wide green lawn, and
      past\n\rthe lawn, a softly shimmering, rainbow-colored mansion.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8909
  - dir: 3
    desc: "The path wind its way through the tall trees, disappearing out of sight.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8905
  extra_descs:
  - keywords: mansion
    description: "The mansion is a sprawling, two-story affair with three wings, where
      the top\n\rof one wing serves as balcony. The walls look as marble would do,
      if marble\n\rchanged color slowly, continuously, through the entire spectrum.
      There are\n\rlarge windows all over the house.\n\r"
- vnum: 8907
  name: The holy grove
  description: "You are standing amidst the tall, majestic trees in the southern end
    of the\n\rholy grove. Paths lead north and east. To the east, You can see a wide,
    open\n\rfield, sloping gently down towards a bright, glittering lake. Somehow,
    here\n\ryou feel an inexplicable happiness, as if the world's troubles no longer\n\rreally
    matter to you.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "The path leading north is soon lost out of sight amongst the ancient oaks
      and\n\rpoplars.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8904
  - dir: 1
    desc: "To the east, the path leads out into a wide, sunny summer's field, sloping\n\rsouth
      towards a beautiful lake. Past the field You can see a stately mansion,\n\rshimmering
      gently in all the rainbow's colours.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8908
  extra_descs:
  - keywords: mansion
    description: "The mansion is a sprawling, two-story affair with three wings, where
      the top\n\rof one wing serves as balcony. The walls look as marble would do,
      if marble\n\rchanged color slowly, continuously, through the entire spectrum.
      There are\n\rlarge windows all over the house.\n\r"
- vnum: 8908
  name: The sunny field
  description: "You are standing in the middle of a wide, summery, sunlit field. There
    is a\n\rfragrance of spring in the air, a sound of summer and a feeling of eternal\n\rSaturday
    afternoon. To the south is a clear, sparkling lake, and to the north\n\rand west
    is the holy grove. In the wood's edge, to the east, is a stately man-\n\rsion,
    shimmering softly through the colors of the rainbow. You feel as if You\n\rcould
    spend the rest of your life here, lying on your back and looking at the\n\rpatterns
    of the clouds as they gently drift across the sky.\n\r"
  room_flags: 8
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "There is a path leading north towards the sacred glade.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8905
  - dir: 1
    desc: "To the east, You can see the rainbow-colored mansion, shimmering like some-\n\rthing
      out of this world.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8919
  - dir: 3
    desc: "There is a small path leading into the woods to the west.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8907
  extra_descs:
  - keywords: mansion
    description: "The mansion is a sprawling, two-story affair with three wings, where
      the top\n\rof one wing serves as balcony. The walls look as marble would do,
      if marble\n\rchanged color slowly, continuously, through the entire spectrum.
      There are\n\rlarge windows all over the house. There is a terrace in front of
      the house,\n\rnext to the low wing, which is almost completely windows.\n\r"
- vnum: 8909
  name: The croquet lawn
  description: "You are standing on a immaculately manicured green lawn, the kind
    you only\n\rget after 200 years of meticulous work. There is a winding stone path
    leading\n\rfrom the wood's edge to the north, to the softly shimmering, rainbow-colored\n\rmansion
    to the south. This place enjoys a perpetual cool, sunny summers after-\n\rnoon.\n\r"
  room_flags: 4
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "To the north, the winding stone path leads into the holy grove.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8906
  - dir: 2
    desc: "To the south, the path leads straight up to the front door of the mansion.\n\r"
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8910
  extra_descs:
  - keywords: mansion
    description: "The mansion is a sprawling, two-story affair with three wings, where
      the top\n\rof one wing serves as balcony. The walls look as marble would do,
      if marble\n\rchanged color slowly, continuously, through the entire spectrum.
      There are\n\rlarge windows all over the house.\n\r"
- vnum: 8910
  name: The foyer
  description: "You are standing in the foyer of Dragon's mansion. The wide double
    door to\n\rthe croquet lawn is to the north, flanked by large windows. The walls
    are\n\rpanelled in oak and hung with strange paintings.  There is door in the
    south\n\rwall.\n\r"
  room_flags: 12
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "Through the windows next to the door you can see the croquet lawn, bathed
      in\n\rafternoon sunlight.\n\r"
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8909
  - dir: 2
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8911
  extra_descs:
  - keywords: painting paintings
    description: "They are strange indeed, works of breathtaking precision depicting
      obviously\n\rimpossible motifs, like a sky filled with headless men, all dressed
      in some\n\rblack costume (including hats), or a lady standing, blue from the
      waist up, or\n\rsome pieces of plankwood that seems to be melting away like
      snow, or a night\n\rsky with a dove-shaped hole of bright day sky in the middle.\n\r"
- vnum: 8911
  name: The hallway
  description: "You are in the north end of a connecting hallway, tastefully decorated
    with\n\roak paneling and the coat-of-arms of various famous nobles hung on the
    walls.\n\rThe hallway leads south, and there is a door in the eastern wall.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8910
  - dir: 1
    desc:
    keywords: door
    exit_flags: 7
