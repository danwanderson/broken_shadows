  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8917
  extra_descs: []
- vnum: 8917
  name: The greenhouse
  description: "This is Dragons' greenhouse. Green light filters in slantwise through
    the\n\rplants, giving the room a subtropical ambience. It is not really hot in
    here,\n\rthough, rather a pleasantly warm temperature. The walls are all windows,
    except \n\rthe eastern one joining the greenhouse to the main building, but it
    is hard to \n\rsee out for all the greenery here. There is a set of easy-chairs
    and a glass\n\rcoffee table. To the south, there is a wide double door out to
    a sunlit \n\rterrace.\n\r"
  room_flags: 520
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8916
  - dir: 2
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8919
  extra_descs: []
- vnum: 8918
  name: The dining hall
  description: "This is Dragons' dining hall. There is a large long solid oak table,\n\rseating
    at least 24, with heavy, wooden chairs to match. The oak panel walls\n\rare filled
    with paintings. There are doors to the north and east, and to the\n\rwest there
    is a wide double door opening out onto the sunlit terrace.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8916
  - dir: 1
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8915
  - dir: 3
    desc:
    keywords: wide door
    exit_flags: 7
    key: -1
    to_vnum: 8919
  extra_descs:
  - keywords: painting paintings
    description: "There are many, many beautiful paintings of famous dragons of history
      and\n\rliterature. There is a big one of Smaug, a group picture of Cuspidorian
      Toxic\n\rDragons, a rather fearsome picture of Norse Chaos incarnate, a grainy
      black-\n\rand-white photograph of Vorgulremik the Steel Dragon, a romantic picture
      of \n\rDalvenjah the Mindijaran and Allan the man become dragon. There are three\n\rempty
      frames labeled 'The Chimerical', 'The Mythical' and 'The Hypothetical',\n\rA
      panoramic picture of Strabo flying between the worlds dominate one wall, \n\rwhile
      a dragons-eye view of Pern (with dragons in the foreground, of course) \n\rfills
      another. There even are a few rare medieval renditions of the great \n\rbeast
      of the Revelation. Over the head of the table hangs a rather modest \n\rportrait
      of a silver Dragon, sparkling with blue lightening, looking amused.\n\r"
- vnum: 8919
  name: The terrace
  description: "You are standing on a sunlit terrace in front of Dragon's mansion.
    To the\n\rwest, there is a splendid view over the field down over the lake. To
    the north\n\ris the greenhouse, its large windowpanes shimmering with weird and
    wonderful\n\rcolors, while a double door leads into the house proper to the east.
    It is\n\rwarm and calm here. There is a white-painted table with a parasol here,\n\rtogether
    with a matched set of chairs.\n\r"
  room_flags: 12
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8917
  - dir: 1
    desc:
    keywords: double door
    exit_flags: 7
    key: -1
    to_vnum: 8918
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8908
  extra_descs: []
- vnum: 8950
  name: At the edge of the grove
  description: "You are standing at the entrace of a beautiful grove of trees, and
    your\n\rheart is filled with pure, peaceful thoughts.  This looks like a safe
    place\n\rto recover from the wounds of adventuring.  A faint path through the
    grove\n\rlies to the north, and you can see the eastern road to the south.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "A faint trail leads deeper into the grove.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8951
  - dir: 2
    desc: "A wide road lies to the south.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3526
  extra_descs: []
- vnum: 8951
  name: Inside the grove
  description: "As you walk among the stately oaks of this grove, you feel at peace
    and \n\rin harmony with this beautiful forest.  If only the rest of the lands
    were\n\rso tranquil.  The trail turns towards the east, leading into the secluded\n\rtrees
    of the druids' holy grove, and a path back to the eastern road lies\n\rsouth.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 1
    desc: "You see the stately oaks and poplars of the holy grove.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8904
  - dir: 2
    desc: "A faint trail heads towards the eastern road.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8950
  extra_descs: []
- vnum: 8999
  name: The fog
  description: "You are in a grey fog, falling, screaming in pain as you realize\n\rthat
    you are being torn to nothing, atom by atom, falling and falling \n\rand falling
    ...\n\r...\n\r.\n\r"
  room_flags: 4
  sector: 0
  owner:
  exits: []
  extra_descs: []
