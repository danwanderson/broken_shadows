- vnum: 8914
  name: The red room
  description: "You are in the red room, one of the guest rooms in Dragon's mansion.
    The\n\rwalls are wallpapered a deep warm red, and dark mahogany panelling nicely
    com-\n\rplements them. There is a large, warm waterbed and a sofa group in dark
    wood\n\rwith leather upholstery, including a coffee table. Heavy brown curtains
    are\n\rpulled away from the wide windows, to reveal a nice view towards the grove.\n\r"
  room_flags: 520
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8913
  extra_descs: []
- vnum: 8915
  name: The kitchen
  description: "You are standing in the middle of Dragon's kitchen. Contrary to popular\n\rbelief,
    He *doesn't* eat virgins, which is amply demonstrated by the large\n\rvariety
    of foodstuffs found here on the shelves. There are numerous cans of\n\rtomatoes,
    peas, corn etc., vines of garlic, a *Huge* array of small spice jars\n\ralong
    several shelves and a large combo refrigerator/freezer. A big oven and\n\rstove
    is lurking in a corner. There is some proof here that Dragon is a less\n\rthan
    meticulous housekeeper... There are doors to the north and west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8913
  - dir: 3
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8918
  extra_descs: []
- vnum: 8916
  name: The ballroom
  description: "You are standing in the middle of a vast palisander floor. This is
    where\n\rDragon entertains large number of guests, but the cloth-covered chairs\n\rstanding
    forlornly in a corner suggests that this does not happen often.\n\rThere are doors
    in the south and west walls, while to the east there is a\n\rshort corridor to
    the greenhouse.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8913
  - dir: 2
    desc:
    keywords: door
    exit_flags: 7
    key: -1
