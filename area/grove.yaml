    to_vnum: 8912
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8913
  extra_descs: []
- vnum: 8912
  name: The blue room
  description: "You are in the blue room, one of the guest rooms in Dragon's mansion.
    The\n\rwalls are (surprise!) blue, and the rest of the room is decorated in similar\n\rshades,
    producing a very nice, cool effect. There is a large bed and a\n\rmatching set
    of sofas, easy-chairs and a coffee table. Through the venetian\n\rblinds in front
    of the large east window you can see the edge of the grove.\n\r"
  room_flags: 520
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords: door
    exit_flags: 7
    key: -1
    to_vnum: 8911
  extra_descs: []
- vnum: 8913
  name: The hallway
  description: "You are standing in the south end of the hallway. There are doors
    in the\n\relegant oak-panelled walls to the south, east and west. Many different\n\rcoat-of-arms
    adorn the walls here.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8911
