- vnum: 8950
  name: At the edge of the grove
  description: |
    You are standing at the entrace of a beautiful grove of trees, and your
    heart is filled with pure, peaceful thoughts.  This looks like a safe place
    to recover from the wounds of adventuring.  A faint path through the grove
    lies to the north, and you can see the eastern road to the south.
  room_flags: '0'
  sector: 3
  owner: ''
  exits:
  - dir: 0
    desc: |
      A faint trail leads deeper into the grove.
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 8951
  - dir: 2
    desc: |
      A wide road lies to the south.
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 3526
  extra_descs: []
- vnum: 8951
  name: Inside the grove
  description: "As you walk among the stately oaks of this grove, you feel at peace\
    \ and \nin harmony with this beautiful forest.  If only the rest of the lands\
    \ were\nso tranquil.  The trail turns towards the east, leading into the secluded\n\
    trees of the druids' holy grove, and a path back to the eastern road lies\nsouth.\n"
  room_flags: '0'
  sector: 3
  owner: ''
  exits:
  - dir: 1
    desc: |
      You see the stately oaks and poplars of the holy grove.
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 8904
  - dir: 2
    desc: |
      A faint trail heads towards the eastern road.
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 8950
  extra_descs: []
- vnum: 8999
  name: The fog
  description: "You are in a grey fog, falling, screaming in pain as you realize\n\
    that you are being torn to nothing, atom by atom, falling and falling \nand falling\
    \ ...\n...\n.\n"
  room_flags: C
  sector: 0
  owner: ''
  exits: []
  extra_descs: []
