- vnum: 10634
  name: Royal Guest's Sitting Room
  description: "After walking into this room, you are now certain these quarters are\n\
    reserved for people only held in the highest esteem.  This room contains\nmany\
    \ odd paintings, one of which is all alone on one of the walls.  Who\nresides\
    \ here?  Who owns this place?  You want to search for answers, before\nyou find\
    \ out the hard way....  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
