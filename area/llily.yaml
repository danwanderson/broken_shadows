    to_vnum: 10639
  extra_descs: []
- vnum: 10639
  name: A Darkened Hallway
  description: "Your footsteps echo through the hallway as you walk on the hardwood\n\rfloor.
    \ You hear noises further down, it sounds like a man crying.  Doors\n\rare closed
    on either side of you, for good reason...  Not everyone would\n\rwant to venture
    in..  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
