- vnum: 10639
  name: A Darkened Hallway
  description: "Your footsteps echo through the hallway as you walk on the hardwood\n\
    floor.  You hear noises further down, it sounds like a man crying.  Doors\nare\
    \ closed on either side of you, for good reason...  Not everyone would\nwant to\
    \ venture in..  \n"
