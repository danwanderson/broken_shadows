  extra_descs: []
- vnum: 10652
  name: Smaller Cobblestone Road
  description: "Now you can smell the scents of dinner, so now you know where the\
    \ mothers\nare.  The chattering of the children is starting to get on your nerves,\
    \ and\nsomething just doesn't feel right.  Everyone is so....  Happy.  Each lawn\n\
    consists of a boy and a girl, with freshly planted flower beds that no dogs\n\
    have got to.  Not far away, you can see a restaraunt, and a happy mailman\ndelivering\
    \ mail.  Now you *know* something isn't right...  Happy mailmen??  \n"
  room_flags: '0'
  sector: 1
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
