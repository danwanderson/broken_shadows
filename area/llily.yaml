- vnum: 10655
  name: A Romantic Table
  description: "Following the young hostess, she seats you at a quiet, dimly lit table\
    \ in\nthe corner.  The mauve tablecloth is accented with a lace overlay.  Matching\n\
    roses are partially opened in a crystal bud vase, and a white candle\nflickers\
    \ sensually on your face.  Too bad you are dining alone!  \n"
  room_flags: A
  sector: 0
  owner: ''
  exits:
  - dir: 2
    desc: ''
    keywords: ''
