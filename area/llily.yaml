    to_vnum: 10645
  extra_descs: []
- vnum: 10645
  name: A Dishevled Room
  description: "This room is a pig sty, as your mother used to say.  Clothes are\n\reverywhere,
    the bed is unmade, and picture frames are thrown about the\n\rfloor.  There is
    no sign of old dishes though, or of any animals living in\n\rhere.  It's not quite
    so dirty as it is messy....  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 1
    key: 0
    to_vnum: 10644
  extra_descs: []
- vnum: 10646
  name: Servant's Quarters
  description: "This room looks a little better than the last, which is lucky for
    your\n\rstomach.  It is a bit messy, but it looks lived-in.  The bed isn't made,
    but\n\ra pad of paper and a pen are on the nightstand.  Peering down at the paper,\n\ryou
    can't understand the writing, but you do understand that the ink is\n\rfresh indeed...
    \ \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 1
    key: 0
    to_vnum: 10643
  extra_descs: []
- vnum: 10647
  name: Servant's Quarters
  description: "Walking into the room, you hear someone humming from behind a Chinese\n\rscreen.
    \ Now you know this floor isn't abandoned, but you still want to\n\rleave before
    this servant discovers you..  \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 1
    key: 0
    to_vnum: 10644
  extra_descs: []
- vnum: 10648
  name: Enormous Cobblestone Road
  description: "Trekkin' on down the bumpy road, you see merchants walking around
    and\n\rcustomers chatting with each other.  Everyone seems friendly enough, want\n\rnot
    make yourself comfortable?  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
