  extra_descs: []
- vnum: 10653
  name: Smaller Cobblestone Road
  description: "You are now standing outside Mardeteit's, and the aromas are wonderful\n\
    even outside.  Peering inside, it looks quite fancy, and the decorations,\nflowers,\
    \ and fabrics are all perfectly matched.  Somehow, you aren't\nsurprised.  \n"
  room_flags: '0'
