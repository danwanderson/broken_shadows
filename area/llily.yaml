    exit_flags: 0
    key: 0
    to_vnum: 10644
  extra_descs: []
- vnum: 10644
  name: Darkened Hallway
  description: "The crying is just on the other side of the door facing you.  It sounds\n\ralmost
    like a tired crying, pitiful.  There is no light peeking out from\n\runder the
    door, you can barely see enough to fumble for the doorknob..  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
