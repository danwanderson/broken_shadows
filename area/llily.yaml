    exit_flags: 0
    key: 0
    to_vnum: 10631
  extra_descs: []
- vnum: 10631
  name: The Master Powder Room
  description: "This room is much smaller, and houses the normal facilities found
    in a\n\rpowder room.  It is decorated in soft lavender, to match the other rooms.
    \n\rThe smell of distant flowers tickles your nose, as also a sense of impending\n\rdanger..
    \ \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10630
  extra_descs: []
- vnum: 10632
  name: Guest Bedroom
  description: "This guest bedroom has more than enough room for a couple, with a
    lovely\n\rcanopy bed in the center.  White satin draperies flow over the bay window\n\rand
    the bed, and the floor is made of black marble.  It looks like a lovely,\n\rsafe
    place to spend the night...  *grin* \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10625
  extra_descs: []
- vnum: 10633
  name: Royal Guest Quarters
  description: "These must be the quarters for the special guests, it is larger and
    more\n\rexquisite than the others you have seen so far.  The bedframe is made
    of a\n\rdeep colored wood, and looks quite heavy.  Dressers and closets made of
    the\n\rsame wood also fill the room, and you can see another door further in.
    \ A\n\rmirror is hung from the ceiling, and a palm trees are scattered about the\n\rroom.
    \ \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10634
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10624
  extra_descs: []
- vnum: 10634
  name: Royal Guest's Sitting Room
  description: "After walking into this room, you are now certain these quarters are\n\rreserved
    for people only held in the highest esteem.  This room contains\n\rmany odd paintings,
    one of which is all alone on one of the walls.  Who\n\rresides here?  Who owns
    this place?  You want to search for answers, before\n\ryou find out the hard way....
    \ \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords: secret
    exit_flags: 1
    key: 0
    to_vnum: 10635
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10633
  extra_descs: []
- vnum: 10635
  name: Inside the Vault
  description: "Whoa!  You've stumbled inside a walk-in vault!  It's too dark to see\n\ranything,
    but you're certain that tons of gold and diamonds must be here! \n\rYou fumble
    for a light switch so you can feast your eyes on your new\n\rtreasure, but a quiet,
    low growling freezes you in mid-action...  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 1
    key: 0
    to_vnum: 10634
  extra_descs: []
- vnum: 10636
  name: Guest Bedroom
  description: "You have arrived at a fairly large bedroom, primarily used for guests,\n\ryou
    presume.  Ivy lines the walls where it meets the ceiling, and is the\n\rdesign
    on the oak headboard.  The newly waxed hardwood floor is covered only\n\rby a
    chinese rug, which sits right under the bed.  The windows to the south\n\rare
    open, letting the weather in.  \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10610
  extra_descs: []
- vnum: 10637
  name: The Sun Room
  description: "The walls and ceiling are made of glass, letting the warm sun shine\n\rthrough.
    \ Potted plants are lining the invisible walls, and couches and\n\rplush chairs
    are scattered about.  \n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
