- vnum: 10650
  name: Smaller Cobblestone Road
  description: "You turn the corner and find yourself in a nice surburban neighborhood.\
    \ \nThe houses are quite smaller than the others you have seen, but still nice\n\
    and appear new.  They all look similiar, except for color variations, and\nchildren\
    \ are playing on every lawn.  \n"
  room_flags: '0'
  sector: 1
  owner: ''
  exits:
