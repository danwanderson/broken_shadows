- vnum: 10660
  name: The Library
  description: "To this end of the library is mainly children's books.  Two groups\
    \ of\nfour tables are arranged in the room, at the perfect height for toddlers\
    \ and\npre-schoolers.  The sound of childish chatter can be heard, but you don't\n\
    see any children around.  \n"
  room_flags: AD
