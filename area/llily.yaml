    exit_flags: 0
    key: 0
    to_vnum: 10630
  extra_descs: []
- vnum: 10630
  name: Master Bath
  description: "Walking further south, you come across the master bath.  And the other\n\rpowder
    rooms were big?  Ha!  This one laughs in comparison.  A pool is\n\rstreched out
    before you, a gorgeous, blue color.  Some rafts are floating in\n\rit, and a smaller
    room is towards the back, undoubtedly the actual bathroom.\n\rPalm trees delicately
    wave over the edge of the pool, and music is being\n\rplayed here, softly.  \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
