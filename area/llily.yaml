- vnum: 10636
  name: Guest Bedroom
  description: "You have arrived at a fairly large bedroom, primarily used for guests,\n\
    you presume.  Ivy lines the walls where it meets the ceiling, and is the\ndesign\
    \ on the oak headboard.  The newly waxed hardwood floor is covered only\nby a\
    \ chinese rug, which sits right under the bed.  The windows to the south\nare\
    \ open, letting the weather in.  \n"
  room_flags: D
