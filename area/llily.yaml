- vnum: 10654
  name: Mardeteit's Foyer
  description: "Walking inside, a pretty hostess takes your name, and says there will\
    \ be\na fifteen minute wait.  Sitting down, you help yourself to a cocktail, and\n\
    take in the lavish surroundings.  Feeling less uneasy, you decide it was\njust\
    \ your hunger making you sensitive.  \n"
  room_flags: D
  sector: 0
  owner: ''
