- vnum: 10642
  name: The Library
  description: "This room looks definitely more lived in than the servant's quarters.\
    \ \nThe carpeting appears rather new, and the tables look waxed.  Tall lamps\n\
    tower over the tables, shining pools of light onto the already open books. \n\
    Peering down at a book at a nearby table, 'Sorcery', you wonder if it is a\njoke...\
    \  \n"
  room_flags: AD
  sector: 0
  owner: ''
  exits:
