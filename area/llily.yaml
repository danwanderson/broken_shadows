- vnum: 10630
  name: Master Bath
  description: "Walking further south, you come across the master bath.  And the other\n\
    powder rooms were big?  Ha!  This one laughs in comparison.  A pool is\nstreched\
    \ out before you, a gorgeous, blue color.  Some rafts are floating in\nit, and\
    \ a smaller room is towards the back, undoubtedly the actual bathroom.\nPalm trees\
    \ delicately wave over the edge of the pool, and music is being\nplayed here,\
    \ softly.  \n"
  room_flags: D
