- vnum: 10632
  name: Guest Bedroom
  description: "This guest bedroom has more than enough room for a couple, with a\
    \ lovely\ncanopy bed in the center.  White satin draperies flow over the bay window\n\
    and the bed, and the floor is made of black marble.  It looks like a lovely,\n\
    safe place to spend the night...  *grin* \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 10625
  extra_descs: []
- vnum: 10633
  name: Royal Guest Quarters
  description: "These must be the quarters for the special guests, it is larger and\
    \ more\nexquisite than the others you have seen so far.  The bedframe is made\
    \ of a\ndeep colored wood, and looks quite heavy.  Dressers and closets made of\
    \ the\nsame wood also fill the room, and you can see another door further in.\
    \  A\nmirror is hung from the ceiling, and a palm trees are scattered about the\n\
    room.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 1
