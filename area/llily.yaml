- vnum: 10659
  name: The Library
  description: "Straight in front of you is the help desk, and the library branches\
    \ off\nin opposite directions.  It is quite dark in here for a place of reading,\n\
    the potted plants here noticably the variety that need little light.  It is\n\
    almost dead quiet in here, except for the occasional whispers and book\nstampings.\
    \  \n"
