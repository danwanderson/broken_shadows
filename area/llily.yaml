    key: 0
    to_vnum: 10648
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10650
  extra_descs: []
- vnum: 10650
  name: Smaller Cobblestone Road
  description: "You turn the corner and find yourself in a nice surburban neighborhood.
    \n\rThe houses are quite smaller than the others you have seen, but still nice\n\rand
    appear new.  They all look similiar, except for color variations, and\n\rchildren
    are playing on every lawn.  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10649
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10651
  extra_descs: []
- vnum: 10651
  name: Smaller Cobblestone Road
  description: "Walking farther down the road, you suddenly get a errie feeling. \n\rGlancing
    around, a pair of children play on every lawn, and swingsets are\n\rvisible in
    every backyard.  No parents can be seen, but no cars are visible\n\reither.  It
    all feels too...  Perfect.  Maybe it's just you...  It has been\n\ra long day
    after all, and you are a bit hungry.  Is that a restaraunt\n\rfurther down?  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10650
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10652
  extra_descs: []
- vnum: 10652
  name: Smaller Cobblestone Road
  description: "Now you can smell the scents of dinner, so now you know where the
    mothers\n\rare.  The chattering of the children is starting to get on your nerves,
    and\n\rsomething just doesn't feel right.  Everyone is so....  Happy.  Each lawn\n\rconsists
    of a boy and a girl, with freshly planted flower beds that no dogs\n\rhave got
    to.  Not far away, you can see a restaraunt, and a happy mailman\n\rdelivering
    mail.  Now you *know* something isn't right...  Happy mailmen??  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10651
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10653
  extra_descs: []
- vnum: 10653
  name: Smaller Cobblestone Road
  description: "You are now standing outside Mardeteit's, and the aromas are wonderful\n\reven
    outside.  Peering inside, it looks quite fancy, and the decorations,\n\rflowers,
    and fabrics are all perfectly matched.  Somehow, you aren't\n\rsurprised.  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10654
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10652
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10656
  extra_descs: []
- vnum: 10654
  name: Mardeteit's Foyer
  description: "Walking inside, a pretty hostess takes your name, and says there will
    be\n\ra fifteen minute wait.  Sitting down, you help yourself to a cocktail, and\n\rtake
    in the lavish surroundings.  Feeling less uneasy, you decide it was\n\rjust your
    hunger making you sensitive.  \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10655
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10653
  extra_descs: []
- vnum: 10655
  name: A Romantic Table
  description: "Following the young hostess, she seats you at a quiet, dimly lit table
    in\n\rthe corner.  The mauve tablecloth is accented with a lace overlay.  Matching\n\rroses
    are partially opened in a crystal bud vase, and a white candle\n\rflickers sensually
    on your face.  Too bad you are dining alone!  \n\r"
  room_flags: 1
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10654
  extra_descs: []
- vnum: 10656
  name: Smaller Cobblestone Road
  description: "Only a few more houses can be seen, the end of this block is approaching.\n\rA
    library sign can be seen at the corner of the block, but nothing else of\n\rinterest
    is around.  You'll be glad to get out of this creepy neighborhood\n\ranyway, everything
    doesn't seem quite right here..  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10653
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10657
  extra_descs: []
- vnum: 10657
  name: Smaller Cobblestone Road
  description: "Well, you have come to the end of the block.  A library is here, made
    of\n\rbrick with large glass windows that allow you to peer inside.  Looking\n\raround
    the corner, you are surprised to find a pond, but otherwise a dead\n\rend.  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10659
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10656
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10658
  extra_descs: []
- vnum: 10658
  name: Smaller Cobblestone Road
  description: "Not far off is a medium size pond, with a few ducks making graceful\n\rpatterns
    on the water.  Maybe you should check it out?  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10663
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10657
  extra_descs: []
- vnum: 10659
  name: The Library
  description: "Straight in front of you is the help desk, and the library branches
    off\n\rin opposite directions.  It is quite dark in here for a place of reading,\n\rthe
    potted plants here noticably the variety that need little light.  It is\n\ralmost
    dead quiet in here, except for the occasional whispers and book\n\rstampings.
    \ \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10661
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10657
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10660
  extra_descs: []
- vnum: 10660
  name: The Library
  description: "To this end of the library is mainly children's books.  Two groups
    of\n\rfour tables are arranged in the room, at the perfect height for toddlers
    and\n\rpre-schoolers.  The sound of childish chatter can be heard, but you don't\n\rsee
    any children around.  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10659
  extra_descs: []
- vnum: 10661
  name: The Library
  description: "At first glance, this looks like the reference section of the library.
    \n\rHowever, as you walk up and down the aisles, the titles are in a foreign\n\rlanguage,
    none of which you have ever seen before.  Picking up one of the\n\rbooks, you
    notice illustrations on a few of the pages.  Beakers and\n\rsolutions are drawn,
    but you cannot tell what it all means.  Giving up, you\n\rplace the book back
    on the shelf, and start to walk away.  As you approach\n\rthe next room, you hear
    a subtle boom, and spin around to see a book fall\n\rfrom the section you were
    just in.  You decide not to pick it up.  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10662
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10659
  extra_descs: []
- vnum: 10662
  name: The Library
  description: "Ah ha!  This must be where they keep the adult books.  Tables are
    lined\n\rneatly in the middle of the room, with bookcases on either side.  This
    is\n\rthe quietest room so far, too quiet for you.  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10661
  extra_descs: []
- vnum: 10663
  name: Near the Edge of a Pond
  description: "Closer to the pond now, it seems on a slant.  Odd.  Well, that can't
    be\n\rpossible, obviously.  You are just acting silly again.  Anyways, a bunch
    of\n\rlittle duckies are quacking happily in the pond, splashing a bit of water
    on\n\ryour feet.  Care to go for a swim?  \n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10665
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10658
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10664
  extra_descs: []
- vnum: 10664
  name: The Edge of a Pond
  description: "You are wading on the very edge of the pond, hesitant on whether or
    not\n\rto venture in.  The water is almost the same temperature as the air, and
    the\n\rwildlife doesn't seem very threatening.  \n\r"
  room_flags: 0
  sector: 3
  owner:
