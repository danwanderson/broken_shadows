- vnum: 10646
  name: Servant's Quarters
  description: "This room looks a little better than the last, which is lucky for\
    \ your\nstomach.  It is a bit messy, but it looks lived-in.  The bed isn't made,\
    \ but\na pad of paper and a pen are on the nightstand.  Peering down at the paper,\n\
    you can't understand the writing, but you do understand that the ink is\nfresh\
    \ indeed...  \n"
  room_flags: D
