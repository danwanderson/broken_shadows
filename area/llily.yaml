- vnum: 10627
  name: Upstairs Hallway
  description: "You are nearing the end of the hallway, and the stairs leading up\
    \ to\nhopefully the last floor.  It's very quiet near this end.  The whole mansion\n\
    is quiet, mind you, but it seems even more eerily quiet here.  Strange.  \n"
