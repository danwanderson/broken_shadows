- vnum: 10635
  name: Inside the Vault
  description: "Whoa!  You've stumbled inside a walk-in vault!  It's too dark to see\n\
    anything, but you're certain that tons of gold and diamonds must be here! \nYou\
    \ fumble for a light switch so you can feast your eyes on your new\ntreasure,\
    \ but a quiet, low growling freezes you in mid-action...  \n"
  room_flags: AD
