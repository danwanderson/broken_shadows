- vnum: 10644
  name: Darkened Hallway
  description: "The crying is just on the other side of the door facing you.  It sounds\n\
    almost like a tired crying, pitiful.  There is no light peeking out from\nunder\
    \ the door, you can barely see enough to fumble for the doorknob..  \n"
