- vnum: 10651
  name: Smaller Cobblestone Road
  description: "Walking farther down the road, you suddenly get a errie feeling. \n\
    Glancing around, a pair of children play on every lawn, and swingsets are\nvisible\
    \ in every backyard.  No parents can be seen, but no cars are visible\neither.\
    \  It all feels too...  Perfect.  Maybe it's just you...  It has been\na long\
    \ day after all, and you are a bit hungry.  Is that a restaraunt\nfurther down?\
    \  \n"
  room_flags: '0'
  sector: 1
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
