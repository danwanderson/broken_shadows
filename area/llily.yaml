- vnum: 10629
  name: Master Bedroom
  description: "The bedroom is decorated in flowers and dainty lace, obviously by\
    \ the\nmistress.  A waterbed stands alone in the middle of the room, with the\
    \ light\nof a skylight shining down on it.  Three dressers line one wall, and\
    \ the\nhard wood floor makes subtle noises as you walk on it.  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
