    exit_flags: 0
    key: 0
    to_vnum: 10605
  extra_descs: []
- vnum: 10649
  name: Enormous Cobblestone Road
  description: "You have come to a fork in the road.  To the west is a smaller,\n\rresidential
    road, while to the east the road becomes much darker.  Rows of\n\rhouses can just
    about be seen to the west, while to the east is nothing but\n\rtrees.  Directly
    forward the road abruptly ends, becoming a beautiful jade\n\rcarved gate.  A regal,
    intricately designed castle lies beyond the gates,\n\rsurrounded by waterfalls
    and lush landscaping.  However, there appears to be\n\rno easy way in, and getting
    through the gates is impossible.  \n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10682
  - dir: 2
