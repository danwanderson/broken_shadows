    to_vnum: 10643
  extra_descs: []
- vnum: 10642
  name: The Library
  description: "This room looks definitely more lived in than the servant's quarters.
    \n\rThe carpeting appears rather new, and the tables look waxed.  Tall lamps\n\rtower
    over the tables, shining pools of light onto the already open books. \n\rPeering
    down at a book at a nearby table, 'Sorcery', you wonder if it is a\n\rjoke...
    \ \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 1
    key: 0
    to_vnum: 10641
  extra_descs: []
- vnum: 10643
  name: A Darkened Hallway
  description: "This hallway sure isn't getting any brighter.  The crying is closer
    now,\n\ralmost choked sobs now.  More rooms line the hallway, but you're not sure
    if\n\ryou want to go in them...  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
