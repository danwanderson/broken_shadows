  extra_descs: []
- vnum: 10638
  name: A Darkened Hallway
  description: "This hallway mysteriously got much darker, contrasting to the Sun
    Room\n\ryou were just in.  Doesn't make sense, really.  Your senses feel heightened\n\rin
    the darkness, and you continue on..  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
