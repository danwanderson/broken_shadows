- vnum: 10645
  name: A Dishevled Room
  description: "This room is a pig sty, as your mother used to say.  Clothes are\n\
    everywhere, the bed is unmade, and picture frames are thrown about the\nfloor.\
    \  There is no sign of old dishes though, or of any animals living in\nhere. \
    \ It's not quite so dirty as it is messy....  \n"
  room_flags: AD
