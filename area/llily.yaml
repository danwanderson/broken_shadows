- vnum: 10647
  name: Servant's Quarters
  description: "Walking into the room, you hear someone humming from behind a Chinese\n\
    screen.  Now you know this floor isn't abandoned, but you still want to\nleave\
    \ before this servant discovers you..  \n"
  room_flags: D
