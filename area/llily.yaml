    to_vnum: 10659
  extra_descs: []
- vnum: 10661
  name: The Library
  description: "At first glance, this looks like the reference section of the library.\
    \ \nHowever, as you walk up and down the aisles, the titles are in a foreign\n\
    language, none of which you have ever seen before.  Picking up one of the\nbooks,\
    \ you notice illustrations on a few of the pages.  Beakers and\nsolutions are\
    \ drawn, but you cannot tell what it all means.  Giving up, you\nplace the book\
    \ back on the shelf, and start to walk away.  As you approach\nthe next room,\
    \ you hear a subtle boom, and spin around to see a book fall\nfrom the section\
    \ you were just in.  You decide not to pick it up.  \n"
