- vnum: 10643
  name: A Darkened Hallway
  description: "This hallway sure isn't getting any brighter.  The crying is closer\
    \ now,\nalmost choked sobs now.  More rooms line the hallway, but you're not sure\
    \ if\nyou want to go in them...  \n"
