- vnum: 10631
  name: The Master Powder Room
  description: "This room is much smaller, and houses the normal facilities found\
    \ in a\npowder room.  It is decorated in soft lavender, to match the other rooms.\
    \ \nThe smell of distant flowers tickles your nose, as also a sense of impending\n\
    danger..  \n"
  room_flags: D
  sector: 0
  owner: ''
  exits:
  - dir: 0
    desc: ''
