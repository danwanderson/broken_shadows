- vnum: 10640
  name: Servant's Quarters
  description: "Your first reaction when you walk into the room is complete horror.\
    \ \nAlthough this room looks like it hasn't been occupied in years, the\nbloodstains\
    \ on the bed and carpet are still apparent.  You don't think you\nwant to know\
    \ what happened here...  \n"
  room_flags: D
