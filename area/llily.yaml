- vnum: 10657
  name: Smaller Cobblestone Road
  description: "Well, you have come to the end of the block.  A library is here, made\
    \ of\nbrick with large glass windows that allow you to peer inside.  Looking\n\
    around the corner, you are surprised to find a pond, but otherwise a dead\nend.\
    \  \n"
  room_flags: '0'
