  name: Smaller Cobblestone Road
  description: "Only a few more houses can be seen, the end of this block is approaching.\n\
    A library sign can be seen at the corner of the block, but nothing else of\ninterest\
    \ is around.  You'll be glad to get out of this creepy neighborhood\nanyway, everything\
    \ doesn't seem quite right here..  \n"
  room_flags: '0'
