    to_vnum: 10641
  extra_descs: []
- vnum: 10640
  name: Servant's Quarters
  description: "Your first reaction when you walk into the room is complete horror.
    \n\rAlthough this room looks like it hasn't been occupied in years, the\n\rbloodstains
    on the bed and carpet are still apparent.  You don't think you\n\rwant to know
    what happened here...  \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 1
    key: 0
    to_vnum: 10639
  extra_descs: []
- vnum: 10641
  name: A Darkened Hallway
  description: "Continuing down the hallway, you are certainly more relutant to explore\n\rthan
    you were before.  Maybe you should just look for an exit, and forget\n\ryou ever
    saw this place..  \n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10639
