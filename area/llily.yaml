- vnum: 10629
  name: Master Bedroom
  description: "The bedroom is decorated in flowers and dainty lace, obviously by
    the\n\rmistress.  A waterbed stands alone in the middle of the room, with the
    light\n\rof a skylight shining down on it.  Three dressers line one wall, and
    the\n\rhard wood floor makes subtle noises as you walk on it.  \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 10626
  - dir: 2
    desc:
