- vnum: 10649
  name: Enormous Cobblestone Road
  description: "You have come to a fork in the road.  To the west is a smaller,\n\
    residential road, while to the east the road becomes much darker.  Rows of\nhouses\
    \ can just about be seen to the west, while to the east is nothing but\ntrees.\
    \  Directly forward the road abruptly ends, becoming a beautiful jade\ncarved\
    \ gate.  A regal, intricately designed castle lies beyond the gates,\nsurrounded\
    \ by waterfalls and lush landscaping.  However, there appears to be\nno easy way\
    \ in, and getting through the gates is impossible.  \n"
  room_flags: '0'
