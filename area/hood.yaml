    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2168
  extra_descs: []
- vnum: 2170
  name: Hallway
  description: "The hallway heads back north to the main part of the inn/pub.\n\rThe
    stairs leading up to the guest rooms here do not seem\n\radvisable to climb.  A
    doorway empties out into Solomon\n\rstreet to the west.\n\r"
  room_flags: 9
