  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2164
  extra_descs: []
- vnum: 2158
  name: Ajax street
  description: "A once prideful guildhouse was on the northeast corner of\n\rthis
    intersection.  Most of the walls and ceiling have long since\n\rbeen demolished.
    \ An inn/pub is to the south.  The street bends\n\rto the east or west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2159
  - dir: 2
    desc:
