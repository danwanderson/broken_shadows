    to_vnum: 2163
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2155
  extra_descs: []
- vnum: 2157
  name: A bend in Ajax
  description: "The roads bends south and east here.  You barely notice\n\ra small
    alley leading north.  Some kind of tunnel entrance\n\ris to the west but it has
    been crushed under its own weight.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2152
