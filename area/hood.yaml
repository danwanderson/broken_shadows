- vnum: 2101
  name: A Dark Alleyway
  description: "The walls of the alleyway have been spray-painted over many times\n\rover
    the years.  One section of graffiti actually looks legible,\n\rit says:    This
    section has been designed for levels 5 through 10\n\r            If you are above
    level 15 please don't expect much fun.\n\r            If you are below level 5
    enter at your own risk.\n\rAnother section of graffiti says \"Raff Rules!\"\n\rThere
    is a boulevard to the east and Emerald Avenue is visible to the west.\n\r"
