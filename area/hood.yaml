    it though if i hadn't told you.  It has been renamed in honor\n\rof the Dragon
    gang's idol, the Dracolich.  It has become sort of a\n\rtraining ground.  There
    is a short cut to the east and an overgrown\n\rlot of land to the north.\n\r"
