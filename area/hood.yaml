  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2166
  extra_descs: []
- vnum: 2168
  name: Solomon Street
  description: "A wrought-iron fence blocks off what used to be an entrance to the\n\rcemetery
    here to the north.  The evil just seems too strong to\n\rto consider entering.
    \ You feel you should stick with the \"lesser\"\n\revils along the road to the
    east and west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2169
  - dir: 3
    desc:
