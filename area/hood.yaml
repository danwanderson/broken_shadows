- vnum: 2154
  name: Ajax street at Weaponshop (or whats left of it)
  description: |
    The street goes north and south.  The stables used to be to the
    east, but I bet all the horses are dead or gone.
  room_flags: '0'
  sector: 1
  owner: ''
  exits:
