  extra_descs: []
- vnum: 2153
  name: What is left of the weaponshop
  description: "It doesn't even look like those punks gave the weaponsmith a\n\rproper
    burial.  But what a going away present he seems to have\n\rreceived!  Blood is
    splattered and dried all over the walls here.\n\rIt looks like a great deal of
    carnage happened here.  The way\n\rout to the east leads out onto a street.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2154
  extra_descs: []
- vnum: 2154
  name: Ajax street at Weaponshop (or whats left of it)
  description: "The street goes north and south.  The stables used to be to the\n\reast,
    but I bet all the horses are dead or gone.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2149
  - dir: 2
    desc:
