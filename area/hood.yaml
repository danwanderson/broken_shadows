    to_vnum: 2165
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2157
  extra_descs: []
- vnum: 2159
  name: Curve in the road
  description: "The street goes north or west from here.  A narrow street once\n\rheaded
    southeast from here.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2154
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2158
  extra_descs: []
- vnum: 2160
  name: A wide alleyway
  description: "The sides of the alleyway have been vandalized many times.\n\rOne
    patch of graffiti actually looks readable:\n\r            This section has been
    designed for levels 5 through 10\n\r            If you are above level 10 please
    don't expect much.\n\r            If you are below level 5 enter at your own risk.\n\rIn
    another spot it says \"now entering Ogre territory...\"\n\rA street lies to the
    west and a major road to the east.\n\r"
  room_flags: 5
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2161
  extra_descs: []
- vnum: 2161
  name: Alexander Road
  description: "You see many gang members walking around looking for\n\rfights to
    pick and things to break.  It seems as if all of the\n\rother citizens have been
    run out of town.  All the former\n\rhomes are boarded up and uninhabitable.  The
    road continues\n\reast and west.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2162
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2160
  extra_descs: []
- vnum: 2162
  name: Alexander Street at park entrance
  description: "A park-looking area lies to the north and a passage between\n\rtwo
    buildings leads to another street to the south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2155
  - dir: 2
    desc:
