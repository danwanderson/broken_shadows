- vnum: 2158
  name: Ajax street
  description: |
    A once prideful guildhouse was on the northeast corner of
    this intersection.  Most of the walls and ceiling have long since
    been demolished.  An inn/pub is to the south.  The street bends
    to the east or west.
  room_flags: '0'
