    key: -1
    to_vnum: 2159
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2153
  extra_descs: []
- vnum: 2155
  name: Khan Park
  description: "Not really a \"park\" as you and i would think of it but\n\rit seems
    queerly peaceful here in comparison to the rest of\n\rthe area.  There seems to
    be some kind of memorial to the\n\rgreat Mongol warrior Khan being crudely constructed
    here.\n\rThere is a street to the east and another to the south.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2156
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2162
  extra_descs: []
- vnum: 2156
  name: Achilles avenue at entrance to park
  description: "A ... park?! lies to the west.  The street runs south to an\n\rintersection
    and curves to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2150
  - dir: 2
