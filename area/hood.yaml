    to_vnum: 2166
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2161
  extra_descs: []
- vnum: 2163
  name: Achilles Avenue
  description: "The Avenue Runs north and south.  You sense you are deep within\n\rOgre
    gang territory, and a chill goes up your spine.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2156
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2167
  extra_descs: []
- vnum: 2164
  name: Ajax Street
  description: "You can see a sinister black wrought-iron fence to the west.\n\rYou
    wonder if it's keeping you out, or the ghouls in?\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2157
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2169
  extra_descs: []
- vnum: 2165
  name: The inn/pub
  description: "The inn actually looks fairly functional despite its lack\n\rof repair.
    \ The boys come here to hoot it up and drink them selves\n\rinto oblivion sometimes.
    \ It looks as if the beer is still on tap!!!\n\rA hallway leads south and you
    spy a street through the doorway\n\rto the north.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2158
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2170
  extra_descs: []
- vnum: 2166
  name: Solomon Street
  description: "This street forms the southern boundary of Ogre territory.  The\n\rstreet
    extends far to the east.  There is also a pathway between\n\rbuildings which leads
    to another street to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2162
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2167
  extra_descs: []
- vnum: 2167
  name: Intersection of Achilles and Solomon
  description: "Solomon street is to the east and west.  The other part of the\n\rT
    is Achilles Avenue, starting here and winding to the north.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2163
