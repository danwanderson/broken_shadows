    exit_flags: 0
    key: -1
    to_vnum: 2167
  extra_descs: []
- vnum: 2169
  name: Intersection of Ajax and Solomon
  description: "The two roads meet at a corner here.  Ajax runs north and\n\rSolomon
    heads west.  An inn/pub is through a back doorway\n\rto the east.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
