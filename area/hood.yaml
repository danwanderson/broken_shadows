    stay out of here for fear of being brutalized.  This was once\n\ra nice lower-middleclass
    neighborhood, but know the gangs run the\n\rstreets.  All the shops and homes
    have been boarded up and abandoned.\n\rAn alleyway is to the west and the street
    continues east.  An over-\n\rgrown lot is to the south.\n\r"
  room_flags: 0
