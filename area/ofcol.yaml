- vnum: 5577
  name: Ravan's hideout
  description: "This place is a small, cosy place where no one disturbs you all\n\rthe
    time. The room has little decoration except for some pictures\n\ron the wall.\n\rYou
    notice that there are no exits from this room.\n\r"
  room_flags: C
  sector: 0
  owner:
  exits: []
  extra_descs:
  - keywords: pictures picture decoration
    description: "These pictures show the friend's and foe's of Ravan.\n\rThey are
      easy to separate, as most of the foe's have the letters\n\rR.I.P. inscripted
      underneath them.\n\r"
  - keywords: foe foes enemies
    description: "There is only one picture yet... Dim.\n\rIt pictures him hanging
      from a gallow, north of the town.\n\rIt has the letters R.I.P. inscripted underneath.\n\r"
  - keywords: friend friends
    description: "The list include such prominent names as : God, Lottie, Kurgan,\n\rEzzard,
      Mike, Sprocket and Stormbringer.\n\r"
