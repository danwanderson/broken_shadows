- vnum: 5556
  name: The Local Inn
  description: "You are in the local inn, where the peaceful citizens of Ofcol\n\rgather
    to have a drink or 5 if they have dry throats.\n\rYou can't help thinking that
    Ofcol is a dry city, when you see the\n\rmany people here.\n\rThe only exit is
    south to the village square.\n\r"
  room_flags: D
  sector: 1
