- vnum: 9163
  name: Huge, gorgeous fountain.
  description: "An enormous golden fountain is here.  You see swans, angels,\n\rgryphons
    and a host of other creatures in the fountain.  The\n\rfountain empties into a
    huge pool that looks quite inviting.\n\r"
