- vnum: 9140
  name: Tower.
  description: "You are in a musty old tower.  The smell of mold and mildew is\n\ralmost
    overpowering.  You hear strange creaks and groans ... is it\n\rthe wind or did
    someone (something?) make that noise.  To the west\n\ris the house and there is
    a stairway leading up into the tower.\n\r"
