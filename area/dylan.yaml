- vnum: 9180
  name: Arboretum.
  description: "A small indoor garden so that the residents don't have to go\n\routside
    to enjoy plants and commune with nature.  There are several\n\rtrees, a small
    pond and flowers of every kind.\n\r"
  room_flags: CD
