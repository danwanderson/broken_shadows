- vnum: 9141
  name: Witches Tower
  description: "Here you see strange things of arcane value.  There is a cauldron
    in the\n\rcorner bubbling madly, belching a foul brew that must have come from
    hell.\n\rOn shelves lie jars of strange creatures you have never seen before,
    or\n\rhope to again.  A picture of a familiar temple hangs on the east wall.\n\r"
  room_flags: ACDN
  sector: 0
