- vnum: 9181
  name: Western tower.
  description: "You are in the bottom part of a tower.  A draft brings a chill to\n\ryour
    spine and causes creaks and groans.  Curtains flutter in the\n\rwind, causing
    quite a distraction.  When you go to shut the window,\n\ryou see that the window
    is closed.  An old, wooden staircase leads\n\rup into darkness.\n\r"
  room_flags: D
  sector: 1
  owner:
  exits:
