- vnum: 9199
  name: Mid-Air.
  description: "You slide down the moisture covered rock, gaining speed as you\n\rapproach
    the cliff.  Realizing your foolish error, you madly claw\n\rat the rock, vainly
    trying to get a precious hold and save your\n\rworthless hide.  Next time, heed
    your conscience.\n\r\n\rYou've fallen, and you can't get up!!!\n\r"
