- vnum: 9182
  name: Western tower.
  description: "The tower creaks and groans, almost as if it were muttering to\n\ritself.
    \ There are windows displaying a full moon, reigning over\n\rthe night sky.  The
    room is dark and there is almost a musty odor\n\rto it.  You are surprised that
    you can't detect any dust or dirt,\n\ralthough there are a couple of cobwebs in
    the corner.\n\r"
