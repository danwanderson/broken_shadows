- vnum: 9179
  name: Library
  description: "You are overwhelmed by the sheer volumes of books here.  The\n\rshelves
    stretch all the way to the ceiling and are on every wall,\n\reven above the doorway.
    \ There are chairs for sitting and reading\n\rand a desk for more intense studies.\n\r"
  room_flags: D
