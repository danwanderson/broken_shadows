  description: "You find yourself in a lavish office.  The desk is absolutely huge,\n\rat
    least ten feet by five feet and made of ebony and inlaid with\n\rmother of pearl.
    \ A grandfather clock towers over the room,\n\rmechanically ticking and tocking
