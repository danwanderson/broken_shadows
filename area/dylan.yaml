- vnum: 9162
  name: Croquet game
  description: "A croquet game has been set up and carelessly left out.  Who ever\n\rwas
    playing blue was in the lead before they quit.  Benches have\n\rbeen set up for
    spectators and players to enjoy themselves.\n\r"
