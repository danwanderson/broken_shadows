- vnum: 9164
  name: Patio.
  description: "A huge patio overlooks the lawn area.  There are enough tables and\n\rchairs
    for a party of 100.  The tables and chairs are ornate and\n\rexpensive, tasteful
    and elegant.  Stairs lead up to the main\n\rhouse.\n\r"
