- vnum: 9177
  name: Foyer.
  description: "\"Magnificent\" does not even begin to describe the foyer.  Lavishly\n\rdecorated,
    yet elegant, it gives an impression of indescribable\n\rwealth.  Paintings and
    tapestries line the walls depicting scenes\n\rfrom throughout history.  Antiques
    furnitures and oriental rugs are\n\rtastefully placed in ideal spots.  The door
    is at least 10 feet\n\rhigh and is made of oak.\n\r"
  room_flags: D
