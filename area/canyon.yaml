    to_vnum: 9254
  extra_descs: []
- vnum: 9256
  name: Floating in Air
  description: "You look down and see the ground 100 feet below you.  The wind whispering\n\rin
    your ear seems to reassure you that this is fine.  To the north aways\n\ryou spy
    a portal of sorts.  To the west is more thin air.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
