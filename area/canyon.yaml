- vnum: 9252
  name: Lightning Chamber
  description: "There is some sort of control panel here. Apparently the Lightning
    Ruler\n\robserves and controls electric forces from here.  A set of steps carved
    into\n\rthe hill lead down to a causeway.\n\r"
  room_flags: 8
  sector: 6
  owner:
  exits:
  - dir: 5
    desc:
