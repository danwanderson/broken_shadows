    description: "The ruler notices your stare, and doesn't like it one bit!  The
      whole\n\rearth seems to shake with his emotion.\n\r"
- vnum: 9228
  name: By the River
  description: "The water in the river seems to bubble and froth with magic.  Though
    it\n\rsplashes playfully on you, it does not seem wet.  The path leads north closer\n\rto
    the water. To the west you see a T-intersection.\n\r"
