    exit_flags: 0
    key: -1
    to_vnum: 9258
  extra_descs:
  - keywords: portal
    description: "Through the portal you see nothing but sky.\n\r"
- vnum: 9260
  name: Air Chamber
  description: "Tiny tornadoes come and go and dance along the ground here.  At the
    back\n\rof the chamber you notice a huge throne made of swirling clouds.\n\rA
    tunnel leads west.\n\r"
  room_flags: 8
  sector: 6
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9259
  extra_descs:
  - keywords: throne clouds
    description: "Although the cloud throne appears solid enough to sit on, I wouldn't
      try\n\rit if I were you!\n\r"
- vnum: 9201
  name: A Mountain Path
  description: "You are on a mountain path which ascends a steep mountainside.  The
    trail\n\rcurves around the mountain so that you cannot really see what lies ahead.\n\rYou
    do sense great power though coming from the area behind the mountain.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 5267
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9202
  extra_descs: []
- vnum: 9202
  name: A Mountain Path
  description: "You are on a rocky mountain path leading up and around a steep mountainside.\n\rYou
    sense a glow from the area beyond the mountain, which you cannot see yet.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9203
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9201
  extra_descs: []
- vnum: 9203
  name: Mountainside Tombs
  description: "There are a few stone heaps here and there, the tombs of those who
    did not\n\rlast the arduous journey up the mountain.  Curiously you notice a few\n\runcovered
    bodies which don't seem to have died of exhaustion.  The path curves\n\reast around
    the mountain.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9204
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9202
  extra_descs:
  - keywords: bodies body dead
    description: "They look as if their necks have been broken and their flesh, chewed.\n\r"
  - keywords: heaps stones tombs
    description: "You are sure glad that YOU aren't under one of those piles!\n\rMany
      of the tombstones have the same name on them, 'Raff'.  He must come\n\rhere
      a lot.\n\r"
- vnum: 9204
  name: A Blind Curve on the Mountain Path.
  description: "This looks like a normal mountain path, but it is NOT!  This section
    of the\n\rpath is habitated by a huge (and of course, man-eating) Cyclops.  The
    path\n\rmakes its final ascent to an overlook.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9205
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9203
  extra_descs: []
- vnum: 9205
  name: Vista
  description: "This is a stunning vista overlooking a canyon. There is a sign here
    that says:\n\r\n\r\tBEHOLD -- ELEMENTAL CANYON\n\r\n\rFire leaps up from firepits
    in the western part of the canyon.  The sky looks\n\rfunny, and the air seems
    hazy to the northwest.  Electricity sparks\n\rintermittently in the northeast.
    \ To the east you see a strong, magic-looking\n\rriver flowing through the canyon.
    \ Also to the east you spy a cave entrance\n\rleading into the canyon wall.  The
    path descends to the north to another\n\roverlook.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9206
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9204
  extra_descs: []
- vnum: 9206
  name: The Overlook
  description: "You see various elemental servants wandering around the canyon.  The
    noise of\n\rhumming coming from the canyon gets louder.  The path makes a steep
    descent\n\rinto the canyon here.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9205
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9207
  extra_descs: []
- vnum: 9207
  name: Entrance to Elemental Canyon
  description: "You are awed by the sounds and sights of great powers at works here.\n\rElemental
    servants bustle back and forth doing the biddings of the elemental\n\rrulers.
    \ You see a sort of cross roads to the north, and you can climb up to\n\rthe overlook
    here.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9209
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9206
  extra_descs: []
- vnum: 9208
  name: The Floor of the Canyon
  description: "Various elemental forms wander the floor of the canyon.  Some seem
    to be\n\rgoing about their business, while others seem to have no business at
    all.\n\rIn general, it is calm, yet there is always a incessant buzz of things\n\rgoing
    on about.  The canyon continues north and east.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9211
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9209
  extra_descs: []
- vnum: 9209
  name: Elemental Gateway
  description: "To the west a path dips and winds among some flowing firepits.  To
    the\n\rnortheast a path goes toward the river.  Beyond toward the northeast and\n\rnorthwest
    are outcrops which rise up from the canyon floor. To the east there\n\ris a cave
    mouth which leads into the canyon wall.  And to the south the path\n\rleads up,
    away, and out of the canyon.  Various pure and cross-breeds of\n\relemental forms
    wander the canyon floor, which extends in a wide swath\n\rnorthwards.\n\r"
  room_flags: 0
  sector: 3
