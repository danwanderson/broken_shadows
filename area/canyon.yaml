- vnum: 9258
  name: Floating in Air
  description: "You look down and see the ground 100 feet below you.  The wind whispering\n\rin
    your ear seems to reassure you that this is fine. There is a portal\n\rhanging
    in midair here. It is to the east.  You can float south or west\n\rif you'd like.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
