- vnum: 9205
  name: Vista
  description: "This is a stunning vista overlooking a canyon. There is a sign here\
    \ that says:\n\n\tBEHOLD -- ELEMENTAL CANYON\n\nFire leaps up from firepits in\
    \ the western part of the canyon.  The sky looks\nfunny, and the air seems hazy\
    \ to the northwest.  Electricity sparks\nintermittently in the northeast.  To\
    \ the east you see a strong, magic-looking\nriver flowing through the canyon.\
    \  Also to the east you spy a cave entrance\nleading into the canyon wall.  The\
    \ path descends to the north to another\noverlook.\n"
  room_flags: '0'
