- vnum: 9255
  name: Floating in Air
  description: "Last you knew, you were walking on the mesa.  Abruptly the path dropped\n\rfrom
    beneath your feet much to quick for you to recover.  Instead of\n\rplunging to
    your death, you seemingly miss the ground and begin walking\n\ron air.  The space
    to the north and east seems just thin air, but you can\n\rwalk there.  The pathway
    you came from is to the south.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 9257
