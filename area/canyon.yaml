  extra_descs:
  - keywords: portal
    description: "Through the portal you see a tunnel.\n\r"
- vnum: 9259
  name: Windy Tunnel
  description: "A tunnel leads east.  To the west you can enter a portal. The wind
    in\n\rthis tunnel is quite fierce, it seems as if it's forced.  \n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 1
    desc:
