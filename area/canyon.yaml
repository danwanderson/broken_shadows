- vnum: 9227
  name: Earth Chamber
  description: "This is the abode of the Earth Ruler.  He decides about earthquakes,\n\rlandslides,
    and avalanches.  The Earth Ruler sits upon a huge marble throne\n\rcarved into
    the wall.\n\r"
  room_flags: 9
  sector: 3
