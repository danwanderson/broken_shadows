- vnum: 5056
  name: A nomad camp
  description: "This small group of desert nomads has stopped for the day to rest\n\rand
    refresh themselves beside this beautiful oasis. Three tents and some\n\rcamels
    make up the party. From within two of the tents you hear muffled\n\rvoices, obviously
    surprised at your visit.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "You see ill-tempered camels.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5058
  - dir: 1
    desc: "You see inside one of the tents a huddled mass of people, probably slaves.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5057
  - dir: 2
    desc: "Sand as far as the eye can see.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5025
  extra_descs: []
- vnum: 5057
  name: Inside a small tent
  description: "This is a small and simple tent with few possessions in sight. Lying\n\rhere
    and there are young-looking men and women, possibly slaves to the\n\rleader of
    this band.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 3
    desc: "You see the center of the nomad camp.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5056
  extra_descs: []
- vnum: 5058
  name: Beside the camels
  description: "Here stand about ten camels, all hitched to some stakes plugged into\n\rthe
    ground. To the east you see a small tent while to the north you see a\n\rlarger,
    fancier tent.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "This tent seems to be the temporary abode of the nomad leader. You make
      a\n\rmental note to visit it before you leave."
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5060
  - dir: 1
    desc: "In this tent there are very large men, all carrying weapons.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5059
  - dir: 2
    desc: "You see the center of the nomad camp.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5056
  extra_descs: []
- vnum: 5059
  name: The warrior's tent.
  description: "This tent has a few furnishings, but mainly it holds the band's\n\rprotectors.
    They all stare at you coldly as you enter.\n\r"
  room_flags: H
  sector: 2
  owner:
  exits:
  - dir: 3
    desc: "Outside you see some peaceful camels.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5058
  extra_descs: []
- vnum: 5060
  name: The main tent
  description: "This tent is as lavishly decorated on the inside as it is on the\n\routside.
    A fancy carpet lies on the sand and numerous baskets line the\n\rwalls.\n\r"
  room_flags: H
  sector: 2
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5061
  - dir: 2
    desc: "You see some peaceful camels.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5058
  extra_descs: []
- vnum: 5061
  name: The main tent
  description: "This is where the leader of this band of nomads resides. He is\n\rdefinitely
    rich as you inspect the tapestries, baskets, and a few\n\rpaintings as well.\n\r"
  room_flags: H
  sector: 2
  owner:
  exits:
  - dir: 3
    desc: "You see the entrance to this tent.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5060
  extra_descs: []
- vnum: 5062
  name: Strange Glowing Sand
  description: "A vast desert stretches for miles, the sand constantly shifting around\n\ryou.
    \ But this patch of desert looks different...the sand glows.  You see a\n\rfuturistic
    city to the south.\n\r"
  room_flags: CD
  sector: 5
  owner:
  exits:
  - dir: 2
    desc: "You see a futuristic city.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 8001
  - dir: 3
    desc: "Sand as far as the eye can see.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5029
  extra_descs: []
- vnum: 5063
  name: The wind-swept ledge
  description: "Being very careful not to lose your balance, you look around and\n\rfind
    that this canyon is about a half a kilometer deep. To the west is\n\ra dark cave
    leading under the desert sands.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 0
    desc: "Sand as far as the eye can see.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5031
  - dir: 3
    desc: "You see a dark cave.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5064
  extra_descs: []
- vnum: 5064
  name: The cave mouth
  description: "The air in here is MUCH cooler than outside. From the west you hear\n\rstrange
    sounds, but can see nothing. The cave slopes down into the\n\rdarkness.\n\r"
  room_flags: AD
  sector: 5
  owner:
  exits:
  - dir: 1
    desc: Outside is lighter and very windy.
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5063
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5065
  extra_descs: []
- vnum: 5065
  name: The mysterious lair.
  description: "You have stumbled upon the home of something. From the treasure\n\rhaphazardly
    strewn about and the rotting carcasses, you would guess that\n\rthis is a dragon's
    lair. As to what type, you can't really say. The cave\n\rnarrows out into a tunnel
    to the west.\n\r"
  room_flags: ADH
  sector: 5
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5064
  - dir: 3
    desc:
    keywords: door
    exit_flags: ABCD
    key: 5024
    to_vnum: 5066
  extra_descs: []
- vnum: 5066
  name: A wide tunnel
  description: "This tunnel seems to go on forever into the darkness. You carefully\n\rfeel
    your way along the walls.\n\r"
  room_flags: ACD
  sector: 5
  owner:
  exits:
  - dir: 1
    desc:
    keywords: door
    exit_flags: ABCD
    key: 5024
    to_vnum: 5065
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5067
  extra_descs: []
- vnum: 5067
  name: A narrower tunnel
  description: "The tunnel becomes very narrow and you fight to squeeze your way through.\n\rThe
    floor seems to level off a little.\n\r"
  room_flags: AD
  sector: 5
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5066
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5068
  extra_descs: []
- vnum: 5068
  name: A narrow crack
  description: "This part of the tunnel is the hardest to move through as the walls\n\rmove
    in to meet you.\n\r"
  room_flags: AD
  sector: 5
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5067
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5069
  extra_descs: []
- vnum: 5069
  name: A small cavern.
  description: "It is dark and damp and bats hang from the ceiling. A narrow crack
    is\n\rin the east wall. The floor now slopes upwards.\n\r"
  room_flags: AD
  sector: 5
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5070
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5068
  extra_descs: []
- vnum: 5070
  name: A small shaft
  description: "From within this shaft you can see a narrow hole in the roof just\n\rlarge
    enough for one person. Back east is the cavern.\n\r"
  room_flags: AD
  sector: 5
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5069
