    exit_flags: 3
    key: -1
    to_vnum: 1321
  extra_descs: []
- vnum: 1318
  name: Mages Tavern
  description: "You are in mages tavern. The air is smokey and filled with the smells\n\rof
    foreign food and drink. The other patrons pay you little heed, as\n\rthey obviously
    have more interesting things to contemplate. Strick the\n\rbartender is here waiting
    to take your order.\n\r  The only exit leads back west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1314
  extra_descs: []
- vnum: 1319
  name: The Magic Shop
  description: "You are in the High Tower's store of magic. Tatorious stands behind\n\rthe
    counter, selling all sorts of herbs, parchment and other reagents\n\rused in magical
    studies.\n\r  The only exit leads back east to the common room.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1314
  extra_descs: []
- vnum: 1320
  name: the kitchen
  description: "You are in a small kitchen. All the usual kitchen type utensils and\n\requipment
    is here, including some not so usual ones. Among the later,\n\ra huge black oven
    against one wall, it must be at least 12 feet high.\n\rOpposite the oven is an
    equally enormous meat locker, large enough to\n\rcomfortably store several hapless
    adventurers no doubt. In the middle of\n\rthe room, hanging in mid-air is a spice
    rack.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords: door wooden
    exit_flags: 3
    key: -1
    to_vnum: 1316
  extra_descs: []
- vnum: 1321
  name: Below the trapdoor
  description: "You are below the trapdoor. It is very dark and dusty here, very little\n\rlight
    filters through from above. A faint sound of dripping water can be\n\rheard in
    the distance below.\n\r  A rope ladder leads down.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
