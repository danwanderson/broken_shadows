- vnum: 1437
  name: The entrance to the library
  description: "You are in the entrance to the great library of magic. A giant desk
    is\n\rhere, covered with books parchments and scrolls. Long shelves loaded with\n\rrow
    upon row of books stretch out in every direction as far as the eye can\n\rsee.\n\r"
