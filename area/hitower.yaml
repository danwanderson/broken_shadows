- vnum: 1324
  name: A dark passage
  description: "You are at the end of a dark passage. A half opened door is to the
    east,\n\rshedding soft light around the edges. Faint snoring sounds can be heard\n\rbehind
    the door.\n\r  Exits lead east through the door, or back west.\n\r"
  room_flags: 9
