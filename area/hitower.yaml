- vnum: 1445
  name: The reading room
  description: "You are in a small room completely devoid of furnishings. The only
    thing\n\rhere is an enormous tome, lying face open on the floor. The great book
    looks\n\rboth heavy and ancient. Its jewel encrusted bindings are well worn as
    the\n\rbark of a tree. Spidery writings seem to crawls across the pages, totally\n\rincomprehensible
    to your mortal eye. Something seems to be wedged between\n\rthe pages.\n\r"
  room_flags: 8
