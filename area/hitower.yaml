  description: "You are in the antechamber of the master magician of the grey light.
    A\n\rfeeling of strong magic floats in the air about you, almost as if you could\n\rtaste
    the power held within these walls.\n\r  Once your eyes adjust to the semi-light,
    you can make out a larger room\n\rto the south.\n\r"
