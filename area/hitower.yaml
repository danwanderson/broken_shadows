- vnum: 1466
  name: A bright hallway
  description: "You are in a long well lit hallway leading east and west. The walls
    here\n\rare a milky white color, and glow with a warm luminescence, as does the\n\rfloor.
    A feeling of goodness permeates the area, and you feel unworthy to\n\rtread upon
    these sacred floors.\n\r  A huge set of double doors in finely worked ivory can
    be seen to the west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
