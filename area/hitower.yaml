  extra_descs: []
- vnum: 1314
  name: Common Room
  description: "You are in the common room. There are many apprentice warlocks here\n\rtalking
    and resting, playing games, comparing notes. Obviously they\n\rare taking a break
    from their rigorous studies. There are benches,\n\rtables and a small water fountain
    here, otherwise the room is quite\n\runremarkable.\n\r  Exits lead off in all
    directions.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1317
  - dir: 1
    desc: "The mages bar can be seen to the east.\n\r"
