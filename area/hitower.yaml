- vnum: 1447
  name: The end of the corridor
  description: "You are at the end of a long corridor. The obsidian walls come to
    an\n\rabrupt halt at the edge of a golden archway here. The hum of power is so\n\rstrong
    it nearly numbs your body.\n\r  The archway lies before you, glowing and pulsing
    with energy.\n\r"
  room_flags: 8
  sector: 0
