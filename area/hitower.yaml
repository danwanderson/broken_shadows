- vnum: 1435
  name: The scrying chamber
  description: "You are in the scrying chamber of the high tower of sorcerery. It
    is here\n\rthat arcane rituals are performed to enable those of the art to look
    in\n\rupon denizens throughout the world and spy out their darkest secrets.\n\r
    \ A huge black cauldron is in the center of the room, bubbling and gurgling,\n\rit
    pours forth a constant stream of smokey fog into the air about you. Here\n\rand
    there on stands of different sizes are crystal balls and oddly shaped\n\rmirrors.\n\r"
