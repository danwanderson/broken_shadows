- vnum: 1336
  name: A guest bedroom
  description: "You are in a small guest bedroom. A small cot is in one corner, and
    a\n\rdusty mirror on one wall, other than that the room looks quite bare, and\n\runused.\n\r
    \ The only apparent exit leads back west to the hallway.\n\r"
  room_flags: 8
