- vnum: 1448
  name: The arched entrance
  description: "You feel a slight tingle as you pass through the archway, as if the
    living\n\rmagical energies here had infused your body, found it wanting and left.
    The\n\rintense glow from the arch above you is almost blinding. Through the light\n\ryou
    can barely make out a stairway leading up.\n\r"
  room_flags: 8
  sector: 0
