- vnum: 1316
  name: Dining Room
  description: "You are in the dining area of the student mages. From the number of\n\rtables
    and chairs here, you can see that this room could easily seat\n\rseveral hundred
    people. It is oddly deserted here, obviously not meal time.\n\r  Exits lead west
    to the kitchen, and back east.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
