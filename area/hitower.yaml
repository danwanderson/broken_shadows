- vnum: 1449
  name: The landing
  description: "You are on a small landing in the middle of a long stairway leading
    up.\n\rYour senses seem dulled here, no sound or smell can be detected at all,
    and\n\rthe only thing you can see in any direction is endless stairway.\n\r"
