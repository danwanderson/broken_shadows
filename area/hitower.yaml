- vnum: 1461
  name: The chamber of darkness
  description: "You are in a vast chamber. The walls fade into darkness, leaving you\n\rwith
    a very vague idea of the actual size of the room. Swirling here and\n\rthere in
    the dark, are patches of pure black which seem to suck in your\n\rlight and leave
    it that much darker here.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1462
