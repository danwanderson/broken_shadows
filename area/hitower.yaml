- vnum: 1335
  name: Guardians chamber
  description: "You are in the chamber of the tower guardians. It is rather sparsely\n\rfurnished,
    but then again the odd occupants don't look to need furniture.\n\rHere and there
    a disembodied pair of hands or eyes flits about.\n\r"
