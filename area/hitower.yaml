- vnum: 1450
  name: An intersection
  description: "You are at an intersection of several hallways. You feel as if strange\n\rmystical
    forces are pushing and pulling at each other from all around you.\n\rThe sensation
    of being trapped, in the middle is almost tangible in the air\n\rhere.\n\r  A
    grey tiled hallway leads south, black tiled east, white tiled west, and\n\ra multi-colored
    hallway swirling with patterns that remain just barely\n\runrecognizable is to
    the north.\n\r"
