    to_vnum: 1320
  extra_descs: []
- vnum: 1317
  name: Dark Hallway
  description: "You are in a dark hallway. It is apparent that this area is seldom\n\rused
    by the regular occupants of the tower. Dust covers the floors\n\rhere.\n\r  The
    faint outline of a trapdoor can be seen in the dust.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1314
