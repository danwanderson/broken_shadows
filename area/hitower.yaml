    to_vnum: 1472
  extra_descs: []
- vnum: 1470
  name: The meditation chamber
  description: "You are in a small meditation chamber. White silk cushions are everywhere,\n\rlooking
    very comfortable. You get an easy peaceful feeling of relaxation\n\rhere, almost
    making you want to lie down and fall asleep.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1469
  extra_descs: []
- vnum: 1471
  name: A study
  description: "You are in a spacious study. It is extremely tidy here, to an almost\n\rantiseptic
    nature. One would wonder how anyone could study without a\n\rmess all around them,
    the master of this chamber obviously can.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1469
  extra_descs: []
- vnum: 1472
  name: A closet
  description: "You are in a small closet. Cloaks and vests hang from hooks in the
    wall,\n\rand a few old boots are all that can be seen here. Rather featureless.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1469
  extra_descs: []
- vnum: 1473
  name: A wide hallway
  description: "You are in a large hallway, wide enough to accommodate several people\n\rstanding
    abreast. The floor here is a swirl of multicolored patterns, in\n\rconstant motion.\n\r
    \ A huge grey metal door blocks the way north, it looks quite sturdy.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
