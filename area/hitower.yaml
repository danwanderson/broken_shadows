  name: A culdesac
  description: "You are in a small culdesac. A window to the east is letting in moonlight\n\rand
    a pleasant breeze. Through it, the surrounding country side can be seen.\n\r  The
    only apparent exit leads back west to the hallway.\n\r"
  room_flags: 8
  sector: 0
