  name: The main chamber
  description: "A feeling of tranquility comes over you as you enter the main chamber
    of\n\rneutrality. Some artifacts are hung on the walls here, or set on stands.\n\rThe
    room in general looks both comfortable and official. Probably where the\n\rmaster
    of neutrality holds audience.\n\r"
