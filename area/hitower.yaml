- vnum: 1467
  name: An antechamber
  description: "You are in a small antechamber. It is well lit here, though the source\n\rof
    light cannot be seen. It is almost as if the room itself exudes a warm\n\rglow
    of goodness. A larger chamber can be seen to the west, but you do not\n\rfeel
    worthy to pass into it.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords: door ivory
    exit_flags: 3
    key: -1
    to_vnum: 1466
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1469
  extra_descs: []
- vnum: 1469
  name: The chamber of the white light
  description: "You are in a vast chamber, its walls floor and ceiling are of an unknown\n\rmetallic
    material, the brightest white, almost blindingly stark. A flickering\n\rflame
    is in the center of the room, seeming to feed off of darkness and\n\rcleansing
    the room of any evil. You feel a slight tug at your being as the\n\rflame flickers
    towards you.\n\r"
  room_flags: 0
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1470
