- vnum: 1325
  name: The stagnant pool
  description: "You are at the edge of a stagnant pool of water. The smell here is
    quite\n\rnauseating. This is apparently where the denizens of the tower dispose
    of\n\rtheir garbage. Faint gurgling can be heard from beneath the surface of the\n\rpool.\n\r
    \ Exits lead back north, or perhaps for the very adventurous, down into the\n\rpool.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1322
  - dir: 5
