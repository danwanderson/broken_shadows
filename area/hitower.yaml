- vnum: 1322
  name: A damp intersection
  description: "You are in a damp intersection of what seems to be the basement of
    the\n\rtower. The sound of running water can be heard coming from the south,\n\rother
    than that, an almost tangible stillness fills the air.\n\r  Passages lead off
    in all directions, and a ladder leads up.\n\r"
  room_flags: 9
