- vnum: 1328
  name: The Jailor's office
  description: "You are in the Jailor's office. It is rather messy here. Judging by
    the\n\rsleeping form of the Jailor on duty, you can surmise that very few, if
    any\n\rprisoners survive long enough to spend much time in these dank dungeons.\n\r
    \ The only exit leads back west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords: door
    exit_flags: 1
    key: -1
    to_vnum: 1324
  extra_descs: []
- vnum: 1329
  name: Below the stagnant pool
  description: "As you dive beneath the putrid waters, you feel a strong tug and a
    whirlpool\n\rdrags you under.  You are sucked into blackness.  You feel your lungs
    burst\n\rfrom lack of oxygen.  Just as you feel your life fading, you notice a
    change in\n\rdirection ... and are sucked under by a rip tide.\n\r"
  room_flags: 13
  sector: 0
  owner:
  exits: []
  extra_descs: []
