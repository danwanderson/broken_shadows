  description: "You are in a small clearing in the shadow grove. There is charred
    grass\n\runderfoot, and the signs of fire here and there. It is almost as if the\n\rplant
    life shuns this spot. The shadowy mist hovers all around, obscuring\n\ryour view
    into the grove.\n\r  A small path leads north to some shadowy structure. All other
    exits are\n\rshrouded in shadowy mist.\n\r"
  room_flags: 1
  sector: 3
  owner:
  exits:
  - dir: 0
    desc: "You can barely make out some sort of building to the north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1312
  - dir: 2
    desc: "The shadows cloud your vision.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1302
  extra_descs: []
- vnum: 1312
  name: Entrance to the High Tower
  description: "You have reached the entrance to the high tower of sorcerery. The\n\rtower
    looms above you at an incredible height. It seems to disappear\n\rinto the storm
    clouds above.\n\r  A diamond gate is to the north, guarded by a huge golem. The
    trail\n\rback south has disappeared behind you.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "The diamond gate looks incredibly strong.\n\r"
    keywords: gate diamond
    exit_flags: 0
    key: -1
    to_vnum: 1313
  extra_descs: []
- vnum: 1313
  name: Inside the High Tower of Sorcerery
  description: "You are inside the high tower of sorcery. The sight is truly amazing.\n\rFrom
    here, it is obvious that somehow, the tower is much larger on the\n\rinside than
    it is on the outside. Young mages walk about, completely\n\roblivious to your
    presence.\n\r  Exits lead north to the common room, west to the dinning room,
    east to\n\ra plain hallway and back south through the gate.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "The common room looks quite busy and noisy.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1314
