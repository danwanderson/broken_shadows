- vnum: 1337
  name: A guest bedroom
  description: "You are in a comfortable looking bedroom. A small globe of magical
    energy\n\rfloats overhead, providing light. A small cot is in one corner looking\n\rever
    so comfortable, so comfortable in fact ...someone is sleeping in it.\n\r  The
    only apparent exit leads back west to the hallway.\n\r"
