- vnum: 1463
  name: Torture chamber
  description: "You are in an ill lit chamber. Instruments of torture hang from a
    rack\n\ron the wall, they seem to quiver with anticipation of a victim as if they\n\rhad
    a mind of their own. An operating table is here, though it is bare.\n\r  An extreme
    feeling of evil permeates the entire area.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1461
  extra_descs: []
- vnum: 1464
  name: The inner chamber
  description: "You are in a small dark chamber. Upon the walls are glowing sigils
    of\n\rdark power, scrawled and traced in an evil language no longer known to most\n\rof
    this plane of existence. There is an obsidian altar here which seems to\n\rglow,
    but does not shed any light, in fact it seems to be taking light in.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1461
  extra_descs: []
- vnum: 1465
  name: A bright hallway
  description: "You are in a long well lit hallway leading east and west. The walls
    here\n\rare a milky white color, and glow with a warm luminescence, as does the\n\rfloor.
    A feeling of goodness permeates the area, and you feel unworthy to\n\rtread upon
    these sacred floors.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1450
  - dir: 3
    desc:
