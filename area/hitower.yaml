  description: "You are in what looks to have once been a guest bed room. The walls
    are\n\rblackened and burnt by what you could only imagine to be magical fire.\n\rThere
    is no sign of the previous occupant, undoubtedly he left in a hurry.\n\r  The
    only exit leads back west to the hallway.\n\r"
