    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1329
  extra_descs: []
- vnum: 1326
  name: A dark passage
  description: "You are in a dark passage, which comes to an abrupt stop at what appears\n\rto
    be a cave-in to the west. It is certainly unpassable, and perhaps quite\n\rdangerous
    just being this close.\n\r  The only exit leads back east.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1322
  extra_descs: []
- vnum: 1327
  name: A dark cell
  description: "You are in a dark cell. Straw and dirt cover the floors here, it is\n\rvery
    dark. Someone, or something seems to be chained to the far wall.\n\r  The only
    exit is back south.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords: oak door
    exit_flags: 15
    key: -1
    to_vnum: 1323
