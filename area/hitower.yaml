- vnum: 1476
  name: The entranceway
  description: "You are at the entrance to the audience chamber of the grand master
    of\n\rmagic. Beautiful tapestries displaying the ancient masters of lore are on\n\rthe
    walls, and the floor is covered with a plush multicolored carpet, which\n\rseems
    to rustle and move at the touch of your boots.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1477
  - dir: 2
    desc:
    keywords: door white ivory
    exit_flags: 15
    key: 1475
    to_vnum: 1475
  extra_descs: []
- vnum: 1477
  name: The audience chamber
  description: "You are in a large chamber. Small bolts of energy leap from wall to
    wall,\n\rcrackling with power. The floor is a swirl of indeterminable colors and\n\rpatterns
    ever changing. Bright bursts of color seem to explode into the air\n\rand fade
    again at random times. All this splendor plays about and draws\n\rattention to
    a large throne in the center of the room, it seems to be cut\n\rfrom a single
    enormous emerald.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1480
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1478
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1476
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1479
  extra_descs:
  - keywords: throne
    description: "The giant emerald is flawless, and must be incredibly valuable.\n\r"
- vnum: 1478
  name: A dressing room
  description: "You are in a plush dressing room. Fine garments of many styles and
    some\n\routlandish colors hang from a rack suspended in mid air at eye level.
    The\n\ronly other interesting feature in the room is a large silver mirror on
    a\n\rfinely crafted gold stand.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1477
  extra_descs: []
- vnum: 1479
  name: The library
  description: "You are in a small cozy looking library. A few well made books sit
    atop\n\rshelves which span every wall. A large oaken writing table is in the center\n\rof
    the room with odd papers and parchments on it. The illumination here,\n\rto your
    surprise is a quite un-magical oil lamp.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1477
  extra_descs: []
- vnum: 1480
  name: The altar
  description: "You are in a small chapel designed around a beautifully crafted golden\n\raltar.
    Many icons to lesser deities line the room, but it is obvious by one\n\rglance
    at the symbols on the altar, that this room was designed for the\n\rworship of
    Mystra, the goddess of magic.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords: door secret
    exit_flags: 3
    key: -1
    to_vnum: 1481
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1477
  - dir: 3
    desc:
    keywords: door secret
    exit_flags: 3
    key: -1
    to_vnum: 1482
  extra_descs: []
- vnum: 1481
  name: The treasury
  description: "You are in a small chamber, the stale air here is testament to the
    fact\n\rthat it has gone undisturbed for many years.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords: door secret
    exit_flags: 3
    key: -1
    to_vnum: 1480
  extra_descs: []
- vnum: 1482
  name: A passage
  description: "You are in a small dark passage, which would be unremarkable if not
    for\n\rthe fact that it ends in a blinding blue light to the west. On hooks set\n\rinto
    the wall here there hang several travel worthy cloaks, and a small\n\rleather
    backpack.  It looks as if someone has prepared this room to be used\n\rin the
    event speedy of a evacuation.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1483
  extra_descs: []
- vnum: 1483
  name: In the light
  description: "You seem to be floating in a magical energy field, though you cannot
    see\n\rthe source of the energy, you can feel its power pushing at you from all\n\rsides,
    completely negating the effects of gravity.\n\r  An imperfection in the uniform
    blue can be seen overhead, it might be an\n\rexit.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 3001
  extra_descs: []
- vnum: 1499
  name: Skylar's Hideout
  description: "You are in a small, very messy room. An unmade bed is against one
    wall, and\n\rbooks and papers cover every available flat surface. Empty beer cans
    lie here\n\rand there, discarded with total abandon. A few over full ashtrays
    can be seen\n\ron a desk.\n\r"
  room_flags: 524
  sector: 0
  owner:
  exits: []
  extra_descs: []
