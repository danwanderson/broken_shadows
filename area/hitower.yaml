- vnum: 1455
  name: The study
  description: "You are in a large study. Shelves filled with many books or arcane\n\rknowledge
    are on every wall. A large oaken desk is in the center, with\n\rmany parchments
    and scrolls on it. The most notable thing in the room is\n\ra small set of scales,
    which floats about eye level. In perfect balance,\n\rthe scales are no doubt a
    sign of the master's neutrality.\n\r"
