- vnum: 1444
  name: Between the shelves
  description: "You are in the great library of magic. The shelves seem uncomfortably\n\rclose
    here, you can barely maneuver between them. The musty smell is still\n\rstrong,
    and the elusive books still hover just out of reach.\n\r  A faint flicker of light
    can barely be made out to the north.\n\r"
