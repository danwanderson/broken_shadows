  description: "You are in a long hallway leading west from here. The walls emit a
    faint\n\rmagical glow which provides enough light to see by. Some faint moonlight\n\rcan
    be seen in the culdesac to the east.\n\r  The hallway continues west and stairs
    lead down to the level below.\n\r"
