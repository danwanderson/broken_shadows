- vnum: 1438
  name: In the library
  description: "You are in the great library of magic. A strong musty smell permeates
    the\n\rentire area. Upon shelves which float just out of reach are hundreds of\n\rbooks,
    tomes and scrolls of every possible shape size and color. The elusive\n\rbooks
    seem to wink in and out of existence before your untrained eyes.\n\r  It is very
