- vnum: 2201
  name: The Tower Gates
  description: "You are at the entrance to a tall tower.  Lightning flashes periodically
    and\n\rit is raining.  You think it might be a good idea to turn back into the
    grove.\n\r"
  room_flags: A
  sector: 1
  owner:
  exits:
  - dir: 0
    desc: "You see a large steel gate.  Beyond is the Foyer of the Tower.\n\r"
    keywords: gate steel
    exit_flags: ABCD
    key: 2231
    to_vnum: 2202
  - dir: 1
    desc: "The shadows cloud your vision.\n\r"
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 1304
  extra_descs:
  - keywords: gate
    description: "The gate is tall and secure.  Whoever built it values privacy.\n\r"
- vnum: 2202
  name: The Foyer
  description: "This is the entrance to the Tower.  The hallway continues to the north,\n\rleading
    towards a staircase.  You notice a grim painting on the wall,  and \n\rquickly
    look away.\n\r"
  room_flags: CD
  sector: 0
  owner:
  exits:
