- vnum: 2239
  name: Clearing
  description: "You stand out in a clearing.  Mountains are all around you.  There
    is a \n\rwell in the middle of the clearing.  Lying against the well is a sign.
    \ A\n\rpath leads up the mountain.  The small opening is back to the north.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "the small opening\n\r"
    keywords:
    exit_flags: 0
