- vnum: 2242
  name: The path continues
  description: "The path continues up the mountain to the top.  The path also goes
    down.\n\rThats it, nothing more to see.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 4
    desc: "top of the mountain\n\r"
