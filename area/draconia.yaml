- vnum: 2218
  name: Entrance to the Crypt
  description: "You have entered a large room which smells heavily of reptile.  You
    wonder\n\rwhat awaits you here.\n\r"
  room_flags: D
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "You see the Treasure Vault.\n\r"
