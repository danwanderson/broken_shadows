- vnum: 2238
  name: A small opening
  description: "You are standing in a small opening.  To the north lies the old wooden\n\rbridge.
    \ To your south the you can see a clearing.  You can see sunlight\n\ragain.  What
    a welcome relief!\n\r"
  room_flags: AD
  sector: 2
  owner:
  exits:
