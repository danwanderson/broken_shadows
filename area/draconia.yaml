- vnum: 2241
  name: A cave opening
  description: "You stand before a huge cave opening.  You hearing heavy breathing
    from\n\rwithin the cave.  There are a few skeletons lying about.  The cave lies
    to \n\rthe south.  The path is back to the east.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
