- vnum: 2222
  name: The Crypt Ends
  description: "You have come to the end of the Crypt.  It seems deserted.  There
    is a \n\rstrange coffin lying against the wall.\n\r"
  room_flags: D
  sector: 1
  owner:
  exits:
