  extra_descs:
  - keywords: door platinum
    description: A huge platinum door separates you from harm
- vnum: 2244
  name: Well
  description: "O\n\r h\n\r   !\n\r\n\r     N\n\r      o\n\r       !\n\r\n\r   I warned
    you!  You have fallen into the bottomless pit.  You life flashes\n\rright before
    your eyes.  Pretty pathetic isn't it?  Next time you'll know\n\rto listen to the
    God of Laughs.\n\r"
  room_flags: BC
  sector: 0
  owner:
  exits: []
  extra_descs: []
