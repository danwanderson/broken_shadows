- vnum: 2234
  name: Tunnel
  description: "This tunnel seems to stretch for miles.  You try to distinguish the
    end but\n\ryour eyes soon tire from the strain.  The smell here has increased
    two fold.\n\rThe tunnel continues to go to the east.  The wine cellar lies back
    to the \n\rwest.\n\r"
