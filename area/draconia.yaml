- vnum: 2237
  name: The Bridge
  description: "You are walking along an old wooden bridge.  Its not that secure.
    \ You \n\rmight want to hurry along.  To the south, on the other side of the bridge,\n\rlies
    a small opening.\n\r"
  room_flags: AD
