- vnum: 2229
  name: The Great Hall Ends.
  description: "You have come to the end of the great hall.  You see before you a
    huge\n\rgolden door, it must be at least twenty feet tall!  It has beautiful etchings\n\rof
    dragons.  You see a sign on the door.\n\r"
  room_flags: D
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "You see a great golden door.\n\r"
