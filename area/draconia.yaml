  name: The End of the tunnel
  description: "You have finally come to the end of the tunnel.  Back to the west
    lies\n\rthe miles of tunnels you have walked through.  You see the faint outline
    of\n\ra trapdoor above you.  A bride over an underground river lies to the south.\n\r"
  room_flags: AI
  sector: 2
