- vnum: 2219
  name: Crypt
  description: "You are in a large room which continues to the west.  You notice many\n\rcoffins
    here.  Open coffins reveal remains of something other than man.  \n\rThe smell
    of reptile is very strong here.\n\r"
  room_flags: D
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "You see the entrance.\n\r"
