    exit_flags: 0
    key: 0
    to_vnum: 2244
  extra_descs:
  - keywords: well
    description: "You peer over the side of the well.  It looks VERY, VERY deep.  It
      appears\n\rto be ENDLESS.\n\r"
  - keywords: sign
    description: "The sign reads:\n\r         This is a bottomless pit cleverly disguised
      as a well.  People have\n\rfallen in and never been heard from again.  Trust
      me, you don't want to go \n\rdown there.\n\r                        The All
      Powerful Well Keeper\n\r"
- vnum: 2240
  name: A path
  description: "This path leads up the side of the mountain.  A clearing lies below
    you.\n\rThere is a cave opening to the west.  The path continues up the mountain.\n\r"
