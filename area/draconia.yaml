- vnum: 2233
  name: Wine cellar
  description: "This is the old wine cellar of the Dragon Tower.  The shelves are
    empty.\n\rNothing living has been in here for a long time.  You see a tunnel leading\n\roff
    to the east and boy does it smell bad.  Kinda of like rotting flesh.\n\r"
  room_flags: A
  sector: 2
  owner:
  exits:
