- vnum: 2235
  name: A cave opening
  description: "You stand at the opening of a giant cave.  There are many bones strewn
    across\n\rthe room.  Some human, some indistinguishable.  It smells very bad in
    here.\n\rYou can hear movement in the cave to the north.  The tunnel goes back
    to the\n\rsouth.\n\r"
  room_flags: AI
  sector: 2
  owner:
  exits:
