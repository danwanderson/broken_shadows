- vnum: 2243
  name: The top of the mountain
  description: "You are standing at the top of the mountain.  It feels more like the
    top of\n\rthe world.  To your north lies a huge platinum door.  You hear very
    pronounced\n\rgrumbling from behind the doors.  It sounds like something huge
    and hungry.\n\rBut if you don't have the key you don't have to worry because you
    can't get it.\n\rIf you do have the key I would suggest not going in.  Some believe
    the Five\n\rHeaded dragon Tiamat was imprisoned here by the gods.  But who believes
    in \n\rfairy tales.  Well, if you're scared, you can always go down the mountain.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "The platinum door\n\r"
    keywords: door platinum
    exit_flags: ABCD
