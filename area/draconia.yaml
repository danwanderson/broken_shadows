    description: "Congratulations on making it this far!  Watch out, it gets a little\n\r
      \   nasty here... :) - Wench\n\r"
- vnum: 2230
  name: THE Lair
  description: "You have entered a huge lair.  You feel that something big lives here
    or at least did.  The golden door lies back to the west.\n\r"
