- vnum: 2223
  name: Entrance to the Great Hall
  description: "You have entered a huge hall.  It has been carefully decorated with\n\rbeautiful
    tapestries depicting a great battle between dragons and men.  The\n\rdragons appear
    to be the victors.\n\r"
  room_flags: D
  sector: 1
  owner:
  exits:
  - dir: 1
    desc: "The Hall continues.\n\r"
