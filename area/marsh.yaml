rooms:
- vnum: 8301
  name: Muddy Path
  description: "This section of the path is slowly being drowned by the nearby swamp
    to the\n\rsouth, which is creeping slowly inland.  Several caved-in buildings
    sprawl\n\rhere, torn apart both by battle and the elements.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc: "The path looks drier here.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 6125
  - dir: 2
    desc: "A broken road leading southward into the marsh.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8302
  extra_descs:
  - keywords: swamp
    description: "The swamp to the south even reaches as far as this point ... it
      makes the\n\rground and air about you moist and fetid.\n\r"
- vnum: 8302
  name: Swamp's Edge
  description: "Briars and marsh plants stick to your boots and clothes, and clouds
    cover the\n\rskies above the murky marsh, leaving the path before you dark and
    sinister.\n\rYou see some disturbances in the marsh, but after a few strangled
    screams,\n\rthe sounds stop.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8301
  - dir: 1
    desc: "To the east lies a series of bogs and shallows that look rather threatening.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8303
  - dir: 2
    desc: "You notice a large hill rising out of the marsh to the south.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8304
  extra_descs: []
- vnum: 8303
  name: Marshy Forest
  description: "This area is by no means a forest, but for those who dwell in these
    sparse\n\rtrees it is one.  Occasionally you see a whole humanoid form floating
    face down\n\rin the water, but mostly you only find pieces.  You hear a loud bellow
    in the\n\rdistance.  And feel fear creep into your heart.\n\r"
  room_flags: 1
  sector: 5
  owner:
  exits:
  - dir: 1
    desc: "Eastward is the thick bog of ooze...\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8305
  - dir: 3
    desc: "Westward lies the remanents of a broken and shattered roadway being swallowed\n\rby
      the marsh.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8302
  extra_descs:
  - keywords: pieces
    description: "You see severed limbs and spongy intestines.\n\r"
  - keywords: humanoid corpse
    description: "He looks mangled and shredded.  You see one large gash mark that
      looks\n\rlike it came from the claw of some huge beast.\n\r"
- vnum: 8304
  name: On a hill.
  description: "You stand atop a hill on the northwestern side of the evil swamp.
    Dark\n\rclouds whip around you and the wind raises its voice and assails you.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 0
    desc: "To the north lies a damp broken roadway.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8302
  - dir: 1
    desc: "A dark pool congeals to the east.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8309
  - dir: 2
    desc: "A gloomy path leads down the hill into the swamp.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8310
  extra_descs: []
- vnum: 8305
  name: An Oozing Bog
  description: "You stand in an oozing quagmire.  A creaking beat fills the air, \n\raccompanied
    by groans and soughing of the air.  Several large winged\n\rbeasts flap over you
    and send chilling glares your way.  You feel out\n\rof place, and feel that the
    occupants of this realm will soon \n\rhave you for a feast.\n\r"
  room_flags: 1
  sector: 5
  owner:
  exits:
  - dir: 1
    desc: "Eastward lies a horde of disgusting looking monsters.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8306
  - dir: 3
    desc: "Westward lies a marshy area.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8303
  extra_descs:
  - keywords: beasts
    description: "You see a large creature, possibly a demon, flapping heavily above
      you.\n\r"
- vnum: 8306
  name: An Oozing Bog
  description: "The ground here is soft and oozing.  You feel slimy water seeping
    into your\n\rboots.  Better stop and check for leeches when you get out of here.\n\r"
  room_flags: 1
  sector: 5
  owner:
  exits:
  - dir: 3
    desc: "You see a large tree limb that looks easily moved.\n\r"
    keywords: limb
    exit_flags: 1
    key: -1
    to_vnum: 8305
  extra_descs:
  - keywords: limb
    description: "The limb looks like it is attached to a trap door in the ground.\n\r"
- vnum: 8307
  name: Swamp Thing's Lair
  description: "A horrible swamp thing resides here.  Mutilated corpses suffuse the
    air with\n\rthe overwhelming stench of putrid flesh.\n\r"
  room_flags: 1
  sector: 6
  owner:
  exits:
  - dir: 3
    desc: "A pool of quick sand lies to the west.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8308
  extra_descs:
  - keywords: corpses
    description: "You notice a note on one of the corpses reading:  'Best ye forget
      the temple,\n\rit is not for the likes of you...'\n\r"
- vnum: 8308
  name: Pool of Quick Sand
  description: "You stand by a large oozing pool of quick sand.  Luckily only a complete\n\rklutz
    could not avoid it.  Dancing lights fly about you and one seems to\n\rbe taunting
    you towards the pool.\n\r"
  room_flags: 1
  sector: 6
  owner:
  exits:
  - dir: 1
    desc: "The swamp thing's lair.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8307
  - dir: 2
    desc: "A murky bog.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8314
  - dir: 3
    desc: "A dark pool lies to the west.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8309
  extra_descs:
  - keywords: quicksand
    description: "It looks deadly to the foolish.\n\r"
  - keywords: 'lights '
    description: "From the stories you have heard, you recognize them as will-o-wisps.\n\r"
- vnum: 8309
  name: A Dark Pool.
  description: "You stand beside a large dark pond.  The water boils not with heat,
    but with\n\rmotion, as if it is alive.  A creaking beat pulses through the air,
    leaving\n\ryou with a cold sweat and fear in your heart.\n\r"
  room_flags: 1
  sector: 6
  owner:
  exits:
  - dir: 1
    desc: "A large pool of quicksand lies to the east.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8308
  - dir: 2
    desc: "You see a cloud of darkness to the south.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8311
  - dir: 3
    desc: "A hill rises out of the swamp to the east.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8304
  extra_descs:
  - keywords: pond
    description: "It looks ALIVE ...\n\r"
- vnum: 8310
  name: Gloomy Path Through the Marsh.
  description: "To the north lies a hill, shrouded in dark clouds, and to the south
    lies\n\ra huge patch of vegetation.  You sense an evil presence and notice \n\ra
    beast flying overhead to the south east, towards what looks to be a \n\rhuge fortress,
    half buried in the marsh.\n\r"
  room_flags: 1
  sector: 6
  owner:
  exits:
  - dir: 0
    desc: "To the north a hill protrudes from the marshes.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8304
  - dir: 2
    desc: "To the south a huge mass of vegetation seems to quiver with life.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8312
  extra_descs:
  - keywords: vegetation
    description: "It looks sentient.\n\r"
  - keywords: fortress
    description: "It is surrounded by walls nearly 20 meters high.  In a tall tower
      on the\n\rnortheast side, a window glows blue with magical energy.\n\r"
  - keywords: beast
    description: "It looks to be a demon of some foul breed.\n\r"
  - keywords: clouds
    description: "The clouds look dark and foreboding.\n\r"
- vnum: 8311
  name: Cloud of Darkness.
  description: "As you travel through this cloud of darkness, a fear such as you have
    never\n\rknown before assails you.\n\r"
  room_flags: 1
  sector: 6
  owner:
  exits:
  - dir: 0
    desc: "A dark pool lies to the north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8309
  - dir: 2
    desc: "An obelisk lies to the south.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8313
  extra_descs: []
- vnum: 8312
  name: Near Vegetation from Hell.
  description: "You stand near some of the strangest plant life you have ever seen,
    a mixture\n\rof tumescent vegetables, evil-smelling fruit trees, and malignant
    ferns.\n\r"
  room_flags: 1
  sector: 6
  owner:
  exits:
  - dir: 0
    desc: "To the north is a gloomy path through the marsh.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8310
  - dir: 1
    desc: "Eastward is a large, black stone monolith.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8313
  extra_descs:
  - keywords: plant plants
    description: "They look rather violent, and snap at you when you come near.\n\r"
- vnum: 8313
  name: By the Monolith.
  description: "You are standing near a monolith which protrudes some 20 feet from
    the\n\rmarsh into the air.  Its black obsidian surface shines darkly in the \n\rstrange,
    almost unearthly light that enters through the clouds above.\n\r"
  room_flags: 1
  sector: 5
  owner:
  exits:
  - dir: 0
    desc: "To the north is a cloud of darkest evil.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8311
  - dir: 1
    desc: "Eastward lies a murky bog.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8314
  - dir: 3
    desc: "Near Vegetation from Hell.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8312
  extra_descs:
  - keywords: monolith
    description: "This huge monolith resembles nothing you have ever seen before.\n\rYou
      have a strong feeling not to go within.\n\r"
- vnum: 8314
  name: Murky Bog.
  description: "A murky bog surrounds you.  To the east a black monolith juts forth
    from the\n\rground.  Far to the north lies a huge pool of quicksand.  Snarls can
    be heard\n\rechoing as if from a great distance.\n\r"
  room_flags: 1
  sector: 5
  owner:
  exits:
  - dir: 0
    desc: "To the north lies a huge pool of quicksand.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8308
  - dir: 1
    desc: "To the east the marsh turns into a small lake.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8315
  - dir: 3
    desc: "Westward a large monolith awaits adventurers.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8313
  extra_descs:
  - keywords: monolith
    description: "This is a huge obsidian stone block stuck in the marsh.\n\r"
- vnum: 8315
  name: Northern Lake Side.
  description: "Floating on this boiling lake is not what you would consider an enjoyable
    \n\rexperience.  Many a creature bumps the bottom of your boat, and glares \n\rat
    you through unblinking eyes from the waters below.  The southern \n\rportion of
    the lake looks calm and serene compared to this wild place.\n\r"
  room_flags: 1
  sector: 7
  owner:
  exits:
  - dir: 2
    desc: "The southern portion of the lake lies to the south.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8316
  - dir: 3
    desc: "To the west lies a murky bog.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8314
  extra_descs: []
- vnum: 8316
  name: Southern Lake Side.
  description: "You are floating on a calm section of blue crystal water.  You feel
    much more\n\rat ease then you were before in this area.  Then a wave of fear passes
    over\n\ryou.  You are not alone.\n\r"
  room_flags: 1
  sector: 7
  owner:
  exits:
  - dir: 0
    desc: "Northern lake side.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8315
  - dir: 3
    desc: "To the west is a beach where your boat can land.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8317
  extra_descs:
  - keywords: north
    description: "The way to the north seems to be impassable, due to the rough water
      and\n\rstrange wild life.\n\r"
- vnum: 8317
  name: Beach
  description: "You are on a sandy shore.  Marsh life creeps across the surface.  To
    the west\n\rlies an evil fortress.  You see figures walking along the battlements.\n\r"
  room_flags: 1
  sector: 5
  owner:
  exits:
  - dir: 1
    desc: "To the east lies the southern portion of a small lake.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8316
  - dir: 3
    desc: "The great gates.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8318
  extra_descs:
  - keywords: fortress
    description: "It is hewn of black stone and heavily fortified.\n\r"
- vnum: 8318
  name: Before the Great Gates.
  description: "You stand before the gates of a huge fortress.  The drawbridge is
    up, the\n\rgates closed, and the portcullis down.  This place looks very dangerous,\n\rand
    you decide not to continue onward.\n\r"
  room_flags: 1
  sector: 3
  owner:
  exits:
  - dir: 1
    desc: "To the east is a marshy beach.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 8317
  extra_descs: []
