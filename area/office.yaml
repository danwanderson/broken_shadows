- vnum: 10009
  name: LadyLily's Bedroom
  description: "Upon entering her beautiful bedroom, you eyes lay on the gigantic
    king\n\rsize bed draped with rich fabrics and surrounded by lilies, lavender,
    and\n\rdaffodils.  The lively , innocent scents and the cute teddybear on the\n\rpillow
    remind you of a little child's room, but when you open her\n\rcloset.....  Whoa!
    \ Hanging on bowed hangers are tight leather outfits,\n\rwhips, chains, and many
    boxes are on the floor.  Love letters are scattered\n\ron the table, and many
    gifts are strewn along the couch.  Erotic Goddess\n\rindeed!  You wonder is she
    can get any man she wants....  And you'd love to\n\rfind out...  \n\r"
  room_flags: 520
