- vnum: 10010
  name: LadyLily's Conservatory
  description: "Glass walls and a glass ceiling frame a room of elegance.  A black
    grand\n\rpiano is in the middle of the room, and some sheet music lays on it.
    \n\rOrchids, lilies, roses, tulips, and daffodils are sprinkled throughtout the\n\rroom,
    and a large palm tree gives shade to the musician.  Frames are found\n\ron the
    desk, with pictures old and new within.  A large golden frame\n\rcontains Medea's
    picture, and some medium size frames contain pictures of\n\rother friends, including
    The Demonic One and Hammer.  The sun floats into\n\rthe glass sanctuary, and a
    feminine voice is heard, humming softly.  \n\r"
  room_flags: 8
