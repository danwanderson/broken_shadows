- vnum: 10004
  name: Awenyedd's Love Shack
  description: "A dimly lit room with quiet music and a wonderful almost vanilla smell\n\rwafting
    through.  High stained glass windows add dapples of colour to the\n\rplushly carpeted
    floor.  There are pillows and flowers scattered about the\n\rroom.\n\r"
  room_flags: 1048577
