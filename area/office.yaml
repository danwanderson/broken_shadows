- vnum: 10025
  name: The Immortal Conference Room
  description: "You are in a large conference room.  In the center of the room is
    a large\n\rtable.  Surrounding the table are a number of comfortable, high-backed\n\rchairs,
    one for each immortal.  At the head of the table is a slightly\n\rlarger chair
    for the administrator.  \n\r"
  room_flags: 1056780
  sector: 0
