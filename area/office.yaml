- vnum: 10096
  name: Mekare's Private Balcony
  description: "You are standing on a wrough-iron balcony overlooking a beautiful
    garden.\n\rThe sky is a breathtaking shade of violet, twilight, Mekare's favorite
    time\n\rof day.  You close your eyes and inhale deeply...  The sweet scent of\n\rnight-blooming
    jasmine overwelming you.  You hear the soft trickling of\n\rwater pouring from
    a nearby fountain, you feel yourself relax.  You open\n\ryour eyes and peer down
    into the garden, giant willow trees shelter the\n\rarea, roses grow wildly...
    \ Wisteria climbs the walls, wrapping around the\n\riron bars of the balcony.
    \ Serveral stone statues are scattered randomly. \n\rYou suddenly feel yourself
    being watched and realize that these statues are\n\rwatching you intently.  You
    feel tense, perhaps they don't like you being\n\rhere?  Afterall, they are the
    guardians of the lovely Vampire Queen and this\n\ris her private balcony.  Perhaps
    you should come back when Mekare herself is\n\rwith you.  You eyes suddenly fix
    upon a large, dark statue of a demon with\n\rgoat's hoofs and huge black wings.
    \ You quickly realize that he wasn't there\n\rwhen you scanned the garden previously...
    \ Mekare's guardian indeed, and one\n\ryou'd rather not mess with.  You quickly
    pray for transportation.  \n\r"
  room_flags: 1114628
  sector: 3
  owner:
  exits:
  - dir: 1
    desc:
