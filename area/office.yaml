- vnum: 10011
  name: Rahl's Private Study
  description: "You have entered the private sanctuary of Rahl.  Unlike his office,
    the\n\rstudy is quiet and orderly.  Around you, on many shelves, are books on
    all\n\rsubjects.  In the center of the room is a large desk with a large,\n\rcomfortable
    chair.  Facing the desk are several large and equally\n\rcomfortable chairs.  On
    the desktop is an hourglass, slowly counting the\n\rminutes and hours since time
    began.  \n\r"
