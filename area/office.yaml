- vnum: 10003
  name: The Tower Room
  description: "You enter the tower chamber through a heavy oak door.  Long, narrow\n\rwindows
    face the remaining three cardinal directions overlooking the forest\n\rbeyond.
    \ The thick stone walls are cold to the touch yet the room is warm\n\rand inviting.
    \ Candles are scattered throughout casting a soft glow and\n\rfilling the room
    with the sweet scent of vanilla.  A deep blue velvet sofa\n\rsits between two
    of the windows and a huge canopy bed rests in the center of\n\rthe tower.  Heavy
    drapes of ivory silk surround the feather mattress, which\n\rappears deep and
    comforting.  Finally, on the wall opposite the sofa is a\n\roil painting.  It
    portrays two young girls dressed in simple grey robes. \n\rThey share identical
    features, and identical long, wavy red hair.  Their\n\ridentical green eyes peer
    through you and the expression they hold is not\n\rthat of sadness or joy, but
    of complete silence.  They are holding hands. \n\rThe title of the painting is
    emblazoned below in fine gold lettering, it\n\rsimply reads \"The Twins\".  \n\r"
  room_flags: 1114124
  sector: 0
  owner:
  exits:
  - dir: 3
