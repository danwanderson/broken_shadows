- vnum: 10005
  name: The Bedroom
  description: "This room is darker than the main room.  The windows are stained glass\n\rhere
    as well, though smaller and higher up on the walls, creating the\n\rsplashes of
    colour over the soft-looking bed.  There are more flowers about\n\rthe room, and
    the wonderful vanilla smell is a little stronger here, coming\n\rfrom a few candles
    deeply set in the walls.\n\r"
  room_flags: 513
