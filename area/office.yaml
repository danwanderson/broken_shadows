- vnum: 10099
  name: The Waterfall
  description: "You are standing at the base of a very large and beautiful waterfall.
    \ At\n\ryour feet is a large pool, collecting some of the water before it all
    runs\n\roff into the depths of the forest.  Around you is a small clearing, with
    a\n\rsoft carpet of green.  A few yards away, the trees of the forest stand their\n\rguard
    against intruders, while above you, the stars and the moon keep their\n\rsilent
    vigil, their ever-watchful eyes staring down from the heavens.  There\n\rare few
    who know the path here, but those who do will agree that this is the\n\rmost peaceful
    and serene place in the entire world.  \n\r"
  room_flags: 1049100
