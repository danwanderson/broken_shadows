- vnum: 20012
  name: The Weaponsmith's Shop
  description: "The weaponsmith's shop in this city must have been a busy place, as\
    \ the\nshop is an impressive looking building and the inside of the building is\n\
    hardly spartan.  As the city flooded, the rushing waters could not lift many\n\
    of the wares of this shop.  On the floor and on the walls are the products\nof\
    \ the weaponsmith's trade.  On careful inspection, you notice that the\nsteel\
    \ weapons have all rusted in the water.  You also notice a set of\nweapons shining\
    \ bright in the light of your underwater lantern.  Perhaps\nthese warrant closer\
    \ inspection.  To the west is the jeweler's shop and to\nthe east is the blacksmith's.\
    \  South is Main Street.  To the distance in the\nnorth, you can see the old shoreline\
    \ and to the immediate north is the\nmarina.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
