- vnum: 20038
  name: Hot Cross Buns Bakery
  description: "This is the site of another of the city's prominent bakeries.  This\n\
    particular bakery was once famous for its pastries and sweets, but now, like\n\
    its sister in the northern part of the city, lies in ruin, its customers and\n\
    its baker long since gone.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
