    to_vnum: 20016
  extra_descs: []
- vnum: 20018
  name: The Temple
  description: "Definitely one of the most impressive buildings in the city, the temple\n\
    towers above you, its top almost reaching the surface of the sea.  When you\n\
    swim inside, you see the various altars to the various gods of the society. \n\
    The entire building is soaked (no pun intended) in wealth.  You are tempted\n\
    to take a \"prize\" back with you.  When you reenter Main Street, you notice\n\
    that the library is just a short walk to the west, convenient for the\nacolytes.\
    \  To the east you can see the city fountain.  North and south you\ncan see shops\
    \ of some sort.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
