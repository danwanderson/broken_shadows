    to_vnum: 20026
  extra_descs: []
- vnum: 20028
  name: The Market
  description: "You are in the center of what used to be the farmer's market.  Farmers\n\
    from the outskirts of the city brought fruits and vegetables here to sell\nthem.\
    \  Most of the stalls were washed away in the flood, but a few remain,\nbroken\
    \ and on their sides.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
