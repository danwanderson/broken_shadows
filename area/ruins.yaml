  extra_descs: []
- vnum: 20019
  name: The Fountain
  description: "You are hovering in front of a large fountain.  This fountain used\
    \ to be\nwhere the people came to get all their water for cooking and other household\n\
    uses.  Now, like everything else in this city, it lies in ruins, swallowed\nby\
    \ the sea.  As you inspect it closer, you notice that the bottom is not\nsolid.\
    \  To the north lies the road to what used to be the shore.  To the\neast and\
    \ west is Main Street.  To the south is the residential district.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
