  extra_descs: []
- vnum: 20020
  name: City Hall
  description: "You are in front of what was the mayor's home and office.  From here,\
    \ he\ndirected the future of the city and managed the day-to-day operations of\
    \ the\nmetropolis.  Inside, you find the reception room and the mayor's office.\
    \ \nThe furniture in both offices is still intact and in good shape, considering\n\
    that it has been underwater for more than a century.  In the mayor's office,\n\
    you find the remains of the mayor.  Apparently, he remained at his post\nuntil\
    \ the end, his body eaten away by scavengers, leaving the bare skeleton\nbehind.\
    \  Quickly, you return to Main Street and look around.  West is the\nfountain,\
    \ while to the north and south are shops of some sort.  To the east\nyou can see\
    \ the guards' office.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
