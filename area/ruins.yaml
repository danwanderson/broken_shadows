    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20027
  extra_descs: []
- vnum: 20029
  name: The Armor Shop
  description: "This is what used to be the armory.  At one point, the armorer stood\n\
    behind this counter selling his wares.  Armor lies strewn about the shop,\nmuch\
    \ of it steel and rusted, but, as you look around, you notice a few\npieces that\
    \ are still shiny.  The flooding destroyed several of the support\nbeams, causing\
    \ the ceiling to collapse.  Picking your way through the\nrubble, you pick up\
    \ a few artifacts and make your way back to the door.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
