- vnum: 20006
  name: The Alley
  description: "You are in a dark alley.  Once, this probably was dingy, but the current\n\
    has washed away everything, leaving it just a narrow channel between\nbuildings\
    \ running toward the cliff that used to mark the shoreline.  To the\neast is the\
    \ bakery.  To the west is what looks like it was the general\nstore.  \n"
  room_flags: AD
  sector: 6
  owner: ''
