  extra_descs: []
- vnum: 20023
  name: The Tax Collector's Office
  description: "In front of you, you can see the office of the most despised man in\
    \ the\nentire city.  This is where the tax collector did much of his work.  Then,\n\
    as now, no one liked the tax collector much.  There wasn't all that much\nmoney\
    \ to go around.  After taxes, most families had enough money for food\nand a little\
    \ left over for other things.  This was not a city of poor people\nand many of\
    \ the families didn't do too badly for themselves, but there were\nnot a lot of\
    \ very wealthy citizens.  To the west is a small inn.  North and\nsouth are shops\
    \ and houses.  Directly to the east of you, you can see the\nedge of the drop\
    \ off where most of the city slid deeper into the sea.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
