  extra_descs: []
- vnum: 20005
  name: The Bakery
  description: "You are hovering in front of what used to be one of the city's bakeries.
    \n\rAs you look at your surroundings, you wonder why someone decided to open a\n\rbakery
    here, where the aroma of all the wonderful breads would be lost in\n\rthe smell
    of the sea and of the fish from the nearby wharf.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
