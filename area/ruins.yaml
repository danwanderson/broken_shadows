    exit_flags: 0
    key: 0
    to_vnum: 20014
  extra_descs: []
- vnum: 20016
  name: West End of Main Street
  description: "You are hovering over the west end of Main Street, where it, at one
    time,\n\rturned into a small path into the woods.  Now, with the flooding of the
    town\n\rand much of the surrounding land, the woods have disappeared and the grass\n\rhas
    died, destroying the lines where the path once lay.  To the east, Main\n\rStreet
    continues, while to the north and south, you can see houses.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20008
