  extra_descs: []
- vnum: 20027
  name: The Magic User's Guild
  description: "You are in front of the city's guild for magic users.  Here, wizards\
    \ and\nsorceresses gathered together to teach each other and young apprentices\
    \ the\nspells and other rituals that defined the way they lived and which caused\n\
    resentment among some.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
