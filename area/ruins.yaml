    to_vnum: 20081
  extra_descs: []
- vnum: 20001
  name: The Wharf
  description: "Here you see the remains of the peirs that once berthed the fleets\
    \ of\nfishing boats, which, at one time, provided the city and many more small\n\
    towns with food.  Now, as the water slowly flows through the many hulks, you\n\
    can almost sense the desolation.  This once busy marketplace now abandoned\nand\
    \ underwater seems to echo the feeling of the entire city - cold and\nempty. \
    \ \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
