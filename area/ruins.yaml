- vnum: 20007
  name: The General Store
  description: "This is what used to be the general store.  Inside are shelves and\
    \ cases\nfull of goods, most of which are still there, surprisingly.  In the back\
    \ are\nbarrels which used to contain flour, sugar, and other foodstuffs, but which\n\
    have dissolved or attracted the attention of sharks.  To the west is an\nalley\
    \ and to the south you see a few houses.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 2
    desc: ''
