- vnum: 20034
  name: More Houses
  description: "You are standing among another group of houses, this one almost as\n\
    unspectacular as the rest of them.  As you begin to search through each\nhouse,\
    \ you start to lose hope of finding anything other than what you've\nalready seen.\
    \  Then, all of a sudden, in one of the least conspicuous\nhouses, you come across\
    \ something new: A framed story of some kind.  In\ninterest, you stop and read\
    \ it...  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20026
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20035
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20033
  extra_descs:
  - keywords: story
    description: "When we were children, we all heard the legend of the Kraken, the\
      \ famous\nship-eating sea monster.  Well, I'm here to tell you that it is entirely\n\
      true.  While I was sitting on the docks one day, I saw a ship come in.  It\n\
      was towing what was left of a great passenger ship and it was carrying the\n\
      survivors, which were few.  Every survivor and many of the crew of the\nrescuing\
      \ ship gave a descrition of a sea monster that fit the legend of the\nkraken\
      \ exactly.  I am convinced that they did indeed see a kraken, for who\nknows\
      \ if there is just one?  Perhaps it does not live as far out in the\nocean as\
      \ everyone thinks.  Personally, I think that it lives nearby. \nPerhaps in the\
      \ caves beneath the city.  \n"
- vnum: 20035
  name: The Gatehouse
  description: "Of all the city's gates, this is the only one still standing as far\
    \ as\nyou can tell.  Indeed, the west gate and gatehouse have been so thouroughly\n\
    destroyed that there is no trace of there ever having been a gate or even a\n\
    wall there.  The east gate, the only other gate into the city has slid down\n\
    into the chasm with the rest of the city and no one knows how much of the\ncity\
    \ survied the fall.  No one is even sure how far down the rest of the\ncity is.\
    \  The large iron gates are now forever rusted closed, their\nusefulness no longer\
    \ apparent, however, even in the murky water, they still\nlook very imposing and\
    \ very impressive.  The gatehouse, too is formidable. \nAt one time it held a\
    \ small squad of guards whose job it was to protect the\ncity from intruders at\
    \ night.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
