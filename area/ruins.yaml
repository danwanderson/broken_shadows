    to_vnum: 20029
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20020
  extra_descs: []
- vnum: 20022
  name: The Fighting Cock Inn
  description: "You are in front of a very nice inn.  No doubt this is where off-duty\n\rguards
    and city officials spent much of their pay and many hours.  Inside,\n\rover the
    fireplace, you see a collection of trophies brought back by lucky\n\rhunters.
    \ Behind the bar is a large mural protraying the birth of the world\n\rwith depictions
    of all the major gods.  Outside, to the west, you can see\n\rthe guards' headquarters,
    while in all other directions are shops and homes.\n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20014
