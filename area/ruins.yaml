    to_vnum: 20017
  extra_descs: []
- vnum: 20019
  name: The Fountain
  description: "You are hovering in front of a large fountain.  This fountain used
    to be\n\rwhere the people came to get all their water for cooking and other household\n\ruses.
    \ Now, like everything else in this city, it lies in ruins, swallowed\n\rby the
    sea.  As you inspect it closer, you notice that the bottom is not\n\rsolid.  To
    the north lies the road to what used to be the shore.  To the\n\reast and west
    is Main Street.  To the south is the residential district.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
