  extra_descs: []
- vnum: 20002
  name: The Cock and Bull Inn
  description: "You hover before what used to be a very nice inn, judging by what's\
    \ left\nof it.  The door hangs by a single hinge, swinging slowly in the current,\
    \ as\ndoes the large sign over the door.  As you gaze upon it, you can almost\
    \ hear\nthe people inside making merry befoere a large fire, mugs of ale in their\n\
    hands and cheer in their hearts, but after a moment you realize that is just\n\
    the water around you.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
