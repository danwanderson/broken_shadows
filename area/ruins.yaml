  extra_descs: []
- vnum: 20002
  name: The Cock and Bull Inn
  description: "You hover before what used to be a very nice inn, judging by what's
    left\n\rof it.  The door hangs by a single hinge, swinging slowly in the current,
    as\n\rdoes the large sign over the door.  As you gaze upon it, you can almost
    hear\n\rthe people inside making merry befoere a large fire, mugs of ale in their\n\rhands
    and cheer in their hearts, but after a moment you realize that is just\n\rthe
    water around you.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 1
    desc:
