- vnum: 20005
  name: The Bakery
  description: "You are hovering in front of what used to be one of the city's bakeries.\
    \ \nAs you look at your surroundings, you wonder why someone decided to open a\n\
    bakery here, where the aroma of all the wonderful breads would be lost in\nthe\
    \ smell of the sea and of the fish from the nearby wharf.  \n"
  room_flags: AD
  sector: 6
  owner: ''
