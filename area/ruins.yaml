  extra_descs: []
- vnum: 20026
  name: The Fighter's Guild
  description: "You are swimming in front of the building that at one time was where\
    \ the\nsoldiers and fighters hung out and practiced.  It was here that the masters\n\
    passed down their knowledge to the good and the bad swordsmen and it was\nhere\
    \ that many blademasters were made.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
