- vnum: 20013
  name: The Blacksmith's Shop
  description: "As you look around, you notice that you are in the blacksmith's shop.
    \n\rNear the back wall you can see the forge, where the city's blacksmith slaved\n\rall
    day to keep the horses shod and provide nails, candlesticks, and other\n\rhousehold
    items.  On the walls and the floor you can see various items that\n\rthe blacksmith
    has made in his years of work.  To the west you can see the\n\rweaponsmith's shop
    and to the east a stable.  South is Main Street and to\n\rthe north is what looks
    like another shop of some sort.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
