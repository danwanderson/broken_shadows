- vnum: 20038
  name: Hot Cross Buns Bakery
  description: "This is the site of another of the city's prominent bakeries.  This\n\rparticular
    bakery was once famous for its pastries and sweets, but now, like\n\rits sister
    in the northern part of the city, lies in ruin, its customers and\n\rits baker
    long since gone.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
