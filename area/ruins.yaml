- vnum: 20009
  name: A House
  description: "You are in front of a rather plain house.  While the owner was not\n\rwealthy,
    he wasn't very poor either.  Except for the fact that it's under\n\rwater, it
    looks much as you'd expect the typical middle-class home to look\n\rlike.  To
    the west you see a large and opulent house.  To the east is\n\ranother house,
    much like this one.  \n\r"
