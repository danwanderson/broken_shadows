    exit_flags: 0
    key: 0
    to_vnum: 20034
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20025
  extra_descs: []
- vnum: 20027
  name: The Magic User's Guild
  description: "You are in front of the city's guild for magic users.  Here, wizards
    and\n\rsorceresses gathered together to teach each other and young apprentices
    the\n\rspells and other rituals that defined the way they lived and which caused\n\rresentment
    among some.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20019
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20028
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20035
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20026
  extra_descs: []
- vnum: 20028
  name: The Market
  description: "You are in the center of what used to be the farmer's market.  Farmers\n\rfrom
    the outskirts of the city brought fruits and vegetables here to sell\n\rthem.
    \ Most of the stalls were washed away in the flood, but a few remain,\n\rbroken
    and on their sides.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20020
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20029
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20036
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20027
  extra_descs: []
- vnum: 20029
  name: The Armor Shop
  description: "This is what used to be the armory.  At one point, the armorer stood\n\rbehind
    this counter selling his wares.  Armor lies strewn about the shop,\n\rmuch of
    it steel and rusted, but, as you look around, you notice a few\n\rpieces that
    are still shiny.  The flooding destroyed several of the support\n\rbeams, causing
    the ceiling to collapse.  Picking your way through the\n\rrubble, you pick up
    a few artifacts and make your way back to the door.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20021
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20030
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20037
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20028
  extra_descs: []
- vnum: 20030
  name: The Blue Parrot Inn
  description: "You are before one of the many inns in the city.  During its heyday,
    the\n\rBlue Parrot had a reputation for being one of the rowdiest places in the\n\rarea.
    \ There was hardly a night when at least one person didn't get thrown\n\rout.
    \ Now, the ruins look so peaceful, water flowing slowly through giant\n\rholes
    in the walls and the roof.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20022
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20031
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20038
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20029
  extra_descs: []
- vnum: 20031
  name: A House
  description: "Before you stands a small house.  Although not in the greatest location,\n\rbeing
    right next door to the Blue Parrot Inn, the owner of this house was\n\rknown throughout
    the city.  Old Mrs.  Earl was perhaps the most giving\n\rperson in the city.  When
    her husband died, and even before, she dedicated\n\rher life to helping others.
    \ Many people, suddenly losing their livelihood\n\rand, therefore, their source
    of income, turned to Mrs.  Earl for a place to\n\rstay until they could find a
    new job or another source of income.  Mrs. \n\rEarl was also the first to offer
    food to the poor and the hungry.  For this,\n\rshe was known throughout the countryside
    and this house, or at least, what\n\ris left of it, stands a few hundred feet
    below the surface of the sea as an\n\reternal tribute to her.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20023
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20039
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20030
  extra_descs: []
- vnum: 20032
  name: The Southwest Corner
  description: "You are in the southwestern corner of the city.  Judging by the absence\n\rof
    shops, inns, and taverns, there must not have been much traffic here\n\rexcept
    for those living in the houses you see before you.  These are not\n\rspectacular
    houses.  In fact, you can see nothing special about them.  This\n\rmust have been
    a nice, quiet neighborhood.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20024
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20033
  extra_descs: []
- vnum: 20033
  name: More Houses
  description: "All around you are more houses, each as ordinary as the rest.  As
    you\n\rlook around, you realize that this must have been the home of many of the\n\rsailors,
    or at least the ones who decided to get married and have a family. \n\rOn the
    walls of a few houses, you can see harpoons and other maritime\n\requipment.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20025
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20034
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20032
  extra_descs: []
- vnum: 20034
  name: More Houses
  description: "You are standing among another group of houses, this one almost as\n\runspectacular
    as the rest of them.  As you begin to search through each\n\rhouse, you start
    to lose hope of finding anything other than what you've\n\ralready seen.  Then,
    all of a sudden, in one of the least conspicuous\n\rhouses, you come across something
    new: A framed story of some kind.  In\n\rinterest, you stop and read it...  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20026
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20035
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20033
  extra_descs:
  - keywords: story
    description: "When we were children, we all heard the legend of the Kraken, the
      famous\n\rship-eating sea monster.  Well, I'm here to tell you that it is entirely\n\rtrue.
      \ While I was sitting on the docks one day, I saw a ship come in.  It\n\rwas
      towing what was left of a great passenger ship and it was carrying the\n\rsurvivors,
      which were few.  Every survivor and many of the crew of the\n\rrescuing ship
      gave a descrition of a sea monster that fit the legend of the\n\rkraken exactly.
      \ I am convinced that they did indeed see a kraken, for who\n\rknows if there
      is just one?  Perhaps it does not live as far out in the\n\rocean as everyone
      thinks.  Personally, I think that it lives nearby. \n\rPerhaps in the caves
      beneath the city.  \n\r"
- vnum: 20035
  name: The Gatehouse
  description: "Of all the city's gates, this is the only one still standing as far
    as\n\ryou can tell.  Indeed, the west gate and gatehouse have been so thouroughly\n\rdestroyed
    that there is no trace of there ever having been a gate or even a\n\rwall there.
    \ The east gate, the only other gate into the city has slid down\n\rinto the chasm
    with the rest of the city and no one knows how much of the\n\rcity survied the
    fall.  No one is even sure how far down the rest of the\n\rcity is.  The large
    iron gates are now forever rusted closed, their\n\rusefulness no longer apparent,
    however, even in the murky water, they still\n\rlook very imposing and very impressive.
    \ The gatehouse, too is formidable. \n\rAt one time it held a small squad of guards
    whose job it was to protect the\n\rcity from intruders at night.  \n\r"
  room_flags: 9
  sector: 6
