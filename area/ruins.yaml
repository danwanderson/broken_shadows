rooms:
- vnum: 20000
  name: The Tavern
  description: "You are in front of what used to be a tavern, from the looks of the\n\
    place.  Long ago, the waters rose and covered the building, but, amazingly,\n\
    it is still intact after numerous decades underwater.  Off to the west and\nto\
    \ the north, there is a large underwater cliff where the ocean once met the\n\
    shore, but now there is no dry land to be seen for miles around.  To the\nsouth\
    \ and to the east, the streets of this once magnificent city extend\ntowards the\
    \ heart of the metropolis.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20001
