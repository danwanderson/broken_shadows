  description: "You are in front of a rather plain house.  While the owner was not\n\
    wealthy, he wasn't very poor either.  Except for the fact that it's under\nwater,\
    \ it looks much as you'd expect the typical middle-class home to look\nlike. \
    \ To the west you see a large and opulent house.  To the east is\nanother house,\
