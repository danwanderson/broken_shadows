  extra_descs: []
- vnum: 20017
  name: The Library
  description: "You are floating here on Main Street in front of the library.  As\
    \ you\nlook upon the huge building, you can almost see the scholars enterting\
    \ the\nbuilding to do research.  You swim between the twin pillars and manage\
    \ to\npush the doors open.  Inside, you can see row upon row of shelves containing\n\
    remnants of many volumes.  This impressive library once held hundreds of\nthousands\
    \ of books, but now there are few intact books left.  After a while,\nyou leave\
    \ the library and reenter Main Street.  To the west is the city\nentrance and\
    \ to the east you can see more of Main Street.  North and south\nof you is a cluster\
    \ of houses.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
