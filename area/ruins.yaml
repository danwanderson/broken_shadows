    exit_flags: 0
    key: 0
    to_vnum: 20059
  extra_descs: []
- vnum: 20020
  name: City Hall
  description: "You are in front of what was the mayor's home and office.  From here,
    he\n\rdirected the future of the city and managed the day-to-day operations of
    the\n\rmetropolis.  Inside, you find the reception room and the mayor's office.
    \n\rThe furniture in both offices is still intact and in good shape, considering\n\rthat
    it has been underwater for more than a century.  In the mayor's office,\n\ryou
    find the remains of the mayor.  Apparently, he remained at his post\n\runtil the
    end, his body eaten away by scavengers, leaving the bare skeleton\n\rbehind.  Quickly,
    you return to Main Street and look around.  West is the\n\rfountain, while to
    the north and south are shops of some sort.  To the east\n\ryou can see the guards'
    office.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20012
  - dir: 1
