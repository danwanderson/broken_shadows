  extra_descs: []
- vnum: 20007
  name: The General Store
  description: "This is what used to be the general store.  Inside are shelves and
    cases\n\rfull of goods, most of which are still there, surprisingly.  In the back
    are\n\rbarrels which used to contain flour, sugar, and other foodstuffs, but which\n\rhave
    dissolved or attracted the attention of sharks.  To the west is an\n\ralley and
    to the south you see a few houses.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 2
    desc:
