  extra_descs: []
- vnum: 20004
  name: The Marina
  description: "Here you can see what's left of the many small boats that were once\
    \ used\nby the people of the city.  To your right, you can see the small building\n\
    where the harbormaster must have kept his watch over the busy port, making\nsure\
    \ that the smaller boats did not get in the way of the larger fishing and\npassenger\
    \ boats.  To the east there is what looks like another shop, while\nto the west\
    \ you can see the main part of the docks.  South of you are more\nbuildings. \
    \ \n"
  room_flags: AD
  sector: 6
  owner: ''
