- vnum: 20006
  name: The Alley
  description: "You are in a dark alley.  Once, this probably was dingy, but the current\n\rhas
    washed away everything, leaving it just a narrow channel between\n\rbuildings
    running toward the cliff that used to mark the shoreline.  To the\n\reast is the
    bakery.  To the west is what looks like it was the general\n\rstore.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 1
