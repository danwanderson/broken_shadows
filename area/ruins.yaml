    to_vnum: 20032
  extra_descs: []
- vnum: 20025
  name: A Cluster of Houses
  description: "You are in front of a small cluster of houses.  Next to each house\
    \ is a\nspot where there was probably once a garden, providing supplimental food\n\
    during the summer months.  The insides of each house are rather plain,\nusually\
    \ consisting of a bedroom or two, a kitchen, and a few other\nmiscellaneous rooms.\
    \  \n"
  room_flags: AD
