- vnum: 20014
  name: A Group of Houses
  description: "You hover before a small cluster of nondescript houses.  Looking around,\n\
    you notice nothing out of the ordinary.  They're just average homes.  To the\n\
    north you can see an alley and, in the distance, the edge of the cliff.  To\n\
    the south is the main street of the city and to the west is the\nblacksmith's.\
    \  East of here you can see more homes.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
