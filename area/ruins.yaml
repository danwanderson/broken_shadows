    to_vnum: 20013
  extra_descs: []
- vnum: 20015
  name: A Group of Houses
  description: "Around you are several houses, none of which really stands out.  East
    of\n\rhere there is a ledge, where a large part of the city slid into the abyss\n\rwhen
    the city began flooding.  To the south is Main Street, while to the\n\rwest you
    can see more houses.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20007
  - dir: 2
