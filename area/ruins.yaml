- vnum: 20015
  name: A Group of Houses
  description: "Around you are several houses, none of which really stands out.  East\
    \ of\nhere there is a ledge, where a large part of the city slid into the abyss\n\
    when the city began flooding.  To the south is Main Street, while to the\nwest\
    \ you can see more houses.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
