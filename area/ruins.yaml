- vnum: 20036
  name: The Wall
  description: "At one point, this used to be a very nice neighborhood.  There used
    to be\n\ra playground for the children here, but now, there is nothing left of
    it\n\rsave a few timbers sticking out of the ground.  The only man-made object\n\rthat
    you can clearly recognize is the wall of the city.  This is one of the\n\rlongest
    segments of the wall left intact, from the gatehouse west of there\n\rto the small
    cottages east of here, almost a quarter mile long.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
