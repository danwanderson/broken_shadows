- vnum: 20008
  name: A House
  description: "You are in front of one of the city's larger houses.  The owner must\
    \ have\nloved the sea, as the house had a spectacular view of the shore and the\
    \ sea\nbeyond.  Inside there are many treasures, including quite a collection\
    \ of\nweapons and armor.  Unfortunately for you, the best you can do is look\n\
    through the windows at them, as all the entrances are effectively blocked. \n\
    Apparently the owner of the house was very cautious with his treasures.  The\n\
    house is closed up like a fortress.  \n"
  room_flags: AD
