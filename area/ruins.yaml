- vnum: 20039
  name: The Drop-Off
  description: "You are hovering over the edge of a deep chasm.  It was into this\
    \ chasm\nthat, more than a century ago, during the flooding, more than half of\
    \ the\ncity fell.  As you peer into the darkness of the abyss, you can't help\
    \ but\nwonder if wat treasures lie at the bottom.  Caution, however, prevents\
    \ you\nfrom going over the edge to find out, for no one knows just how far down\
    \ the\nremainder of the city is.  For all anyone knows, you might be crushed to\n\
    death by the pressure of hundreds of feet of water before you glimpse the\nspire\
    \ of the tallest building left standing there.  \n"
