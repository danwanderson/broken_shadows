- vnum: 20037
  name: Cottages
  description: "You are swimming in front of a group of small wooden cottages.  All\
    \ of\nthese cottages are made like log cabins and have only a few rooms each.\
    \ \nOnce, these cottages were the homes of the tavern maids, the blacksmith's\n\
    apprentices, and others with a low income but could still provide for\nthemsleves.\
    \  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
