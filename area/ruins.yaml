  extra_descs:
  - keywords: sign
    description: "The Cock and Bull Inn\n\r"
- vnum: 20003
  name: The Docks
  description: "You are now in front of the main docks of the city.  From here, voyages\n\rto
    other cities departed and travellers from other lands arrived.  At one\n\rtime,
    this used to be one of the busiest parts of the city, but now, they\n\rlie much
    as the neighboring wharf does.  To the east, you can see a small\n\rmarina, servicing
    the smaller boats.  To the south is one of the trade\n\rstreets.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 1
    desc:
