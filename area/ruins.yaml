- vnum: 20012
  name: The Weaponsmith's Shop
  description: "The weaponsmith's shop in this city must have been a busy place, as
    the\n\rshop is an impressive looking building and the inside of the building is\n\rhardly
    spartan.  As the city flooded, the rushing waters could not lift many\n\rof the
    wares of this shop.  On the floor and on the walls are the products\n\rof the
    weaponsmith's trade.  On careful inspection, you notice that the\n\rsteel weapons
    have all rusted in the water.  You also notice a set of\n\rweapons shining bright
    in the light of your underwater lantern.  Perhaps\n\rthese warrant closer inspection.
    \ To the west is the jeweler's shop and to\n\rthe east is the blacksmith's.  South
    is Main Street.  To the distance in the\n\rnorth, you can see the old shoreline
    and to the immediate north is the\n\rmarina.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
