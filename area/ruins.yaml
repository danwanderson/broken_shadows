rooms:
- vnum: 20000
  name: The Tavern
  description: "You are in front of what used to be a tavern, from the looks of the\n\rplace.
    \ Long ago, the waters rose and covered the building, but, amazingly,\n\rit is
    still intact after numerous decades underwater.  Off to the west and\n\rto the
    north, there is a large underwater cliff where the ocean once met the\n\rshore,
    but now there is no dry land to be seen for miles around.  To the\n\rsouth and
    to the east, the streets of this once magnificent city extend\n\rtowards the heart
    of the metropolis.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20001
