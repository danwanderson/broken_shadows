  extra_descs: []
- vnum: 20014
  name: A Group of Houses
  description: "You hover before a small cluster of nondescript houses.  Looking around,\n\ryou
    notice nothing out of the ordinary.  They're just average homes.  To the\n\rnorth
    you can see an alley and, in the distance, the edge of the cliff.  To\n\rthe south
    is the main street of the city and to the west is the\n\rblacksmith's.  East of
    here you can see more homes.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20006
