    to_vnum: 20024
  extra_descs: []
- vnum: 20017
  name: The Library
  description: "You are floating here on Main Street in front of the library.  As
    you\n\rlook upon the huge building, you can almost see the scholars enterting
    the\n\rbuilding to do research.  You swim between the twin pillars and manage
    to\n\rpush the doors open.  Inside, you can see row upon row of shelves containing\n\rremnants
    of many volumes.  This impressive library once held hundreds of\n\rthousands of
    books, but now there are few intact books left.  After a while,\n\ryou leave the
    library and reenter Main Street.  To the west is the city\n\rentrance and to the
    east you can see more of Main Street.  North and south\n\rof you is a cluster
    of houses.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20009
  - dir: 1
    desc:
