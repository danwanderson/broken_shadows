    exit_flags: '0'
    key: 0
    to_vnum: 20028
  extra_descs: []
- vnum: 20030
  name: The Blue Parrot Inn
  description: "You are before one of the many inns in the city.  During its heyday,\
    \ the\nBlue Parrot had a reputation for being one of the rowdiest places in the\n\
    area.  There was hardly a night when at least one person didn't get thrown\nout.\
    \  Now, the ruins look so peaceful, water flowing slowly through giant\nholes\
    \ in the walls and the roof.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20022
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20031
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20038
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20029
  extra_descs: []
- vnum: 20031
  name: A House
  description: "Before you stands a small house.  Although not in the greatest location,\n\
    being right next door to the Blue Parrot Inn, the owner of this house was\nknown\
    \ throughout the city.  Old Mrs.  Earl was perhaps the most giving\nperson in\
    \ the city.  When her husband died, and even before, she dedicated\nher life to\
    \ helping others.  Many people, suddenly losing their livelihood\nand, therefore,\
    \ their source of income, turned to Mrs.  Earl for a place to\nstay until they\
    \ could find a new job or another source of income.  Mrs. \nEarl was also the\
    \ first to offer food to the poor and the hungry.  For this,\nshe was known throughout\
    \ the countryside and this house, or at least, what\nis left of it, stands a few\
    \ hundred feet below the surface of the sea as an\neternal tribute to her.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20023
  - dir: 2
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20039
  - dir: 3
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20030
  extra_descs: []
- vnum: 20032
  name: The Southwest Corner
  description: "You are in the southwestern corner of the city.  Judging by the absence\n\
    of shops, inns, and taverns, there must not have been much traffic here\nexcept\
    \ for those living in the houses you see before you.  These are not\nspectacular\
    \ houses.  In fact, you can see nothing special about them.  This\nmust have been\
    \ a nice, quiet neighborhood.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20024
  - dir: 1
    desc: ''
    keywords: ''
    exit_flags: '0'
    key: 0
    to_vnum: 20033
  extra_descs: []
- vnum: 20033
  name: More Houses
  description: "All around you are more houses, each as ordinary as the rest.  As\
    \ you\nlook around, you realize that this must have been the home of many of the\n\
    sailors, or at least the ones who decided to get married and have a family. \n\
    On the walls of a few houses, you can see harpoons and other maritime\nequipment.\
    \  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
