  extra_descs:
  - keywords: sign
    description: |
      The Cock and Bull Inn
- vnum: 20003
  name: The Docks
  description: "You are now in front of the main docks of the city.  From here, voyages\n\
    to other cities departed and travellers from other lands arrived.  At one\ntime,\
    \ this used to be one of the busiest parts of the city, but now, they\nlie much\
    \ as the neighboring wharf does.  To the east, you can see a small\nmarina, servicing\
    \ the smaller boats.  To the south is one of the trade\nstreets.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 1
