    to_vnum: 20034
  extra_descs: []
- vnum: 20036
  name: The Wall
  description: "At one point, this used to be a very nice neighborhood.  There used\
    \ to be\na playground for the children here, but now, there is nothing left of\
    \ it\nsave a few timbers sticking out of the ground.  The only man-made object\n\
    that you can clearly recognize is the wall of the city.  This is one of the\n\
    longest segments of the wall left intact, from the gatehouse west of there\nto\
    \ the small cottages east of here, almost a quarter mile long.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
