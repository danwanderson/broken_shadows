    exit_flags: 0
    key: 0
    to_vnum: 20025
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20016
  extra_descs: []
- vnum: 20018
  name: The Temple
  description: "Definitely one of the most impressive buildings in the city, the temple\n\rtowers
    above you, its top almost reaching the surface of the sea.  When you\n\rswim inside,
    you see the various altars to the various gods of the society. \n\rThe entire
    building is soaked (no pun intended) in wealth.  You are tempted\n\rto take a
    \"prize\" back with you.  When you reenter Main Street, you notice\n\rthat the
    library is just a short walk to the west, convenient for the\n\racolytes.  To
    the east you can see the city fountain.  North and south you\n\rcan see shops
    of some sort.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20010
