- vnum: 20037
  name: Cottages
  description: "You are swimming in front of a group of small wooden cottages.  All
    of\n\rthese cottages are made like log cabins and have only a few rooms each.
    \n\rOnce, these cottages were the homes of the tavern maids, the blacksmith's\n\rapprentices,
    and others with a low income but could still provide for\n\rthemsleves.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
