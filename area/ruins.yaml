  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20024
  extra_descs: []
- vnum: 20026
  name: The Fighter's Guild
  description: "You are swimming in front of the building that at one time was where
    the\n\rsoldiers and fighters hung out and practiced.  It was here that the masters\n\rpassed
    down their knowledge to the good and the bad swordsmen and it was\n\rhere that
    many blademasters were made.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20018
  - dir: 1
    desc:
