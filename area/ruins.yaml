  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20021
  extra_descs: []
- vnum: 20023
  name: The Tax Collector's Office
  description: "In front of you, you can see the office of the most despised man in
    the\n\rentire city.  This is where the tax collector did much of his work.  Then,\n\ras
    now, no one liked the tax collector much.  There wasn't all that much\n\rmoney
    to go around.  After taxes, most families had enough money for food\n\rand a little
    left over for other things.  This was not a city of poor people\n\rand many of
    the families didn't do too badly for themselves, but there were\n\rnot a lot of
    very wealthy citizens.  To the west is a small inn.  North and\n\rsouth are shops
    and houses.  Directly to the east of you, you can see the\n\redge of the drop
    off where most of the city slid deeper into the sea.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20015
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20031
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20022
  extra_descs: []
- vnum: 20024
  name: The Butcher's Shop
  description: "You are in front of one of the city's butcher shops.  When you swim\n\rinside,
    you can see the back room, where the animals were slaughtered.  The\n\rwalls of
    this room are covered with various knives and cutting implements. \n\rThe front
    room contains a few tables where all kinds of cut meats were in\n\rdisplay.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20016
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20025
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20032
  extra_descs: []
- vnum: 20025
  name: A Cluster of Houses
  description: "You are in front of a small cluster of houses.  Next to each house
    is a\n\rspot where there was probably once a garden, providing supplimental food\n\rduring
    the summer months.  The insides of each house are rather plain,\n\rusually consisting
    of a bedroom or two, a kitchen, and a few other\n\rmiscellaneous rooms.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20017
