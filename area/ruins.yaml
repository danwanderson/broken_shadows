  extra_descs: []
- vnum: 20008
  name: A House
  description: "You are in front of one of the city's larger houses.  The owner must
    have\n\rloved the sea, as the house had a spectacular view of the shore and the
    sea\n\rbeyond.  Inside there are many treasures, including quite a collection
    of\n\rweapons and armor.  Unfortunately for you, the best you can do is look\n\rthrough
    the windows at them, as all the entrances are effectively blocked. \n\rApparently
    the owner of the house was very cautious with his treasures.  The\n\rhouse is
    closed up like a fortress.  \n\r"
  room_flags: 9
  sector: 6
