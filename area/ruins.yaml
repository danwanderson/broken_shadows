    to_vnum: 20022
  extra_descs: []
- vnum: 20024
  name: The Butcher's Shop
  description: "You are in front of one of the city's butcher shops.  When you swim\n\
    inside, you can see the back room, where the animals were slaughtered.  The\n\
    walls of this room are covered with various knives and cutting implements. \n\
    The front room contains a few tables where all kinds of cut meats were in\ndisplay.\
    \  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
