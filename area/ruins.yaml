    exit_flags: 0
    key: 0
    to_vnum: 20019
  extra_descs: []
- vnum: 20021
  name: The Guards' Office
  description: "You are standing before the cityguards' headquarters.  From here,
    the\n\rguards used to patrol the city, keeping the peace and upholding the law.
    \n\rOver the door, the large shield of the guards is prominently displayed.  To\n\rthe
    west you can see City Hall.  To the east and north you can see shops of\n\rsome
    sort.  Sout of here is what looks like houses.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 20013
  - dir: 1
    desc:
