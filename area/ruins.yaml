- vnum: 20021
  name: The Guards' Office
  description: "You are standing before the cityguards' headquarters.  From here,\
    \ the\nguards used to patrol the city, keeping the peace and upholding the law.\
    \ \nOver the door, the large shield of the guards is prominently displayed.  To\n\
    the west you can see City Hall.  To the east and north you can see shops of\n\
    some sort.  Sout of here is what looks like houses.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
