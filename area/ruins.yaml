  extra_descs: []
- vnum: 20004
  name: The Marina
  description: "Here you can see what's left of the many small boats that were once
    used\n\rby the people of the city.  To your right, you can see the small building\n\rwhere
    the harbormaster must have kept his watch over the busy port, making\n\rsure that
    the smaller boats did not get in the way of the larger fishing and\n\rpassenger
    boats.  To the east there is what looks like another shop, while\n\rto the west
    you can see the main part of the docks.  South of you are more\n\rbuildings.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
