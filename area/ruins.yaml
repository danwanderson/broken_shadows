- vnum: 20011
  name: The Jeweler's
  description: "This used to be the jeweler's shop.  As you look around, you can see\
    \ that\nthe display cases are still intact.  Upon closer inspection, you can see\n\
    that not only are the cases intact, but they still have all sorts of jewelry\n\
    in them.  To the west is a group of houses.  East is the weaponsmith's shop.\n\
    To the north you can see the old shoreline.  South is Main Street.  \n"
  room_flags: AD
