- vnum: 20013
  name: The Blacksmith's Shop
  description: "As you look around, you notice that you are in the blacksmith's shop.\
    \ \nNear the back wall you can see the forge, where the city's blacksmith slaved\n\
    all day to keep the horses shod and provide nails, candlesticks, and other\nhousehold\
    \ items.  On the walls and the floor you can see various items that\nthe blacksmith\
    \ has made in his years of work.  To the west you can see the\nweaponsmith's shop\
    \ and to the east a stable.  South is Main Street and to\nthe north is what looks\
    \ like another shop of some sort.  \n"
  room_flags: AD
