    to_vnum: 20081
  extra_descs: []
- vnum: 20001
  name: The Wharf
  description: "Here you see the remains of the peirs that once berthed the fleets
    of\n\rfishing boats, which, at one time, provided the city and many more small\n\rtowns
    with food.  Now, as the water slowly flows through the many hulks, you\n\rcan
    almost sense the desolation.  This once busy marketplace now abandoned\n\rand
    underwater seems to echo the feeling of the entire city - cold and\n\rempty.  \n\r"
  room_flags: 9
  sector: 6
  owner:
  exits:
  - dir: 1
    desc:
