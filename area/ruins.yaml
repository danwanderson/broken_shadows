- vnum: 20016
  name: West End of Main Street
  description: "You are hovering over the west end of Main Street, where it, at one\
    \ time,\nturned into a small path into the woods.  Now, with the flooding of the\
    \ town\nand much of the surrounding land, the woods have disappeared and the grass\n\
    has died, destroying the lines where the path once lay.  To the east, Main\nStreet\
    \ continues, while to the north and south, you can see houses.  \n"
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
