- vnum: 20022
  name: The Fighting Cock Inn
  description: |
    You are in front of a very nice inn.  No doubt this is where off-duty
    guards and city officials spent much of their pay and many hours.  Inside,
    over the fireplace, you see a collection of trophies brought back by lucky
    hunters.  Behind the bar is a large mural protraying the birth of the world
    with depictions of all the major gods.  Outside, to the west, you can see
    the guards' headquarters, while in all other directions are shops and homes.
  room_flags: AD
  sector: 6
  owner: ''
  exits:
  - dir: 0
    desc: ''
