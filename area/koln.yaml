  description: "You are in the practice and training room for the Katra dwarves.  It
    is\n\rin this rooms that the Katra perfect their unique brand of fighting style.
    \n\rIn his room there are many unusual and vicious looking weapons hanging on\n\rthe
    dark stone walls that the Katra make for themselves.  A halway leads to\n\rthe
    meditaion room to the west and another hall leads to the south.  \n\r"
