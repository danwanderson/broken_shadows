    to_vnum: 14417
  extra_descs:
  - keywords: door
    description: "You see the Great Iron Doors of Death.  They are massive, strong
      and old.\n\rForged hundreds of years ago they, the doors have withstood many
      attacks by\n\rhumans and goblins and the like.  \n\r"
- vnum: 14472
  name: The Bar
  description: "You are at the large (and low) bar.  There are many drunken dwarves
    here\n\rhaving fun in a dwarven type of way.  Served here is a fine assortment
    of\n\ralcoholic beverages from grog to ale, and even the infamous Blackend Voodoo\n\rBeer!
    \ (Truely a drinking experience!)  To the south lies the way back to\n\rthe food
    serving section of the Good Grub tavern.  \n\r"
