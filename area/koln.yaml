- vnum: 14470
  name: The Altar Room
  description: "You are in the Altar room for the Goddess Oya.  The room is lit by
    the\n\rholy candles that light the way for the dead souls to reach the other side.
    \n\rTo the south lies the burial caves.  \n\r"
