- vnum: 14481
  name: The Deathmaster's Room
  description: "You are in the Deathmaster's room.  There are many old blood stains
    on\n\rthe walls and floors.  There is very little of intrest here.  It seems the\n\rDeathmaster
    lives humbly.  The only exit is north.  \n\r"
