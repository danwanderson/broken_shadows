- vnum: 14477
  name: Entrance to the Katra Hideout
  description: "You are in the entrance to the secret hideout of the Katra dwarves.
    \ On\n\rthe floor are old, ornate rugs that are worn thin from years of foot\n\rtramplings.
    \ On the walls are hung ancient, faded tapestries depicting\n\rvarious scenes
    from dwarven history.  There are passageways cut in the stone\n\rwalls to the
    north and east.  \n\r"
