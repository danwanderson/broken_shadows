- vnum: 14471
  name: The Gates
  description: "You are at the gates to the Burial caves of the dwarven kingdom.  The\n\rgates
    are almost as large and ornately decorated as the gates to the kingdom\n\ritself.
    \ The giant doors are always locked except when a dead dwarf is going\n\rto be
    placed in the caves.  The keys to the gate are carrired by the dwarven\n\rpriests-warriors
    who guard the gates and watch over the dead.  \n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "You see the Great Iron Gates of Death.\n\r"
    keywords: gate
    exit_flags: 15
    key: 14409
    to_vnum: 14448
  - dir: 2
