  name: The Katra Hideout
  description: "You are in another part of the Katra hideout.  There are some flat,
    old,\n\rdusty mattresses lying on the cold stone floor.  The smell of mushroom
    smoke\n\ris thick in the air.  To the west lies the entrance to the hideout and
    to\n\rthe north you see the weapons room.  \n\r"
