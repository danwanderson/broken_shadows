    there's\n\rno way of turning around on this all too narrow path. There IS another
    exit\n\rfrom here but that leads right into mid-air and with high probability
    of a\n\rfree fall session afterwards.\n\r"
  room_flags: ACD
  sector: 5
  owner:
  exits:
  - dir: 0
    desc: "North. The ledge leads into a corner and turns eastward.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7106
  - dir: 1
    desc: "You stare into mid-air, and right under there's absolutely nothing but
