- vnum: 7190
  name: Mid-air
  description: "You've just stepped into the most unlucky position in the whole of
    DikuMUD.\n\rThe result of such a foolish act should be punished with death, you
    know.\n\rWith an acceleration of approximately 9.82 metres per second per second,
    you\n\rare now descending the Abyss. What awaits you at the bottom will continue
    to\n\rbe a mystery. Bye Cruel World.\n\r\n\rYou've fallen, and you can't get up!!!\n\r"
  room_flags: CD
  sector: 0
  owner:
  exits: []
  extra_descs: []
- vnum: 7199
  name: The Edge of the Water
  description: "The pool side is dimly lit up by your light. You can see absolutely
    nothing\n\relse nearby. The darkness her seems enormously oppressive here. The
    air is\n\rdamp and the rock on which you stand is slippery. The pool seems too
    dark \n\rto make anything clear. The rock can be climbed upwards from here.\n\r"
  room_flags: ACD
  sector: 5
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7099
  extra_descs: []
- vnum: 7200
  name: The Treasury
  description: "You are in a small but well equipped treasury.  You can see some writing
    on\n\rthe wall.  The ceiling has a funny glow, which enables you to see.  You
    can\n\rget back into the inner lair through the stone door which is east.\n\r"
  room_flags: CD
  sector: 0
  owner:
  exits:
  - dir: 1
    desc: "You look back through the opening into the inner lair.\n\r"
    keywords: door stone
    exit_flags: A
    key: 7205
    to_vnum: 7201
  extra_descs:
  - keywords: writing
    description: "You read the number '666'.\n\r"
  - keywords: door stone
    description: "This is a heavy black stone door it looks very solid.\n\r"
- vnum: 7201
  name: The inner Lair
  description: "You are in a octagonal room with smooth purple stone walls.  The floor
    is \n\rmade from black stone.  In the western wall you see a large black stone
    door.\n\r"
  room_flags: AD
  sector: 0
