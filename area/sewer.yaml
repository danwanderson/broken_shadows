    description: "This is funny enough a wooden ladder and, after closer inspection,
      you\n\rdiscover it is magically held towards the wall! You can't, even with
      your\n\rgreatest effort, rock it at ALL!\n\r"
- vnum: 7103
  name: A muddy bend in the sewer system
  description: "You are standing in what looks like a bend in the pipe system of the\n\rsewer.
    The 'floor' is covered completely by mud! This includes covering\n\ryour legs
    up to your knees as well. The pipe leads west and south.\n\r"
  room_flags: AD
  sector: 4
  owner:
  exits:
  - dir: 2
    desc: "To the south there's less mud than here! It actually seems to end there!\n\rYou
      have a felling it would be nice to have your feet free from mud again.\n\r"
