- vnum: 7111
  name: The southwestern corner of the ledge
  description: "This seems like a ledge that is a little broader than the one just
    to the \n\rnorth of here. The ledge seems to lead around some sort of Abyss of
    total \n\rdarkness. The ledge seems to have an odd-looking edge here.\n\r"
  room_flags: ACD
  sector: 5
  owner:
  exits:
  - dir: 0
    desc: "North. The ledge leads further north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7110
  - dir: 1
    desc: "You see a broad ledge leading eastward.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7115
  - dir: 2
    desc: "South of here is the exit from the ledge.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7112
  - dir: 5
    desc: "The Abyss lies down there. Who knows what might lurk down there?\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7279
  extra_descs:
  - keywords: rock
    description: "It looks as if it can be opened in a door-like fashion. Maybe this
      will lead\n\rthe way down.\n\r"
  - keywords: step
    description: "A small rock sticks out right under it, otherwise the way is DOWN,
      DOWN, and\n\rSPLAT!!!\n\r"
  - keywords: edge odd-looking
    description: "This is truly a weird piece of craftsmanship in your eyes. The edge
      seems to\n\rform a step leading down, but WHAT a STEP DOWN. The Abyss opens
      down there \n\rleading to seemingly total destruction.\n\r"
- vnum: 7112
  name: An odd intersection
  description: "You stand in a rather odd intersection of pipes. The pipes actually
    don't\n\rresemble pipes anymore. They look more like a real stone tunnel, or a\n\rpassageway
    hewn directly into the rock. The ways from here lead north, east\n\rand west.\n\r"
  room_flags: AD
