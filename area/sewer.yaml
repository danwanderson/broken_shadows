  - dir: 3
    desc: "You see the treasury.\n\r"
    keywords: door stone
    exit_flags: ABCD
    key: 7205
    to_vnum: 7200
  extra_descs: []
- vnum: 7202
  name: The Lair
  description: "On the floor you see a lot of human decay, like bones and skulls.
    You also\n\rsee a lot of slime. On the wall is a torch sitting in its sconce.
    To the north \n\rare a wooden door.\n\r"
