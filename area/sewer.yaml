- vnum: 7101
  name: Under the mudhole
  description: "You stand in a small room with a great big opening in the ceiling.
    From this\n\ropening there's mud dripping down in large lumps. >YUCK<. You can
    smell the \n\rfoul stench of the slimy sediment as you try not to get covered
    by the \n\rfalling sludge. To the east there is an entryway leading out from here
    and \n\rit seems absolutely impossible to force the muddy decent.\n\r"
  room_flags: ACD
  sector: 5
  owner:
  exits:
  - dir: 1
    desc: "East. You see nothing of interest.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7103
  extra_descs:
  - keywords: mud
    description: "You never saw such disgusting matter before, it nearly makes you
      puke.\n\r"
- vnum: 7102
  name: Under the Dark Pit
  description: "Nice place you found yourself. You stand in the middle of a room with
    only\n\rtwo exits, Up and East. A tall ladder is left here so that you can climb\n\rup
    through the Pit without the use of a rope.\n\r"
  room_flags: AD
