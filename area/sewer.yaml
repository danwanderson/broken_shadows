- vnum: 7015
  name: The old well
  description: "You are standing by an old and worn well from before this century.
    The sewer\n\rleads to the east from here and the well leads down into darkness.
    Metal\n\rbars implanted in the side of the well lead down as a ladder.\n\r"
  room_flags: AD
  sector: 3
  owner:
  exits:
  - dir: 1
    desc: "East. You see, because of the utter darkness that surround you, absolutely\n\rnothing.
      Your light isn't of much use for that kind of distance.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7028
  - dir: 5
    desc: "Down the well there's even less light than up here, so ... sorry, you can't\n\rsee
      a thing. There are metal bars in the side leading down into the darkness.\n\r"
