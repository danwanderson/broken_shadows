    exit_flags: 0
    key: -1
    to_vnum: 7105
  extra_descs:
  - keywords: bars
    description: "These look like they're pretty slippery, and not very safe, but
      perhaps safe\n\renough for you to climb down, WITH both hands on them.\n\r"
