- vnum: 7105
  name: Down the old well
  description: "You are dangling on the slippery sides of the old well leading down
    and up.\n\rThe only secure point here is the metal bars that are cemented into
    the \n\rsides, the ones that you cling frantically to so that you don't fall.
    Who\n\rknows how deep this well is?\n\r"
  room_flags: AD
  sector: 5
  owner:
  exits:
  - dir: 4
    desc: "There's a slight, dim light from above, or maybe it's your imagination.\n\rAnyway
      it SEEMS darker down here than up there, if that is possible.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 7015
  extra_descs:
  - keywords: bars
    description: "These look like they're pretty slippery, and not very safe.  You'd
      better\n\rnot go down any further.\n\r"
- vnum: 7106
  name: The northwestern corner of the ledge
  description: "You stand, swaying out from the ledge, with only a couple of inches
    of safe, \n\rsolid ledge under your feet. The ledge continues to the east but
    not back\n\rsouth. It seems that the ledge is too narrow to turn on so you'll
    have to\n\rcontinue forward.\n\r"
  room_flags: ACD
  sector: 5
