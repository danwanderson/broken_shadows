- vnum: 7013
  name: A MUDDY intersection
  description: "You wouldn't want to know the true feeling of standing in this mud
    up to \n\ryour hips. >BWAADR<. All that fills your mind right now is the dream
    of \n\ra hot bath. This is NOT very clean mud you know, remember you're in the\n\rsewer!
    The pipes leads north, south and east.\n\r"
  room_flags: AD
  sector: 5
  owner:
  exits:
  - dir: 0
