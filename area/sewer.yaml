- vnum: 7114
  name: Mid-air
  description: "You've just stepped into the most unlucky position in the whole of
    Merc Mud.\n\rThe result of such a foolish act should be punished with death, you
    know.\n\rWith an acceleration of approximately 9.82 metres per second per second,
    you\n\rare now descending the Abyss. What awaits you at the bottom will continue
    to\n\rbe a mystery. Bye Cruel World.\n\r\n\rYou've fallen, and you can't get up!!!\n\r"
  room_flags: CD
  sector: 0
  owner:
  exits: []
  extra_descs: []
- vnum: 7115
  name: The Broad ledge
  description: "You are standing on a ledge that seems quite a lot larger than the
    rest \n\rof the ledges. This one leads to the west and the east, plus it has an
    exit\n\rgoing to the south. Though you could jump into mid-air, but it probably
    \n\rwouldn't be such a good idea. The way south is in utter darkness.\n\r"
  room_flags: ACD
