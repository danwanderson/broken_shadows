- vnum: 1139
  name: Pig pen
  description: |
    You feel your boots sinking into the mud.  Numerous pigs roam about,
    oblivious to your company.  A grassy field is to the north while you see
    a small path winding to the west.
  room_flags: '0'
  sector: 1
  owner: ''
  exits:
  - dir: 0
    desc: |
      You see a grassy field.
    keywords: ''
    exit_flags: '0'
