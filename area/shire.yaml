- vnum: 1141
  name: Gamgee Residence
  description: "You stand inside a modest home.  You deduce that this is indeed the
    home\n\rof whomever owns the surrounding lands.  The air is somewhat musty and
    \n\rthe smell reminds you of a stable.  As you look around disdainfully, you\n\rthink
    to yourself that this is more of a shack than a proper residence and\n\ryou long
    for the urban riches of the Shire proper.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see a small path winding its way southward.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1140
  extra_descs: []
- vnum: 1142
  name: A barn
  description: "Animals of every sort fill the small barn.  You feel the hot breath
    of\n\rhorses and cows on your neck and you feel the sudden need for fresh air.\n\rOther
    than that, you feel cozy and protected and don't mind staying for a\n\rbit longer.
    \ All the warmth and good vibes remind you of the days when your\n\rmother would
    hold you in her arms and sing you to sleep.  You find yourself\n\rwanting to cradle
    all the animals.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 0
    desc: "You see a chicken coop to the north.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1143
  - dir: 2
    desc: "You see a grassy field.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1138
  extra_descs: []
- vnum: 1143
  name: A chicken coop
  description: "You stand inside a rather crowded chicken coop.  The cackle of hens
    fill\n\rthe air.  The only exit is to the south.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 2
    desc: "You see a large barn.\n\r"
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 1142
  extra_descs: []
- vnum: 1144
  name: The Green Dragon
  description: "Welcome to the Green Dragon, the undisputed leader in the art of\n\rinnkeeping.
    \ A rather charming and friendly hostess stands to the side,\n\rready to offer
    you food and drink.  While most of the patrons are halfling\n\rlocals, you spy
    an occasional human or two.  As you listen more closely\n\rto the conversations
    that fill the inn, you hear the tales of great and\n\rseasoned adventurers as
    well as the usual gossip.  You feel as if you've\n\rfound your second home in
    the Green Dragon.  You see a stairway leading\n\rupwards.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 3
    desc: "You see Delving Lane.\n\r"
    keywords:
    exit_flags: 0
    key: -1
