  description: "You stand in a comfortably well-equipped house, a palace by humble
    halfling\n\rstandards.  On the wall you see a banner which reads \"Home Sweet
    Home\".\n\rA solid oak door to the east leads to a pantry while you see a cozy
    bedroom\n\rto the west.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 1
    desc: "Through the keyhole you see what looks like a well stocked pantry.\n\r"
    keywords: door
