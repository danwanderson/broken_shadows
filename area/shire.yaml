- vnum: 1137
  name: Pantry
  description: "You are inside the pantry.  Shelves filled with food and drink surround\n\ryou
    on all sides.  You wonder why a halfling would need so much to eat.\n\rThe presence
    of something unseen chills you to your bones.  On the floor\n\ryou spy a trapdoor.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
  - dir: 3
    desc: "Beyond the door you see the main room of Bag End.\n\r"
    keywords: door
    exit_flags: A
    key: -1
    to_vnum: 1135
  - dir: 5
    desc: "It's anyone's guess as to where the trapdoor leads.\n\r"
    keywords:
    exit_flags: 0
