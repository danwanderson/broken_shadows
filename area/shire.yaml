- vnum: 1136
  name: Bedroom
  description: "You stand in the private bedroom of Bag End.  There are two beds to
    the\n\rside, neither of which are made.  Portraits of halflings hang on the wall,\n\rand
    as you gaze upon them you come to the conclusion that the owner of\n\rBag End
    comes from a long line of distinguished halflings.  A cozy fire\n\rin the fireplace
    keeps the room warm and comfortable.\n\r"
  room_flags: D
  sector: 0
  owner:
  exits:
