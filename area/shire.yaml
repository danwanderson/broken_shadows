  description: "Delving Lane runs north and south in this small borough of the Shire.
    \ To \n\rthe south stands Brandywine Bridge.  The Green Dragon, the undisputed
    leader\n\rin the art of innkeeping, offers rest and comfort to the east.  You
    hear the\n\rbray of horses from the west.\n\r"
