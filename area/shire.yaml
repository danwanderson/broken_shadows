  description: "You tremble with ecstasy as the tempting odors of freshly made pipeweed\n\rbread
    fill your lungs.  Rumor has it that the pipeweed bread sold here can\n\rrestore
    vitality.  You look around but find no one to take your order.  \n\rYou then peep
    over the counter and discover a friendly grocer who is too \n\rshort to be seen
    over the counter.  The only exit is to the north.\n\r"
