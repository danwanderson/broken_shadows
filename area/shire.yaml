    to_vnum: 1140
  extra_descs: []
- vnum: 1140
  name: A stony path
  description: |
    You walk on a stony path which leads to a small residence to the north.
    From the east you hear the noisy din of pigs.
  room_flags: '0'
  sector: 1
  owner: ''
  exits:
  - dir: 0
    desc: |
      To the north you see a modest house.
    keywords: ''
    exit_flags: '0'
    key: -1
    to_vnum: 1141
  - dir: 1
    desc: |
      A rather large pig pen is to the east.
    keywords: ''
    exit_flags: '0'
