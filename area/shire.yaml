  description: "You stand on a solidly built bridge.  As you look down you spy gaily\n\rcolored
    fish swimming with the current of Brandywine River.  The cool water\n\rlooks invitingly
    refreshing and you get a sudden urge to strip and bathe in\n\rthe river, but you
    hear the laughter of women nearby and so resist the urge.\n\rDelving Lane extends
    to the north while Bywater Road can be seen to the south.\n\r"
