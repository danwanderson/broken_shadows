- vnum: 1145
  name: Shiriff Post of Delving Lane
  description: "You are in the Shiriff Post which acts as the nucleus for the three
    shiriffs\n\rof Delving Lane.  As you examine the shiriffs on duty, you come to
    realize\n\rthat the halflings of the Shire are not to be reckoned with.  You cower
    with\n\rawe.  The only exit is to the west.\n\r"
