  name: Took Hill
  description: "You stand on top of Took Hill, named after the legendary Bandobras
    Took.\n\rYou feel honored to be standing on a hill named after your hero.  From
    this\n\rvantage point you can see all of shiredom.  You get the feeling that with\n\rone
    stomp you could eliminate their great city.  You can see the outline of\n\rMidgaard
    to the far east.  Sounds of joyful celebration are heard from the\n\rfields west
    of here.  The Brandywine flows by lazily nearby.\n\r"
  room_flags: 0
