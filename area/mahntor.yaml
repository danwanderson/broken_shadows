- vnum: 2349
  name: The throne room
  description: "You stand in a large, crudely decorated throne room. A huge throne
    adorned\n\rwith humanoid skulls sits against the west wall. A crude, blood stained
    altar\n\ris against the east wall. A doorway is directly to the north, long strands
    of\n\rbeads blocking the view of the other side. Crude torches light the hall
    and \n\rsmoke clings to the ceiling.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
