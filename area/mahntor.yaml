    description: "A very formidable looking door.\n\r"
  - keywords: gold
    description: "Looks like the back of a secret door of sorts.\n\r"
- vnum: 2386
  name: Entry to the Royal Chambers
  description: "You are at the entrance to the royal chambers of the keep. A plush
    shag rug\n\rcovers the stone floor. Large candelabras hang from the ceiling, lighting
    the\n\rroom. A huge fireplace warms the room. Beaded doorways lead south and east.
    A\n\rhuge stone door stands in the west wall.\n\r"
  room_flags: 8
  sector: 0
