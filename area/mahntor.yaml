    description: "It looks like it leads back to the hall.\n\r"
- vnum: 2395
  name: The main living room
  description: "This room is decorated with sturdy stone furniture that is carved
    and gilded.\n\rLarge candles light the room. A thick rug covers the floor. Thick
    furs and\n\rtapestries decorate the walls. Beaded doorways lead south and west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 2
