  extra_descs: []
- vnum: 2334
  name: Lost in the Mist
  description: "You try to peer through the mist......You see nothing. It swirls about
    you,\n\rcovering you in a damp sheen. There is no sound, all light is eagerly
    devoured\n\rby the mist. You feel totally and hopelessly lost.\n\r"
  room_flags: 8201
  sector: 4
  owner:
  exits:
  - dir: 0
