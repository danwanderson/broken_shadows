    to_vnum: 2323
  extra_descs:
  - keywords: portal blue
    description: "You see a swirling blue portal of light. You think you can see glimpses
      of\n\rsomething moving on the \"other side\".\n\r"
  - keywords: small inscriptions inscription
    description: "\"Enter all ye who wish to join the Brotherhood!\"\n\r"
- vnum: 2325
  name: The edge of the sea
  description: "You walk along the water's edge. The tide appears to have risen. Very
    little\n\rdebris is washed up on shore. You slip and slide as you tread across
    the\n\rslippery rocks that make up the shore. To the west you see a small altar
    that\n\rradiates blue light. The shore extends north away from the water's edge.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
