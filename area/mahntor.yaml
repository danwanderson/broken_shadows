- vnum: 2382
  name: The Great Hall
  description: "You stand in the great hall of the keep. Huge pillars rise up to the
    vaulted\n\rceiling and torch light glimmers off the marble floor here. You are
    amazed at\n\rthe sheer size of the hall. The hall itself leads north and east.
    You notice a\n\rsmaller hall leading south, deeper into the keep.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
