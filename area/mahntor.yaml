- vnum: 2339
  name: The solid path
  description: "A solid path rises out of the misty swamp. It leads north, into what
    appears\n\rto be a forested area. The trees, above, allow light and air to penetrate
    and\n\ryou can see the sky above. A thick bank of mist is to your west.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2340
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2336
  extra_descs: []
- vnum: 2340
  name: A forested path
  description: "The path here leads north through a thick forest. High bushes and
    forest\n\rundergrowth line both sides of the trail. Looking north, you see a thin
    line\n\rof smoke rising up above the tree line. You also notice a crude wooden
    gate\n\rfarther north on the trail. The trail itself leads south into murky territory.\n\r"
  room_flags: 4
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2341
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2339
  extra_descs: []
- vnum: 2341
  name: The gate before the Ogre Village
  description: "You stand before a huge pair of crude, wooden gates. They are thrown
    open.\n\rLooking inside the gates, you see a crude village. Large humanoid creatures\n\rare
    milling to and fro.......Ogres! You can head north through the gate or\n\rsouth
    into the forest.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2343
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2340
  extra_descs: []
- vnum: 2342
  name: Among the crude huts
  description: "You walk among the huts of the ogre village. The village appears to
    be cut\n\rfrom the heart of the forest itself. The swamp, nearby, provides the
    ogres\n\rwith a prime hunting ground. Small paths lead north and east.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2345
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2343
  extra_descs: []
- vnum: 2343
  name: Inside the gates
  description: "You stand just north of the gates to the village. Looking around,
    you see many\n\rcrude huts and cooking fires. To the north, you see a huge fire
    pit. Behind \n\rit, there appears to be a hut of sorts. Small paths lead east
    and west among \n\rthe crude huts. The gates to the south provide an exit from
    the village.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2346
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2344
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2341
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2342
  extra_descs: []
- vnum: 2344
  name: Among the crude huts
  description: "You walk through the crude village. Small huts made of wood and thatch\n\rsurround
    you. Every so often, you can hear grunts and snarls inside the huts.\n\rThe smell
    here is unbearable. You wonder what type of creature could possibly\n\rlive in
    such squalor. Small paths lead west and north here.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2347
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2343
  extra_descs: []
- vnum: 2345
  name: The gathering place
  description: "This appears to be the clearing the ogres use to assemble. It is quite
    large\n\rand has a raised mound in the center that contains a crude throne. The
    ground\n\rin front of the throne is quite worn, as if it is sat on quite often.
    You get\n\rthe impression that this place is a crude sort of auditorium. Small
    paths lead\n\reast and south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2346
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2342
  extra_descs: []
- vnum: 2346
  name: The firepit before the lodge
  description: "You stand at the edge of a huge firepit. The heat from the burning
    embers\n\rmakes you sweat as you stand here. Large spits above the pit are empty
    but\n\rthey appear to be quite large enough to hold hapless adventurers. A large\n\rlodge
    is towards the north, while paths lead east, west, and south into the\n\rvillage
    itself.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords: door
    exit_flags: 1
    key: -1
    to_vnum: 2348
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2347
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2343
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2345
  extra_descs: []
- vnum: 2347
  name: The village dump
  description: "The smell here overpowers you. All around you are the rotting remains
    of the\n\rvillage's refuse. Partially eaten corpses, rotting food, and other truly\n\rdisgusting
    things have been discarded here. Paths lead south and west towards\n\rfresher
    air.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
