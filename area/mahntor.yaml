    to_vnum: 2367
  extra_descs: []
- vnum: 2369
  name: The Inn of the Broken Horn
  description: "You enter a warm tavern. The room is lit mainly by two huge fireplaces
    at each\n\rend of the room. Small tables and a large bar furnish the room. The\n\rinhabitants
    of the inn are all minotaurs of varying size and disposition. Most\n\rseem to
    regard you with suspicion. Few approach you. A large door leads\n\rnorth, out
    of the bar and back out into the cold.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2366
  extra_descs: []
- vnum: 2370
  name: The Mahn-Tor Equipment Shop
  description: "You are in a crude equipment shop. The store is filled with racks
    of various\n\ritems that adventurers could use. Large fireplaces light and heat
    the room.\n\rA large desk occupies the back of the room. The door to the shop
    lies to the\n\rnorth.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2367
  extra_descs: []
- vnum: 2371
  name: The Mahn-Tor General Store
  description: "You enter a small store that is dark and cold. Old empty shelves line
    the\n\rwalls and snow blows across the dirty stone floor. It is evident that this\n\rstore
    was once used, but it is no more. A small doorway leads north out into\n\rthe
    chilling snow and wind.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2368
  extra_descs: []
- vnum: 2372
  name: Gorak's Training Room
  description: "This room is full of all sorts of weapons and armours. Pieces of old
    targets\n\rand practice dummies lie all around. The walls are chipped and scored
    from\n\rweapon blows. This is obviously the room of an avid warrior. A red door
    leads\n\reast.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords: red
    exit_flags: 9
    key: 2351
    to_vnum: 2388
  extra_descs:
  - keywords: red
    description: "It looks like it leads back to the hall.\n\r"
- vnum: 2373
  name: Darkoth's Dark Study
  description: "This room is dark. It reeks of death and evil. Arcane symbols and
    a small\n\raltar fill the room. Blood runs from the altar. It is evident that
    this room\n\ris used for unholy purposes. A black door leads west.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords: black
    exit_flags: 9
    key: 2352
    to_vnum: 2389
  extra_descs:
  - keywords: black
    description: "It looks like it leads back to the hall.\n\r"
- vnum: 2374
  name: Tyrgoth's Inner Sanctum
  description: "Idols to the gods of good fill the room. White furniture and decorations
    give\n\rthe room a holy appearance. It is evident that some being of supreme goodness\n\rlives
    here. A white door leads east.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords: white
    exit_flags: 9
    key: 2353
    to_vnum: 2392
  extra_descs:
  - keywords: white
    description: "It looks like it leads out to the hall.\n\r"
- vnum: 2375
  name: The road to the Keep of Mahn-Tor
  description: "You walk up a steep rocky road. It leads up a steep grade to the east.
    At the\n\rend of this steep road, you see a huge keep. Snow swirls all about you
    and you\n\rfeel your breath freeze as it leaves your lungs. Blurry lights to the
    east and\n\rwest are all you can see from here.\n\r"
  room_flags: 4
  sector: 5
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2377
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2368
  extra_descs: []
- vnum: 2376
  name: A small guard house
  description: "You enter a small guard house. A huge fireplace lights and warms the
    room.\n\rLooking around, you see that the room is fairly well furnished. Thick
    rugs\n\rand curtains help insulate the room and the beds themselves look quite
    warm.\n\rA table in the center of the room has the remnants of a card game strewn\n\racross
    it. A small door leads south.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2377
  extra_descs: []
- vnum: 2377
  name: Before the Keep of Mahn-Tor
  description: "You stand before a huge keep that has been carved into the side of
    the\n\rmountain. Huge wooden gates before you provide entrance to the keep. It\n\rappears
    as though the cold here has convinced the guards to seek warmth\n\rinside. You
    see the lights of the city to the west. You also notice small\n\rguard houses
    to the north and south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2376
  - dir: 1
    desc:
    keywords: gate
    exit_flags: 15
    key: 2350
    to_vnum: 2379
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2378
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2375
  extra_descs: []
- vnum: 2378
  name: A small guard house
  description: "You enter a small, but warm, guard house. Deep rugs and thick curtains\n\rinsulate
    the room. A huge fireplace lights and warms the room. Outside, you\n\rhear the
    roar of the freezing wind. A small door leads north out into the cold.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2377
  extra_descs: []
- vnum: 2379
  name: The entryway to the Keep of Mahn-Tor
  description: "You are at the entry hall to the huge keep. The high vaulted ceiling
    is carved\n\rfrom solid stone. Huge stone pillars rise up from the floor to meet
    the\n\rceiling far above. The architecture appears to be dwarven. A huge pair
    of\n\rgates stand to the west, protecting the keep from the harsh cold outside.
    A\n\rlarge hall leads east, deeper into the keep.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2380
  - dir: 3
    desc:
    keywords: gate
    exit_flags: 15
