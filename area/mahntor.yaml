- vnum: 2350
  name: The chieftain's room
  description: "This appears to be the ogre chieftain's private quarters. A huge pile
    of furs\n\ris in the far corner. Large chests fill the room. All of them have
    heavy pad\n\rlocks. The room is filled with trophies of dead enemies. It is quite
    lavishly\n\rdecorated for such a crude inhabitant as an ogre. A beaded doorway
    is to the\n\rsouth.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
