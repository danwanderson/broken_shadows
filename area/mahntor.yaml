- vnum: 2390
  name: Sumaron's Sanctum
  description: "You enter a temple of sorts. A small altar is here and relics of many\n\rreligions
    lie around. It is evident that this is the room of a studying cleric.\n\rA yellow
    door leads west.\n\r"
  room_flags: 8
