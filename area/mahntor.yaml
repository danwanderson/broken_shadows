- vnum: 2397
  name: The end of the guarded hall
  description: "You are at the end of the hall. Colored doors line the walls to the
    north. To\n\ryour west, you see a brown door. To you east, you see a grey door.
    The hall\n\ritself leads north back along the rows of doors.\n\r"
  room_flags: 8
