- vnum: 2321
  name: The rocky shoreline
  description: "You are on a rocky shore that borders a vast sea. A stiff wind blows
    here and\n\rwhistles among the rocks. You see an altar of some sort built on the
    shore to\n\rthe south. The shore itself leads east and west. Looking up, you see
    foothills\n\rand rocky crags.\n\r"
  room_flags: 0
  sector: 2
