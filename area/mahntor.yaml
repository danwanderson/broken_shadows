  - keywords: brown
    description: "You see a brown door here. It has the name \"Belrak\" written on
      it.\n\r"
- vnum: 2398
  name: Dorgar's Dismal Domicile
  description: "This room is dirty and unkempt. Odds and ends of different items lie
    all over.\n\rIt is apparent that some type of pack-rat lives here. It appears
    as though\n\rnothing has ever entered this room and ever left again. A grey door
    leads west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords: grey
    exit_flags: 15
    key: 2358
    to_vnum: 2397
  extra_descs:
