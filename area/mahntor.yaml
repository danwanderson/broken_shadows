- vnum: 2319
  name: The hills above the shoreline
  description: "You stand on a rocky summit overlooking a rough shoreline below. The
    sea wind\n\rblows hard across the rocks here and they have been worn smooth with
    time.\n\rLooking around, you notice that you can safely climb down towards the
    shore.\n\rThe hills themselves stretch towards the north. The rough summit you
    stand\n\rupon leads west along the shoreline.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
