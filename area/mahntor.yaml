- vnum: 2327
  name: The swampy path
  description: "This damp path seems to lead into a deep, dark swamp. The trees above
    block\n\rout all light and stifle the wind. You smell swamp gas and hear damp
    squashing\n\rsounds all around you. The path leads east deeper into the swamp.
    You also see\n\ra dark forest to the west.\n\r"
  room_flags: 13
  sector: 3
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
