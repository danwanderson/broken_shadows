- vnum: 2380
  name: The Hall
  description: "You are in a huge hall. Large tapestries line the walls and huge statues
    of\n\rvarious make and appearance are spread about. The ceiling above supports
    huge\n\rcandelabras, which light the room. To the east, you see a bright light
    and\n\rhear sounds of inhabitation. Looking west, you see the entry gates to the
    keep.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
    desc:
