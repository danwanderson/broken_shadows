    to_vnum: 2364
  extra_descs: []
- vnum: 2366
  name: The city streets of Mahn-Tor
  description: "You trudge through the snow covered streets. The street itself is
    made of\n\rcobblestones and the footing is quite treacherous. To the south, you
    see what\n\rappears to be a small tavern. Bright lights shine through the windows.
    Small\n\rstreets also lead north and east.\n\rA small sign hangs outside the tavern.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2363
