- vnum: 2320
  name: The rocky shore
  description: "You are at the base of the rocky hills. Stretching to the south and
    east, you\n\rsee a rocky shore. To the southeast, you see a small altar of some
    sorts that\n\rglows with an eerie blue light. It is possible to climb up into
    the hills here.\n\r"
  room_flags: 0
