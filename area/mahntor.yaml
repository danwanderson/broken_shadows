- vnum: 2322
  name: The rocky shore
  description: "You stand at the base of some rocky hills, where they meet a rocky
    shore. A\n\rvast sea is to your south. Looking to the southwest, you see a small
    altar\n\rthat glows with a eerie blue light. The shore stretches out to the south
    and\n\rwest. It is possible to climb up into the hills here.\n\r"
  room_flags: 0
  sector: 2
