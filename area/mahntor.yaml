- vnum: 2336
  name: Lost in the Mist
  description: "You wander, lost, for what seems an eternity. Then....From nowhere....You
    see\n\rwhat appears to be trees and hills to the east. The mist itself thickens
    to\n\rthe west, while it grows thin to the east.\n\r"
  room_flags: 8201
  sector: 4
  owner:
  exits:
  - dir: 0
