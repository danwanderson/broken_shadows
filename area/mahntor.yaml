- vnum: 2365
  name: The city streets of Mahn-Tor
  description: "You trudge among the icy streets of Mahn-Tor. The streets themselves
    are made\n\rof cobblestone and are quite treacherous. Small homes and businesses
    along\n\rthe street are closed tight and light from their windows throws eerie
    shadows\n\racross the dark street. Small streets lead west and south here.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
