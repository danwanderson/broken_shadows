  extra_descs: []
- vnum: 2381
  name: The Grand Hall
  description: "You are in the main hall of the Keep of Mahn-Tor. This hall is huge.
    The wide\n\rfloor of the hall is an expanse of marble. It shimmers in the light
    thrown\n\roff by the torches that line the walls. To the east, you see what appears
    to\n\rbe a huge golden throne. The hall itself stretches south and a smaller hall\n\rleads
    to the west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
