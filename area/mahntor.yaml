- vnum: 2353
  name: The Glacier Temple
  description: "You are in a small temple. It appears to be built entirely from ice.
    The ice\n\rwalls are frosted and are opaque. There is a small blue portal here.
    You can\n\rgo north, to enter the portal. Looking south, you see a world of white
    outside\n\rthe open doorway. Swirling snow and bright light obscure your view.\n\r"
  room_flags: 8
