rooms:
- vnum: 2300
  name: The dark woods
  description: "You are travelling through woods that are as dark as night. The trees
    above\n\rblock all light and wind. The air is stagnant and smells of death and
    decay.\n\rThe lack of sounds and other signs of life make your skin crawl and
    you feel\n\rvery much like turning back and heading for safer areas. The path
    leads north\n\rinto more open lands while it also leads south into the darkness
    of the forest.\n\rA small sign is posted here.\n\r"
  room_flags: 4
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 5280
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2301
  extra_descs:
  - keywords: sign
    description: "[]================================[]\n\r |      BEWARE!      | Hope
      you   |\n\r |   Travellers are  | enjoy it!  |\n\r |  advised to stay  | <------->
      \ |\n\r |   in groups for   |  Skurge    |\n\r |      safety.      | Ragnarok
      \  |\n\r[]================================[]\n\r"
- vnum: 2301
  name: The dark woods
  description: "You wearily travel through the darkness of the forest. Huge skeletal
    trees\n\rline the edges of the path and tower above you. Errant rays of light
    spear\n\rdown through the gaps in the canopy above and provide small spots of
    light\n\rthat seem to attract what little foliage can grow on the dark forest
    floor.\n\rThe path winds north and south into darkness.\n\r"
  room_flags: 5
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2300
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2302
  extra_descs: []
- vnum: 2302
  name: The small intersection in the forest
  description: "The forest path splits here in three directions. Small paths lead
    to the east,\n\rnorth, and south. The trees above leave a gap which allows light
    to fill the\n\rintersection. It is almost as though you are in a circle of light
    that\n\rprovides sanctuary in this land of darkness.\n\rSomething has been scrawled
    in the dirt in blood here.\n\r"
  room_flags: 0
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2301
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2304
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2303
  extra_descs:
  - keywords: blood dirt scrawl
    description: "BeWAre tHe SwAmP oGreS......\n\r"
- vnum: 2303
  name: The edge of the forest and hills
  description: "You stand at the edge of a dark forest. A path leads north into the
    forest and\n\rits deadly darkness and silence. Looking west, you see a path that
    leads up\n\rinto a foothills region. Standing here on the boundary between light
    and\n\rdarkness, you feel very vulnerable and alone.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2302
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2309
  extra_descs: []
- vnum: 2304
  name: In the dense forest
  description: "You walk along a small path leading through a dark forest. No sounds
    can be\n\rheard and little light penetrates the canopy of trees above you. The
    air here\n\rsmells musty and you long for a fresh breath. You see an intersection
    of paths\n\rto the west. The path you are on leads south into the darkening woods.\n\r"
  room_flags: 1
  sector: 3
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2305
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2302
  extra_descs: []
- vnum: 2305
  name: The dark forest path
  description: "You continue on through darkness and gloom. The path below you has
    become a\n\rwet quagmire. It is difficult to walk, and you make squishing sounds
    as you\n\rmove on. Looking east, you see a swampy path. The main path leads north
    and\n\rsouth into darkness.\n\r"
  room_flags: 1
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2304
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2327
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2306
  extra_descs: []
- vnum: 2306
  name: A turn in the path
  description: "The forest path turns here towards the north and west. To the north,
    you see\n\rthat the ground has become dank and swampy, while the western path
    appears\n\rto be entering a hilly area. You hear sounds of swamp creatures to
    the north\n\reast.\n\r"
  room_flags: 1
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2305
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2307
  extra_descs: []
- vnum: 2307
  name: The bloody intersection
  description: "This is a small intersection. Paths lead east, west, and south. You
    are struck\n\rby the carnage here when you enter the clearing. There appears to
    have been a\n\rgreat battle here. Blood is everywhere and the ground is all torn
    up. Pieces\n\rof beaten armour and broken blades lie all around. Examining the
    tracks here\n\rlead you to believe that the dead and wounded were dragged off
    in two \n\rdirections, south and east.\n\r"
  room_flags: 1
  sector: 4
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2306
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2310
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2308
  extra_descs: []
- vnum: 2308
  name: The rocky path
  description: "The path here winds among the low rocky hills. The long trek up and
    down the\n\rhills begins to tire you greatly. Looking east, you see a small clearing.
    More\n\rhills are to the north of here.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2309
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2307
  extra_descs: []
- vnum: 2309
  name: The rocky path
  description: "The path here is very rocky and treacherous. The travelling is rough
    and you\n\rslip and fall often. Looking south, you see that the path continues
    into the\n\rhills. Smoother ground is to the east, but the path seems to lead
    into a dark\n\rforest in that direction.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2303
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2308
  extra_descs: []
- vnum: 2310
  name: Up the rocky hillside
  description: "You are climbing on a rocky hillside. As you scramble about, loose
    rocks and\n\rsmall boulders bounce and fall down below you. Looking to the east
    and west,\n\ryou see more stable ground. The hillside itself goes on higher to
    the south\n\rand it drops away to the north.\n\r"
  room_flags: 4
  sector: 5
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2307
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2312
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2314
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2311
  extra_descs: []
- vnum: 2311
  name: The sparse foothills
  description: "You are in foothills that are sparsely covered by scraggly bushes
    and weather\n\rbeaten trees. There are little signs of life here. Only bare rock
    and dry dirt\n\rcan be seen. Looking east, you see a small pass that will allow
    you to leave\n\rthe foothills. The foothills themselves extend to the south.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2310
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2313
  extra_descs: []
- vnum: 2312
  name: Standing on level ground
  description: "You are standing at the edge of a steep set of foothills. Looking
    down, you\n\rsee what appears to be a marshy, dark forest. It reeks of death and
    decay.\n\rEven here, you catch its scent on the winds. From here, you can travel
    south\n\rdeeper into the foothills or to the west where a small pass will allow
    you to\n\rclimb down.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2315
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2310
  extra_descs: []
- vnum: 2313
  name: In the foothills
  description: "You are in a barren set of foothills. Looking around, all you see
    are dead\n\rplants and boulders. From the south, you get a whiff of salty air.
    Barren paths\n\rlead east, north, and south into more barren hills.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2311
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2314
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2317
  extra_descs: []
- vnum: 2314
  name: Before the huge tree
  description: "You enter a large ring of boulders. Sheltered by this wall of stones,
    a small\n\rcluster of plants have sprung up. In the center of this group of trees
    and\n\rbushes is a huge gnarled tree. It appears to have been twisted and torn
    by\n\rthe forces of nature. It sways and moans as a strong wind from the south
    tears\n\rthrough its old feeble branches. The hills themselves lead in all directions.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2310
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2315
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2318
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2313
  extra_descs: []
- vnum: 2315
  name: Before the dark cave
  description: "You stand directly before a huge dark cave. The rocks and boulders
    outside the\n\rcave are covered with blood stains and all types of broken and
    shattered bones\n\rlie around. An unbearable stench comes from within the cave
    itself. The dark\n\rcave entrance looms to the east. The hills themselves lead
    towards the\n\rnorth, south, and west.\n\r"
  room_flags: 0
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2312
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2316
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2319
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2314
  extra_descs: []
- vnum: 2316
  name: Inside the horrid cave
  description: "The stench is overwhelming. You can hardly breathe as you enter the
    cave.\n\rLooking around, you realize that some bizarre and horrible creature uses
    this\n\rcave as a home. Skeletal remains lie all over. Several half-eaten corpses
    are\n\rrotting away slowly in the gloomy darkness. In the back of the cave, you
    see a\n\rlarge pile of rotting cloth, fur, and plant matter. Light and safety
    is\n\rtowards the west.\n\r"
  room_flags: 9
  sector: 0
  owner:
  exits:
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2315
  extra_descs:
  - keywords: pile
    description: "It appears to be some sort of nest......\n\r"
- vnum: 2317
  name: The hills overlooking the shore
  description: "Standing at the edge of the foothills, you are able to look down upon
    a rocky\n\rshoreline. It appears as though a vast ocean is to the south. Sea birds
    have\n\rmade their nests here in the rocks and you are heartened by the presence
    of\n\rlife here. It is possible to climb down to the shore here. The hills\n\rthemselves
    are to the north. The edge of the hills leads to the east along the\n\rshoreline.\n\r"
  room_flags: 0
  sector: 4
