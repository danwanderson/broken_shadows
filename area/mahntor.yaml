- vnum: 2391
  name: Amyrok's Arcane Study
  description: "This room is full of shelves which hold various spell components.
    The center\n\rof the room is occupied by a huge pentagram. The entire room smells
    of smoke\n\rand incense. The room is obviously used extensively by a practicing
    mage. A\n\rmaroon door leads west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
