      \   Broken   |\n\r |     Horn    |\n\r[]=============[]\n\r"
- vnum: 2367
  name: The Square of Mahn-Tor
  description: "This appears to be the main square of Mahn-Tor. A huge fountain graces
    the\n\rcenter of the square, but the extreme cold has turned it into an ice\n\rsculpture.
    The water has frozen in arcs through the air. Snow and ice covers\n\rthe square
    and small streets lead east and west. To the north, you see\n\rthe gates to the
    city. You also notice a small store to the south.\n\rA small sign hangs outside
    the store.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
