- vnum: 2392
  name: The guarded hall
  description: "You walk down a quiet hall. The stone walls here are wet with moisture.\n\rColored
    doors can be seen in the walls here. To your east, you see a green\n\rdoor. To
    your west, you see a white door. The hall itself leads north and\n\rsouth.\n\r"
  room_flags: 8
