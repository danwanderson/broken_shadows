  extra_descs: []
- vnum: 2332
  name: Lost in the Mist
  description: "You wander, hopelessly lost. Swirling mist obscures your vision and
    clouds\n\ryour mind. You lose all concept of direction. Small, silent giggles
    can be\n\rheard all around. You can wander in any direction.\n\r"
  room_flags: 8201
  sector: 4
  owner:
  exits:
