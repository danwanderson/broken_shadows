- vnum: 2323
  name: The edge of the sea
  description: "You walk along the water's edge. The vastness of the ocean is staggering
    as\n\ryou look out across it. You notice a small altar that glows with blue light\n\rto
    the east. The shore itself extends north away from the water's edge.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
