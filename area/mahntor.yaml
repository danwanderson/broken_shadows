- vnum: 2383
  name: Standing before the throne
  description: "You stand before the throne of Mahn-Tor. This golden throne is so
    huge that it\n\rtakes up almost the entire wall, stretching far above the floor.
    Sitting upon\n\rit, you feel small and feeble. It is evident that this throne
    is more of a\n\rdecoration than anything else. Only the largest of kings could
    sit upon it.\n\rThe hall leads south and west into other parts of the keep.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
  - dir: 1
