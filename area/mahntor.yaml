  extra_descs: []
- vnum: 2335
  name: Lost in the Mist
  description: "You stumble through the marsh here. The swamp seems to have swallowed
    you up\n\rand denied you exit. This mist is your jailor. You cannot tell where
    you are.\n\rYou hear quiet laughter all about you.\n\r"
  room_flags: 8201
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
