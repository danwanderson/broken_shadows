- vnum: 2324
  name: The Blood Sea Portal
  description: "You stand on a small pedestal like altar that has been built on the
    shore\n\rhere.  Standing here, you can look out across the sea.  You can almost\n\rimagine
    that you see a far away island.  Dominating the altar is a small\n\rblue portal
    of light.  It is possible to walk south into the portal.  The\n\rshore itself
    extends to the north, east, and west.  \n\rThere are small inscriptions on the
    rock at the base of the portal.\n\r"
  room_flags: 0
  sector: 2
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2321
