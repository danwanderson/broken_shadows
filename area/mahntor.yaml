    description: "It looks like it leads back to the hall.\n\r"
- vnum: 2399
  name: Belrak's Green Room
  description: "This room is full of green. The furniture and all other items show
    the color\n\rof nature. The room smells of pine and forest odors. From the items
    here, it\n\rappears as though a woodsman of some sorts lives here. A brown door
    leads east.\n\r"
