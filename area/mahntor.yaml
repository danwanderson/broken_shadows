- vnum: 2318
  name: The hills overlooking the shoreline
  description: "You stand on a barren section of hills that overlook a rocky shoreline.
    The\n\rstiff ocean wind has blown the rocks smooth here and you have to lean forward\n\ra
    bit to keep your balance. The salty sea air fills your nostrils and you\n\rnotice
    signs of life in the rocky crags here. You can climb down towards the\n\rshore
    or head north into the hills themselves. The rocky summit you are\n\rstanding
    leads east and west along the shoreline.\n\r"
  room_flags: 0
  sector: 4
