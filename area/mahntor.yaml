- vnum: 2337
  name: Lost in the Mist
  description: "You wander through the thick mist. It swirls all about you and makes
    it hard\n\rto breathe. The ground below you makes a soft squishing sound as you
    trudge\n\ron, but this noise is absorbed by the mist and does not travel. You
    can wander\n\rin any direction.\n\r"
  room_flags: 8201
  sector: 4
  owner:
  exits:
  - dir: 0
    desc:
