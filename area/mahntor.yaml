    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2328
  extra_descs: []
- vnum: 2330
  name: The turn in the swampy path
  description: "You come upon a bend in the swampy path. The ground here is fairly
    sturdy,\n\ras this place is elevated above the rest of the swamp. Looking around,
    you see\n\ra dark, mist filled swamp. Small paths lead south and west into the
    mist.\n\r"
  room_flags: 9
  sector: 3
  owner:
  exits:
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2331
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2329
  extra_descs: []
- vnum: 2331
  name: The swampy path
  description: "You tread lightly through the mirky water and sludge that makes up
    the path\n\ryou follow. To the east, there is a thick wall of mist. You can see
    nothing\n\rwithin it. Harder ground rises to the north.\n\r"
  room_flags: 9
  sector: 3
  owner:
  exits:
  - dir: 0
    desc:
