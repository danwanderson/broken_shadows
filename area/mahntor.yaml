- vnum: 2384
  name: The Great Hall
  description: "You are in a great hall. Huge torches light the room and their light
    shimmers\n\roff the marble floor below you. To the north, you see a huge golden
    throne.\n\rLooking up, you grow dizzy at the height to which the vaulted ceiling
    rises.\n\rThe hall itself leads north and west.\n\r"
  room_flags: 8
  sector: 0
