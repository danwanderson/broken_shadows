- vnum: 2396
  name: The Master Bedroom
  description: "This appears to be the master bedroom. A huge bed fills the rooms.
    Piles of\n\rfurs and other rich furnishings adorn the room. Candles are everywhere
    and\n\rthey help a huge fireplace light the room. The lavishness of the room\n\roverwhelms
    you. Beaded doorways lead north and west.\n\r"
