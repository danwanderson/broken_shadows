- vnum: 2338
  name: Lost in the Mist
  description: "You wander, lost hopelessly. The mist swirls all about you. You can
    discern no\n\rdirection. You stumble blindly through the mist, oblivious to your\n\rsurroundings.\n\r"
  room_flags: 8201
  sector: 3
  owner:
  exits:
