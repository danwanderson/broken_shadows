- vnum: 2348
  name: The entryway to the lodge
  description: "You are at the entry hall to a large lodge. Animal pelts and other
    trophies\n\rline the walls here. Large chests on either side of the door appear
    to be\n\rlocked. The lodge stretches north, while the doors to the south provide
    an\n\rexit into the village.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
