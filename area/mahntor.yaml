- vnum: 2387
  name: The Guard Post
  description: "The hall here has been built into a guard post of sorts. It appears
    as though\n\rit would be quite easy to defend in times of emergency. Obviously,
    something\n\rimportant lies beyond. A small hall leads south, while the main hall
    can be\n\rseen to the north.\n\r"
  room_flags: 8
  sector: 0
