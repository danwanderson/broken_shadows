- vnum: 2333
  name: Lost in the Mist
  description: "You are in a thick misty area. The mist swirls around you, seeming
    to taunt\n\ryou and dare you to escape. You feel a slight electric charge in the
    mist. It\n\ralmost caresses your body as it floats about you. You can wander in
    any\n\rdirection.......\n\r"
  room_flags: 8201
  sector: 3
  owner:
  exits:
