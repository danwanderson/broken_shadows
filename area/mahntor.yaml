    description: "[]=========[]\n\r |  Equip  |\n\r |   Shop  |\n\r[]=========[]\n\r"
- vnum: 2368
  name: The streets of Mahn-Tor
  description: "You walk among the small stores and homes of Mahn-Tor. The cobblestone
    streets\n\rare covered with ice and snow. Small snow drifts have formed at the
    edges of\n\rthe streets. The wind blows fiercely. Small streets lead in all directions.\n\rThere
    appears to be a large building to the east, but the snow obscures your\n\rview.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2365
