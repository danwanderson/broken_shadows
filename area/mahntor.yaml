- vnum: 2326
  name: Floating in blue light
  description: "You seem to be floating in blue weightlessness. You tumble head over
    heels and\n\rfinally right yourself. Gaining your bearings, you notice that there
    are two\n\r\"windows\" in the sea of blue here. One to the south shows an image
    of a snowy\n\rplain. Another window the the north shows an image of a rocky shore.\n\r"
  room_flags: 12
  sector: 0
