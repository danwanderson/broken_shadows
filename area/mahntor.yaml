- vnum: 2388
  name: The guarded hall
  description: "You walk down a torch lit hallway. It has been carved out of pure
    stone. It is\n\rvery quiet in this hall. You notice rows of colored doors on each
    wall. To\n\ryour east, you see a yellow door. To your west, you see a red door.
    The hall\n\ritself leads south and north.\n\r"
  room_flags: 8
  sector: 0
