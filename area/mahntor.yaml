- vnum: 2394
  name: Nasturn's Humble Abode
  description: "This room is filled with all types of natural items. Trees and plants
    have\n\rbeen lovingly cultivated and grown by hand, in large pots. The room is
    like an\n\rindoor garden. A green door leads west.\n\r"
  room_flags: 8
  sector: 0
  owner:
  exits:
