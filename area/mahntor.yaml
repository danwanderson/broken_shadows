  - keywords: white
    description: "You see a white door here. It has the name \"Tyrgoth\" inscribed
      on it.\n\r"
- vnum: 2393
  name: The Harem Room
  description: "This appears to be the harem room of the Keep. Huge piles of furs
    and beds\n\rfill the room. The lighting is dim, but the room is very warm. You
    can hear\n\rmusic playing quietly from somewhere. Beaded doorways lead north and
    east.\n\r"
