    to_vnum: 2305
  extra_descs: []
- vnum: 2328
  name: The swampy path
  description: "You tread lightly in a wet, swampy path. All around you, you see pools
    of\n\rquicksand and rotting vegetation. Unlike the forest to the west, the swamp
    is\n\rteeming with life. Some of it is harmless, some is not. The path leads east\n\rand
    west into more swamp.\n\r"
  room_flags: 9
  sector: 3
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2329
  - dir: 3
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2327
  extra_descs: []
- vnum: 2329
  name: The swampy path
  description: "You weave your way through the treacherous swamp. Gas rises all around
    you and\n\ra damp mist covers the ground, making it impossible to travel safely,
    without\n\rcarefully picking your way around obstacles. Large, gnarled trees rise
    above\n\ryou. Their moss covered branches block out all traces of the sun. The
    path\n\rhere leads east and west.\n\r"
  room_flags: 9
  sector: 3
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: -1
    to_vnum: 2330
