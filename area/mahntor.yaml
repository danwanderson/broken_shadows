- vnum: 2360
  name: The edge of the frigid wastes
  description: "You stand at the base of a steep rocky cliff. To the north, a vast
    arctic\n\rwasteland stretches out. The snow falls lightly here and the wind is
    not\n\rvery fierce. You can climb up the rocky cliff or head north into the arctic\n\rwastes.\n\r"
  room_flags: 4
  sector: 5
  owner:
  exits:
  - dir: 0
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2358
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2361
  extra_descs: []
- vnum: 2361
  name: On the cliffside
  description: "You cling to the side of the cliff. Looking down, you are terrified
    by the\n\rsheer distance to the ground below. You can climb up higher into the
    cliffs,\n\rbut the area above is obscured by clouds and you cannot tell what lies
    waiting\n\rabove.\n\r"
  room_flags: 4
  sector: 5
  owner:
  exits:
  - dir: 4
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2362
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2360
  extra_descs: []
- vnum: 2362
  name: Before the gates of Mahn-Tor
  description: "You stand at the edge of a high cliff. Directly south, set back off
    the\n\rcliff's edge, you see a huge pair of gates. These gates appear to be carved\n\ralmost
    completely out of ice. A huge city and keep appear to be on the other\n\rside
    of these gates. There is also a possibility of climbing down the cliff \n\rface.\n\r"
  room_flags: 0
  sector: 5
  owner:
  exits:
  - dir: 2
    desc:
    keywords: gate huge gates ice
    exit_flags: 3
    key: -1
    to_vnum: 2364
  - dir: 5
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2361
  extra_descs:
  - keywords: gate gates ice huge
    description: "The gates to the city are made almost completely of ice. Looking
      closely, you\n\rcan see intricate carvings in the gates. They appear to be of
      creatures that\n\rare half man and half bull.\n\r"
- vnum: 2363
  name: The city streets of Mahn-Tor
  description: "You walk among the ice and snow covered shops and homes. Most of the
    doors are\n\rclosed and only the light from the windows betrays the presence of
    inhabitants.\n\rA cold wind blows through here, scattering fine clouds of snow
    all about. Small\n\rstreets lead south and east.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 1
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2364
  - dir: 2
    desc:
    keywords:
    exit_flags: 0
    key: 0
    to_vnum: 2366
  extra_descs: []
- vnum: 2364
  name: Inside the gates of Mahn-Tor
  description: "You stand just inside the gates to the city of Mahn-Tor. The city
    itself\n\rspreads out in front of you. The buildings are sturdy, as they appear
    to be\n\rmade from the very rock of this mountain. Snow falls all around and a
    fine\n\rsheet of ice can be seen covering all but the most used walk ways. Small
    city\n\rstreets lead east and west, while a main road appears to lead south.\n\r"
  room_flags: 0
  sector: 1
  owner:
  exits:
  - dir: 0
    desc:
    keywords: gates gate huge ice
    exit_flags: 7
    key: -1
    to_vnum: 2362
